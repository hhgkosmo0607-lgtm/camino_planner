<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카미노 프로젝트 문서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root{
  --ink:#12253F; --ink2:#1D3B5E; --ink3:#2C4E75;
  --granite:#E7E8E2; --paper:#FBFBF9; --stone:#C6C8BE;
  --flecha:#F0B429; --vino:#7A2E39; --moss:#3F5D4A;
  --text:#1B2430; --muted:#6B7280; --faint:#9AA1AB;
  --sidebar:290px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--granite); color:var(--text);
  font-family:'IBM Plex Sans KR',system-ui,sans-serif;
  font-size:16px; line-height:1.75; -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace; font-variant-numeric:tabular-nums;}

/* ───── 사이드바 ───── */
#side{
  position:fixed; inset:0 auto 0 0; width:var(--sidebar);
  background:var(--ink); color:#fff; display:flex; flex-direction:column;
  z-index:40;
}
.mojon{padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,.12);}
.mojon-brand{display:flex; align-items:center; gap:9px; margin-bottom:14px;}
.mojon-brand svg{flex:none;}
.mojon-brand span{font-family:'Gowun Batang',serif; font-size:15px; letter-spacing:.02em;}
.mojon-plate{border:2px solid rgba(240,180,41,.45); border-radius:4px; padding:9px 13px;}
.mojon-label{font-size:9px; letter-spacing:.3em; color:rgba(255,255,255,.55);}
.mojon-num{font-family:'IBM Plex Mono',monospace; font-size:27px; font-weight:600; color:var(--flecha); line-height:1.1;}
.mojon-num small{font-size:12px; color:rgba(255,255,255,.6); margin-left:5px; font-weight:400;}
.mojon-bar{height:3px; background:rgba(255,255,255,.14); border-radius:2px; margin-top:9px; overflow:hidden;}
.mojon-bar i{display:block; height:100%; background:var(--flecha); width:0; transition:width .15s linear;}

#search{margin:14px 16px 6px; position:relative;}
#search input{
  width:100%; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14);
  border-radius:6px; padding:8px 11px 8px 32px; color:#fff; font-family:inherit; font-size:13px;
}
#search input::placeholder{color:rgba(255,255,255,.4);}
#search input:focus{outline:2px solid var(--flecha); outline-offset:1px; background:rgba(255,255,255,.11);}
#search svg{position:absolute; left:10px; top:9px; opacity:.45;}

#nav{flex:1; overflow-y:auto; padding:8px 10px 24px;}
#nav::-webkit-scrollbar{width:8px;}
#nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16); border-radius:4px;}
.doc{margin-bottom:2px;}
.doc > button{
  width:100%; text-align:left; background:none; border:0; color:#fff; cursor:pointer;
  font-family:inherit; padding:9px 11px; border-radius:6px; display:flex; gap:10px; align-items:baseline;
  border-left:2px solid transparent;
}
.doc > button:hover{background:rgba(255,255,255,.07);}
.doc.on > button{background:rgba(255,255,255,.1); border-left-color:var(--flecha);}
.doc-no{font-family:'IBM Plex Mono',monospace; font-size:11px; color:rgba(255,255,255,.45); flex:none; width:18px;}
.doc-t{font-size:14px; font-weight:500;}
.doc-s{display:block; font-size:11px; color:rgba(255,255,255,.45); font-weight:400; margin-top:1px; line-height:1.45;}
.parts{display:none; padding:2px 0 8px 41px;}
.doc.on .parts{display:block;}
.parts a{
  display:block; color:rgba(255,255,255,.6); text-decoration:none; font-size:12.5px;
  padding:4px 8px; border-radius:4px; border-left:1px solid rgba(255,255,255,.15);
}
.parts a:hover{color:#fff; background:rgba(255,255,255,.06);}
.parts a.here{color:var(--flecha); border-left-color:var(--flecha);}

/* ───── 본문 ───── */
#main{margin-left:var(--sidebar); min-height:100vh;}
#wrap{max-width:840px; margin:0 auto; padding:52px 44px 140px; background:var(--paper); min-height:100vh;
  box-shadow:0 0 0 1px var(--stone);}

#doc h1{font-family:'Gowun Batang',serif; font-size:30px; font-weight:700; line-height:1.35;
  margin:0 0 6px; letter-spacing:-.01em;}
#doc h1 + blockquote{margin-top:0;}
#doc h2{font-family:'Gowun Batang',serif; font-size:23px; font-weight:700; margin:52px 0 14px;
  padding-bottom:9px; border-bottom:2px solid var(--ink); letter-spacing:-.01em;}
#doc h3{font-size:17.5px; font-weight:600; margin:34px 0 10px; color:var(--ink);}
#doc h4{font-size:15px; font-weight:600; margin:24px 0 8px; color:var(--ink2);}
#doc h5{font-size:14px; font-weight:600; margin:18px 0 6px; color:var(--muted);}
#doc p{margin:0 0 14px;}
#doc strong{font-weight:600; color:var(--ink);}
#doc em{font-style:normal; background:linear-gradient(transparent 62%, rgba(240,180,41,.35) 62%);}
#doc a{color:var(--ink2); text-decoration:underline; text-underline-offset:2px; text-decoration-thickness:1px;}
#doc a:hover{color:var(--flecha);}
#doc hr{border:0; border-top:1px solid var(--stone); margin:40px 0;}
#doc ul,#doc ol{margin:0 0 14px; padding-left:22px;}
#doc li{margin-bottom:5px;}
#doc li::marker{color:var(--faint);}

#doc blockquote{
  margin:18px 0; padding:12px 18px; border-left:3px solid var(--flecha);
  background:#FDF9EF; border-radius:0 5px 5px 0; color:#4A3F26;
}
#doc blockquote p:last-child{margin-bottom:0;}
#doc blockquote strong{color:#2E2716;}

#doc code{
  font-family:'IBM Plex Mono',monospace; font-size:.87em;
  background:rgba(18,37,63,.07); padding:1.5px 5px; border-radius:3px; color:var(--ink);
}
#doc pre{
  background:var(--ink); color:#DCE3EC; padding:16px 18px; border-radius:7px;
  overflow-x:auto; margin:16px 0; font-size:12.5px; line-height:1.65;
}
#doc pre code{background:none; padding:0; color:inherit; font-size:inherit;}

/* ───── 표 — 이 문서의 주역 ───── */
.tw{overflow-x:auto; margin:20px 0; border-radius:7px; box-shadow:0 0 0 1px var(--stone);}
#doc table{border-collapse:collapse; width:100%; font-size:14px; background:#fff;}
#doc thead th{
  background:var(--ink); color:#fff; font-weight:500; text-align:left;
  padding:11px 14px; font-size:12.5px; letter-spacing:.02em; white-space:nowrap;
  border-right:1px solid rgba(255,255,255,.1);
}
#doc thead th:last-child{border-right:0;}
#doc tbody td{padding:10px 14px; border-top:1px solid var(--stone); vertical-align:top; line-height:1.6;}
#doc tbody tr:nth-child(even){background:#F7F7F4;}
#doc tbody tr:hover{background:#F2F4F0;}
#doc tbody td:first-child{font-weight:500; color:var(--ink); white-space:nowrap;}
#doc tbody td:first-child:has(+ td){white-space:normal;}
#doc table code{font-size:12px;}

/* 강조 마커 */
#doc td:has(> strong:only-child){background:rgba(240,180,41,.09);}

/* ───── 상단 바 ───── */
#top{
  position:sticky; top:0; z-index:20; background:rgba(251,251,249,.92);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--stone);
  padding:11px 44px; display:flex; align-items:center; justify-content:space-between; gap:16px;
  margin:-52px -44px 34px;
}
#crumb{font-size:12.5px; color:var(--muted);}
#crumb b{color:var(--ink); font-weight:600;}
.tools{display:flex; gap:7px;}
.tools button{
  border:1px solid var(--stone); background:#fff; border-radius:5px; padding:5px 11px;
  font-family:inherit; font-size:12px; cursor:pointer; color:var(--ink);
}
.tools button:hover{border-color:var(--ink); }
.tools button:focus-visible{outline:2px solid var(--flecha); outline-offset:1px;}

/* ───── 검색 결과 ───── */
.hit{padding:13px 15px; border:1px solid var(--stone); border-radius:7px; margin-bottom:9px;
  background:#fff; cursor:pointer;}
.hit:hover{border-color:var(--ink);}
.hit-doc{font-size:11px; color:var(--flecha); font-weight:600; letter-spacing:.04em;}
.hit-line{font-size:13.5px; margin-top:4px; color:var(--text);}
.hit-line mark{background:rgba(240,180,41,.45); padding:0 2px; border-radius:2px;}

/* ───── 반응형 ───── */
#burger{display:none;}
@media (max-width:1000px){
  :root{--sidebar:0px;}
  #side{transform:translateX(-290px); width:290px; transition:transform .2s;}
  #side.open{transform:none;}
  #main{margin-left:0;}
  #wrap{padding:52px 20px 120px;}
  #top{padding:11px 20px; margin:-52px -20px 30px;}
  #burger{display:inline-flex;}
  #doc h1{font-size:25px;}
  #doc h2{font-size:20px;}
  body{font-size:15px;}
}
#scrim{position:fixed; inset:0; background:rgba(18,37,63,.4); z-index:30; display:none;}
#scrim.on{display:block;}

/* ───── 인쇄 ───── */
@media print{
  #side,#top,#scrim{display:none !important;}
  #main{margin:0;}
  #wrap{max-width:none; padding:0; box-shadow:none; background:#fff;}
  body{font-size:10pt; background:#fff;}
  #doc h2{page-break-after:avoid;} #doc table{page-break-inside:avoid;}
  .tw{box-shadow:none; border:1px solid #999;}
  #doc pre{background:#f4f4f4; color:#111; border:1px solid #ccc;}
}
@media (prefers-reduced-motion:reduce){*{transition:none !important; scroll-behavior:auto !important;}}
</style>
</head>

  </div>

<script id="payload" type="application/json">[{"file": "00_README.md", "title": "개요", "sub": "README", "md": "# 카미노 프로젝트 문서\n\n> 한국인 순례자를 위한 카미노 데 산티아고 동반 서비스\n> 문서 v5.1 · 2026년 7월\n\n---\n\n## 0. 산티아고 순례길이란\n\n**처음 보는 사람을 위한 배경.** 아는 사람은 1장으로.\n\n### 무엇인가\n\n스페인 북서부 **산티아고 데 콤포스텔라**까지 걷는 장거리 순례길이다. 사도 야고보의 무덤을 참배하려 시작된 가톨릭 순례였고, 지금은 종교와 무관하게 누구나 걷는 세계적 도보 여행 코스가 됐다. 로마·예루살렘과 함께 중세 3대 성지였고 **유네스코 세계유산**이다.\n\n### 왜 걷는가\n\n| 과거 | 현재 |\n|---|---|\n| 신앙 · 회개 · 기도 · 속죄 | 자기 성찰 · 자연과 문화 체험 · 장거리 도전 · 사람과의 만남 |\n\n### 일반 여행과 다른 점\n\n**관광지를 보는 게 아니라 걷는 과정 자체가 중심이다.**\n\n```\n아침 출발 → 20~30km 걷기 → 숙소 도착 → 휴식 → 다음 날 다시\n```\n\n이게 30~40일 반복된다.\n\n### 어떻게 가는가\n\n- **대부분 혼자 출발한다.** 길에서 사람을 만난다\n- **길 찾기는 어렵지 않다.** 노란 화살표와 조가비 표식이 잘 되어 있다\n- 여행사 가이드 투어도 있다 (350~600만 원)\n- **짐만 다음 숙소로 보내주는 서비스**가 있다 (동키 서비스)\n\n### 난이도\n\n**생활은 어렵지 않다.** 숙소와 식당이 곳곳에 있고, 마을이 이어져 물건을 살 수 있으며, 길도 잘 정비돼 있다.\n\n**하지만 체력적으로는 쉽지 않다.** 하루 20~30km를 한 달 넘게 걸으면 발·무릎·허리에 부담이 온다. **이게 우리 사업의 출발점이다.**\n\n### 숙소 — 정확히 알아야 할 것\n\n| 유형 | 예약 | 요금 (2026) |\n|---|---|---|\n| **공립·Xunta·본당·기부제** | **불가** (워크인 전용, 1박 제한) | 8~12유로 |\n| **사립** | **가능** (전화·WhatsApp·온라인 플랫폼) | 12~20유로 |\n\n⚠️ **\"공립도 예약된다\"는 말이 돌지만 사실이 아니다.** 2020년 코로나 시기 갈리시아 주가 예약 시스템을 운영한 적이 있으나 2021년 7월 폐지됐고 2026년 현재도 워크인 전용이다.\n\n**다만 돈을 조금 더 내면(사립) 전 구간 예약이 가능하다. 예약 인프라는 실제로 좋아졌다.**\n\n> 그래서 **\"침대를 못 구해 노숙한다\"는 프레임은 낡았다.**\n> 진짜 문제는 **\"어느 날을 예약하고 어느 날을 비워둘지\"** 판단할 근거가 없다는 것이다.\n\n### 한 줄로\n\n> **잘 준비된 인프라 속에서, 매일 20~30km를 걸으며 자신을 돌아보는 장거리 도보 여행.**\n\n---\n\n## 1. 한 장 요약\n\n| 항목 | 내용 |\n|---|---|\n| **무엇** | 순례자가 다치지 않고, 숙소 판단을 대신 받으며 걷게 하는 서비스 |\n| **사업 축** | **A. 몸(부상 예방·대응) / B. 잠자리(예약 판단)** |\n| **무게중심** | **A축.** 예약 인프라와 패키지가 좋아져도 **무릎은 아프고 물집은 생긴다** |\n| **최대 기회** | **패키지 수요 전환.** 고객 1명 = 자유여행 고객 10~15명 가치 |\n| **누구** | 한국인 순례자 **전원** (연 1만~1만 2천 명) |\n| **목표** | **도달률 85%+** |\n| **차별점** | ① 출국 전 90일 장악 ② 데이터가 아니라 **판단** ③ **보여주기 카드** ④ 여정 이후 |\n| **원칙** | 무료 · 가입 없음 · 웹 우선 · 오프라인 · **보상은 팔지 않고 준다** |\n| **수익** | 보험·장비(A축) + 숙소·짐배송(B축) + **반패키지** |\n| **시점** | **2027년 성년(Año Santo)** 봄. 다음 성년은 2032년 |\n| **손익분기** | 사이드 **도달률 4%** / 1인 전업 **22%** / 2인 전업 **42%(2028~)** |\n| **최악의 실패 비용** | **900만 원과 40일** — 그 40일은 어차피 걷고 싶었던 길이다 |\n\n---\n\n## 2. ⭐ 사업 모델\n\n### 2.1 두 축\n\n| 축 | 문제 | 파는 것 | 패키지가 대체하나 |\n|---|---|---|---|\n| **A. 몸** | 부상이 완주를 막는다 | 다치지 않게 하는 준비와 판단 | **아니다. 사도 다친다** |\n| **B. 잠자리** | 어느 날을 예약할지 모른다 | 예약과 자유 사이의 판단 | 그렇다 (비싸게) |\n\n### 2.2 예약을 해도, 안 해도 부상으로 간다\n\n```\n  예약을 안 했다              예약을 다 했다\n       ↓                          ↓\n  자리가 걱정된다            오늘 25km를 가야만 한다\n       ↓                          ↓\n  새벽에 서둘러 걷는다        무릎이 아파도 걷는다\n       ↓                          ↓\n      부상  ←──────────────────→  부상\n```\n\n**판단이 없기 때문이다. 이 순환을 끊는 지점이 곧 우리가 돈을 버는 지점이다.**\n\n### 2.3 최대 단일 기회 — 패키지 수요\n\n| | 자유여행 | 패키지 |\n|---|---|---|\n| 총비용 | 약 430~490만 | 약 500~600만 |\n| **차액** | | **70~150만** |\n| 어디서 자나 | **알베르게** | **호텔** |\n\n**그들은 돈이 많아서가 아니라 불안해서 산다. 그리고 그 100만 원에 알베르게를 잃는다.**\n\n우리는 **20~50만 원에 안심을 주고 알베르게는 남긴다.**\n\n⭐ **킬러 기능: 가족 안심 세트** — 매일 도착 알림, 3일 미도착 확인.\n원가 0, 경쟁자 없음, **자녀가 부모에게 사주는 상품**이 된다.\n\n### 2.4 역할 분담\n\n| 축 | 역할 | 수단 |\n|---|---|---|\n| **B. 숙소** | **유입을 만든다** | 어느 날 예약할지 판단, 플랜 B 목록 |\n| **A. 부상** | **수익을 만든다** | 보험, 신발·장비, 짐배송 |\n\n순례자는 신발을 사러 오는 게 아니라 **\"숙소 어떡하지\"** 로 온다.\n\n⚠️ **부상으로 물건을 팔지 않는다.** 신뢰가 이 사업의 유일한 자산이다.\n\n---\n\n## 2-b. 서비스명 — 미확정\n\n이름을 아직 정하지 않았다. **코드에서는 `config/brand.ts` 한 곳에서만 관리한다.**\n\n### 기준\n\n| 기준 | 설명 |\n|---|---|\n| 짧고 발음이 쉽다 | 입소문으로 퍼져야 한다 |\n| 검색 가능 | 흔한 단어면 묻힌다 |\n| 카미노 고유 | 확장해도 뿌리가 남는다 |\n| 종교색이 짙지 않다 | 순례자 다수가 비종교적이다 |\n| 두 축과 어긋나지 않는다 | 부상·숙소를 다루는 서비스다 |\n\n### 후보\n\n| 후보 | 뜻 | 장점 | 약점 |\n|---|---|---|---|\n| **세요** (Sello) | 도장 | 수집 문화의 중심. \"찍으세요\"와 어감이 겹친다 | 뜻이 바로 안 통한다 |\n| **모혼** (Mojón) | 이정표 | 우리 시그니처 UI. \"남은 거리를 알려주는 돌\" | 한국인에게 생소 |\n| **콘차** (Concha) | 조가비 | 순례자의 상징 | 흔하다 |\n| **부엔** (Buen) | 좋은 | 인사말 \"부엔 카미노\"에서 | Buen Camino 앱과 충돌 |\n\n### 확정 전 확인\n\n```\n□ 도메인 (.com / .kr / .co.kr)\n□ 상표 검색 — 여행·소프트웨어 분류\n□ 앱스토어 중복\n□ 스페인어권에서 부정적 의미가 없는지\n□ 한국어 검색 시 동음이의어와 경합하는지\n```\n\n---\n\n## 2-c. 보상은 소유욕을 만들어야 한다\n\n**PDF 한 장은 800km에 값하지 않는다.** 문제는 분량이 아니라 성격이다.\n\n| 동인 | 우리 장치 |\n|---|---|\n| **노력의 증거** | **안개 지도 — 걸어야 열린다** |\n| **수집 완성** | 세요(도장), 랜드마크 19곳 |\n| **개인화** | 내 경로, 내 날짜, 내 사진 |\n| **물성** | 포스터, 포토북, **일회용 필름 카메라** |\n| **자랑 가능성** | 숫자 카드 |\n| **애착** | **크레덴시알 · 「내 돌」** — 마스코트를 만들지 않고 이미 있는 것을 쓴다 |\n\n### 「내 돌」\n\n순례자는 집에서 돌 하나를 가져와 **철의 십자가(1,505m)** 에 놓는다. 출발 전 사진과 한 줄을 등록해두면 그 지점에 도착했을 때 다시 보인다.\n\n**마스코트를 만들지 않는다.** 이미 있는 의식을 기록해줄 뿐이다.\n\n### 안개 지도\n\n지도가 구름에 덮여 있고 **걸으면 걸은 만큼 열린다.** 상징적 장소 19곳에 도착하면 주변이 밝아지며 이야기가 열린다. 완주 후 **\"내가 밝힌 지도\"가 포스터로 남는다.**\n\n⚠️ **안개는 이야기 레이어만 가린다. 경로·화살표·알베르게는 항상 보인다.**\n기본값은 꺼짐이고 언제든 끌 수 있다. **안전이 재미보다 위다.**\n\n---\n\n## 3. 문서 구성\n\n| # | 문서 | 구성 | 대상 |\n|---|---|---|---|\n| 01 | [조사와 근거](./01_조사와근거.md) | **1부** 시장·사용자 조사 · **2부** 출처 대장·최종 검토 | 전원 |\n| **02** | **[전략과 사업](./02_전략과사업.md)** | **1부** 사업모델 · **2부** 패키지 전환 · **3부** 재무·의사결정 · **4부** 법무·리스크 | **의사결정자** |\n| 03 | [제품과 기능](./03_제품과기능.md) | **1부** 제품 기획 · **2부** 기능 사양 · **3부** 보여주기 카드 · **부록** 경로·고도 | 기획·개발 |\n| 04 | [실행 계획](./04_실행계획.md) | **1부** 경쟁 · **2부** 콘텐츠·SEO · **3부** 부상 콘텐츠 · **4부** 제휴 실무 · **5부** 런칭·운영 | 기획·마케팅 |\n| **05** | **[검증 계획](./05_검증계획.md)** | **가설 27개 · 인터뷰 25명 · 트래픽 실험 · 실측 도보 · 판단 게이트** | **전원** |\n| 06 | [개발 가이드](./06_개발가이드.md) | **1부** Claude Code 사용법 · **2부** 단계별 프롬프트 | 개발 |\n| — | [CLAUDE.md](./CLAUDE.md) | 저장소 루트에 두는 상시 컨텍스트 | 코딩 에이전트 |\n| — | camino-companion.jsx | 초기 프로토타입. 마을 데이터 82개 원본 | 개발 |\n\n### 배포용 (수정 과정을 뺀 판)\n\n작업 문서는 개정 이력·결함·검증 상태를 담고 있어 내부용이다.\n**외부에 보여줄 때는 아래를 쓴다.**\n\n| 문서 | 용도 |\n|---|---|\n| [배포용/기획서.md](./배포용/기획서.md) | 제품이 무엇인가 |\n| [배포용/사업계획서.md](./배포용/사업계획서.md) | 지원사업·제휴·투자 |\n| [배포용/사양서.md](./배포용/사양서.md) | 개발 발주·협업 |\n\n⚠️ 배포용에서도 **검증되지 않은 가정은 \"가정\"으로 명시한다.** 전환율을 사실처럼 쓰지 않는다.\n\n**읽는 순서**: 01(1부) → **02** → 03(1부) → **05** → 04 → 03(2·3부) → 06\n\n> **01의 2부는 반드시 읽는다.** 어떤 숫자가 사실이고 어떤 게 우리 창작인지 구분해준다.\n> **05는 그 창작을 사실로 바꾸는 계획이다.** 개발보다 먼저 읽는다.\n\n---\n\n## 2-d. 메뉴 명칭\n\n**순례자가 현지에서 첫날부터 듣는 말만 쓴다.** 기독교 교리 용어는 쓰지 않는다.\n\n| 메뉴 | 명칭 | 뜻 |\n|---|---|---|\n| 홈 | 오늘 | — |\n| 일정 | 에타파 Etapa | 하루 구간 |\n| 지도 | 플레차 Flecha | 노란 화살표 |\n| 숙소 | 알베르게 Albergue | 순례자 숙소 |\n| 기록 | 크레덴시알 Credencial | 순례자 여권 |\n| 카드 | 카드 | — |\n| 완주 | 콤포스텔라 Compostela | 완주 증서 |\n| 준비 | 준비 | — |\n\n한글을 크게, 원어를 작게 병기한다. **\"카드\"와 \"준비\"는 번역하지 않는다** — 다급하거나 낯선 사용자가 쓰는 곳이다.\n\n---\n\n## 3-b. ⚠️ 프랑스 길은 하나의 선이 아니다\n\n**같은 순례길이라도 사람마다 걷는 길이 다르다. 11곳에서 갈라졌다 다시 만난다.**\n\n| 분기점 | 선택지 | 판단 요소 |\n|---|---|---|\n| **생장피드포르** | **나폴레옹(고지)** vs **발카를로스(계곡)** | **11/1~3/31 나폴레옹 폐쇄** |\n| 레온 이후 | 비야당고스(차도) vs **비야르 데 마사리페** | 차도 회피 |\n| 트리아카스텔라 | 산 실(짧음) vs **사모스(대수도원)** | 거리 vs 볼거리 |\n| 그 외 8곳 | 에우나테 · 부르고스 강변길 · 칼사다 로마나 등 | |\n\n**현재 데이터는 82개 마을의 단일 선형 배열이라 변형 경로가 없다.**\n경로·고도 추출 시 변형도 함께 뽑는다 (03 문서 부록 4-b).\n\n⚠️ **실측 도보 출발일을 10월 초로 앞당겨야 한다.** 11월 1일 이후에는 나폴레옹 루트를 걸을 수 없고, 1일차는 부상이 가장 많은 날이자 우리 고도 결함의 대표 사례다.\n\n---\n\n## 3-c. 걷는 것만이 아니다\n\n**순례는 인천공항에서 시작한다.** 생장피드포르에 공항이 없어 최소 2~3회 환승이 필요하고, 이것이 준비에서 가장 헷갈리는 부분이다.\n\n| 경로 | 구간 |\n|---|---|\n| 파리 경유 | 인천 → CDG → **TGV 바욘** → 생장 기차 |\n| 비아리츠 경유 | 인천 → 파리 → 비아리츠 → 버스 → 바욘 → 생장 |\n| **팜플로나 경유** | 인천 → 마드리드 → 팜플로나 → 생장 버스 |\n\n일정에 **Day 0(이동)** 으로 넣고 귀환편까지 계획한다.\n\n**여정 중 이동수단도 예외가 아니다.** 부상·만실·시간 부족으로 버스나 택시를 쓰는 일은 흔하다. 걷지 않은 구간은 기록에서 빠지고, 콤포스텔라 요건에 영향을 주면 경고한다.\n\n### ⚠️ 콤포스텔라 요건 — 2025년에 바뀌었고, 우리 문서에 오류가 있었다\n\n| 방식 | 최소 거리 |\n|---|---|\n| 도보·말 | 100km |\n| 자전거 | **200km** |\n| **전기자전거** | **대상 아님** |\n\n**도장 규칙은 위치가 아니라 총 도보 거리 기준이다.**\n\n| 조건 | 하루 도장 |\n|---|---|\n| 최소 거리만 걷는 경우 (도보 100km대) | 2개 |\n| 그보다 길게 걷는 경우 | **1개** |\n\n**생장에서 773km를 걸으면 사리아를 지나도 하루 1개면 된다.**\n기존 문서의 \"사리아 이후 2개\"는 틀린 서술이었고 전 문서에서 정정했다.\n\n---\n\n## 4. 🔴 개발 착수 전 반드시 해결할 것\n\n**최종 검토에서 제품의 핵심을 무력화하는 결함 2건이 발견됐다.** (→ 01 문서 2부)\n\n### 결함 1 — 고도 데이터가 실제 오르막을 최대 39% 과소평가한다\n\n마을 고도만 가지고 `도착지 − 출발지`로 계산하는데, 중간에 더 높은 고개를 넘는 구간에서 완전히 틀린다.\n\n| 생장 → 론세스바예스 (1일차) | |\n|---|---|\n| 우리 계산 | +780m |\n| 실제 (레포에데르 고개 약 1,450m 경유) | **약 +1,280m** |\n\n**카미노에서 가장 힘들고 부상이 많은 날인데 \"평범한 산길\"로 판단된다.**\n\n### 결함 2 — 내리막을 전혀 고려하지 않는다\n\n무릎 부상의 주원인은 오르막이 아니라 **내리막**이다. 엘 아세보 → 몰리나세카(−550m, 급경사 돌길)는 우리 엔진에서 상승 0이라 \"쉬운 날\"이 된다.\n\n### → 해결 경로 확보 (03 문서 부록)\n\n```\n경로  ← OpenStreetMap 하이킹 릴레이션   (ODbL)\n고도  ← 스페인 IGN MDT05               (CC BY 4.0, LiDAR 5m 격자)\n      ↓\n직접 계산 → ascent / descent\n```\n\n- **데이터 비용 0원.** IGN은 출처 표시만 하면 상업 이용 가능\n- 작업 약 3일 (`scripts/build-profiles.ts`)\n- ⚠️ **함정**: 고도를 그대로 더하면 노이즈 때문에 실제의 2~3배. 평활화 필수\n- 개발 프롬프트 **P0.5**가 이 작업. **P1보다 먼저 한다**\n\n---\n\n## 5. 검증되지 않은 것\n\n이 문서들의 상당 부분은 **2차 자료 기반 가설**이다. 특히 아래는 **근거 없는 우리 창작**이다. 전체 목록은 01 문서 2부 2.6절.\n\n- 페르소나 비율 (30/40/20/10)\n- 도달률 목표 (30/60/85%)\n- 전환율 전부 (보험 15%, 장비 12%, 숙소 10%…)\n- 임계값 전부 (상승 600m, 하강 500m, 28km, 침대 30개)\n- `injuryRiskScore` 공식 — **의학적 근거 전무**\n\n### 확인 순서 (→ 05 문서에 전체 설계)\n\n| # | 항목 | 시기 | 검증 |\n|---|---|---|---|\n| 1 | **순례자 25명 인터뷰** (중도 포기자 5명 + 패키지 이용자 5명) | 2026.08 | H1~H4, H17~H27 |\n| 2 | **보험사·GA 3곳 접촉** | 2026.09 | **H16 — 매출의 33%. 최우선** |\n| 3 | **웹 계산기 4주 트래픽 실측** | 2026.09~10 | H5 — 도달률 전략의 60% |\n| 4 | 여행사 3곳 조사 (화이트라벨 타진) | 2026.09 | H26 |\n| 5 | **경로·고도 데이터 생성** | 2026.09 | 결함 1·2 |\n| 6 | **현지 실측 도보 40일** | **2026.10 초~11 초** | H12~H15, H20 |\n\n> **순서를 바꾸지 않는다.** 인터뷰 결과가 실측 도보에서 무엇을 볼지 결정한다.\n> **6번은 선택이 아니다.** 걸어보지 않은 팀이 만든 앱은 커뮤니티에서 즉시 판별된다.\n\n### 판단 게이트\n\n| 게이트 | 시기 | 결정 |\n|---|---|---|\n| 1 | 2026.09 | 제품 방향 유지 / 재검토 |\n| 2 | 2026.10 | 채널 전략, **수익 모델 확정** |\n| 3 | 2026.12 | 데이터 확보 완료 |\n| **4** | **2027.06** | **전업 전환 여부 (1인 기준)** |\n\n---\n\n## 6. 개정 이력\n\n| 버전 | 바뀐 것 |\n|---|---|\n| v1.0 | 초기 기획 (일정 계산기 중심) |\n| v2.0 | 문서 통합, 출처 등급화, 완주 보상, 이중 순례자, 검증 계획 |\n| v3.0 | **사업모델을 부상+숙소 두 축으로.** 보여주기 카드, 법무, 재무 시나리오 |\n| v3.1 | **B축 재정의** — \"침대 확보\"→\"예약 판단\". 무게중심을 A축으로 |\n| v4.0 | 패키지 수요 전환 전략 추가. 문서 16개 → 7개 통합 |\n| v5.0 | 소유욕 보상 설계 · 안개 지도 · 메뉴 명칭 · 실사용 도구 정리 · 배포용 3종 분리 |\n| v5.1 | 캐릭터(마스코트) 제외. 서비스명 미확정으로 환원. 애착 동인을 실존 사물로 대체 |\n| v5.2 | 갈림길 11곳 모델 · 일자별 상세 일정 · Plan B · 체크리스트 · 예산 관리 |\n| v5.3 | 전 문서 정합성 감사. 개발가이드·CLAUDE.md·배포용 누락분 반영. 실측 도보 10월 초 출발로 통일 |\n| **v5.4** | **접근·귀환 교통(F-24) · 이동 방식(F-25) 추가. Plan B를 일정 카드 안으로 재설계. 콤포스텔라 도장 규칙 오류 정정** |\n"}, {"file": "01_조사와근거.md", "title": "조사와 근거", "sub": "시장·사용자 조사 · 출처 대장", "md": "# 01 · 조사와 근거\n\n> 순례자는 실제로 어떻게 걷는가 · 모든 주장의 출처 · 발견된 결함\n> v2.1 · 2026년 7월\n\n---\n\n## 이 문서의 신뢰도를 먼저 밝힌다\n\n시장 통계는 **산티아고 대성당 순례자 사무소(Oficina del Peregrino) 공식 자료**다. 반면 사용자 애로사항은 **공개 후기·커뮤니티 글·현지 운영자 기록을 종합한 2차 조사**이며, 직접 인터뷰나 현장 관찰은 아직 없다.\n\n따라서 3장 이후는 **가설의 목록**이다. 각 항목에 신뢰도를 표시했다.\n\n- ★★★ 복수의 독립 출처에서 일치, 공식 자료로 뒷받침\n- ★★☆ 여러 후기에서 반복 관찰되나 정량 근거 없음\n- ★☆☆ 일부 사례에서만 관찰, 검증 필요\n\n---\n\n## 1. 시장 규모\n\n### 1.1 전체 시장 (공식 통계)\n\n| 연도 | 콤포스텔라 수령자 | 비고 |\n|---|---|---|\n| 2010 | 272,385 | 직전 성년. 전년 대비 +85% |\n| 2019 | 347,566 | 코로나 이전 최고 |\n| 2020 | 54,144 | 팬데믹 |\n| 2022 | 438,208 | 성년 연장 |\n| 2023 | 446,039 | |\n| 2024 | 499,242 | |\n| **2025** | **530,987** | 역대 최고, 전년 대비 +6% |\n\n- 프랑스 길 242,179명 (46%)\n- **사리아가 단일 최다 출발지: 162,076명 (30.5%)** → 100km 단기 순례가 시장의 3분의 1\n- 국적: 스페인 43%, 미국 43,964명, 이탈리아 26,626명, 독일 24,335명\n\n### 1.2 한국 시장\n\n| 연도 | 한국인 | 증감 |\n|---|---|---|\n| 2004 | 18 | — |\n| 2016 | 4,534 | |\n| 2019 | 8,224 | 역대 최고 |\n| 2024 | 약 7,910 | |\n| **2025** | **7,481** | **-5.4%** |\n\n**추정 실제 시장: 연 1만~1만 2천 명** (콤포스텔라 미신청자, 중도 이탈자 포함)\n\n### 1.3 이 숫자가 말하는 것\n\n**① 성장이 멈췄다.** 2019년 8,224명이 정점이고 6년째 정체~감소다. 시장이 커지길 기다리는 전략은 실패한다.\n\n**② 2027년은 성년(Año Santo Xacobeo)이다.** 7월 25일 성 야고보 축일이 일요일인 해로, 25년 주기 중 순례자가 가장 몰린다. 직전 성년 2010년은 전년 대비 85% 급증했다. 2025년 53만 명 기준을 적용하면 2027년은 70만 명 이상, 한국인은 1만 2천~1만 5천 명이 예상된다.\n\n**다음 성년은 2032년이다. 이 창은 5년에 한 번 열린다.**\n\n**③ 재구매가 없다.** 대부분 평생 한 번 걷는다. LTV = 1회 거래액.\n\n**④ 하지만 1인당 지출이 크다.**\n\n| 항목 | 1인 지출 |\n|---|---|\n| 왕복 항공 | 120~180만 |\n| 현지 체류 (35일 × 5만) | 175만 |\n| 장비 (배낭·등산화·침낭·의류) | 60~120만 |\n| 보험·여권·기타 | 15만 |\n| **합계 (완주 기준)** | **370~490만 원** |\n| 여행사 패키지 이용 시 | 350~600만 원 |\n\n**연 1만 명 × 평균 400만 원 = 시장 전체 지출 약 400억 원.**\n구독료를 받을 게 아니라 이 흐름에서 수수료를 취해야 한다.\n\n### 1.4 중도 이탈의 규모 ★★☆\n\n콤포스텔라 통계는 **완주자만** 집계한다. 중도 포기자는 잡히지 않는다.\n\n간접 증거: **2025년 생장 순례자 사무소는 54,115명을 집계했지만 산티아고 사무소는 30,345명만 집계했다.** 약 23,770명이 산티아고 도착 전 어딘가에서 멈췄다는 뜻이다.\n\n⚠️ 단, 이 격차에는 애초에 일부 구간만 걸을 계획이었던 사람과 콤포스텔라를 신청하지 않은 사람도 포함된다. 전부 중도 포기로 해석하면 안 된다. **인터뷰로 확인 필요.**\n\n**→ 그럼에도 이 격차의 상당 부분이 우리의 진짜 고객이다. 완주자를 위한 서비스가 아니라 중도 포기를 줄이는 서비스로 포지셔닝한다.**\n\n---\n\n## 2. 경쟁 환경\n\n| 서비스 | 형태 | 가격 | 강점 | 한국 시장 공백 |\n|---|---|---|---|---|\n| Buen Camino | 앱 | 무료 | 45개 루트, 100만+ 다운로드, 9개 언어 | 한국어 없음, 준비 단계 없음 |\n| Wise Pilgrim | 앱 | 루트당 $4.99 | 14년 업력, 오프라인 지도, 2026 리뉴얼 | 영어, 유료 |\n| Gronze | 웹 | 무료 | 숙소 DB 최고 수준 | 스페인어 |\n| Camino Ninja | 앱 | 무료 | 커뮤니티 | 한국어 없음 |\n| 공식 디지털 크레덴시알 | 앱 | 무료 | 대성당 공식, QR 도장 | 기록 기능만 |\n| **네이버 카페** | 커뮤니티 | 무료 | **국내 정보의 실질 허브** | 검색성 낮음, 구조화 안 됨 |\n| 여행사 패키지 | 오프라인 | 350~600만 | 전 과정 대행 | 자유도 낮음, 고가 |\n\n**진짜 경쟁자는 앱이 아니라 네이버 카페와 여행사다.** 정보는 카페에서 무료로 얻고, 돈은 여행사에 낸다. 우리 자리는 그 사이다.\n\n**중요**: 글로벌 앱들이 한국어에 투자할 이유가 없다. 한국인은 전체 순례자의 **1.4%**다. 이 무관심이 우리의 진입 공간이다.\n\n---\n\n\n## 2-b. 순례자가 실제로 쓰는 도구\n\n**경쟁 분석을 앱으로 좁히면 안 된다. 순례자는 종이·웹·앱·사람을 섞어 쓴다.**\n\n### 2-b.1 전수 목록\n\n| 분류 | 도구 | 특징 | 우리와의 관계 |\n|---|---|---|---|\n| **가이드북** | **John Brierley** | 2003년 초판. **가장 많이 들고 다니는 책.** 저자는 2023년 작고, 가족이 개정 지속 | 구간이 고정돼 개인 체력 반영 불가 |\n| 가이드북 | Village to Village | 얇고 정보 많음 | |\n| 가이드북 | Cicerone | 가장 상세하나 340g으로 무거움 | |\n| **앱** | **Wise Pilgrim** | $4.99. 14년. **2026년 전면 리뉴얼.** 오프라인 지도, 동적 고도 프로파일, **예약 도우미 + Booking·WhatsApp 직접 링크** | ⚠️ **B축 기능 상당수를 이미 한다. 다만 영어** |\n| **앱** | **Buen Camino** | 무료. 루트 수가 가장 많음. 9개 언어 | 준비 단계 없음 |\n| 앱 | TrekRight | | |\n| 앱 | 공식 디지털 크레덴시알 | 대성당 운영. QR 도장 | 기록만 |\n| **웹** | **Gronze** | 숙소 DB 최고 수준. 스페인어 | |\n| **웹** | **Godesalco** | **구간 계산기.** 출발지를 고르면 다음 마을들까지 거리가 나온다. 스페인어 | ⚠️ **우리 계산기의 직접 경쟁** |\n| 웹 | Eroski | 역사·문화 해설이 좋음 | |\n| 웹 | santiago.forwalk.org | | |\n| **커뮤니티** | **caminodesantiago.me** | 영문 포럼. 실시간 정보 | |\n| 커뮤니티 | **네이버 카페** | **국내 정보의 실질 허브** | 경험·실시간은 못 이긴다 |\n| **무료 인쇄물** | **생장 순례자 사무소 A4 배포물** | **거리·알베르게·고도가 한 장에.** 무료 | ⚠️ **\"이것만으로 충분했다\"는 순례자가 있다** |\n| 예약 | Booking.com | 사립 알베르게 다수 등재 | |\n| 예약 | 알베르게 직접 전화·WhatsApp | 언어 장벽 | **F-04 예약 스크립트** |\n| 짐 배송 | Correos PAQ PEREGRINO | 공식. 한국어 안내 있음 | |\n| 짐 배송 | Jacotrans 등 사설 | | |\n| 지도 | Google Maps 오프라인, maps.me, OsmAnd | | |\n| 기록 | 크레덴시알(종이), 인스타그램 | | |\n| 기타 | 알베르게 책 교환 선반 | 앞선 순례자가 두고 간 가이드북 | |\n\n### 2-b.2 ⚠️ 이 목록이 말해주는 것\n\n**① 우리 차별점이 생각보다 좁다**\n\nWise Pilgrim은 2026년 리뉴얼에서 **오프라인 지도, 동적 고도 프로파일, 예약 도우미, Booking·WhatsApp 직접 링크**를 갖췄다. **B축 기능의 상당 부분을 이미 한다.**\n\nGodesalco는 **구간 계산기**를 이미 제공한다. 우리 핵심 도구와 겹친다.\n\n**→ 남는 차별점은 이것뿐이다.**\n\n| 남는 차별점 | 이유 |\n|---|---|\n| **한국어** | 이들 전부 한국어를 지원하지 않는다 |\n| **부상(A축)** | **어느 도구도 다루지 않는다** |\n| **판단** | 전부 데이터를 보여줄 뿐 결론을 내려주지 않는다 |\n| **준비 단계** | D-90부터의 준비를 다루는 도구가 없다 |\n| **보여주기 카드** | 없다 |\n\n**② 무료 인쇄물이 실제 경쟁자다**\n\n생장 순례자 사무소가 나눠주는 A4 한 장에 거리·알베르게·고도가 다 들어 있다. 무료다.\n**\"이것만으로 충분했다\"는 순례자가 실제로 있다.**\n\n→ 우리 인쇄용 일정표는 **이것보다 나아야 한다.** 개인 체력이 반영된 일정, 부상 경고, 스페인어 문장이 우리 우위다.\n\n**③ 종이와 앱을 함께 쓴다**\n\n권장되는 조합은 **\"계획·저녁 참고는 종이, 낮 실시간 안내는 앱\"** 이다. 폰을 떨어뜨리거나 배터리가 나가는 상황을 대비한다.\n\n→ **우리도 인쇄를 부가 기능이 아니라 기본으로 설계한다.**\n\n---\n\n## 2-c. 프랑스 길은 하나의 선이 아니다 — 등급 B\n\n**같은 순례길이라도 사람마다 걷는 길이 다르다.** 11곳에서 갈라졌다 다시 만난다.\n\n| # | 분기점 | 선택지 | 판단 요소 |\n|---|---|---|---|\n| **1** | **생장피드포르** | **나폴레옹(고지)** vs **발카를로스(계곡)** | **계절·날씨·체력** |\n| 2 | 오바노스 직전 | 직행 vs 에우나테(12세기 성당) | 역사 |\n| 3 | 에스테야 근처 | 직행 vs 몬테후라 | 경치 |\n| 4 | 부르고스 진입 | N-120 vs 강변길 vs N-1 | 차도 회피 |\n| 5 | 카리온 이후 | 직행 vs 비요비에코(강길) | 경치 |\n| 6 | 사아군 이후 | 엘 부르고 라네로 vs 칼사다 로마나 | 한적함 |\n| **7** | **레온 이후** | 비야당고스(차도) vs **비야르 데 마사리페** | 차도 회피 |\n| 8 | 오스피탈 데 오르비고 | 직행 vs 산 후스토 우회 | 경치 |\n| 9 | 카카벨로스 이후 | 직행 vs 카라세도 수도원 | 역사 |\n| 10 | 비야프랑카 이후 | 직행 vs 프라델라(능선) | 경치 vs 급경사 |\n| **11** | **트리아카스텔라** | 산 실(짧음) vs **사모스(대수도원)** | 거리 vs 볼거리 |\n\n### 2-c.1 1번 갈림길 — 계절 폐쇄\n\n| | 나폴레옹 | 발카를로스 |\n|---|---|---|\n| 성격 | 능선 종주 | 계곡 도로 |\n| 경유 | 온토 · 오리송 · 벤타르테아 고개 · **레포에데르 고개** | 아르네기(국경) · 발카를로스 · 이바녜타 고개 |\n| **위험** | **오리송 위로 대피소가 없고 날씨가 몇 분 만에 바뀐다** | 도로 구간이 길다 |\n| **11/1~3/31** | **폐쇄** | **유일한 선택지** |\n\n**생장 순례자 사무소가 당일 안전한 쪽을 안내한다.**\n\n### 2-c.2 ⚠️ 이것이 우리 데이터에 미치는 영향\n\n**현재 `towns.ts`는 82개 마을의 단일 선형 배열이다. 변형 경로가 없다.**\n\n| 문제 | 영향 |\n|---|---|\n| 변형 경로 마을이 누락돼 있다 | 발카를로스·에우나테·사모스 등 **추정 25~40곳** |\n| 계절 폐쇄 정보가 없다 | 겨울 순례자에게 못 걷는 길을 추천하게 된다 |\n| 차도 병행 비율을 모른다 | 차도 회피를 원하는 사용자에게 답할 수 없다 |\n\n**→ 경로·고도 추출 시 변형도 함께 뽑는다** (03 문서 부록 4-b).\n**→ 계절 폐쇄는 OSM에 없으므로 수기 관리하고 연 1회 확인한다.**\n\n### 2-c.3 ⚠️ 실측 도보 일정에 미치는 영향\n\n**10월 초에 출발해야 한다.**\n\n| 출발일 | 결과 |\n|---|---|\n| 10월 20일 이전 | 나폴레옹 통과 가능 |\n| **11월 1일 이후** | **발카를로스만 가능. 1일차 데이터를 못 얻는다** |\n\n**1일차는 부상이 가장 많은 날이자, 마을 고도 기준 +780m vs 실제 약 +1,280m로 우리 고도 결함의 대표 사례다.**\n\n---\n\n## 2-d. 콤포스텔라 요건 — 2025년에 바뀌었다 (등급 A)\n\n**우리 문서에 오류가 있었다. 순례자 사무소 공식 기준으로 정정한다.**\n\n### 2-d.1 이동 방식별 최소 거리\n\n| 방식 | 최소 거리 | 비고 |\n|---|---|---|\n| **도보** | **100km** | |\n| **말** | **100km** | |\n| **자전거** | **200km** | |\n| **전기자전거** | **해당 없음** | **콤포스텔라 대상이 아니다** |\n| 요트 | 100해리 + 하선 후 도보 | 드묾 |\n\n### 2-d.2 ⚠️ 도장 규칙 — 우리가 틀렸던 부분\n\n**\"사리아 이후에는 하루 2개\"가 아니다.**\n\n| 조건 | 하루 도장 |\n|---|---|\n| **마지막 100km(자전거 200km)만 걷는 경우** | **2개** |\n| **그보다 길게 걷는 경우** | **1개면 충분** |\n\n**즉 생장에서 773km를 걷는 사람은 사리아를 지나도 하루 1개면 된다.**\n사리아에서 시작해 114km만 걷는 사람이 하루 2개가 필요하다.\n\n**→ 판정 기준은 \"위치\"가 아니라 \"총 도보 거리\"다.**\n\n### 2-d.3 2025년 신설 조건\n\n| 조건 | 내용 |\n|---|---|\n| 연속성 | 100km는 **연속**이어야 한다 |\n| 영토 | **스페인 영토 안**에서 채워야 한다 |\n| **마지막 구간** | **최소 20km이고 대성당으로 직접 이어져야 한다** |\n| 국외 출발 | 스페인 밖에서 시작했으면 **스페인 내 최소 70km** |\n| 구간 순례 | 여러 해에 나눠 걸어도 된다. 단 **중단 지점과 재개 지점에 각각 날짜 도장** |\n\n⚠️ **생장 출발자는 프랑스에서 시작하므로 \"스페인 내 70km\" 규칙이 적용된다.** 프랑스 길은 스페인 구간이 700km가 넘어 문제없다.\n\n### 2-d.4 종교적 동기가 아니면\n\n콤포스텔라는 **종교적·영적 동기**의 순례자에게 발급된다. 그 외(레저·스포츠)는 별도의 **순례 증명서(Certificado de Peregrinación)** 를 신청할 수 있다.\n\n---\n\n## 2-e. 시작점까지 어떻게 가는가 (등급 B)\n\n**우리는 걷는 것만 생각했다. 인천에서 생장까지 가는 것도 계획의 일부다.**\n\n생장피드포르에는 공항이 없다. **최소 2~3회 환승**이 필요하다.\n\n### 2-e.1 주요 경로\n\n| 경로 | 구간 | 비고 |\n|---|---|---|\n| **A. 파리 경유** | 인천 → 파리(CDG) → **TGV 바욘** → 생장 기차 | **CDG 공항에 TGV역이 있다.** 파리 시내로 안 나가도 된다 |\n| **B. 비아리츠 경유** | 인천 → 파리 → 비아리츠(항공) → 버스 → 바욘 → 생장 | 비아리츠가 가장 가까운 공항 |\n| **C. 팜플로나 경유** | 인천 → 마드리드 → 팜플로나(항공·기차·버스) → 생장 버스 | **가장 많은 순례자가 쓰는 경로** |\n| D. 마드리드 직행버스 | 인천 → 마드리드 → Alsa 버스 → 바욘 | 시간이 오래 걸린다 |\n\n### 2-e.2 구간별 실제 정보\n\n| 구간 | 수단 | 소요 | 요금 |\n|---|---|---|---|\n| 파리(CDG) → 바욘 | TGV | 약 4시간 | |\n| **바욘 → 생장** | SNCF 기차 | **1시간** | **약 12유로** |\n| 비아리츠 공항 → 바욘 | Txiktxak 3번 버스 | 25분 | 2유로 |\n| 비아리츠 공항 → 생장 | Express Bourricot 셔틀 | | 밴 140유로 (8인 분담 시 21유로) |\n| 팜플로나 → 생장 | 버스 | 1.5~2시간 | |\n\n**바욘 → 생장 직행 기차는 2026년 3월 기준 하루 6편**이고 출발 시각은 6:40, 8:50, 12:36, 14:25, 17:14, 18:37이다. 계절에 따라 바뀐다.\n\n### 2-e.3 ⚠️ 알아두면 좋은 것\n\n- **바욘~생장 철로는 자주 운행이 중단되고, 그때는 철도회사가 대체 버스를 운행한다.** 기차표를 샀는데 버스가 와도 정상이다\n- 바욘역 직원들이 하루 종일 순례자를 맞는 플랫폼으로 안내한다. **배낭 멘 사람들을 따라가면 된다**\n- CDG 공항에서 TGV역까지는 **CDGVAL** 무료 셔틀을 탄다. 표지판이 헷갈린다\n- 시차 적응을 위해 **팜플로나에서 1~2일 묵고 가는 방식**을 쓰는 순례자가 있다\n\n### 2-e.4 귀환\n\n| 구간 | 수단 |\n|---|---|\n| 산티아고(SCQ) → 마드리드 | 이베리아 하루 여러 편. **막판 기차보다 저렴한 경우가 많다** |\n| 산티아고 → 피니스테레·무시아 | 버스 (연장 순례 시) |\n\n---\n\n## 3. 순례자의 하루 — 실제로 무슨 일이 일어나는가\n\n### 3.1 표준 일과 (프랑스 길, 성수기) ★★★\n\n| 시각 | 행동 | 스트레스 |\n|---|---|---|\n| 05:00~06:00 | 기상. 어둠 속 배낭 정리 | 다인실. 비닐봉지 소리로 눈총 |\n| 06:00~06:30 | 출발. 아직 어두움 | 첫 1시간은 헤드랜턴 |\n| 06:30~08:00 | 첫 구간, 대개 공복 | 첫 바(bar)까지 몇 km인지 모르면 불안 |\n| 08:00~08:30 | 첫 마을 카페에서 아침 | 여기서 도장 1개 |\n| 08:30~12:00 | 본 구간 | **머릿속은 계속 \"지금 멈추면 늦나?\"** |\n| 12:00~14:00 | 도착. 알베르게 앞 대기 | **하루 최대 스트레스 지점** |\n| 14:00~16:00 | 샤워, 빨래, 발 관리 | 빨래가 마를지가 다음 날을 좌우 |\n| 16:00~19:00 | 마을 산책, 장보기 | 시에스타(14~17시) 폐점에 자주 당함 |\n| 19:00~20:30 | 순례자 정식 또는 자취 | 스페인 식당은 20시 이후 개점이 많음 |\n| 21:00~22:00 | 소등 | 대부분 22시 소등 |\n\n### 3.2 이 일과의 핵심 ★★★\n\n> **하루가 \"풍경\"이 아니라 \"시계\"를 중심으로 돌아간다.**\n\n현지 알베르게 운영자의 관찰이 정확하다 — 예약 없이 걷는 사람들은 신앙심이 아니라 **노숙 공포**로 새벽 5시에 일어나고, 공립 알베르게 앞에 몇 시간씩 서 있는 모습이 일상 풍경이 됐다. 카페에서 이야기하다가도 누군가 \"11시 45분이네\" 하면 순식간에 자리가 빈다.\n\n로마네스크 성당을 구경하고 싶어도, 그늘에서 쉬고 싶어도, **\"지금 멈추면 알베르게 마감 전에 도착할 수 있나\"** 가 먼저 떠오른다.\n\n**이것이 서비스가 풀어야 할 1번 문제다. 길을 못 찾는 게 아니라, 침대를 확보할 수 있을지 몰라서 하루 종일 불안한 것이다.**\n\n---\n\n## 4. 애로사항 전수 목록\n\n```\n       높은 빈도                          낮은 빈도\n     ┌──────────────────────────┬──────────────────────────┐\n심각 │ ① 침대 확보 불안          │ ④ 부상으로 중도 포기      │\n     │ ② 발 물집 / 무릎 통증     │ ⑤ 빈대 감염               │\n     │                          │ ⑥ 저체온·열사병           │\n     ├──────────────────────────┼──────────────────────────┤\n경미 │ ③ 언어 장벽               │ ⑦ 도난                    │\n     │ ⑧ 다인실 소음·수면 부족   │ ⑨ 인종차별 경험           │\n     │ ⑩ 식사·시에스타 시간      │ ⑪ 세탁물 건조             │\n     └──────────────────────────┴──────────────────────────┘\n```\n\n---\n\n### ① 침대 확보 — \"베드 레이스\" ★★★\n\n#### 예약 가능 여부 — 헷갈리기 쉬우니 정확히\n\n| 숙소 유형 | 예약 | 요금 (2026) | 비고 |\n|---|---|---|---|\n| Xunta 공립 (갈리시아) | **불가** | 8~10유로 | 선착순, 13시 개방, 크레덴시알 필수 |\n| 지자체(municipal) 공립 | **불가** | 8~12유로 | 선착순. 도보 > 자전거 > 말 우선권 |\n| 본당·수도원 | 대부분 불가 | 기부제~10유로 | |\n| 기부제(donativo) | 불가 | 자율 | 현금만 |\n| **사립(privado)** | **가능** | 12~25유로 | 전화·WhatsApp·Booking.com |\n\n#### \"예약 시스템이 있다\"는 말이 도는 이유\n\n2020년 코로나 시기 Xunta가 `alberguesxacobeo.gal`이라는 공립 알베르게 예약 플랫폼을 실제로 운영했다. 전날부터 숙박 당일 13시까지, 최대 5인 단체까지 예약할 수 있었다. **이 사이트는 지금도 존재하고 검색에 노출되지만, 예약 기능은 2021년 7월에 폐지됐고 현재는 위치·정보 조회용이다.**\n\n2026년 기준으로 재확인한 결과, 공립·Xunta 알베르게는 예약을 받지 않는 워크인 전용이다.\n\n⚠️ **앱에서 이 구분을 틀리면 사람이 한데서 잔다.** `reservation` 필드는 추정으로 채우지 말고, 미확인 숙소는 `UNKNOWN`으로 둔다.\n\n#### 정책 변경 가능성 ★★☆\n\n2025년 초, 포르투갈 길 친구회가 **7~8월 성수기에 한해 Xunta 알베르게 예약 허용**을 제안했다. 오스피탈레로 회의에서 제기된 안이다. **2027년 성년을 앞두고 재논의될 가능성이 높다.**\n\n→ **데이터 모델은 정책 변경을 흡수해야 한다. \"공립 = 예약 불가\"를 코드에 하드코딩 금지.**\n\n#### 베드 레이스는 실재하는가\n\n**실재한다는 방증**: 위 제안서에서 포르투갈 길 친구회 회장은 **자리를 확보하려고 점점 더 새벽에 걷는 사람이 늘고 있다**고 경고했다. 현지 협회가 공식 제안의 근거로 삼을 만큼 문제가 가시화됐다.\n\n**과장이라는 반론 ★★☆**: 베테랑들은 다르게 본다. 8월 나헤라에서 자원봉사한 순례자는 대혼란을 예상했지만 실제 만실은 한 번뿐이었고, **온라인의 인식이 매우 국지적이며 현실과 항상 일치하지 않는다**고 지적한다. 문제는 부활절, 7월 25일 성 야고보 축일, 10월 12일 스페인 국경일, 팜플로나 산 페르민 축제 같은 **특정 시기·장소**에서 국지적으로 발생한다.\n\n#### ⚠️ v3.1 정정 — 프레임이 낡았다\n\n**2026년 기준으로 다시 확인한 결과, \"침대를 못 구해 노숙한다\"는 서술은 과장이다.**\n\n- 공립은 여전히 예약 불가가 맞다\n- **그러나 사립 알베르게는 온라인 플랫폼(Booking.com 등)에 대거 등재됐다**\n- 돈을 조금 더 내면(10유로 → 12~20유로) **전 구간 예약이 가능하다**\n- 여행사 패키지는 이 문제를 통째로 해결한다\n\n현지 조언을 정확히 옮기면 이렇다.\n\n> 한 해의 상당 기간, 한산한 루트에서는 걷다가 도착해서 침대를 찾는 옛 방식이 여전히 통한다.\n> 하지만 한여름, 주말, 프랑스 길, 무엇보다 **사리아 이후 마지막 100km**에서는 예약이 중요해진다.\n> **4월에는 대개 찾는다. 8월에 사리아부터라면 도박하지 마라.**\n\n권장 전략도 **\"플랜 A는 알베르게, 플랜 B는 펜시온\"** 이다. 원하는 알베르게를 목표로 하되, 만실이면 전화할 근처 사립 방 이름을 알아두라는 것.\n\n#### → 재해석: \"확보\"가 아니라 \"판단\"의 문제다\n\n순례자가 마주하는 선택은 셋이고, 셋 다 문제가 있다.\n\n| 선택 | 문제 |\n|---|---|\n| 전부 예약 | 비싸고(사립만), **다치거나 컨디션이 좋을 때 못 바꾼다** |\n| 아무것도 안 함 | 성수기 사리아 이후에서 실제로 곤란 |\n| **그 사이** | **어느 날을 잡을지 판단할 근거가 없다** ← **우리 자리** |\n\n⚠️ **그리고 구조가 악화되는 방향이다.** 남들이 예약할수록 예약 안 한 사람의 자리는 진짜로 없어진다.\n\n**기존 서술(아래)은 이 재해석의 근거로만 유지한다.**\n\n- 순례자는 오늘 그 마을에 침대가 몇 개고 몇 명이 향하는지 **알 방법이 없다**\n- 그래서 최악을 가정하고 새벽에 뛴다\n- 대부분의 경우 침대는 남는다. 하지만 그걸 모르니까 불안하다\n\n**예약 시스템으로는 못 푼다** (공립은 구조적으로 불가). 대신:\n\n1. 해당 마을의 **총 침대 수 vs 그날 예상 도착 인원** 추정치 제시\n2. 만실 시 **대안 마을 + 남은 거리** 즉시 제시\n3. 사립 알베르게 **전화·WhatsApp 원터치 + 스페인어 문장 자동 생성**\n4. **\"오늘은 서두르지 않아도 됩니다\"** 라는 판단을 대신 내려주기\n\n> 기존 앱은 전부 숙소 \"목록\"을 보여준다. **아무도 \"오늘 뛰어야 하나요\"에 답하지 않는다. 여기가 공백이다.**\n\n---\n\n### ② 발 물집과 무릎 통증 ★★★\n\n가장 흔한 신체 문제이자 완주 실패의 주된 원인.\n\n- 한 부부 순례자 기록: 감기약·소화제·항히스타민제는 쓸 일이 없었지만 **소염진통제와 근육이완제는 모자랐다.** 둘 다 무릎 통증이 심했다. 파스와 스포츠 테이프는 물집 관리에 요긴했다\n- 일반적 권장: **배낭 무게는 체중의 10% 이하(보통 6~7kg), 90분마다 10분 휴식**\n- 순례 중 무릎 통증으로 8일간 걷지 못하고 피로골절을 의심해 국내 의료 상담을 받은 사례가 있다\n\n**핵심 통찰 ★★☆**\n\n> \"쉬는 걸 두려워하지 마세요. 하루 쉰다고 완주 못 하는 게 아니라, **안 쉬고 걷다 다치면 완주를 포기하게 됩니다.**\"\n\n#### → 해석: 일정의 목표 함수를 바꾼다\n\n기존 앱과 가이드북은 전부 **\"어떻게 완주할 것인가\"** 를 다룬다. 실제 리스크는 **\"어떻게 다치지 않을 것인가\"** 다.\n\n- 목표 함수: 최단 일수 → **부상 없는 완주 확률 최대화**\n- **초반 3~5일을 의도적으로 짧게** (몸이 적응하기 전 과부하가 부상의 주원인)\n- 큰 오르막 다음 날 자동 단축\n- 연속 고강도 일수에 경고\n- **휴식일을 요청하지 않아도 기본 제안**\n\n> 이건 우리 구간 분할 엔진으로 구현 가능하다. **경쟁 앱은 사용자가 직접 구간을 고르게 두고, 그래서 무리한 일정을 방치한다.**\n\n⚠️ **의료 정보는 전문가 검수 후에만 제공한다.** 통증 대처법, 약품명, 물집 처치는 정형외과·스포츠의학 자문 없이 넣지 않는다.\n\n---\n\n### ③ 언어 장벽 ★★★\n\n- 프랑스 길 중반 시골은 영어가 거의 안 통한다\n- 약국에서 증상 설명이 가장 곤란\n- **알베르게 전화 예약이 사실상 불가능** → 예약 가능한 사립을 두고도 선착순 공립에 줄 선다\n\n#### → 해석: 언어가 ①번을 악화시킨다\n\n전화 한 통이면 침대를 확보할 수 있는데 스페인어를 못 해서 못 건다.\n\n- 상황별 문장집 (약국, 예약, 응급)\n- **전화 예약 스크립트**: 이름·인원·날짜·도착 예정 시각을 넣은 문장 자동 생성 → 읽기만 하면 됨\n- WhatsApp 메시지 자동 생성 (스페인 알베르게는 WhatsApp을 많이 쓴다)\n- 빈대 신고 문장 — 스페인어로 빈대는 **`chinches`**. 이 단어를 외워두면 알베르게에서 누가 그 얘기를 할 때 알아듣고, 자기 상황도 설명할 수 있다\n\n**구현 비용이 매우 낮고 효용이 크다.**\n\n---\n\n### ④ 빈대 (chinches) ★★★\n\n- 순례자 회전율이 높고 한 공간에 많이 모이는 알베르게 특성상 발생. 매트리스 솔기·벽 틈·배낭에 숨는다. 질병은 안 옮기지만 물리면 매우 괴롭다\n- 실제 사례가 처참하다. 한 순례자는 **사리아에서 물린 뒤 포르토마린, 팔라스 데 레이, 멜리데까지 네 마을에 걸쳐 세탁하고 살충제를 뿌렸는데도 계속 물렸고, 아르수아에서 산업용 건조기에 전부 돌리고서야 멈췄다.** 그 과정에서 모자 두 개가 타고 지퍼가 녹았다\n- 커뮤니티에서는 **건조기(secadora) 보유 알베르게 목록**을 서로 공유한다\n\n#### → 해석: 데이터 필드 하나로 해결된다\n\n- 알베르게 데이터에 **`hasDryer` 필수 필드**\n- 빈대 발생 시 \"가장 가까운 건조기 보유 숙소\" 즉시 검색\n- 예방 체크리스트 (배낭을 침대 위에 올리지 말 것, 매트리스 솔기 확인, 옷은 밀폐 봉투)\n- 최근 발생 제보 (지역·시점만. **특정 숙소 실명 노출은 명예훼손 위험 → 법률 검토 필요**)\n\n> **`hasDryer` 하나가 \"이 앱 만든 사람은 진짜 걸어봤구나\"를 증명한다.** 걸어보지 않으면 이게 왜 중요한지 모른다.\n\n---\n\n### ⑤ 계절·기후 ★★★\n\n- 여름은 무더위로 체력 소모가 크고 숙소 경쟁이 심하다\n- 겨울은 산악에 눈이 쌓이고 **많은 알베르게가 문을 닫는다.** 공립은 보통 부활절~10월 말 운영\n\n⚠️ **`open_from`/`open_to` 없이 숙소를 표시하는 것은 사고다.** 11월 순례자에게 4월에만 여는 알베르게를 추천하면 그 사람은 한데서 잔다.\n\n---\n\n### ⑥~⑪ 기타\n\n| 문제 | 실태 | 신뢰도 |\n|---|---|---|\n| 도난 | 다인실 특성상 발생. 여행자 보험 권장 | ★★☆ |\n| 다인실 소음 | 코골이, 새벽 부스럭거림. 귀마개 필수 | ★★★ |\n| 시에스타 | 상점 14~17시 폐점. 장보기 타이밍 놓침 | ★★☆ |\n| 세탁물 건조 | 비 오는 날 안 마르면 다음 날이 괴로움 | ★★☆ |\n| 인종차별 | 시골에서 무시당하는 경험 보고. 위협적이진 않으나 당황스러움 | ★☆☆ |\n\n---\n\n## 5. 한국인 특유의 상황\n\n### 5.1 한국인은 이미 \"보이는\" 집단이다 ★★★\n\n- **2004년 18명 → 2019년 8,224명, 15년간 450배.** 김남희 작가의 책과 god 출연 TV 프로그램이 열풍의 핵심이었다\n- 일부 알베르게(특히 '스페인 하숙' 촬영지)는 **한국인이 절반 이상**을 차지하기도 했다\n- 길 위의 식당과 성당에서 **한글 메뉴판과 한글 안내**를 볼 수 있다\n\n**→ 기회이자 함정이다.**\n기회: 한국인 밀도가 높아 한국어 서비스의 효용이 크다.\n함정: **이미 한국어 대응이 어느 정도 되어 있다. \"한국어 지원\"만으로는 차별점이 안 된다.**\n\n### 5.2 짐 배송(동키 서비스) — 결정적 제약 발견 ★★★\n\n- 스페인 우체국 Correos가 **PAQ PEREGRINO**를 운영한다. 배낭·가방을 원하는 우체국으로 보내 도착할 때까지 보관해준다. 짐을 순례 시작점으로 미리 보내 항공 수하물 요금을 아낄 수도 있다\n- 국내에서는 '스페인 하숙' 8화에 나오며 **'동키'** 로 알려졌다\n- 한 국내 여행사는 전 구간 짐 배송을 **약 200유로**로 안내한다\n\n#### ⚠️ 공립 알베르게는 짐 배송을 받지 않는다\n\n**예약을 안 받으니 침대를 보장할 수 없고, 따라서 짐을 맡아둘 근거가 없다.**\n\n```\n배낭 배송을 쓴다  →  그날 밤 숙소가 미리 확정돼야 한다\n                  →  예약 가능한 사립 숙소만 가능\n                  →  숙박비 8~10유로 → 12~25유로\n                  →  35일 완주 시 숙박비만 150~500유로 추가\n```\n\n즉 **\"부상 위험을 줄이려면 돈을 더 내야 하는\" 구조**다. 순례자가 실제로 마주하는 트레이드오프인데, **아무 앱도 이걸 계산해주지 않는다.**\n\n#### → 해석\n\n- 배송 사용/미사용 **두 시나리오의 총비용과 부상 위험을 나란히 제시**\n- \"전 구간 배송\"이 아니라 **\"큰 오르막 3개 구간만 배송\"** 같은 부분 사용 제안 (비용 최소, 효과 최대)\n- 배송 접수 마을 + **배송 수령 가능한 사립 숙소**를 세트로 표시\n- 접수 양식 작성 도우미 → **제휴 수수료 발생 지점**\n\n### 5.3 평판 문제 ★☆☆\n\n국내 커뮤니티에서 한국인 순례자의 낙서 등 민폐 행위가 현지인 반감을 산다는 지적이 반복된다. 정량 근거는 없으나, **앱 안에 순례 예절 안내를 넣는 것은 낮은 비용으로 실질적 기여가 된다.**\n\n### 5.4 크레덴시알은 국내 관문이 아니다 ★★★\n\n초기 가설은 \"국내 크레덴시알 발급처를 잡으면 100%를 잡는다\"였다. **틀렸다.**\n\n프랑스 길 순례자는 대부분 **생장피드포르 순례자 사무실에서 여권과 신청서를 내고 2유로에 발급**받는다. 국내 협회나 성당에서도 미리 받을 수 있지만, 현지 발급이 일반적이라 국내에 단일 관문이 없다.\n\n→ 협회 제휴는 여전히 유효하나 **데이터·신뢰 확보 목적**이지 도달 관문으로서의 가치는 낮다.\n\n---\n\n## 6. 도출된 제품 기회 (우선순위)\n\n| # | 기회 | 근거 | 구현 난이도 |\n|---|---|---|---|\n| 1 | **\"오늘 서두를 필요 있나요?\"** | ①. 아무 앱도 답하지 않는 질문 | 중 |\n| 2 | **부상 회피형 일정 설계** | ②④. 목표 함수를 완주 확률로 | 낮 |\n| 3 | **전화 예약 스크립트** | ③. 언어 장벽이 침대를 못 잡게 함 | **매우 낮음** |\n| 4 | **건조기 지도** | ④. 데이터 필드 하나 | **매우 낮음** |\n| 5 | **짐배송 비용·리스크 계산기** | 5.2. 아무도 안 함 | 낮 |\n| 6 | 비용 계산기 | 지출 400만 원대, 예산 민감층 다수 | 낮 |\n\n**3·4번은 구현 비용이 거의 없으면서 \"걸어본 사람이 만들었다\"를 증명한다. 초기에 반드시 넣는다.**\n\n---\n\n## 7. 반드시 인터뷰로 확인할 것\n\n이 문서의 3장 이후는 전부 2차 자료다. 아래는 직접 물어봐야만 알 수 있다.\n\n| # | 질문 | 확인 대상 |\n|---|---|---|\n| 1 | 걷는 중 하루에 휴대폰을 몇 번, 언제 꺼냈나 | 현장 사용 빈도. 앱을 안 볼 수도 있다 |\n| 2 | 침대를 못 구한 적이 실제로 있었나. 몇 번인가 | 베드 레이스가 실재인지 공포인지 |\n| 3 | 오늘 어디서 잘지 언제 결정했나 | 계획형 vs 즉흥형 |\n| 4 | 중도 포기를 고민한 순간이 있었나. 언제, 왜 | 이탈 지점 특정 |\n| 5 | 출국 전 정보를 어디서 얻었나. 뭐가 없어서 답답했나 | 준비 단계 공백 |\n| 6 | 돈을 냈다면 무엇에 냈겠나 | 지불 의사 지점 |\n| 7 | 기존 앱을 썼나. 안 썼다면 왜 | 경쟁 앱 실제 침투율 |\n| 8 | 짐 배송을 썼나. 안 썼다면 왜 | 기회 5의 실현 가능성 |\n\n**대상**: 최근 2년 내 완주자 10명 + **중도 포기자 5명** + 출발 예정자 5명\n**방법**: 1인 40분 반구조화 인터뷰\n**⚠️ 중도 포기자 5명이 가장 중요하다. 완주자만 만나면 생존자 편향에 빠진다.**\n\n---\n\n\n---\n\n# 2부 · 출처 대장 및 최종 검토\n\n\n## 이 문서의 2부를 만든 이유\n\n앞선 문서들은 **사실, 추론, 설계 결정을 뒤섞어** 서술했다. 읽는 사람이 \"이건 확인된 건가, 아니면 지어낸 건가\"를 구분할 수 없다.\n\n이 문서는 두 가지를 한다.\n\n1. **출처 대장** — 각 주장이 어디서 왔는지, 신뢰 등급이 무엇인지\n2. **최종 검토** — 문서 전체를 다시 읽고 발견한 결함\n\n---\n\n## 1. 근거 등급 정의\n\n| 등급 | 의미 | 문서에서의 취급 |\n|---|---|---|\n| **A** | 공식 기관 발표 자료 | 사실로 서술 가능 |\n| **B** | 복수의 독립 출처에서 일치 | 사실로 서술하되 출처 명시 |\n| **C** | 단일 출처, 또는 후기·커뮤니티 | \"~로 보인다\" 수준으로 서술 |\n| **D** | 우리의 추론·계산 | **반드시 \"추정\"으로 명시** |\n| **E** | 근거 없는 설계 결정 | **반드시 \"가설\" 또는 \"임의 설정\"으로 명시** |\n\n> **D와 E를 A처럼 서술하는 것이 가장 위험하다.** 읽는 사람이 검증된 사실로 착각하고 의사결정한다.\n\n---\n\n## 2. 출처 대장\n\n### 2.1 순례자 통계 — 등급 A\n\n| 주장 | 값 | 출처 | 확인일 |\n|---|---|---|---|\n| 2025년 전체 콤포스텔라 수령자 | 530,987 | Oficina del Peregrino (via viajecaminodesantiago.com, pilgrimaps.com) | 2026-07 |\n| 연도별 추이 2003~2025 | 표 참조 | viajecaminodesantiago.com/en/curiosities/statistics/ | 2026-07 |\n| 2010년 (직전 성년) | 272,385 | 동일 | |\n| 2009년 | 147,254 | 동일 | |\n| 2024년 | 499,242 | 동일 | |\n| 프랑스 길 2025 | 242,179 (46%) | caminoways.com | |\n| 사리아 출발자 2025 | 162,076 (30.5%) | caminoways.com | |\n| 스페인 국적 비율 | 43% (228,527) | viajecaminodesantiago.com | |\n| 미국 | 43,964 | unanchoredpassenger.com | |\n| **한국 2025** | **7,481 (-5.42%)** | unanchoredpassenger.com | |\n| 한국 2019 | 8,224 (8위) | Google Arts & Culture | |\n| 한국 2016 | 4,534 | elcaminoconcorreos.com | |\n| 한국 2004 | 18 | Google Arts & Culture | |\n| 생장 사무소 2025 집계 | 54,115 | americanpilgrims.org/statistics | |\n| 산티아고 사무소 생장 출발자 집계 | 30,345 | 동일 | |\n\n#### ⚠️ 발견된 불일치\n\n**2025년 총계가 출처마다 다르다.**\n\n| 출처 | 값 |\n|---|---|\n| viajecaminodesantiago.com, pilgrimaps.com, caminoways.com | **530,987** |\n| americanpilgrims.org, unanchoredpassenger.com | 530,919 |\n| solviturambulando.es | 530,881 |\n\n차이는 106명(0.02%)으로 의사결정에 영향은 없다. 순례자 사무소가 잠정치를 여러 차례 갱신했기 때문으로 보인다. **문서에서는 530,987을 쓰되, \"출처에 따라 ±100명 차이가 있음\"을 각주로 남긴다.**\n\n**한국 2024년 수치는 우리가 역산한 값이다 (등급 D).**\n7,481 ÷ (1 − 0.0542) ≈ 7,910. 원자료를 직접 확인하지 않았다. **\"약 7,910 (역산)\"으로 표기해야 한다.**\n\n---\n\n### 2.2 알베르게 운영 — 등급 A~B\n\n| 주장 | 출처 | 등급 |\n|---|---|---|\n| Xunta 공립 예약 시스템 `alberguesxacobeo.gal` 2020년 개설, 전날~당일 13시, 5인까지 | Xunta de Galicia 공식 보도자료 (xunta.gal) | **A** |\n| 2021년 7월 7일 예약 기능 폐지, 선착순 복귀, 13시 개방 | elcaminoconcorreos.com | B |\n| 2026년 갈리시아 공립 약 10유로 | stingynomads.com (2026-03) | B |\n| **2026년 공립·Xunta 예약 불가, 워크인 전용** | caminoadventures.com (2026-03), packing-up-the-pieces.com (2026-05) | **B** |\n| 사립은 전화·WhatsApp·플랫폼 예약 가능 | 동일 | B |\n| **공립·지자체 알베르게는 짐 배송을 받지 않음** (침대 보장 불가) | packing-up-the-pieces.com | **C** |\n| 공립 겨울 폐쇄, 통상 부활절~10월 말 | hamburgueseriasenaris.com | C |\n| 성수기 예약 허용 제안 (Amigos del Camino Portugués, 2025년 초) | caminodesantiago.me 포럼 | B |\n| Xunta 알베르게 운영 민간 위탁, 2024년 7월 계약, 연 610만 유로 | caminodesantiago.me 포럼 (라 보스 데 갈리시아 인용) | C |\n\n#### ⚠️ 사립 알베르게 요금 — 문서 수정 필요\n\n| 출처 | 값 |\n|---|---|\n| viajecaminodesantiago.com | 10~15유로 |\n| 포르투갈 길 해안 사립 목록 | 14~32유로 |\n| **우리 문서 (01, 04)** | **12~25유로** |\n\n**우리 값은 두 출처를 임의로 절충한 것이다 (등급 D).** 근거가 없다. **\"10~25유로 (출처별 편차 있음, 실측 필요)\"로 수정한다.**\n\n---\n\n### 2.3 애로사항 — 등급 C (대부분)\n\n| 주장 | 출처 | 등급 |\n|---|---|---|\n| 노숙 공포로 새벽 5시 기상, 공립 앞 대기 행렬 | hamburgueseriasenaris.com/ko (2026-01, 현지 운영자) | C |\n| 12시 30분 이전 도착 권장 | 동일 | C |\n| \"점점 더 새벽에 걷는 사람이 늘고 있다\" | Amigos del Camino Portugués 회장, 포럼 인용 | C |\n| **반론**: 8월 나헤라 자원봉사 중 만실은 한 번뿐 | thenwewalked.com (2026-02) | C |\n| 부활절·7/25·10/12·산 페르민에 국지적 혼잡 | thenwewalked.com | C |\n| 소염진통제·근육이완제 부족, 무릎 통증 | elinprince 블로그 (2024-04) | C |\n| 배낭 무게 체중 10% 이하, 90분마다 10분 휴식 | mjw96.com (2025-04) | C |\n| 순례 중 무릎 통증 피로골절 의심 사례 | 닥터나우 상담 (2024-10) | C |\n| 빈대: 사리아→아르수아 4개 마을, 건조기로 해결 | caminodesantiago.me 포럼 (2022-05) | C |\n| 빈대 스페인어 `chinches` | caminocomfort.com (2025-10) | B |\n| 건조기 보유 알베르게 목록 공유 문화 | caminodesantiago.me 포럼 | C |\n\n> **①~⑪ 애로사항 전체가 등급 C다.** 인터뷰 20건 전까지는 가설이며, 빈도와 심각도 순위는 우리 판단이다(등급 E).\n\n---\n\n### 2.4 한국 시장 — 등급 B~C\n\n| 주장 | 출처 | 등급 |\n|---|---|---|\n| 2004년 18명 → 2019년 8,224명, 450배 | Google Arts & Culture | B |\n| 김남희 작가 책 + god 프로그램이 열풍 요인 | 동일 | C |\n| 스페인 하숙 촬영지 알베르게 한국인 절반 이상 | milemoa 게시판 (2019) | C |\n| 길 위에 한글 메뉴판 존재 | 한국아파트신문 연재 | C |\n| 크레덴시알 생장 발급 2유로, 국내 협회도 가능 | happidaily.com, bbobbosis.com | B |\n| Correos PAQ PEREGRINO 운영 | elcaminoconcorreos.com/ko (공식) | **A** |\n| 전 구간 짐 배송 약 200유로 | ojitour.com 상품 안내 | C |\n| '동키' 명칭은 스페인 하숙 8화에서 확산 | 나무위키 | C |\n| 한국인 낙서 등 민폐 지적 | 나무위키 | **C (정량 근거 없음)** |\n\n---\n\n### 2.5 경쟁 앱 — 등급 B\n\n| 주장 | 출처 |\n|---|---|\n| Buen Camino: 100만+ 다운로드, 45개 가이드, 9개 언어, 무료 | App Store 리스팅 |\n| Wise Pilgrim: $4.99, 14년, 2026년 리뉴얼, 오프라인 지도 | App Store 리스팅 |\n| Gronze: 스페인어 전용, 숙소 DB 강점 | travelledroad.com, alberguesansol.com |\n| 대성당 공식 디지털 크레덴시알, QR 도장 | alberguesansol.com |\n\n---\n\n### 2.6 우리가 만든 숫자 — 등급 D·E\n\n**이 표가 이 문서에서 가장 중요하다.**\n\n| 항목 | 값 | 등급 | 실제 근거 |\n|---|---|---|---|\n| 실제 시장 규모 | 연 1만~1.2만 명 | **D** | 7,481 + 중도이탈·미신청 추정 |\n| 1인당 지출 | 370~490만 원 | **D** | 항목별 시세 추정. 실측 없음 |\n| 시장 전체 지출 | 약 400억 원 | **D** | 위 두 값의 곱 |\n| 2027년 한국인 예상 | 1.2만~1.5만 명 | **D** | 2010년 성년의 +85%를 단순 적용 |\n| **페르소나 비율 (30/40/20/10)** | — | **E** | **근거 없음. 창작이다** |\n| **도달률 목표 30/60/85%** | — | **E** | 목표치이지 예측이 아니다 |\n| **ARPU 3만 원** | — | **E** | 근거 없음 |\n| 여행사 송객 수수료 5~10% | — | **E** | 미확인. 확인이 최우선 과제 |\n| 장비 제휴 수수료 5% | — | **E** | 미확인 |\n| 인건비 월 400만/인 | — | D | 통상 시세 |\n| 실측 도보 비용 800만 | — | D | 40일 체류비 추정 |\n| **오르막 임계값 400m** | — | **E** | 임의 설정 |\n| **장거리 임계값 28km** | — | **E** | 임의 설정 |\n| **침대 부족 임계값 30개** | — | **E** | 임의 설정 |\n| **초반 3일 ×0.8** | — | **E** | 임의 설정 |\n| **경로 이탈 150m** | — | **E** | 임의 설정 |\n| **injuryRiskScore 공식** | — | **E** | **의학적 근거 전무** |\n| 혼잡 추정 모델 계수 | — | **E** | 임의 설정 |\n\n> **위 E 등급 항목들이 제품의 핵심 로직이다.** 전부 실측 도보와 인터뷰로 교정해야 한다.\n> 특히 `injuryRiskScore`는 **의학적 근거가 전혀 없으므로, 사용자에게 \"위험 점수\"라는 이름으로 제시해서는 안 된다.**\n\n---\n\n## 3. 최종 검토 — 발견된 결함\n\n### 🔴 결함 1 — 고도 데이터가 실제 오르막을 심각하게 과소평가한다\n\n**가장 심각한 결함이다. 제품의 핵심 차별점을 무력화한다.**\n\n우리 데이터는 **마을의 고도만** 가지고 있다. 오르막을 `도착지 고도 − 출발지 고도`로 계산하는데, **중간에 더 높은 고개를 넘는 구간에서는 완전히 틀린다.**\n\n**생장피드포르 → 론세스바예스 (1일차)**\n\n| | 값 |\n|---|---|\n| 우리 계산 | 950m − 170m = **+780m** |\n| 실제 | 레포에데르 고개 약 1,450m를 넘는다 |\n| 실제 누적 상승 | **약 1,280m** |\n| 실제 하강 | 약 500m |\n| **오차** | **약 500m (39% 과소평가)** |\n\n카미노에서 가장 힘든 구간이자 부상이 가장 많이 나는 날인데, **우리 엔진은 이 날을 \"오르막 780m, 평범한 산길\"로 판단한다.**\n\n같은 문제가 폰세바돈(철의 십자가 1,505m), 오 세브레이로 구간에도 있다.\n\n**→ 조치**\n\n1. `data/towns.ts`에 마을 고도만 두지 말고, **구간별 실제 누적 상승/하강(`ascent`/`descent`)을 별도 필드로 추가**한다\n2. 이 값은 **GPX 트랙에서 추출**해야 한다. 마을 고도로는 절대 계산할 수 없다\n3. 실측 도보 전까지는 공개 GPX(갈리시아 주정부, OSM 등)에서 추출하되 라이선스를 확인한다\n4. **그 전까지는 `injuryRiskScore`를 사용자에게 노출하지 않는다**\n\n---\n\n### 🔴 결함 2 — 내리막을 전혀 고려하지 않는다\n\n무릎 부상의 주원인은 오르막이 아니라 **내리막**이다. 그런데 우리 모델에는 `elevationGain`만 있고 하강이 없다.\n\n우리 데이터에서도 급격한 하강 구간이 보인다.\n\n| 구간 | 고도 변화 | 비고 |\n|---|---|---|\n| 엘 아세보 → 몰리나세카 | 1,145m → 595m (**−550m**) | 급경사 돌길로 악명 |\n| 오 세브레이로 → 트리아카스텔라 | 1,300m → 665m (**−635m**) | |\n| 론세스바예스 → 수비리 | 950m → 520m (−430m) | |\n\n**엘 아세보 → 몰리나세카는 우리 엔진에서 `elevationGain = 0`이라 \"쉬운 날\"로 분류된다.** 실제로는 무릎 부상이 가장 많이 나는 구간 중 하나다.\n\n**→ 조치**: `Stage`에 `elevationLoss` 추가. 위험 산정에 **하강을 오르막보다 높은 가중치로** 반영한다.\n\n---\n\n### 🟠 결함 3 — 재무 추정과 실행 권고가 서로 모순된다\n\n`02_전략과사업.md`에서:\n\n- **5장 재무표**: 비용 1억 4,500만 원 (2인 전업 인건비 9,600만 포함)\n- **8장 권고**: \"사이드 프로젝트로 시작, 500만 원 이내\"\n\n**두 시나리오가 한 문서에 섞여 있어 읽는 사람이 혼란스럽다.**\n\n**→ 조치**: 재무표에 **\"전업 전환 시나리오 (2027 하반기 이후 가정)\"** 라고 명시하고, Phase 0 사이드 프로젝트의 별도 손익표를 추가한다.\n\n| Phase 0 (사이드, 2026 하반기) | 금액 |\n|---|---|\n| 서버·도메인 | 30만 |\n| 지도 타일 (Phase 0는 불필요) | 0 |\n| 실측 도보 40일 | 800만 (휴가 활용 시 체류비만) |\n| **합계** | **약 830만** |\n| 매출 | 0 (검증 단계) |\n\n---\n\n### 🟠 결함 4 — 중도 이탈 23,770명 해석이 위험하다\n\n`01` 문서에서 생장 54,115 − 산티아고 30,345 = 23,770을 \"중도 이탈\"로 다뤘다. 주의 문구를 달았지만 **여전히 오해를 부를 수 있다.**\n\n두 숫자는 **세는 대상이 다르다.**\n\n- 생장 사무소: 그 사무소를 **방문한** 사람 수 (당일 관광객, 며칠만 걷는 사람 포함)\n- 산티아고 사무소: **콤포스텔라를 신청하면서 출발지를 생장으로 적은** 사람 수\n\n중도 이탈뿐 아니라 ① 애초에 일부 구간만 걸을 계획, ② 콤포스텔라 미신청, ③ 다른 곳에서 여정을 마침이 모두 섞여 있다.\n\n**→ 조치**: \"중도 이탈 규모\"가 아니라 **\"생장에서 출발했다고 기록된 사람과 산티아고에서 완주를 신고한 사람의 격차\"** 로 정확히 서술하고, 해석은 인터뷰 이후로 미룬다.\n\n---\n\n### 🟡 결함 5 — SEO 페이지 수가 문서마다 다르다\n\n| 문서 | 값 |\n|---|---|\n| 00 README | 330+ |\n| 02 전략 | 330+ |\n| 04 사양서 | 163 자동 + 150 수기 = 313 |\n| 05 프롬프트 P5 완료조건 | \"170개 이상\" |\n\n혼란을 준다. 정리하면:\n\n| 구분 | 수 | 시점 |\n|---|---|---|\n| 마을 | 82 | Phase 1 (자동) |\n| 구간 | 81 | Phase 1 (자동) |\n| 루트 | 3 | Phase 1 |\n| 도구 | 3~6 | Phase 1 |\n| **Phase 1 소계** | **약 170** | |\n| 가이드·일정·상황 | 150+ | Phase 2 (수기) |\n| **최종 합계** | **약 320** | |\n\n**→ 조치**: 전 문서에서 \"Phase 1 약 170페이지 / 최종 약 320페이지\"로 통일한다.\n\n---\n\n### 🟡 결함 6 — 페르소나 비율이 창작이다\n\n30% / 40% / 20% / 10%. **아무 근거가 없다.** 순례자 사무소는 국적별·연령별 통계를 내지만 우리는 그 연령 분포를 확인하지 않았다.\n\n**→ 조치**: 비율을 삭제하거나 **\"인터뷰 전 임시 가설\"** 로 명시한다. 이 비율로 리소스 배분을 결정하면 안 된다.\n\n---\n\n### 🟡 결함 7 — \"판단을 대신한다\"의 법적 부담을 다루지 않았다\n\n우리 제품의 차별점은 \"데이터가 아니라 판단을 준다\"인데, **판단에는 책임이 따른다.**\n\n- \"오늘은 서두르지 않아도 됩니다\" → 그런데 만실이었다 → 노숙\n- \"이 일정은 무리 없습니다\" → 부상\n\n기존 앱들이 데이터만 보여주는 것은 게을러서가 아니라 **책임을 지지 않기 위해서**일 수 있다.\n\n**→ 조치**\n1. 모든 판단에 **근거를 함께 표시**한다 (\"침대 240개, 6월 평일 기준\")\n2. **\"추정\"임을 항상 명시**한다\n3. 이용약관에 면책 조항. **법률 검토를 미해결 목록에 추가**\n4. `injuryRiskScore`는 의학 자문 전까지 **점수로 노출하지 않는다.** 대신 \"이 일정은 초반이 빡빡합니다\" 같은 서술형으로\n\n---\n\n### 🟡 결함 8 — 데이터 라이선스를 확인하지 않았다\n\nOSM, 갈리시아 주정부 GPX를 \"0원\"으로 잡았지만 **라이선스를 확인하지 않았다.**\n\n- OSM은 ODbL — 파생물에 동일 라이선스 적용 의무가 있을 수 있다\n- 지도 타일 자체 호스팅은 대역폭 비용이 발생한다\n- 상업적 이용 조건이 다를 수 있다\n\n**→ 조치**: P0 착수 전 확인. 비용 0 가정이 깨지면 재무표를 수정한다.\n\n---\n\n### 🟢 결함 9 — 82개 마을은 프랑스 길만 커버한다\n\n포르투갈 길·북쪽 길 확장을 로드맵에 넣었지만, **데이터가 전혀 없다.** 확장은 데이터 구축을 다시 처음부터 하는 일이다.\n\n**→ 조치**: 확장 일정에 \"루트당 실측 20~30일 필요\"를 명시한다.\n\n---\n\n### 🟢 결함 10 — 도달률 분모를 실시간으로 알 수 없다\n\n도달률이 북극성 지표인데, **분모(연간 한국인 순례자 수)는 이듬해 1월에나 발표된다.** 연중에는 측정이 불가능하다.\n\n**→ 조치**: 연중에는 **대리 지표**로 운영한다.\n- 월 순방문자 수\n- 계산기 완료 수\n- 계획 링크 공유 수\n\n도달률은 **연 1회 사후 검증 지표**로 쓴다.\n\n---\n\n## 4. 검토 요약\n\n| # | 결함 | 심각도 | 영향 문서 | 조치 |\n|---|---|---|---|---|\n| 1 | 고도 데이터가 실제 오르막 과소평가 | 🔴 | 04, 05 | GPX에서 ascent/descent 추출 |\n| 2 | 내리막 미고려 | 🔴 | 04, 05 | `elevationLoss` 추가 |\n| 3 | 재무표와 권고의 모순 | 🟠 | 02 | 시나리오 분리 |\n| 4 | 중도 이탈 해석 위험 | 🟠 | 01 | 서술 정정 |\n| 5 | 페이지 수 불일치 | 🟡 | 00,02,04,05 | 170/320으로 통일 |\n| 6 | 페르소나 비율 창작 | 🟡 | 03 | 삭제 또는 가설 명시 |\n| 7 | 판단의 법적 부담 미검토 | 🟡 | 03, 04 | 면책·근거 표시·법률 검토 |\n| 8 | 데이터 라이선스 미확인 | 🟡 | 02, 04 | P0 착수 전 확인 |\n| 9 | 확장 시 데이터 재구축 누락 | 🟢 | 02 | 일정에 명시 |\n| 10 | 도달률 실시간 측정 불가 | 🟢 | 02, 03 | 대리 지표 운영 |\n\n---\n\n## 5. 개발 착수 전 반드시 처리할 것\n\n**결함 1·2는 코드를 쓰기 전에 해결해야 한다.** 부상 회피 엔진이 제품의 핵심 차별점인데, 입력 데이터가 틀리면 그 차별점이 오히려 위험이 된다.\n\n```\n현재:   마을 고도 → 오르막 계산 → 위험 판단  ❌ 최대 39% 오차\n필요:   GPX 트랙 → 누적 상승/하강 → 위험 판단  ✅\n```\n\n**P0에 GPX 처리 단계를 추가하고, 그 전까지 `injuryRiskScore`를 사용자에게 노출하지 않는다.**\n\n---\n\n## 6. 출처 URL 전체\n\n### 공식 기관\n- Xunta de Galicia 보도자료 — xunta.gal/es/hemeroteca\n- Correos 순례자 서비스 (한국어) — elcaminoconcorreos.com/ko/\n- 대한민국 산티아고 순례자 협회 — caminocorea.org\n\n### 통계\n- viajecaminodesantiago.com/en/curiosities/statistics/\n- americanpilgrims.org/statistics/\n- caminoways.com/camino-de-santiago-statistics\n- unanchoredpassenger.com/camino-de-santiago-statistics/\n- pilgrimaps.com\n\n### 알베르게\n- stingynomads.com/albergues-camino-de-santiago/\n- caminoadventures.com/blog/pilgrim-hostels/\n- packing-up-the-pieces.com/camino-de-santiago-albergues-tips/\n- alberguescaminosantiago.com\n- vivecamino.com\n\n### 커뮤니티·후기\n- caminodesantiago.me (영문 포럼)\n- hamburgueseriasenaris.com/ko (현지 운영자, 한국어)\n- thenwewalked.com\n- epiccamino.com\n- caminocomfort.com\n- 국내: milemoa, brunch, 한국아파트신문, 개인 블로그 다수\n\n### 앱\n- App Store 각 앱 페이지\n- alberguesansol.com/en/apps-camino-santiago\n- travelledroad.com/best-camino-de-santiago-apps/\n\n---\n\n*이 문서는 살아 있는 문서다. 인터뷰와 실측 도보 이후 등급 C·D·E 항목을 갱신한다.*\n"}, {"file": "02_전략과사업.md", "title": "전략과 사업", "sub": "사업모델 · 패키지 전환 · 재무 · 법무", "md": "# 02 · 전략과 사업\n\n> 1부 사업모델 · 2부 패키지 수요 전환 · 3부 재무와 의사결정 · 4부 법무와 리스크\n> v4.1 · 2026년 7월\n\n---\n\n## 목차\n\n| 부 | 내용 | 핵심 |\n|---|---|---|\n| **1부** | 사업모델 | 두 축(부상·숙소), 시장, 경쟁, 수익, 도달률 |\n| **2부** | 패키지 수요 전환 | **최대 단일 기회.** 350~600만 내려는 사람을 20~50만에 |\n| **3부** | 재무와 의사결정 | 민감도, 시나리오 4개, 실패와 출구, KPI |\n| **4부** | 법무와 리스크 | 의료·여행업·보험 규제, 리스크 대장 |\n\n---\n\n# 1부 · 사업모델\n\n### 1. 목표\n\n> **한국에서 카미노를 준비하거나 걷는 모든 사람이 이 서비스를 쓴다.**\n\n#### 1.1 이 목표는 타당한가\n\n**타당하다. 단, 보통의 이유와는 반대 방향에서 타당하다.**\n\n일반적으로 100% 점유는 비현실적이다. 시장이 크면 경쟁자가 반드시 생기고, 취향이 갈리고, 어떤 세그먼트는 절대 안 넘어온다.\n\n**그런데 이 시장은 연 1만 명이다.** 너무 작아서:\n\n- 글로벌 경쟁자(Buen Camino, Wise Pilgrim)가 한국어에 투자할 이유가 없다 — 한국인은 전체 순례자의 **1.4%**다\n- 국내 대기업이 진입할 이유가 없다 — 최대 매출이 수억 원대다\n- 반대로 **한 팀이 전부를 감당할 수 있는 크기다** — 연 1만 명이면 CS도 데이터 관리도 소수 인원으로 가능하다\n\n> **작은 시장은 약점이 아니라 해자(moat)다. 아무도 안 오는 시장이라서 전부 가질 수 있다.**\n\n#### 1.2 \"100%\"의 정의\n\n정의를 잘못 잡으면 측정도 달성도 못 한다.\n\n**잘못된 정의**\n\n| 정의 | 왜 틀렸나 |\n|---|---|\n| 앱 설치 100% | 불가능. 패키지 이용자, 60대 일부는 앱을 안 깐다 |\n| 유료 전환 100% | 불가능하고, 시도하면 도달률이 무너진다 |\n| 완주자 100% | 가장 도움이 필요한 중도 포기자를 놓친다 |\n\n**채택하는 정의**\n\n> **도달률(Reach) = 그 해 카미노를 준비하거나 걸은 한국인 중, 이 서비스를 한 번이라도 사용한 사람의 비율**\n\n- \"사용\"의 최소 단위는 **웹 일정 계산기 1회 실행.** 설치도 가입도 불필요\n- 분모 추정 가능: 콤포스텔라 한국인 수령자 + 중도 이탈 추정치\n- **실제로 측정 가능한 지표다.** 순례자 사무소가 매년 국적별 통계를 공표한다. 대부분의 스타트업은 자기 점유율을 모르는데, 우리는 안다\n\n#### 1.3 단계 목표\n\n| 연도 | 도달률 | 절대 사용자 | 근거 |\n|---|---|---|---|\n| 2027 (성년) | 30% | 약 4,000 | SEO + 실측 콘텐츠로 검색 유입 확보 |\n| 2028 | 60% | 약 6,500 | 완주자 입소문 + 카페·협회 침투 |\n| 2029 | 85% | 약 9,000 | 사실상 표준 |\n| 이후 | 85~90% 유지 | — | 100%는 점근선 |\n\n**85%를 \"전부\"로 간주한다.** 마지막 15%(패키지 이용자, 비디지털층)를 잡는 비용이 앞의 85%보다 크다.\n\n---\n\n### 2. 이 목표가 강제하는 제약\n\n목표를 도달률로 잡는 순간, 아래는 선택이 아니라 **전제조건**이 된다.\n\n#### 제약 1 — 핵심 기능은 영원히 무료\n\n유료화는 도달률의 상한을 만든다. Wise Pilgrim이 $4.99를 받는 순간 사용자는 \"돈 낼 의향이 있는 사람\"으로 한정된다.\n\n- 일정 계산, 마을 정보, 숙소 정보, 오프라인 지도 — **전부 무료**\n- 수익은 **사용자가 어차피 쓸 돈**(장비·보험·항공·짐배송)에서 나온다\n\n> **이전 계획의 프리미엄 구독 ₩19,900은 폐기한다.** 순례기 PDF·포토북 같은 사후 상품이면 도달률을 해치지 않으므로 그 형태로만 남긴다.\n\n#### 제약 2 — 가입을 요구하지 않는다\n\n회원가입은 도달률을 30~50% 깎는다.\n\n- 계획 상태는 **URL 쿼리스트링에 담는다** → 링크 공유가 곧 바이럴\n- 계정은 순례 일지처럼 저장이 필요한 기능에서만 선택적으로\n\n#### 제약 3 — 웹이 본체, 앱은 부속\n\n앱 설치는 큰 마찰이다. 특히 60대에게.\n\n```\n검색 → 웹에서 즉시 일정 계산 (설치·가입 없음)\n     → 링크 공유\n     → 출국 2주 전, 오프라인 지도가 필요할 때만 앱 설치\n```\n\n**앱을 안 깐 사람도 우리 사용자로 카운트한다.** 이게 도달률 정의의 핵심이다.\n\n#### 제약 4 — 모든 세그먼트를 동시에\n\n타깃을 좁힐 수 없다. 20대 최저예산 배낭족과 68세 은퇴자를 **같은 제품으로** 만족시켜야 한다.\n\n다행히 요구사항이 겹친다.\n\n| | 20대 | 30대 | 60대 |\n|---|---|---|---|\n| 침대 확보 불안 | ✓ | ✓ | ✓ |\n| 부상 회피 | ✓ | ✓ | ✓✓ |\n| 언어 장벽 | ✓ | ✓ | ✓✓ |\n| 비용 최적화 | ✓✓ | ✓ | — |\n| 큰 글씨·단순 UI | — | — | ✓✓ |\n\n**공통 문제가 압도적으로 크다.** 세그먼트 분기는 글꼴 크기와 비용 강조 정도면 충분하다.\n\n---\n\n### 3. 관문 분석 — 어디를 잡아야 하는가\n\n한국인 순례자가 **반드시 지나가는 지점**을 찾아 거기에 자리 잡는다.\n\n| 관문 | 통과 비율 | 장악 가능성 | 비고 |\n|---|---|---|---|\n| **검색 (네이버·구글)** | **~100%** | **높음** | 유일한 완전 관문 |\n| 항공권 예약 | 100% | 낮음 | 개입 여지 적음 |\n| 장비 구매 | ~95% | 중간 | 제휴 가능하나 시점이 늦음 |\n| 네이버 카페 | 70~80% | 중간 | 직접 광고 불가, 기여로만 접근 |\n| 크레덴시알 발급 | 100% | **낮음** | 대부분 생장 현지 발급. 국내 단일 창구 없음 |\n| 여행사 | 20~30% | 중간 | B2B 제휴 |\n| 본당·수도회 | 10% | 중간 | 단체 순례 |\n\n#### 결론: 검색이 유일한 100% 관문이다\n\n**그러므로 SEO는 마케팅 채널이 아니라 전략 그 자체다.**\n\n이전 계획에서 SEO를 \"획득 채널의 40%\"로 잡았던 것과 다르다. 도달률이 목표라면 **자원의 대부분을 여기 쏟아야 한다.**\n\n---\n\n### 4. 실행 설계\n\n#### 4.1 검색 장악 — 롱테일 총력전\n\n한국인이 카미노 준비 중 검색하는 모든 질문에 우리 페이지가 있어야 한다.\n\n| 유형 | 예시 | 페이지 수 | 생성 방식 |\n|---|---|---|---|\n| 마을 | \"포르토마린 알베르게\", \"오 세브레이로 숙소\" | 82 | **데이터 자동 생성** |\n| 구간 | \"생장에서 론세스바예스\", \"사리아 포르토마린 거리\" | 81 | **데이터 자동 생성** |\n| 일정 | \"산티아고 순례길 20일 코스\", \"사리아 5일\" | 40+ | 반자동 |\n| 준비 | \"산티아고 배낭 무게\", \"순례자 여권 발급\" | 60+ | 수기 |\n| 상황 | \"알베르게 만실이면\", \"빈대 물렸을 때\", \"무릎 아플 때\" | 50+ | 수기 |\n| 비용 | \"산티아고 순례길 비용 30일\" | 20+ | 반자동 |\n\n**총 330페이지 이상. 이 중 163개는 이미 확보한 82개 마을 데이터에서 자동 생성된다.**\n\n> 콘텐츠 농장이 아니다. 각 페이지는 실제로 유용해야 하고, 끝에 일정 계산기로 연결된다.\n\n#### 4.2 무료 도구 — 각각이 검색 유입구\n\n가입도 설치도 없이 즉시 쓰는 도구를 독립 URL로 배포한다.\n\n| 도구 | 유입 기대 | 비고 |\n|---|---|---|\n| 일정 계산기 | ★★★ | 핵심. 링크 공유 가능 |\n| 비용 계산기 | ★★★ | 구간·기간·숙소 유형별 |\n| 배낭 무게 계산기 | ★★★ | 체중 10% 기준 |\n| 준비 타임라인 생성기 | ★★☆ | 출국일 입력 → D-90 체크리스트 |\n| 스페인어 문장 생성기 | ★★☆ | 전화 예약·약국·빈대 신고 |\n| 짐배송 비용 비교 | ★★☆ | 공립 vs 사립 트레이드오프 |\n\n**각 도구가 독립적으로 유입을 만들고 서로를 연결한다.**\n\n#### 4.3 완주자를 채널로\n\n카미노에서는 매일 밤 한국인끼리 정보를 교환한다. 이 구조를 이용한다.\n\n- 순례 종료 시 **순례기 PDF 자동 생성** → SNS·블로그 게시 시 자연 노출\n- 도장 수집 화면을 공유하기 좋게 설계\n- **\"이거 뭐 써요?\" 하고 물었을 때 답이 되는 것**이 목표\n\n#### 4.4 비디지털층 — 마지막 15%\n\n60대 이상, 여행사 패키지 이용자에게는 앱이 안 닿는다.\n\n- **인쇄용 일정표 PDF** — A4 한 장. **자녀가 뽑아서 부모에게 준다**\n- 본당 순례 설명회용 자료 무료 배포\n- 여행사에 일정표 생성 도구 제공 → **역으로 여행사가 우리를 쓰게 만든다**\n\n> **\"자녀가 부모를 위해 대신 계획을 세우는\" 경로가 실제로 존재한다.** 사용자와 수혜자가 다른 케이스를 설계에 반영한다.\n\n#### 4.5 마케팅 채널 비중\n\n| 채널 | 방법 | 비중 |\n|---|---|---|\n| 검색 (SEO) | 330페이지 + 무료 도구 | **60%** |\n| 유튜브 | 실측 도보 40일 연재 | 20% |\n| 네이버 카페 | 정보 기여 후 자연 언급 (**직접 광고 금지**) | 10% |\n| 천주교 본당 | 순례 준비 설명회 | 5% |\n| 기타 | 등산·아웃도어 커뮤니티 | 5% |\n\n> 네이버 카페는 노골적 홍보에 매우 적대적이다. 무료 계산기를 공개하고 질문에 성실히 답하는 방식으로만 접근한다.\n\n---\n### 5. 사업 모델 — 부상과 숙소, 두 축\n\n#### 5.1 왜 이 두 가지인가\n\n01 문서의 애로사항 순위 1·2위가 이것이다.\n\n1. **침대 확보 불안** — 하루를 시계 중심으로 돌아가게 만든다\n2. **부상** — 완주 실패의 주된 원인\n\n그런데 **03 문서 2부의 여행사 상품 분석이 이걸 그대로 증명한다.**\n\n거의 모든 패키지가 **\"전 일정 짐 이동(동키 서비스)\"** 를 첫 줄에 내세우고, 알베르게에 호텔을 섞어 **숙소 확보의 확실성**을 판다. 585~720만 원짜리 상품이 파는 것의 본질이 **짐(=부상)과 숙소**다.\n\n**시장이 이미 이 두 가지에 200만 원의 값을 매기고 있다.**\n\n| | 자유여행 | 패키지 | 차액 |\n|---|---|---|---|\n| 총비용 | 370~490만 | 585~720만 | **약 200~250만** |\n\n차액의 내용은 짐 배송 + 숙소 확보 + 인솔이다.\n**우리는 앞의 두 개를 50만 원 이하로 해결한다. 이게 사업의 전부다.**\n\n#### 5.2 두 축은 하나의 사슬로 연결된다 ⭐\n\n이게 이 사업 모델의 핵심 통찰이다.\n\n```\n부상을 피하려면  →  짐을 부쳐야 하고\n짐을 부치려면    →  숙소가 미리 확정돼야 하고\n                    (공립은 짐 배송을 안 받는다)\n숙소를 확정하면  →  사립 예약이 필요하고\n사립을 예약하면  →  우리에게 수수료가 들어온다\n```\n\n**억지 판매가 아니다.** 사용자에게 실제로 이득이고, 그 과정에서 자연스럽게 수익이 발생한다.\n\n반대 방향도 성립한다.\n\n```\n숙소가 불안하면  →  새벽에 뛰게 되고\n새벽에 뛰면      →  무리하게 되고\n무리하면         →  다친다\n```\n\n**숙소 불안이 부상을 만든다. 두 문제는 원래 하나였다.**\n\n---\n\n#### 5.3 축 1 — 부상\n\n> **부상은 400만 원짜리 여정을 망치는 유일한 요인이다. 그래서 지불 의사가 가장 높다.**\n\n##### 개입 시점과 수익화\n\n| 시점 | 개입 | 수익 | 근거 |\n|---|---|---|---|\n| **D-90** | 부상 회피 일정 설계 | — (무료, 유입) | 초반 과부하가 부상의 주원인 |\n| **D-60** | **신발·배낭·폴 안내 → 제휴** | **R-A1** | 잘못된 신발이 물집의 1번 원인. **길들이기 기간 때문에 D-60에 사야 한다** |\n| D-30 | 12주 훈련 계획 | — (무료, 리드) | |\n| D-30 | 상비약 목록 | R-A2 | 소염진통제·근육이완제가 실제로 부족했다는 후기 다수 |\n| **D-14** | **여행자 보험 → 제휴** | **R-A3** | 패키지도 1억 보험을 포함한다 |\n| **여정 중** | **짐 배송 판단·접수** | **R-A4** | 부상 위험 감소의 직접 수단 |\n| 여정 중 | 통증 대응 안내 | — | ⚠️ 전문가 검수 필수 |\n| 여정 중 | 물리치료사·약국 위치 | — | 경로상 물리치료사가 실재한다 |\n| 여정 중 | 부상 시 일정 재조정 + 대체 교통 | — | 버스·택시 구간 안내 |\n\n##### ⭐ 개입 타이밍이 특정된다\n\n관찰된 패턴이 있다.\n\n- 첫 주가 가장 힘들고, 몸은 **4~7일**이면 적응한다\n- 그런데 **프랑스 길에서 부상 순례자가 가장 많은 시점은 2주차**다\n\n즉 **몸이 적응했다고 느끼는 순간 무리해서 다친다.**\n\n**→ 8~14일차에 개입한다.**\n\n```\n\"지금쯤 몸이 적응했다고 느끼실 겁니다.\n 이 구간에서 무리하다 다치는 경우가 많습니다.\n 오늘 거리를 조금 줄이시겠어요?\"\n```\n\n⚠️ \"통계적으로\"라는 표현은 근거를 확보한 뒤에만 쓴다. 현재는 커뮤니티 관찰 수준이다.\n\n##### 이 축의 방어선\n\n경쟁 앱이 따라하기 어렵다. **일정 엔진 + 고도 데이터 + 한국인 체력 기준 + 장비 제휴**가 결합돼야 한다.\n\n---\n\n#### 5.4 축 2 — 숙소\n\n> **우리는 예약을 팔 수 없다. 대신 \"언제 예약해야 하는지\"를 판다.**\n\n##### 구조적 제약\n\n| 숙소 | 예약 | 짐 배송 수령 |\n|---|---|---|\n| 공립·Xunta | **불가** | **불가** |\n| 사립 | 가능 | 가능 |\n\n**공립은 예약도 짐 배송도 안 된다.** 그래서 중개할 대상은 사립뿐이고,\n**그게 정확히 짐 배송을 쓰는 사람이 필요로 하는 것이다.**\n\n##### 개입 시점과 수익화\n\n| 시점 | 개입 | 수익 |\n|---|---|---|\n| D-90 | 구간별 침대 수 기반 일정 설계 | — |\n| **D-7** | **첫날 숙소 예약 (생장)** | **R-B1** — 사실상 전원이 필요로 한다 |\n| **여정 중** | **\"오늘 서두를 필요 있나요?\"** | — (핵심 무료 기능) |\n| **여정 중** | 서둘러야 할 때 → **사립 예약 연결** | **R-B2** |\n| 여정 중 | 만실 시 대안 숙소 알선 | R-B2 |\n| 여정 중 | 짐 배송 사용 시 → 수령 가능 숙소만 필터 | R-B2 |\n| **종료** | **산티아고 숙소 2~3박** | **R-B3** |\n\n##### ⭐ 첫날과 마지막날이 확실한 수익 지점이다\n\n**생장피드포르 첫날 숙소**는 사실상 전원이 예약한다. 도착이 늦고 다음 날 피레네를 넘어야 한다.\n**산티아고 도착 후 숙소**도 마찬가지로 대부분 2~3일 머문다.\n\n**이 두 지점만으로도 예약 중개가 성립한다.** 여정 중 예약은 그 위에 얹는다.\n\n##### 예약을 직접 운영하지 않는다\n\n자체 예약 시스템은 만들지 않는다(→ 03 문서 1부 W1). 대신:\n\n- **예약 플랫폼 어필리에이트** — 사립 알베르게 상당수가 등록돼 있다\n- **전화·WhatsApp 원터치 + 스페인어 스크립트** — 플랫폼에 없는 곳\n- 우리는 **판단과 연결**만 한다\n\n⚠️ **잘못된 \"예약 가능\" 표시는 사람을 한데서 자게 한다.** 미확인은 `UNKNOWN`으로 둔다.\n\n---\n\n#### 5.5 수익 모델 정리\n\n| # | 항목 | 축 | 단가 | 발생률 가정 |\n|---|---|---|---|---|\n| **R-A1** | **장비 제휴** (신발·배낭·폴) | 부상 | 인당 4~7만 | 25% |\n| R-A2 | 상비약·소품 제휴 | 부상 | 인당 0.5만 | 20% |\n| **R-A3** | **여행자 보험 제휴** | 부상 | 인당 1~2만 | 30% |\n| **R-A4** | **짐 배송 제휴** | 부상 | 인당 2~4만 | 20% |\n| **R-B1** | **첫날 숙소 예약 중개** | 숙소 | 인당 0.8~1.5만 | 40% |\n| **R-B2** | **여정 중 사립 예약 중개** | 숙소 | 인당 1.5~4만 | 25% |\n| **R-B3** | **산티아고 숙소 중개** | 숙소 | 인당 1~2만 | 35% |\n| R-C1 | 완주 보상 실물 (포토북·포스터) | — | 건당 1.5~4만 | 15% |\n| R-C2 | 여행사 송객 | — | 인당 20~40만 | **2~4%** |\n| R-C3 | B2B 단체 순례 관리 | — | 건당 50~100만 | — |\n\n**~~프리미엄 구독~~ 폐기** (도달률 상한을 만든다)\n\n##### ⚠️ 여행사 송객의 비중을 낮춘다\n\n이전 계획에서 송객을 매출의 35%로 잡았는데, **03 문서 2부 분석 결과 과대평가였다.**\n\n우리 사용자는 **자유여행을 하려는 사람**이다. 패키지로 돌아서는 비율은 높지 않다. 단가는 크지만 발생률을 2~4%로 보수적으로 잡는다.\n\n**→ 매출의 중심을 부상(R-A)과 숙소(R-B)로 옮긴다.** 발생률이 훨씬 높다.\n\n#### 5.6 3년 추정\n\n**전제**: 2027년 성년으로 한국인 1.3만 명, 2028년 반동 1.1만 명, 2029년 1.05만 명\n\n| 구분 | 2027 (성년) | 2028 | 2029 |\n|---|---|---|---|\n| **도달률** | 30% | 60% | 85% |\n| 도달 사용자 | 4,000 | 6,600 | 8,900 |\n| **실제 여정 진행자** | 2,000 | 3,500 | 5,000 |\n| **부상 축** | | | |\n| R-A1 장비 | 2,500만 | 5,500만 | 9,000만 |\n| R-A3 보험 | 900만 | 1,800만 | 2,700만 |\n| R-A4 짐배송 | 1,200만 | 2,400만 | 3,600만 |\n| R-A2 소품 | 200만 | 400만 | 600만 |\n| **숙소 축** | | | |\n| R-B1 첫날 | 800만 | 1,500만 | 2,200만 |\n| R-B2 여정 중 | 1,250만 | 2,500만 | 3,750만 |\n| R-B3 산티아고 | 1,050만 | 1,950만 | 2,850만 |\n| **기타** | | | |\n| R-C1 보상 실물 | 750만 | 1,750만 | 3,000만 |\n| R-C2 송객 | 1,250만 | 2,800만 | 4,500만 |\n| R-C3 B2B | 500만 | 1,500만 | 3,000만 |\n| **매출 합계** | **약 1억 400만** | **약 2억 2,100만** | **약 3억 5,200만** |\n| **비용** | 1억 4,500만 | 1억 8,000만 | 2억 2,000만 |\n| **손익** | **-4,100만** | **+4,100만** | **+1억 3,200만** |\n\n**손익분기가 3년차에서 2년차로 당겨진다.**\n\n부상·숙소는 **발생률이 높은 반복 접점**이기 때문이다. 송객은 단가가 크지만 드물다.\n\n⚠️ **위 발생률(25%, 40% 등)은 전부 우리가 만든 가정이다.** 05 문서의 검증을 거쳐야 한다.\n특히 **예약 중개 수수료율은 확인된 바 없다.** 게이트 2에서 확인한다.\n\n#### 5.7 비용 구조 (1년차 전업 기준)\n\n| 항목 | 금액 |\n|---|---|\n| 인건비 (2인 × 월 400만 × 12) | 9,600만 |\n| **현지 실측 도보 40일** | 800만 |\n| 디자인·개발 외주 | 1,500만 |\n| 서버·지도 타일·도메인 | 600만 |\n| 마케팅 | 2,000만 |\n| **합계** | **1억 4,500만** |\n\n---\n\n### 6. 100%가 사주는 것과 못 사주는 것\n\n#### 못 사주는 것 — 매출\n\n```\n도달률 100% × 12,000명 × ARPU ₩30,000 = 연 3.6억\n```\n\n**점유율 100%를 달성해도 연 매출 3~4억이다.** 2~3인 팀의 생계는 되지만 투자 유치 스토리는 아니다. **이건 반드시 직시해야 한다.**\n\n#### 사주는 것 1 — 협상력의 역전\n\n- 점유율 30%: 우리가 여행사에 \"송객해드릴게요\" 하고 부탁한다\n- 점유율 85%: **여행사가 우리에게 \"노출시켜주세요\" 하고 온다**\n\n같은 일인데 수수료율이 다르다. 장비 브랜드, 보험사도 마찬가지다. 위 재무 추정에서 송객 단가가 25만 → 32만으로 오르는 근거가 이것이다.\n\n#### 사주는 것 2 — 데이터 독점\n\n한국인 순례자가 언제 출발하고, 어디서 시작하고, 며칠에 걷고, **어디서 포기하는지** — 이 데이터를 가진 곳이 없다. 콤포스텔라 통계는 완주자 결과만 보여준다.\n\n여행사·관광청·장비사에 팔 수 있고, 무엇보다 **제품을 계속 정확하게 만든다.**\n\n#### 사주는 것 3 — 다음 시장으로의 이전 (가장 중요)\n\n**카미노 100%는 목적지가 아니라 교두보다.**\n\n\"한국인 순례자 전원이 쓰는 서비스\"라는 사실은 다음 시장 진입 시 그대로 신뢰 자산이 된다.\n\n| 다음 시장 | 규모 | 이전되는 것 |\n|---|---|---|\n| 제주올레 (437km) | 연 90만+ | 구간 분할 엔진, 브랜드 신뢰 |\n| 해파랑길 (750km)·남파랑길 | 수십만 | 동일 |\n| 일본 시코쿠 88 순례길 | 성장세 | 순례 + 도장 문화가 동일 |\n| **구마노고도** | 카미노 자매길 | **완주자가 다음으로 가는 길** |\n\n특히 구마노고도는 **세계에서 단 둘뿐인 유네스코 세계유산 순례길**로서 카미노와 짝을 이루며, 양쪽을 걸은 사람에게 **이중 순례자(Dual Pilgrim)** 자격을 주는 공식 제도가 2015년부터 운영되고 있다. 2025년 5월에 1만 번째 수여자가 나왔다.\n\n**이 제도가 확장 전략의 실제 형태다.**\n\n- 카미노 완주자에게 \"아직 절반입니다\"라고 말할 근거가 있다\n- 일본이라 항공권 20~30만 원, 3~5일이면 된다\n- 카미노를 먼저 걸은 사람은 구마노에서 **다이코 의식**에 참여할 수 있다. 순서가 유리하다\n- **한국 순례자 커뮤니티에서 거의 다뤄지지 않는다**\n\n즉 **완주 보상이자 다음 시장으로의 다리**를 하나의 기능이 동시에 수행한다. 상세 설계는 03 문서 1부 6.4절.\n\n> **\"카미노 도달률 100% → 도보여행 카테고리\"** 가 실제 사업 경로다.\n> 카미노만 보면 3.6억이지만, 카테고리를 잡으면 자릿수가 달라진다.\n\n---\n\n### 7. 진입 순서와 자금\n\n#### 7.1 4단계 진입\n\n**1단계 — 콘텐츠로 신뢰를 산다 (2026 하반기)**\n창업자가 프랑스 길 800km를 직접 걷고 전 구간 데이터를 실측한다. 이 40일을 유튜브·브런치·카페에 연재한다. 앱 홍보가 아니라 **\"실제로 걸어본 사람이 만든다\"는 증명**이 목적이다.\n\n**2단계 — 웹으로 검색을 잡는다 (2027 Q1)**\n330페이지 + 무료 도구 6종. 가입 없이 쓰는 계산기. **준비 단계 사용자는 PC로 검색한다.**\n\n**3단계 — 앱으로 현장을 잡는다 (2027 Q2)**\n웹에서 계획을 세운 사람에게 출국 2주 전 앱 설치를 유도한다. 오프라인 지도가 앱의 유일한 존재 이유다.\n\n**4단계 — 수수료를 회수한다 (2027 Q2~)**\n계획 단계에서 자연스럽게 장비·보험·짐배송을 연결한다. 자유여행이 부담스러운 사용자는 제휴 여행사로 송객한다.\n\n#### 7.2 자금 조달\n\n| 출처 | 금액 | 시점 |\n|---|---|---|\n| 자기자본 | 500만 (1단계 검증) | 2026 Q3 |\n| 자기자본 추가 | 3,000만 | 전업 전환 시 |\n| **한국관광공사 관광벤처사업** | 최대 5,000만 | 2026 Q4~2027 Q1 공모 |\n| 예비창업패키지 / 초기창업패키지 | 최대 1억 | 2027 상반기 |\n| 매출 | — | 2027 Q2~ |\n\n관광 특화 지원사업이 일반 창업지원보다 적합도가 높다. 카미노 소재는 심사에서 서사가 강하게 작동한다.\n\n---\n\n### 8. 권고 — 어떻게 시작할 것인가\n\n#### 8.1 하지 말아야 할 것\n\n> **이 아이템으로 처음부터 2억을 태워 2인 전업 창업하지 않는다.**\n\n위 재무 추정에서 1년차 8,300만 원 적자는 성년 효과를 최대로 잡은 낙관 시나리오다. 2028년 반동까지 감안하면 2년간 1억 원 가까이 태우게 된다.\n\n#### 8.2 권고 경로\n\n**Phase 0 — 사이드 프로젝트 (2026 하반기, 약 900만 원)**\n- 본업 유지. 웹 계산기 + SEO 페이지 163개(자동 생성)만 만든다\n- **인터뷰 20명 → 트래픽 4주 → 실측 도보 40일** 순서로 검증한다 (→ 05 문서)\n- 실측 도보는 휴가나 안식월로 처리\n- **최악의 경우에도 카미노를 한 번 걷고 포트폴리오가 남는다. 실패 비용이 낮다**\n\n| Phase 0 예산 | 금액 |\n|---|---|\n| 인터뷰 사례 20명 | 60만 |\n| 도메인·서버 6개월 | 30만 |\n| 항공 왕복 | 150만 |\n| 현지 체류 40일 | 480만 |\n| 장비 | 100만 |\n| 보험·예비 | 80만 |\n| **합계** | **약 900만** |\n\n**Phase 1 — 성년 시즌 실측 (2027 상반기)**\n- 트래픽, 이메일 수집, 제휴 문의를 측정\n- 판단 기준 (→ 05 문서 7장 게이트 4와 일치시킨다):\n  - 도달률 **20% 이상**\n  - 제휴 매출 전망 **연 5,000만 이상**\n  - 앱 현장 사용률 **40% 이상**\n  - **셋 중 둘 이상 충족 → 전업 전환.** 그 미만이면 사이드 유지 또는 정리\n\n**Phase 2 — 전업 및 확장 (2027 하반기~)**\n- 정부지원 신청, 2인 체제\n- 앱 개발, 커머스 연동\n- 2028년부터 제주올레·구마노고도 확장 검토\n\n#### 8.3 왜 이 순서인가\n\n목표가 도달률 100%라면 **초기에 돈을 쓸 곳이 별로 없다.** 필요한 건 검색 페이지와 계산기이고, 둘 다 자본이 아니라 시간과 데이터의 문제다. 진짜 비용은 **40일 실측 도보**인데 이건 어차피 해야 하는 일이다.\n\n---\n\n### 9. 리스크\n\n| 리스크 | 영향 | 대응 |\n|---|---|---|\n| **수익화 지연** | 높음 | 무료 원칙상 초기 매출 거의 0. 자기자본 최소 투입으로 대응 |\n| **성년 이후 반동** | 높음 | 2028년 순례자 감소 시 절대 사용자 수 하락. **도달률로 평가하되 절대 수도 함께 본다** |\n| 시장 규모 자체 | 치명적 | 카테고리 확장(도보여행)을 전제로 설계 |\n| 무료 강자(Buen Camino) | 중간 | 준비 단계 + 판단 대행으로 우회. 한국어는 차별점이 아님 |\n| 알베르게 데이터 노후화 | 높음 | `verified_at` UI 노출 + 사용자 제보 + 연 1회 실측 |\n| **정책 변경** (예약 제도 등) | 중간 | 하드코딩 금지, 데이터로 관리 |\n| CS 부담 | 중간 | 도달률에 비례해 문의 증가. FAQ 자동화, 커뮤니티 자문단 |\n| 순례 중 사고 책임 | 높음 | 의료·안전 정보 전문가 검수 + 면책 고지 |\n| 개인정보·위치정보 규제 | 중간 | 위치는 단말 내 처리, 서버 미전송. 이메일만 수집 |\n\n---\n\n### 10. 팀\n\n| 역할 | 필요 역량 | 현황 |\n|---|---|---|\n| 대표 | 기획, 현지 실측, 제휴 | — |\n| 개발 | Next.js + React Native 풀스택 | — |\n| 자문 | 카미노 완주 경험자 2~3인 | 확보 필요 |\n| 자문 | 정형외과 또는 스포츠의학 | 확보 필요 |\n\n> **전제 조건: 창업자 중 최소 1인은 반드시 카미노를 완주해야 한다.** 마케팅 자산이자 제품 품질의 하한선이며, 순례자 커뮤니티에서 신뢰를 얻는 유일한 방법이다.\n\n---\n\n### 11. 다음 할 일\n\n| # | 항목 | 기한 | 비고 |\n|---|---|---|---|\n| 1 | **웹 일정 계산기 공개 + 4주 트래픽 실측** | 2026.09 | **최우선** |\n| 2 | **마을·구간 SEO 페이지 163개 자동 생성** | 2026.09 | 데이터 이미 확보 |\n| 3 | 순례자 20명 인터뷰 (**중도 포기자 5명 포함**) | 2026.08 | |\n| 4 | 무료 도구 3종 (비용·배낭·타임라인) | 2026.10 | |\n| 5 | 여행사 3곳 송객 수수료율 확인 | 2026.09 | 재무 추정의 핵심 변수 |\n| 6 | 순례자 협회 접촉 (데이터·신뢰 목적) | 2026.08 | |\n| 7 | **실측 도보 40일 확정 — 10월 초 출발** | 2026.09 | **11/1 나폴레옹 폐쇄 전** |\n| 8 | 관광벤처사업 공모 일정 확인 | 2026.10 | |\n\n**1·2번이 도달률 전략의 전부다. 검색에서 안 보이면 도달률은 오르지 않는다.**\n**3·5번이 없으면 이 문서의 모든 추정은 희망사항이다.**\n\n---\n\n\n### 12. 서비스 이름 — 미확정\n\n#### 12.1 기준\n\n| 기준 | 설명 |\n|---|---|\n| 짧고 발음이 쉽다 | 입소문으로 퍼져야 한다 |\n| 검색 가능 | 흔한 단어면 묻힌다 |\n| 카미노 고유 | 확장해도 뿌리가 남는다 |\n| 종교색이 짙지 않다 | 순례자 다수가 비종교적이다 |\n| 두 축과 어긋나지 않는다 | 부상·숙소를 다루는 서비스다 |\n\n#### 12.2 후보\n\n| 후보 | 뜻 | 장점 | 약점 |\n|---|---|---|---|\n| **세요** (Sello) | 도장 | 수집 문화의 중심 | 뜻이 바로 안 통한다 |\n| **모혼** (Mojón) | 이정표 | 시그니처 UI. \"남은 거리를 알려주는 돌\" | 한국인에게 생소 |\n| **콘차** (Concha) | 조가비 | 순례자의 상징 | 흔하다 |\n| **부엔** (Buen) | 좋은 | 인사말에서 | Buen Camino 앱과 충돌 |\n\n#### 12.3 확정 전 확인\n\n```\n□ 도메인 · 상표 (여행·소프트웨어 분류) · 앱스토어 중복\n□ 스페인어권에서 부정적 의미가 없는지\n□ 한국어 동음이의어와의 검색 경합\n```\n\n⚠️ 확정 전까지 코드에서는 `config/brand.ts` 한 곳에서만 관리한다.\n\n---\n\n### 13. 성공의 정의\n\n> **2029년, 산티아고 순례길을 준비하는 한국인이 네이버에 무엇을 검색하든 우리 페이지가 나오고,\n> 카미노 위에서 한국인끼리 \"그거 쓰세요\" 하고 말하는 이름이 하나로 굳어져 있는 상태.**\n\n이 상태의 매출은 3억대지만, **한국 도보여행 시장 전체로 나갈 자격을 얻는다.**\n\n---\n\n# 2부 · 패키지 수요 전환\n\n### 0. 왜 이 시장을 노리는가\n\n**패키지 고객 1명 = 자유여행 고객 10~15명의 가치.**\n\n| 구분 | 우리 매출 |\n|---|---|\n| 자유여행자 (도달 사용자) | ARPU 2~3만 |\n| **패키지 전환자** | **20~50만** |\n\n3년차 기준으로 계산하면 이렇다.\n\n```\n패키지 검토층 (연 1.2만 명 중 20~30%)   = 2,400~3,600명\n그중 \"불안해서\" 사는 사람 (약 60%)        = 1,400~2,200명\n우리가 15% 전환                          = 210~330명\n객단가 30만                              = 6,300만~9,900만\n```\n\n**자유여행 전체 도달(8,900명)에서 나오는 매출과 맞먹는다.**\n\n---\n\n### 1. ⭐ 그들은 왜 사는가\n\n#### 1.1 오해 — \"돈이 많아서 산다\"\n\n**틀렸다. 불안해서 산다.**\n\n비용 차이를 실제로 계산하면 생각보다 작다.\n\n| 항목 | 자유여행 (35일) | 패키지 |\n|---|---|---|\n| 항공 | 150만 | 포함 |\n| 숙박 | 알베르게 35박 × 15유로 ≈ 52만 | 포함 (호텔·펜시온 위주) |\n| 식비 | 35일 × 30유로 ≈ 147만 | 일부 포함 |\n| 장비 | 60~120만 | 별도 |\n| 짐 배송 | 0 (안 씀) | 포함 (약 200유로 상당) |\n| 기타 | 20만 | |\n| **합계** | **약 430~490만** | **약 500~600만** |\n\n**차액은 70~150만 원에 불과하다.**\n\n> **그런데 왜 대부분은 자유여행을 갈까?**\n> **돈이 아니라 \"알베르게에서 자고 싶어서\"다.**\n\n#### 1.2 패키지가 실제로 파는 것\n\n| 파는 것 | 우리 축 | 우리가 줄 수 있나 |\n|---|---|---|\n| 숙소 확정 | B | **가능** (필요한 날만) |\n| 짐 배송 | A+B | **가능** (필요한 구간만) |\n| 준비 부담 제거 | 전부 | **가능** |\n| 언어 지원 | A+B | **가능** (보여주기 카드) |\n| 문제 발생 시 대응 | A+B | **부분 가능** |\n| **가족 안심** | — | **가능. 아무도 안 함** |\n| 인솔자 동행 | — | **불가** |\n| 동행자 (외롭지 않음) | — | **불가** |\n\n**8개 중 6개를 우리가 준다. 그것도 훨씬 싸게.**\n\n#### 1.3 패키지의 치명적 약점\n\n> **⭐ 패키지로 가면 알베르게에 안 묵는다.**\n\n호텔과 펜시온에 묵는다. 그런데 **순례 경험의 대부분이 알베르게에서 일어난다.**\n\n- 매일 밤 세계 각국 순례자와 섞이는 것\n- 공동 식사, 공동 빨래, 공동 소등\n- 도장을 받고 침대를 배정받는 의식\n- \"부엔 카미노\" 인사가 오가는 공간\n\n**패키지 고객은 100만 원을 더 내고 순례를 잃는다.**\n\n⚠️ 다만 이걸 **공격적으로 말하지 않는다.** \"여행사는 나쁘다\"가 아니라 **\"이런 선택지도 있습니다\"** 로 제시한다.\n\n---\n\n### 2. 세그먼트 — 누구를 뺏을 수 있나\n\n**패키지 검토층은 하나가 아니다. 뺏을 수 있는 사람과 없는 사람을 구분한다.**\n\n| # | 유형 | 비중(추정) | 뺏을 수 있나 | 이유 |\n|---|---|---|---|---|\n| **P1** | **불안해서** | 30% | **✅ 높음** | 안심 장치를 주면 된다 |\n| **P2** | **알아볼 시간이 없어서** | 20% | **✅ 높음** | 준비를 대신해주면 된다 |\n| **P3** | **가족이 걱정해서** | 15% | **✅ 높음** | **가족 안심 장치. 아무도 안 함** |\n| P4 | 언어가 두려워서 | 15% | 🟡 중간 | 보여주기 카드로 상당 부분 |\n| P5 | 혼자가 외로워서 | 10% | ❌ 낮음 | 동행은 못 만들어준다 |\n| P6 | 진짜 편하게 가고 싶어서 | 10% | ❌ 낮음 | **뺏을 필요도 없다** |\n\n**→ P1+P2+P3 = 65%가 전환 가능 시장이다.**\n\n#### 2.1 ⭐ P3 — 가족이 걱정해서 (가장 놓치기 쉬운 세그먼트)\n\n**60대 부모를 보내는 자녀가 결제자인 경우가 많다.**\n\n| 자녀의 걱정 | 패키지가 주는 답 | 우리가 줄 수 있는 답 |\n|---|---|---|\n| 무슨 일 생기면? | 인솔자가 있다 | **매일 도착 알림 + 비상 체계** |\n| 길을 잃으면? | 가이드가 있다 | 오프라인 지도 + 카드 |\n| 아프면? | 인솔자가 병원에 데려간다 | **의료 정보 카드 + 보험 + 카드 A4** |\n| 말이 안 통하면? | 통역이 있다 | **보여주기 카드 23장** |\n| 연락이 안 되면? | 인솔자에게 연락 | **3일 미도착 시 자동 확인** |\n\n> **\"가족 안심\"은 여행사도 제대로 안 판다. 그리고 우리 원가는 거의 0이다.**\n\n---\n\n### 3. 상품 설계 — 두 단계\n\n#### 3.1 왜 두 단계인가\n\n**여행업 규제 때문이다.** (→ 02 문서 4부 3장)\n\n숙소 예약과 짐 배송을 **대행**하면 여행 상품 판매다. 관광사업자 등록이 필요하다.\n그래서 **규제를 안 건드리는 상품**과 **화이트라벨 상품**을 나눈다.\n\n#### 3.2 셀프형 — \"안심 준비\" (15~25만) · 규제 없음\n\n**우리는 판단과 도구만 준다. 실행은 본인이 한다.**\n\n| 구성 | 내용 |\n|---|---|\n| ① 맞춤 일정 | 체력·기간·나이 반영. 부상 회피 설계 |\n| ①-b **갈림길 선택** | **11곳 중 어느 쪽을 걸을지. 계절 폐쇄 반영** |\n| ①-c **일자별 상세** | Day 1~N. 아침·휴식·식수·약국·숙박·위험 구간 |\n| ①-d **접근·귀환 교통** | **인천 → 생장 경로 비교. Day 0으로 포함** |\n| ② **예약할 날 지정** | \"이 5일은 잡으세요. 나머지는 비워두세요\" + 숙소 후보와 **원터치 예약 링크** |\n| ③ **플랜 B 목록** | 각 도착지의 대안 숙소 3곳 + 연락처 |\n| ④ 짐 배송 판단 | 어느 구간에 쓸지 + 접수 방법 안내 |\n| ⑤ 보험 체크리스트 | 무엇을 봐야 하는지 (도보 담보 포함 여부 등) |\n| ⑥ 장비 안내 | 신발 중심. **안 사도 되는 것은 안 사도 된다고 말한다** |\n| ⑦ **보여주기 카드** | 앱 + 인쇄본 (A4 양면 + 명함형 의료 카드) |\n| ⑧ **가족 안심 세트** | 아래 3.4절 |\n| ⑨ 출국 전 점검 | D-7 화상 30분 (선택) |\n| ⑩ **예산 계획** | 계획 예산 + 현지 기록 도구 |\n\n**핵심**: 우리는 예약을 **대신 하지 않는다.** 링크를 만들어주고 사용자가 누른다.\n\n#### 3.3 대행형 — \"안심 동행\" (40~60만) · 화이트라벨\n\n**셀프형 전부 + 실제 실행 대행.**\n\n| 추가 구성 | 실행 주체 |\n|---|---|\n| 숙소 예약 대행 (5~8일) | **제휴 여행사** |\n| 짐 배송 사전 접수 | **제휴 여행사** |\n| 첫날·마지막날 숙소 | **제휴 여행사** |\n| **한국어 비상 지원** | 우리 (3.5절) |\n\n```\n우리          : 일정 설계, 숙소 선정, 판단, 도구, 가족 안심\n제휴 여행사    : 실제 예약, 결제, 계약 주체, 사고 대응\n```\n\n⚠️ **이 구조의 적법성을 반드시 확인한다.** (H18)\n\n#### 3.4 ⭐ 가족 안심 세트 — 킬러 기능\n\n**원가 거의 0, 경쟁자 없음, P3 세그먼트를 통째로 가져온다.**\n\n| 기능 | 내용 |\n|---|---|\n| **매일 도착 알림** | 순례자가 도착 표시 → 가족에게 자동 문자/카톡 |\n| **미도착 알림** | 예정 시각 + 4시간 경과 시 가족에게 알림 |\n| **3일 규칙** | 3일간 기록이 없으면 가족에게 확인 요청 |\n| **오늘 어디쯤** | 가족용 웹 페이지. 앱 설치 불필요 |\n| **비상 연락 카드** | 대사관, 보험사, 현지 응급번호 |\n| **의료 정보 카드** | 03 문서 3부 A7 |\n| 완주 알림 | 산티아고 도착 시 축하 메시지 |\n\n⚠️ **위치 실시간 공유는 하지 않는다.** (프라이버시, 배터리)\n**\"도착했다\"는 사실만** 전달한다. 순례자가 직접 누른다.\n\n> **자녀가 부모에게 사주는 상품이 될 수 있다.**\n> 결제자와 사용자가 다른 구조를 설계에 반영한다.\n\n#### 3.5 한국어 비상 지원 (대행형만)\n\n**시차가 오히려 유리하다.** 스페인 낮 = 한국 저녁.\n\n| 시간 | 상황 |\n|---|---|\n| 스페인 14시 (한국 22시) | 알베르게 도착 시간대 |\n| 스페인 18시 (한국 새벽 2시) | 저녁 |\n\n**한국 시간 저녁~밤에 카톡으로 대응한다.** \"오늘 만실인데 어떡하죠\" 같은 문의.\n\n⚠️ **사람이 필요해서 확장이 어렵다.** 대행형 100명까지가 한계. 그 이상은 자동화하거나 가격을 올린다.\n⚠️ **의료 문의에는 답하지 않는다.** (→ 02 문서 4부 2.5)\n\n---\n\n### 4. 어떻게 만나는가 — 전환 깔때기\n\n#### 4.1 3단계 장벽\n\n```\n① 인지    \"패키지 말고 다른 방법이 있다\"를 모른다\n              ↓\n② 신뢰    \"정말 괜찮을까\"\n              ↓\n③ 실행    \"그래도 뭘 해야 할지 모르겠다\"\n```\n\n#### 4.2 ① 인지 — 검색어를 가로챈다\n\n**패키지를 검토하는 사람이 검색하는 말은 자유여행자와 다르다.**\n\n| 검색어 | 현재 검색 결과 | 우리 대응 |\n|---|---|---|\n| 산티아고 순례길 패키지 | 여행사 랜딩페이지뿐 | **정직한 비교 페이지** |\n| 산티아고 순례길 여행사 추천 | 광고성 글 | 비교 + 우리 대안 |\n| 산티아고 순례길 비용 | 파편적 | **비용 계산기** |\n| 산티아고 혼자 갈 수 있나 | 후기 산발 | **셀프 진단** |\n| **60대 산티아고 순례길** | 거의 없음 | **공백. 반드시 잡는다** |\n| **부모님 산티아고 순례길** | 거의 없음 | **P3 진입점** |\n| 산티아고 순례길 준비 얼마나 걸려 | | 타임라인 |\n| 산티아고 패키지 vs 자유여행 | **거의 없음** | **핵심 페이지** |\n\n> **\"60대\", \"부모님\" 검색어에 제대로 된 한국어 콘텐츠가 거의 없다. 여기가 가장 큰 공백이다.**\n\n#### 4.3 ⭐ 핵심 콘텐츠 — \"정직한 비교\"\n\n**여행사를 깎아내리지 않고, 숫자로 보여준다.**\n\n```\n산티아고 순례길, 얼마나 들까 — 세 가지 방법\n\n                   자유여행    안심 준비    패키지\n─────────────────────────────────────────────────\n항공                150만       150만      포함\n숙박              알베르게52만  알베르게62만  호텔 포함\n식비                147만       147만      일부 포함\n장비                 80만        80만       80만\n짐 배송                 0     오르막 4만       포함\n서비스                  0        20만          —\n─────────────────────────────────────────────────\n합계                429만       463만    500~600만\n\n어디서 자나        알베르게    알베르게      호텔\n일정 변경          자유        자유        불가\n준비 부담          전부 본인   대신 해줌   없음\n문제 생기면        스스로      한국어 지원  인솔자\n```\n\n**그리고 정직하게 덧붙인다.**\n\n> **이런 분은 패키지가 맞습니다.**\n> · 혼자가 아니라 사람들과 함께 가고 싶다\n> · 준비를 아예 하고 싶지 않다\n> · 알베르게 다인실이 부담스럽다\n>\n> **[제휴 여행사 상품 보기]**\n\n⚠️ **패키지가 맞는 사람은 여행사로 보낸다.** 이게 신뢰를 만들고, 동시에 R6 송객 수수료가 된다.\n\n#### 4.4 ② 신뢰 — 먼저 준다\n\n| 순서 | 행동 |\n|---|---|\n| 1 | 무료 계산기로 일정을 만들어본다 |\n| 2 | 결과가 구체적이고 정확하다 (부상 경고, 침대 수, 하강) |\n| 3 | 실측 도보 콘텐츠로 \"진짜 걸어봤구나\" |\n| 4 | **\"안 사도 됩니다\" 를 말하는 걸 본다** |\n| 5 | 그제서야 상품을 본다 |\n\n**무료 도구가 신뢰를 만들고, 신뢰가 전환을 만든다.**\n\n#### 4.5 ③ 실행 — 진단으로 밀어준다\n\n**\"저는 어떤 방법이 맞을까요?\" 진단**\n\n```\nQ1. 나이대는?\nQ2. 며칠 걸으실 건가요?\nQ3. 걷기·등산 경험은?\nQ4. 영어는 어느 정도?\nQ5. 혼자 가시나요?\nQ6. 가족이 걱정하시나요?\nQ7. 예산은?\n\n→ 결과: 자유여행 / 안심 준비 / 안심 동행 / 패키지 권장\n```\n\n⚠️ **패키지가 나오면 그대로 권한다.** 우리 상품으로 억지로 끌지 않는다.\n이 정직함이 나머지 전환을 만든다.\n\n---\n\n### 5. 여행사와의 관계 — 충돌하는가\n\n#### 5.1 문제\n\n**우리가 패키지 고객을 뺏으면 여행사가 적이 된다.** 그런데 R5(화이트라벨)와 R6(송객)은 여행사가 필요하다.\n\n#### 5.2 해소 — 파이를 나누는 게 아니라 넓힌다\n\n```\n현재\n  자유여행 (80%) ─────────── 패키지 (20%)\n       ↑                        ↑\n   여행사 매출 0            여행사 매출\n\n우리가 만드는 것\n  자유여행 (65%) ── 반패키지 (15%) ── 패키지 (20%)\n                        ↑\n                  여행사가 실행 → 여행사 매출 발생\n```\n\n**반패키지는 여행사에게 새로운 상품 라인이다.**\n\n- 우리가 기획하고 여행사가 실행 → **여행사에 없던 매출**\n- 자유여행자였던 사람이 15~25만 원짜리 실행 서비스를 산다\n- 여행사는 마케팅·기획 비용 없이 고객을 받는다\n\n#### 5.3 여행사에 이렇게 제안한다\n\n```\n\"저희 고객은 지금 여행사를 이용하지 않는 분들입니다.\n\n패키지가 부담스러워 혼자 준비하다가,\n결국 숙소 예약이나 짐 배송에서 막히는 분들이 많습니다.\n\n저희가 일정을 설계하면, 실행만 맡아주실 수 있을까요.\n기존 패키지보다 단가는 낮지만 물량이 있고,\n마케팅 비용이 들지 않습니다.\n\n그리고 저희 진단에서 '패키지가 맞다'고 나오는 분들은\n그대로 여행사 상품으로 안내드립니다.\"\n```\n\n**마지막 문장이 핵심이다.** 우리는 여행사의 경쟁자가 아니라 **깔때기 위쪽**이다.\n\n---\n\n### 6. 재무 영향\n\n#### 6.1 R5 재추정\n\n**이전에는 도달 사용자 대비 2/5/8%로 잡았다. 세그먼트 기준으로 다시 계산한다.**\n\n| 구분 | 2027 | 2028 | 2029 |\n|---|---|---|---|\n| 한국인 순례자 | 13,000 | 11,000 | 10,500 |\n| 패키지 검토층 (25%) | 3,250 | 2,750 | 2,625 |\n| 전환 가능 (P1~P3, 65%) | 2,113 | 1,788 | 1,706 |\n| **우리 도달** (도달률 적용) | 634 | 1,073 | 1,450 |\n| **전환율** | 8% | 15% | 22% |\n| **전환자** | **51명** | **161명** | **319명** |\n| 객단가 (셀프 20만 / 대행 50만 혼합) | 25만 | 28만 | 30만 |\n| **매출** | **1,275만** | **4,508만** | **9,570만** |\n\n**이전 추정(1,200만 / 4,950만 / 1억 680만)과 비슷하다.** 다만 근거가 생겼다.\n\n#### 6.2 부수 효과\n\n| 효과 | 설명 |\n|---|---|\n| **R6 송객 증가** | 진단에서 \"패키지 권장\"이 나온 사람 → 여행사 |\n| **R1 보험 전환율 상승** | 상품 구매자는 보험도 함께 든다 |\n| **R2 장비 전환율 상승** | 준비를 우리에게 맡긴 사람 |\n| **CS 부담 증가** | ⚠️ 대행형은 사람이 붙는다 |\n\n---\n\n### 7. 리스크\n\n| 리스크 | 대응 |\n|---|---|\n| **여행업 규제** 🔴 | 셀프형(규제 없음) 먼저. 대행형은 화이트라벨 확정 후 |\n| **여행사와 관계 악화** 🟠 | 5.3절. 파이를 넓히는 제안 |\n| **CS 부담** 🟠 | 대행형 초기 100명 한정 |\n| **\"결국 여행사네\"** 🟡 | 알베르게 유지를 명확히. 호텔 안 씀 |\n| **품질 통제** 🟠 | 제휴 여행사 실행 품질을 우리가 못 본다. SLA 필요 |\n| **가족 알림 오작동** 🟠 | **알림이 안 가면 가족이 공황.** 이중화 필수 |\n| 사고 시 책임 | 계약 주체 명확화 (→ 02 문서 4부) |\n\n#### 7.1 ⚠️ 가장 조심할 것\n\n**\"안심\"을 팔면서 안심시키지 못하면 최악이다.**\n\n| 하지 말 것 |\n|---|\n| \"저희가 다 해드립니다\" (못 한다) |\n| \"절대 안전합니다\" (보장 못 한다) |\n| 24시간 지원 약속 (사람이 없다) |\n| 응급 상황 대응 약속 (**우리는 현지에 없다**) |\n\n**정확히 말한다.** \"한국 시간 저녁에 카톡으로 답합니다. 응급은 112입니다.\"\n\n---\n\n### 8. 검증 (05 문서에 추가)\n\n| # | 가설 | 방법 | 우선 |\n|---|---|---|---|\n| **H23** | **패키지 구매자의 다수가 \"불안\"이 이유다** | 여행사 인터뷰 + 패키지 이용자 인터뷰 | 🔴 |\n| **H24** | **가족 안심 기능에 지불 의사가 있다** | 인터뷰 (자녀 세대 포함) | 🔴 |\n| H25 | 패키지 검토자가 알베르게 경험을 아쉬워한다 | 인터뷰 | 🟠 |\n| H26 | 여행사가 화이트라벨 실행을 받아들인다 | 여행사 접촉 | 🔴 |\n| H27 | 20~50만 원 가격대가 수용된다 | 인터뷰 | 🟠 |\n\n#### 8.1 인터뷰 대상 추가\n\n**기존 20명에 5명을 더한다.**\n\n| 대상 | 인원 |\n|---|---|\n| **패키지 이용 완주자** | 3 |\n| **패키지를 검토했으나 자유여행을 택한 사람** | 2 |\n\n#### 8.2 추가 질문\n\n```\n[패키지 이용자에게]\n1. 왜 패키지를 고르셨어요?\n2. 얼마 내셨어요? 아깝다고 느낀 게 있어요?\n3. 알베르게에서 못 잔 게 아쉽진 않으셨어요?\n4. 다시 간다면 어떻게 하시겠어요?\n5. 준비만 대신 해주고 걷는 건 자유로운 상품이 있다면요?\n\n[패키지를 검토했다 안 산 사람에게]\n6. 왜 안 사셨어요?\n7. 대신 어떻게 하셨어요?\n8. 가장 불안했던 건 뭐예요?\n\n[가족·자녀 관점]\n9. (60대 완주자에게) 가족이 걱정하셨어요?\n10. 어떻게 안심시키셨어요?\n11. 매일 도착 알림이 가족에게 간다면 어떠셨을까요?\n   ★ H24. 가족 안심 세트의 전제\n```\n\n---\n\n### 9. 실행 순서\n\n| Phase | 내용 | 시점 |\n|---|---|---|\n| **0** | 인터뷰에 패키지 관련 5명 추가 | 2026.08 |\n| **0** | 여행사 접촉 시 화이트라벨 타진 | 2026.09 |\n| **1** | **\"패키지 vs 자유여행\" 비교 콘텐츠** | 2026.09 |\n| **1** | \"60대\", \"부모님\" 검색어 페이지 | 2026.12 |\n| **1** | 방법 진단 도구 | 2027.01 |\n| **2** | **셀프형 상품 출시** (규제 없음) | 2027.02 |\n| **2** | **가족 안심 세트** | 2027.03 |\n| **3** | 대행형 (화이트라벨 확정 후) | 2027.05 |\n\n**셀프형과 가족 안심 세트를 먼저 낸다.** 규제 위험이 없고 원가가 낮다.\n\n---\n\n### 10. 한 줄 정리\n\n> **패키지 고객은 돈이 많아서가 아니라 불안해서 산다.**\n> **차액은 100만 원인데, 그 100만 원에 알베르게를 잃는다.**\n>\n> **우리는 20~50만 원에 안심을 주고, 알베르게는 남긴다.**\n\n---\n\n# 3부 · 재무와 의사결정\n\n### 0. 왜 이 문서가 필요한가\n\n02 문서의 재무 추정은 **전환율이 전부 가정**이다. 하나도 검증되지 않았다.\n\n계획서가 하나의 시나리오만 가지고 있으면, **틀렸을 때 대응할 방법이 없다.** 그리고 사람은 자기 계획이 틀렸다는 걸 늦게 인정한다.\n\n**이 문서는 미리 정해두는 것이다. 틀렸을 때 무엇을 할지.**\n\n---\n\n### 1. 기본 시나리오 복기\n\n| 구분 | 2027 (성년) | 2028 | 2029 |\n|---|---|---|---|\n| 한국인 순례자 | 13,000 | 11,000 | 10,500 |\n| 도달률 | 30% | 60% | 85% |\n| 도달 사용자 | 4,000 | 6,600 | 8,900 |\n| **매출** | 8,380만 | 2억 7,350만 | 5억 7,320만 |\n| **비용** | 1억 4,500만 | 1억 9,000만 | 2억 5,000만 |\n| **손익** | **-6,120만** | **+8,350만** | **+3억 2,320만** |\n\n#### 1.1 이 안에 숨은 가정 12개\n\n| # | 가정 | 값 | 등급 | 근거 |\n|---|---|---|---|---|\n| A1 | 2027 순례자 증가율 | +74% | D | 2010년 +85% 유추 |\n| A2 | 2028 반동 | -15% | E | 추정 |\n| A3 | 도달률 1년차 | 30% | E | 목표치 |\n| A4 | 도달률 3년차 | 85% | E | 목표치 |\n| **A5** | **보험 전환율** | **15/25/35%** | **E** | **근거 없음** |\n| **A6** | **보험 수수료** | **15%** | **E** | **미확인** |\n| A7 | 장비 전환율 | 12/20/28% | E | 근거 없음 |\n| A8 | 장비 수수료 | 6% | E | 미확인 |\n| A9 | 숙소 전환율 | 10/18/25% | E | 근거 없음 |\n| A10 | 반패키지 전환율 | 2/5/8% | E | 근거 없음 |\n| A11 | 여행사 수수료 | 5~10% | E | 미확인 |\n| A12 | 비용 구조 | 인건비 2인 | D | 시세 |\n\n**12개 중 10개가 등급 E다.** 이 사실을 계속 눈앞에 둔다.\n\n---\n\n### 2. 민감도 분석\n\n#### 2.1 어느 가정이 가장 크게 흔드나\n\n**2029년 매출 5억 7,320만을 기준으로, 각 가정을 절반으로 낮췄을 때.**\n\n| 가정 | 절반으로 낮추면 | 매출 변화 | 영향도 |\n|---|---|---|---|\n| **A5 보험 전환율** | 35% → 17.5% | **-6,200만** | 🔴 **11%** |\n| **A7 장비 전환율** | 28% → 14% | **-7,470만** | 🔴 **13%** |\n| **A3~A4 도달률** | 85% → 42.5% | **-2억 8,660만** | 🔴🔴 **50%** |\n| A10 반패키지 전환율 | 8% → 4% | -5,340만 | 🟠 9% |\n| A9 숙소 전환율 | 25% → 12.5% | -2,780만 | 🟡 5% |\n| A11 여행사 수수료 | 30만 → 15만 | -2,700만 | 🟡 5% |\n| A1~A2 순례자 수 | -15% | -8,600만 | 🟠 15% |\n\n#### 2.2 결론\n\n> **도달률이 모든 것을 지배한다.**\n\n전환율을 아무리 올려도 사람이 안 오면 소용없다. 반대로 **도달률만 확보되면 전환율이 절반이어도 3억대는 나온다.**\n\n**→ 자원 배분의 근거가 된다. SEO와 콘텐츠에 최우선으로 투입한다.**\n\n두 번째는 **A5·A7(보험·장비 전환율)이다.** 이 둘이 합쳐 24%를 흔든다. **두 축 사업모델의 핵심 검증 대상이다.**\n\n---\n\n### 3. 시나리오 4개\n\n#### 3.1 시나리오 A — 기본 (확률 30%)\n\n**전제**: 도달률 목표 달성, 보험 제휴 성사\n\n| | 2027 | 2028 | 2029 |\n|---|---|---|---|\n| 손익 | -6,120만 | +8,350만 | +3억 2,320만 |\n\n**행동**: 계획대로. 2027년 6월 전업 전환.\n\n---\n\n#### 3.2 시나리오 B — 보험 제휴 불발 (확률 25%)\n\n**전제**: 규제 또는 상품 부재로 R1 불가\n\n| | 2027 | 2028 | 2029 |\n|---|---|---|---|\n| 매출 | 6,580만 | 2억 1,575만 | 4억 4,920만 |\n| 손익 | **-7,920만** | +2,575만 | **+1억 9,920만** |\n\n**손익분기가 2년차 후반으로 밀린다.**\n\n**대응**\n\n| # | 행동 |\n|---|---|\n| 1 | **장비 비중 확대** — 신발 큐레이션 강화, 자체 셀렉션 검토 |\n| 2 | 보험은 **정보 제공만** (무료). 신뢰 자산으로 활용 |\n| 3 | 반패키지(R5) 조기 착수 |\n| 4 | 비용 축소 — 1.5인 체제 유지 |\n\n⚠️ **이 시나리오가 두 번째로 유력하다. 미리 준비한다.**\n\n---\n\n#### 3.3 시나리오 C — 도달률 미달 (확률 30%)\n\n**전제**: 검색 유입이 예상의 절반. 2029년 도달률 45%\n\n| | 2027 | 2028 | 2029 |\n|---|---|---|---|\n| 도달률 | 15% | 30% | 45% |\n| 매출 | 4,190만 | 1억 3,675만 | 3억 350만 |\n| 손익 | **-1억 310만** | **-5,325만** | **+5,350만** |\n\n**손익분기가 3년차 말로 밀린다. 누적 적자 1억 5,600만.**\n\n**대응**\n\n| 단계 | 행동 |\n|---|---|\n| 1 | **원인 진단** — 검색 노출 문제인가, 클릭 문제인가, 콘텐츠 문제인가 |\n| 2 | 네이버 블로그 본격 운영 |\n| 3 | 유튜브 비중 확대 |\n| 4 | 카페 협업 (운영진과 공식 제휴) |\n| 5 | **전업 전환 보류.** 사이드로 유지 |\n\n⚠️ **전업 전환을 하지 않는 것이 핵심 대응이다.** 인건비 9,600만이 없으면 시나리오 C도 흑자다.\n\n---\n\n#### 3.4 시나리오 D — 실패 (확률 15%)\n\n**전제**: 게이트 1에서 H1·H2·H4 중 둘 이상 불통과. 또는 도달률 20% 미달 + 제휴 전부 불발\n\n**신호**\n\n```\n□ 인터뷰 20명 중 침대 불안이 주요 문제라는 응답 7명 이하\n□ 걷는 중 휴대폰을 거의 안 본다는 응답 다수\n□ 4주 트래픽 월 500 세션 미만\n□ 보험·여행사·장비 제휴 전부 불발\n□ 2027년 성년 시즌에도 도달률 10% 미만\n```\n\n**→ 5장 참조**\n\n---\n\n### 4. 손익분기 조건\n\n**\"몇 명이 와야 먹고사나\"를 명확히 한다.**\n\n#### 4.1 사이드 프로젝트 유지 (인건비 0)\n\n| 항목 | 연간 |\n|---|---|\n| 서버·도메인 | 60만 |\n| 데이터 갱신·실측 (2년에 1회 안분) | 400만 |\n| 자문 (법률·의료) | 300만 |\n| **합계** | **760만** |\n\n**필요 매출 760만 → 도달 사용자 약 400명 (ARPU 2만 기준)**\n\n**→ 도달률 4%면 사이드 프로젝트는 유지된다.** 매우 낮은 문턱이다.\n\n#### 4.2 1인 전업\n\n| 항목 | 연간 |\n|---|---|\n| 인건비 1인 | 5,000만 |\n| 운영비 |
