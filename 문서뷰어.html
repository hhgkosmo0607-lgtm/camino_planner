터베이스를 재배포하는 게 아니다. **다만 이건 법률 검토가 필요하다.** 상업 서비스이므로 확인 없이 넘어가지 않는다.\n\n#### 1.4 대안 경로 소스 (참고)\n\n| 소스 | 내용 | 라이선스 | 판단 |\n|---|---|---|---|\n| **OSM** | 릴레이션 네트워크 | ODbL | **채택** |\n| Stingy Nomads | 구간별 GPX 무료 배포 | 명시 없음 | 검증용으로만 |\n| caminodesantiago.me 자료실 | 전 루트 GPX/KMZ 통합 파일 | 커뮤니티 업로드, 불명확 | 검증용으로만 |\n| Village to Village Press | 상세 GPX 세트 | **명시적 저작권** | **사용 금지** |\n| Australian Friends of the Camino | 2000년 GPS 기록 재정리, 브리얼리 34구간 | 불명확, 25년 전 데이터 | 사용 안 함 |\n| Wikiloc | 사용자 업로드 | 업로더별 상이 | 사용 안 함 |\n\n> **여러 소스를 교차 검증용으로 쓰는 것과, 그 데이터를 제품에 넣는 것은 다르다.**\n> 우리 계산 결과가 다른 앱의 값과 크게 다르면 뭔가 잘못된 것이므로 비교는 하되, 데이터는 OSM에서만 가져온다.\n\n---\n\n### 2. 고도 데이터 — 스페인 IGN MDT\n\n#### 2.1 이게 최선이다\n\n스페인 국립지리원(IGN/CNIG)이 **PNOA 항공 LiDAR**로 만든 수치표고모델을 무료 공개한다.\n\n| 제품 | 격자 | 비고 |\n|---|---|---|\n| **MDT05** | **5m** | 1차 커버리지. 전국. **우리가 쓸 것** |\n| MDT02 | 2m | 2차 커버리지. 더 정밀하나 용량이 크다 |\n| MDT25 / MDT200 | 25m / 200m | 저해상도 |\n\nMDT05는 **최근 COG(Cloud Optimized GeoTIFF) 포맷으로 전환**됐다. 기존 ESRI ASCII 격자보다 다루기 훨씬 편하다.\n\n#### 2.2 라이선스 — 깨끗하다\n\nCNIG 다운로드 센터는 **출처와 소유권을 표시하면 자유롭고 무료(CC-BY 4.0)** 로 이용할 수 있다고 명시한다.\n\n**→ \"출처: Instituto Geográfico Nacional (CC BY 4.0)\" 한 줄만 표시하면 상업 이용도 가능하다.** 동일조건변경허락 의무가 없어서 ODbL보다 다루기 쉽다.\n\n#### 2.3 받는 법\n\n- 다운로드 센터: `centrodedescargas.cnig.es` → 「Modelos Digitales de Elevaciones」\n- 시트 단위는 **MTN50 도엽**을 따른다. 프랑스 길이 지나는 도엽만 골라 받으면 된다\n- **WCS 다운로드 서비스**도 제공하므로, 좌표 구간만 잘라 받는 것도 가능하다\n- 좌표계: ETRS89 UTM (본토는 30번대 확장 존)\n\n#### 2.4 프랑스 구간\n\n생장피드포르에서 스페인 국경까지 약 20km는 프랑스 영토다. 이 구간은 IGN España가 커버하지 않는다.\n\n| 옵션 | 비고 |\n|---|---|\n| IGN France RGE ALTI | 프랑스 국립지리원 고도 모델. 라이선스 확인 필요 |\n| Copernicus DEM (EU) | 30m. 전 유럽 커버. 무료 |\n| SRTM | 30m. 전 세계. 무료. 정확도는 가장 낮음 |\n\n**1일차가 하필 이 구간이고, 그 1일차가 가장 위험한 날이다.** 프랑스 쪽 고도는 별도로 신경 써서 확보한다.\n\n---\n\n### 3. 계산 파이프라인\n\n```\n① OSM에서 프랑스 길 릴레이션 → 좌표 시퀀스 (GeoJSON LineString)\n② 마을 82곳 좌표로 구간 81개로 분할\n③ 각 구간을 일정 간격(예: 10m)으로 리샘플링\n④ 각 점의 고도를 MDT05에서 샘플링\n⑤ ★ 평활화 적용 (4장)\n⑥ ascent = Σ max(0, Δh),  descent = Σ max(0, -Δh)\n⑦ data/profiles.ts 로 출력 (source: 'OSM+MDT')\n```\n\n이건 **일회성 배치 스크립트**다. 서비스 런타임에 도는 코드가 아니다.\n\n```\nscripts/build-profiles.ts   ← Node. 개발 시에만 실행\ndata/profiles.ts            ← 결과물. 저장소에 커밋\n```\n\n---\n\n### 4. ⚠️ 반드시 알아야 할 함정 — 누적 상승은 부풀려진다\n\n**이게 이 작업에서 가장 실수하기 쉬운 지점이다.**\n\n고도 데이터를 그대로 더하면 **실제보다 2~3배 큰 값**이 나온다. 이유는 이렇다.\n\n- DEM에는 미세한 노이즈가 있다\n- 평지를 걸어도 매 10m마다 ±0.3m씩 오르내리는 것으로 기록된다\n- 이걸 다 더하면 **메세타 평야 구간에서 누적 상승 800m** 같은 말도 안 되는 값이 나온다\n\n같은 트랙을 두고 앱마다 누적 상승이 크게 다른 이유가 이것이다.\n\n#### 대응\n\n| 방법 | 설명 |\n|---|---|\n| **임계값(threshold)** | 연속된 고도차가 일정 값(예: 3~5m)을 넘을 때만 누적에 반영 |\n| **이동평균** | 고도 시퀀스를 먼저 평활화한 뒤 차분 |\n| **리샘플링 간격** | 너무 촘촘하면 노이즈가 늘고, 너무 성기면 봉우리를 놓친다. 10~25m가 무난 |\n\n#### 검증 방법\n\n계산 결과를 **알려진 값과 대조**한다.\n\n| 구간 | 기대치 |\n|---|---|\n| 생장 → 론세스바예스 | 누적 상승 1,200~1,400m대 (레포에데르 고개 경유) |\n| 비야프랑카 → 오 세브레이로 | 700~900m대 |\n| **엘 아세보 → 몰리나세카** | **상승 거의 없고 하강 500m 이상** |\n| 부르고스 → 오르니요스 (메세타) | 상승 100m 이하여야 정상 |\n\n**마지막 항목이 핵심 검증이다.** 메세타 평야 구간에서 상승 300m 이상이 나오면 평활화가 안 된 것이다.\n\n> ⚠️ 위 기대치는 우리가 참고용으로 잡은 대략값이다. **DEM 계산 결과가 곧 정답이 된다.**\n> 다만 계산값이 위 범위를 크게 벗어나면 파이프라인을 의심한다.\n\n---\n\n### 4-b. ⚠️ 갈림길 경로도 함께 추출한다\n\n**현재 데이터는 82개 마을의 단일 선형 배열이다. 변형 경로가 없다.**\n\n프랑스 길은 11곳에서 갈라졌다 다시 만난다. OSM에는 주 경로뿐 아니라 **변형 경로도 별도 릴레이션으로 매핑돼 있다.**\n\n| 작업 | 내용 |\n|---|---|\n| 1 | 주 경로 외에 변형 릴레이션을 찾는다 (`alternative`, `variant` 태그) |\n| 2 | 각 변형의 분기점·재합류점을 마을 좌표와 매칭 |\n| 3 | 변형별로 `ascent`/`descent`를 따로 계산 |\n| 4 | 변형 경유 마을을 `towns.ts`에 추가 |\n| 5 | 차도 병행 비율은 OSM 도로 유형(`highway=*`)으로 산출 |\n\n**추가되는 마을 (추정 25~40곳)**\n\n발카를로스 계열 · 에우나테 · 비요비에코 · 칼사다 로마나 계열 · 비야르 데 마사리페 계열 · 프라델라 · 사모스 등.\n\n⚠️ **계절 폐쇄 정보는 OSM에 없다.** 나폴레옹 루트의 11/1~3/31 폐쇄 같은 정보는 **수기로 관리**하고 연 1회 확인한다.\n\n---\n\n### 5. 작업 순서와 비용\n\n| 단계 | 작업 | 소요 | 비용 |\n|---|---|---|---|\n| 1 | OSM 릴레이션 확인 및 좌표 추출 | 0.5일 | 0 |\n| 2 | MDT05 해당 도엽 목록 파악·다운로드 | 0.5일 | 0 |\n| 3 | 샘플링·평활화 스크립트 작성 | 1일 | 0 |\n| 4 | 검증 (4장 대조표) | 0.5일 | 0 |\n| 5 | 프랑스 구간 별도 처리 | 0.5일 | 0 |\n| 6 | **변형 경로 11곳 추출·계산** | **1.5일** | 0 |\n| 6 | **라이선스 검토** | — | 법률 자문 |\n| **합계** | | **약 4.5일** | **데이터 비용 0** |\n\n**데이터 비용은 0원이다.** 앞선 계획에서 \"라이선스 미확인, 비용 0 가정이 깨질 수 있음\"이라고 적었는데, **확인 결과 유지된다.** 다만 ODbL 파생물 판단은 법률 검토가 필요하다.\n\n---\n\n### 6. 표시 의무 정리\n\n앱과 웹 하단, 그리고 오프라인 지도 화면에 넣는다.\n\n```\n경로 데이터 © OpenStreetMap contributors (ODbL)\n고도 데이터 © Instituto Geográfico Nacional (CC BY 4.0)\n```\n\n지도 타일을 자체 호스팅하면 OSM 표시가 추가로 필요하다.\n\n---\n\n### 7. 문서 반영 사항\n\n| 문서 | 반영 |\n|---|---|\n| 04 사양서 2.1-b | `SegmentProfile.source`에 `'GPX'` 대신 `'OSM+MDT'` 사용 |\n| 04 사양서 5장 | 데이터 확보 계획 1차에 이 문서 참조 추가 |\n| 04 사양서 7장 | 미해결 1번(지도 타일 라이선스)과 별개 항목으로 분리 |\n| 05 개발가이드 P0 | 5번 단계를 이 파이프라인 결과로 교체 |\n| 01 문서 2부 결함 1·2 | **해결 경로 확보. 실행만 남음** |\n\n---\n\n### 8. 남은 위험\n\n| 위험 | 대응 |\n|---|---|\n| **ODbL 파생 DB 해석** | 좌표를 커밋하지 않고 숫자만 남긴다. 법률 검토 |\n| OSM 경로가 실제와 다를 수 있음 | 실측 도보 시 GPS 기록으로 대조 |\n| MDT05 도엽 경계 처리 | 구간이 도엽을 넘어갈 때 이어붙이기 |\n| 프랑스 구간 데이터 품질 | 1일차가 가장 위험한 날이므로 별도 확인 |\n| 대안 경로(변형 루트) 누락 | 사모스/산실, 발카를로스 등. Phase 2로 미룸 |\n\n---\n\n*이 문서는 01 문서 2부의 결함 1·2에 대한 해결 계획이다. 실행 완료 시 해당 결함을 종료 처리한다.*"}, {"file": "04_실행계획.md", "title": "실행 계획", "sub": "경쟁 · 콘텐츠 · 부상 · 제휴 · 운영", "md": "# 04 · 실행 계획\n\n> 1부 경쟁과 대체재 · 2부 콘텐츠와 검색 · 3부 부상 콘텐츠 · 4부 제휴 실무 · 5부 런칭과 운영\n> v2.1 · 2026년 7월\n\n---\n\n## 목차\n\n| 부 | 내용 |\n|---|---|\n| **1부** | 경쟁과 대체재 — 진짜 경쟁자는 앱이 아니다 |\n| **2부** | 콘텐츠와 검색 — SEO는 전략 그 자체 |\n| **3부** | 부상 콘텐츠 45개 — **의료 검수 프로세스 포함** |\n| **4부** | 제휴 실무 — 이메일 초안과 질문지 |\n| **5부** | 런칭과 운영 — 성년 시즌, 데이터 갱신, CS |\n\n---\n\n# 1부 · 경쟁과 대체재\n\n## 1. 경쟁 지형을 다시 그린다\n\n이전 문서는 앱끼리 비교했다. **틀린 프레임이다.**\n\n한국인 순례자는 \"카미노 앱을 고르는\" 게 아니라 **\"이 여행을 어떻게 감당할지\"** 를 고른다. 그 선택지가 진짜 경쟁 지형이다.\n\n```\n       비용\n        ↑\n  600만 ┤                        ● 여행사 풀패키지\n        │\n  400만 ┤                  ● 세미패키지\n        │\n        │       ★ 우리 (20~50만)\n   50만 ┤\n        │\n    0원 ┤ ● 혼자 (카페 + 무료앱)\n        └───────────────────────────→ 안심\n          불안                    안심\n```\n\n**우리는 \"혼자\"와 \"세미패키지\" 사이의 빈 곳을 노린다.**\n\n---\n\n## 2. 대체재별 심층 분석\n\n### 2.1 여행사 패키지 — 가장 중요한 경쟁자\n\n#### 상품 구조\n\n| 유형 | 가격대 | 구성 |\n|---|---|---|\n| 풀패키지 (인솔자 동행) | 500~600만 | 항공 + 전 구간 숙소 + 짐배송 + 인솔 + 일부 식사 |\n| 세미패키지 | 350~450만 | 항공 + 숙소 + 짐배송, 인솔 없음 |\n| 현지 지원형 | 200~300만 | 숙소 + 짐배송만 |\n\n실제 국내 상품 사례에서 **전 구간 짐 배송이 약 200유로**로 별도 표기되고, 43일 일정이 구성된다.\n\n#### 왜 사람들이 이걸 사는가\n\n| 이유 | 우리 축 |\n|---|---|\n| 숙소를 못 잡을까 봐 | **B** |\n| 언어가 안 통해서 | A + B |\n| 나이가 있어서 몸이 걱정돼서 | **A** |\n| 혼자 가기 무서워서 | — |\n| 알아볼 시간이 없어서 | A + B |\n\n**→ 다섯 중 넷이 우리 두 축이다.** 여행사는 우리와 같은 문제를 팔고 있다.\n\n#### 약점\n\n| 약점 | 우리 기회 |\n|---|---|\n| 비싸다 (10~30배) | 가격 |\n| 일정이 고정 | 자유도 |\n| 알베르게가 아니라 호텔 — **순례 경험이 희석된다** | **진정성** |\n| 만나는 사람이 한국인 일행뿐 | 경험 |\n| 예약이 전 구간이라 부담 | 부분 선택 |\n\n> **핵심 공격 포인트: \"패키지로 가면 알베르게에 안 묵는다.\"**\n> 순례 경험의 대부분이 알베르게에서 일어난다. 여행사는 이걸 못 준다.\n> **우리는 알베르게에 묵으면서 안심할 수 있게 한다.**\n\n#### 그런데 적이 아니다\n\n**여행사는 R5(반패키지)의 실행 파트너이자 R6(송객)의 대상이다.**\n\n- 자유여행을 준비하다 포기하는 사람 → 여행사로 송객 (수수료)\n- 반패키지 → 여행사가 실제 예약·결제 (화이트라벨)\n\n**→ 인터뷰 때 \"자유여행 준비하다 패키지로 돌아서는 분이 있나요? 왜요?\"를 반드시 묻는다.** 이 답이 우리 상품의 설계도다.\n\n### 2.2 네이버 카페 — 정보의 실질 허브\n\n| 제공 | 강도 |\n|---|---|\n| 실시간 현지 정보 | ★★★ |\n| 경험자의 답변 | ★★★ |\n| 동행 구하기 | ★★★ |\n| 정서적 지지 | ★★★ |\n| 구조화된 정보 | ★ |\n| 검색성 | ★ |\n\n#### 이기는 곳 / 못 이기는 곳\n\n| 질문 | 승자 |\n|---|---|\n| \"사리아 5일 일정 짜줘\" | **우리** (계산) |\n| \"포르토마린 알베르게 어때요?\" | 카페 (경험) |\n| \"무릎 아픈데 어떡하죠?\" | 카페 (공감) + 우리 (판단) |\n| \"지금 만실인가요?\" | **카페** (실시간) |\n| \"신발 뭐 사요?\" | 카페 (경험) → **우리가 노릴 곳** |\n| \"며칠 걸리나요?\" | **우리** |\n\n> **카페와 싸우지 않는다.** 카페는 경험과 실시간을, 우리는 계산과 판단을 맡는다.\n\n#### 접근 원칙\n\n| 하는 것 | 하지 않는 것 |\n|---|---|\n| 운영진에 사전 허락받고 무료 도구 공유 | 무단 홍보 글 |\n| 질문에 성실히 답하기 (링크 없이) | 답변마다 링크 걸기 |\n| 실측 도보 연재로 자연스러운 인지 | 바이럴 알바 |\n| 인터뷰 모집도 허락받고 | 회원 DM |\n\n⚠️ **네이버 카페는 상업적 접근에 매우 적대적이다. 한 번 찍히면 복구가 안 된다.**\n\n### 2.3 글로벌 앱 — 우리 축과 다르다\n\n| 앱 | 강점 | **두 축 대응** |\n|---|---|---|\n| Buen Camino | 45개 루트, 100만+ 다운로드, 9개 언어, 무료 | 숙소 **목록**. 부상 축 없음 |\n| Wise Pilgrim | 14년 업력, 오프라인 지도, 2026 리뉴얼, $4.99 | 숙소 목록 + 예약 연결. 부상 축 없음 |\n| Gronze | 숙소 DB 최고 수준 (스페인어) | 숙소 정보. 부상 축 없음 |\n| Camino Ninja | 커뮤니티 | — |\n| 공식 디지털 크레덴시알 | QR 도장 | — |\n\n**→ 어느 앱도 \"부상\"을 다루지 않는다.** 목록은 주지만 판단은 안 준다.\n\n**한국인은 전체 순례자의 1.4%**라 이들이 한국어에 투자할 이유가 없다.\n\n### 2.4 \"아무것도 안 함\" — 가장 큰 경쟁자\n\n**절반 이상은 카페 몇 번 보고 그냥 간다.** 이기는 방법은 하나뿐이다. **검색했을 때 우리가 거기 있는 것.**\n\n---\n\n## 3. 포지셔닝 문장\n\n> **\"알베르게에 묵으면서, 여행사만큼 안심하고.\"**\n\n| 대상 | 메시지 |\n|---|---|\n| 혼자 갈 사람 | 필요한 날만 잡으면 됩니다 |\n| 패키지 고민 중인 사람 | 그 돈의 10분의 1이면 됩니다 |\n| 60대 | 무리하지 않는 일정을 짜드립니다 |\n| 30대 | 짧은 기간에 최대한 |\n\n---\n\n# 2부 · 콘텐츠와 검색\n\n## 4. SEO는 전략 그 자체다\n\n검색이 유일한 100% 관문이다(→ 02 문서 1부 5.4). **자원의 대부분이 여기 간다.**\n\n### 4.1 페이지 구성\n\n| 유형 | 수 | 생성 | Phase |\n|---|---|---|---|\n| 마을 | 82 | 자동 | 1 |\n| 구간 | 81 | 자동 | 1 |\n| 루트 | 3 | 반자동 | 1 |\n| 무료 도구 | 7 | 수기 | 1~2 |\n| **Phase 1 소계** | **약 170** | | |\n| **부상 가이드** | **45** | 수기 | 2 |\n| 숙소 가이드 | 35 | 수기 | 2 |\n| 준비 가이드 | 40 | 수기 | 2 |\n| 일정 추천 | 25 | 반자동 | 2 |\n| 상황 대응 | 25 | 수기 | 2 |\n| **랜드마크 19곳** | **19** | **실측 도보 후 수기** | 2 |\n| **갈림길 11곳** | **11** | **실측 도보 후 수기** | 2 |\n| **접근·귀환 교통** | **8** | 수기 | **1** |\n| **최종 합계** | **약 358** | | |\n\n### 4.2 ⭐ 검색어 목록 — 두 축 중심\n\n**이전 계획은 \"마을 이름\"에 치우쳐 있었다. 두 축을 사업으로 잡았으니 검색어도 바뀐다.**\n\n#### A축 · 부상 (45페이지) — **가장 중요**\n\n| 유형 | 예시 | 우선 |\n|---|---|---|\n| 신발 | 산티아고 순례길 신발 추천 / 등산화 vs 트레킹화 / 사이즈 / 길들이기 | ★★★ |\n| 물집 | 물집 예방 / 터뜨리기 / 양말 추천 / 발 관리 | ★★★ |\n| 무릎 | 무릎 통증 / 보호대 / 스틱 필요한가 / 내리막 걷는 법 | ★★★ |\n| 배낭 | 무게 / 크기 / 짐 줄이기 / 패킹 | ★★★ |\n| 체력 | 체력 준비 / 훈련 / 60대 가능한가 / 무릎 안 좋은데 | ★★★ |\n| 부상 대응 | 발목 삐었을 때 / 족저근막염 / 아킬레스건염 / 근육통 | ★★☆ |\n| 현지 의료 | 스페인 약국 / 병원 / 약 이름 / 물리치료 | ★★☆ |\n| 보험 | 여행자 보험 / 장기 체류 / 도보 여행 보험 | ★★★ |\n| 짐 배송 | 동키 서비스 / 요금 / 코레오스 | ★★☆ |\n\n#### B축 · 숙소 (35페이지)\n\n| 유형 | 예시 | 우선 |\n|---|---|---|\n| 알베르게 기본 | 알베르게란 / 공립 사립 차이 / 요금 / 크레덴시알 | ★★★ |\n| 예약 | 예약 되나요 / 방법 / 전화 스페인어 | ★★★ |\n| 만실 | 자리 없으면 / 성수기 / 몇 시에 도착 | ★★★ |\n| 마을별 숙소 | (마을명) 알베르게 — 82개 마을 페이지와 연결 | ★★★ |\n| 시설 | 세탁 / 취사 / 와이파이 / 콘센트 / 침낭 필요한가 | ★★☆ |\n| 빈대 | 빈대 / 베드버그 / 예방 / 물렸을 때 | ★★☆ |\n| 대안 숙소 | 호스텔 / 펜션 / 부킹닷컴 | ★★☆ |\n\n#### 접근 교통 (8페이지) — 준비 단계 최대 검색어\n\n| 검색어 | 현재 국내 자료 |\n|---|---|\n| **생장피드포르 가는 법** | 파편적 |\n| **인천에서 산티아고 순례길** | 파편적 |\n| 파리에서 생장 | 있으나 오래됨 |\n| **바욘 생장 기차** | 거의 없음 |\n| 팜플로나에서 생장 버스 | 거의 없음 |\n| 산티아고에서 한국 오는 법 | 거의 없음 |\n| 산티아고 순례길 항공권 | 여행사 광고뿐 |\n| 순례길 짐 미리 보내기 | 거의 없음 |\n\n**\"어떻게 가지?\"가 준비 단계의 첫 질문인데 국내 자료가 낡았거나 파편적이다.**\n\n#### 갈림길 (11페이지) — 검색 공백\n\n| 검색어 | 현재 국내 자료 |\n|---|---|\n| **나폴레옹 vs 발카를로스** | 거의 없음 |\n| 산티아고 순례길 겨울 피레네 | 거의 없음 |\n| **사모스 vs 산 실** | 거의 없음 |\n| 비야르 데 마사리페 | 거의 없음 |\n| 에우나테 성당 가는 법 | 거의 없음 |\n| 부르고스 강변길 | 없음 |\n| 칼사다 로마나 (로마 가도) | 없음 |\n| 프라델라 우회 | 없음 |\n\n**전부 실제로 순례자가 고민하는 지점인데 한국어 자료가 없다.**\n\n#### 기본·준비 (40) / 상황·기타 (25)\n\n일정, 비용, 시기, 크레덴시알, 항공, 짐 목록, 코스 선택 / 이중 순례자, 피니스테레, 완주 후, 스페인어, 안전, 혼자 가기.\n\n### 4.3 작성 순서\n\n**검색량이 아니라 \"우리 축\"과 \"경쟁 공백\" 기준으로 정한다.**\n\n| 순위 | 묶음 | 이유 |\n|---|---|---|\n| 1 | **접근 교통** | **준비의 첫 질문. 8페이지로 검색 초입을 잡는다** |\n| 1 | **신발·물집** | A축 진입점. **국내 정보가 파편적** |\n| 2 | **알베르게 예약 가능 여부** | B축 진입점. **잘못된 정보가 퍼져 있다** |\n| 3 | 배낭 무게 | 계산기와 직결 |\n| 4 | 무릎·내리막 | **우리만의 데이터(하강) 활용** |\n| 5 | 마을·구간 163개 | 자동 생성 |\n| 6 | 여행자 보험 | R1 진입점 |\n| 7 | **이중 순례자** | **검색 공백이 가장 크다** |\n| 7 | **랜드마크 19곳** | 안개 지도 콘텐츠와 SEO를 동시에. 실측 사진 필수 |\n| 7 | **갈림길 11곳** | **\"나폴레옹 발카를로스\", \"사모스 산실\" 등 실검색어. 국내 자료가 거의 없다** |\n| 8 | 나머지 | |\n\n### 4.4 콘텐츠 원칙\n\n| 원칙 | 설명 |\n|---|---|\n| **실제로 답한다** | 콘텐츠 농장 금지 |\n| **모르면 모른다고 쓴다** | 데이터 없으면 \"확인 중\" |\n| **의료는 검수 후에만** | 부상 45개가 전부 여기 걸린다 |\n| **상품을 먼저 꺼내지 않는다** | 정보 → 판단 → (필요하면) 상품 |\n| **실측 사진을 쓴다** | 스톡 이미지 금지 |\n| **날짜를 표시한다** | \"2026년 10월 확인\" |\n\n### 4.5 ⚠️ 네이버 대응\n\n**한국인은 네이버에서 검색한다. 그런데 네이버는 외부 사이트 색인이 구글만큼 관대하지 않다.**\n\n| 대응 | 내용 |\n|---|---|\n| 서치어드바이저 등록 | 필수 |\n| 사이트맵 제출 | 필수 |\n| **블로그 병행 운영** | 네이버는 블로그·카페를 우선 노출한다 |\n| 콘텐츠 이원화 | 블로그는 경험·후기, 자체 사이트는 도구·데이터 |\n\n**4주 트래픽 실험에서 네이버 비중이 구글의 1/3 미만이면 블로그를 본격 운영한다.** (→ 05 문서 4.5)\n\n---\n\n# 3부 · 부상 콘텐츠 설계\n\n## 0. 이 문서의 위치\n\n부상(A축)이 **수익의 절반 이상**을 만든다. 그런데 그 근거가 되는 콘텐츠 45개는 아직 목차조차 없었다.\n\n동시에 **가장 위험한 영역**이다. 잘못 쓰면 사람이 다치고 우리가 법적 책임을 진다.\n\n**이 문서는 무엇을 쓸지와, 쓰기 전에 무엇을 지켜야 하는지를 정한다.**\n\n---\n\n## 1. ⚠️ 대원칙 — 먼저 읽는다\n\n### 1.1 우리가 하는 것과 하지 않는 것\n\n```\n✅ 하는 것\n   · 무엇이 흔히 보고되는지 알린다\n   · 준비 단계에서 무엇을 결정해야 하는지 알린다\n   · 일정을 무리하지 않게 설계한다\n   · 전문가에게 갈 수 있게 돕는다 (카드, 위치, 언어)\n   · 전문가의 판단을 일정에 반영한다\n\n❌ 하지 않는 것\n   · 진단한다 (\"족저근막염입니다\")\n   · 약을 지정한다 (\"이 약을 드세요\")\n   · 용량·복용법을 쓴다\n   · \"괜찮다\"고 안심시킨다\n   · 치료법을 처방한다\n```\n\n**우리는 통로다. 판단자가 아니다.**\n\n### 1.2 표현 규칙\n\n| ❌ | ✅ |\n|---|---|\n| \"족저근막염입니다\" | \"발뒤꿈치 통증은 여러 원인이 있습니다\" |\n| \"이 약을 드세요\" | \"약국에서 증상을 설명하는 카드를 준비했습니다\" |\n| \"3일 쉬면 낫습니다\" | \"쉬는 기간은 전문가와 상의하세요\" |\n| \"괜찮습니다\" | \"판단이 어려우면 진료를 받으세요\" |\n| \"치료법은\" | \"일반적으로 알려진 대응은\" |\n| \"반드시 ~하세요\" | \"~하는 것이 권장됩니다\" |\n\n### 1.3 모든 페이지 하단 고정\n\n```\n이 글은 일반적인 참고 정보이며 의학적 진단이나 치료 조언이 아닙니다.\n증상이 있을 경우 의료 전문가와 상담하십시오.\n스페인 응급번호: 112\n```\n\n---\n\n## 2. 의료 검수 프로세스\n\n### 2.1 검수 없이 게시하지 않는다\n\n**45개 페이지 전부가 검수 대상이다. 예외 없다.**\n\n```\n① 초안 작성          ← 우리\n② 사실 확인          ← 공개 자료 대조\n③ ★ 의료 자문 검수   ← 정형외과 또는 스포츠의학\n④ 표현 수정          ← 1.2절 규칙 적용\n⑤ 재검수            ← 수정본 확인\n⑥ 게시 + 검수일 표시\n⑦ 연 1회 재검토\n```\n\n### 2.2 자문 계약\n\n| 항목 | 내용 |\n|---|---|\n| 대상 | 정형외과 전문의 또는 스포츠의학 전문의 |\n| 보조 | 물리치료사 (보행·재활 영역) |\n| 형태 | 월 정액 또는 건당 |\n| 범위 | 콘텐츠 검수 + 보여주기 카드 의료 8장 + 위험 산정 로직 검토 |\n| 예상 비용 | **300~500만** |\n| 시점 | **부상 콘텐츠 착수 전 (2026년 11월)** |\n\n### 2.3 검수 요청 양식\n\n```\n[검수 요청]\n페이지: (제목)\n목적: 순례 준비자에게 ○○을 알리기 위함\n대상: 40~70대 일반인, 의학 지식 없음\n\n확인 부탁드릴 것\n□ 사실관계 오류\n□ 진단·처방으로 읽힐 여지\n□ 위험한 자가 대응을 유도하는 부분\n□ \"전문가에게 가야 하는 신호\"가 빠졌는지\n□ 표현 강도가 적절한지\n```\n\n### 2.4 ⚠️ 검수자가 거부하면 게시하지 않는다\n\n**\"이건 쓰지 마세요\"라고 하면 안 쓴다.** 다시 설득하지 않는다.\n\n---\n\n## 3. 콘텐츠 45개 목차\n\n### 3.1 신발 (9)\n\n**물집의 최대 변수. A축 진입점이자 R2 커머스의 핵심.**\n\n| # | 제목 | 검색 의도 | 우선 |\n|---|---|---|---|\n| S1 | 산티아고 순례길 신발, 무엇을 봐야 하나 | 기준을 모른다 | ★★★ |\n| S2 | 등산화 vs 트레킹화 vs 러닝화 | 종류 선택 | ★★★ |\n| S3 | **신발 사이즈 — 왜 크게 신어야 하나** | **발이 붓는다는 걸 모른다** | ★★★ |\n| S4 | 신발 길들이기, 언제부터 얼마나 | D-60 행동 유도 | ★★★ |\n| S5 | 방수 신발이 꼭 필요한가 | 갈리시아 비 | ★★☆ |\n| S6 | 양말이 신발만큼 중요한 이유 | 소재·두께 | ★★★ |\n| S7 | 깔창을 바꿔야 할까 | 발 아치 | ★★☆ |\n| S8 | 신던 신발로 가도 되나 | **안 사도 되는 경우** | ★★☆ |\n| S9 | 현지에서 신발을 사야 한다면 | 비상 상황 | ★☆☆ |\n\n> **S8을 반드시 쓴다.** \"안 사도 된다\"고 말하는 페이지가 있어야 나머지 8개가 신뢰를 얻는다.\n\n### 3.2 발 (8)\n\n| # | 제목 | 우선 |\n|---|---|---|\n| F1 | 물집은 왜 생기나 | ★★★ |\n| F2 | 물집 예방 — 걷기 전에 하는 것 | ★★★ |\n| F3 | 물집이 생겼을 때 (⚠️ 검수 최우선) | ★★★ |\n| F4 | 발을 마르게 유지하는 법 | ★★★ |\n| F5 | 발뒤꿈치 통증 | ★★☆ |\n| F6 | 발가락·발볼 통증 | ★★☆ |\n| F7 | 발톱 문제 | ★★☆ |\n| F8 | 매일 하는 발 관리 루틴 | ★★★ |\n\n⚠️ **F3(물집 대응)이 가장 위험한 페이지다.** 자가 처치를 유도하면 감염 위험이 있다. **검수를 가장 엄격하게 받는다.**\n\n### 3.3 무릎·다리 (8)\n\n| # | 제목 | 우선 |\n|---|---|---|\n| K1 | 무릎이 아픈 이유 — 오르막보다 내리막 | ★★★ |\n| K2 | **내리막 걷는 법** (우리 하강 데이터 활용) | ★★★ |\n| K3 | 등산스틱, 정말 필요한가 | ★★★ |\n| K4 | 무릎보호대 (⚠️ 의료기기 표현 주의) | ★★☆ |\n| K5 | 종아리·정강이 통증 | ★★☆ |\n| K6 | 아킬레스건 부위 통증 | ★★☆ |\n| K7 | 발목을 삐었을 때 | ★★☆ |\n| K8 | 무릎이 안 좋은데 갈 수 있을까 | ★★★ |\n\n> **K8이 60대 사용자의 첫 검색어일 가능성이 크다.** 겁주지도, 안심시키지도 않는다. **\"전문가와 상의하세요\"가 결론이어야 한다.**\n\n### 3.4 배낭·짐 (6)\n\n| # | 제목 | 우선 |\n|---|---|---|\n| B1 | 배낭 무게 — 체중의 10%라는 기준 | ★★★ |\n| B2 | 배낭 크기와 종류 | ★★☆ |\n| B3 | 배낭 메는 법 (어깨가 아닌 골반) | ★★★ |\n| B4 | 짐 줄이는 법 — 실제로 안 쓴 것들 | ★★★ |\n| B5 | 짐 배송을 쓸까 말까 (비용·부상 트레이드오프) | ★★★ |\n| B6 | 무게가 몸에 미치는 영향 | ★★☆ |\n\n### 3.5 체력·일정 (7)\n\n| # | 제목 | 우선 |\n|---|---|---|\n| P1 | 출발 전 체력 준비, 언제부터 | ★★★ |\n| P2 | 하루 몇 km가 적당한가 | ★★★ |\n| P3 | **초반 3일이 왜 위험한가** | ★★★ |\n| P4 | 휴식일을 넣어야 하는 이유 | ★★★ |\n| P5 | 60대·70대의 순례 | ★★★ |\n| P6 | 걷는 속도와 리듬 | ★★☆ |\n| P7 | 몸이 보내는 신호 — 언제 멈춰야 하나 | ★★★ |\n\n> **P3과 P7이 우리 일정 엔진의 근거를 설명하는 페이지다.** 여기서 제품과 콘텐츠가 이어진다.\n\n### 3.6 현지 대응 (7)\n\n| # | 제목 | 우선 |\n|---|---|---|\n| L1 | 스페인 약국 이용법 | ★★★ |\n| L2 | 병원에 가야 하는 경우 | ★★★ |\n| L3 | 상비약으로 뭘 가져가나 (⚠️ 약명 지정 금지) | ★★★ |\n| L4 | 여행자 보험 — 무엇을 봐야 하나 | ★★★ |\n| L5 | 보험금 청구 절차 | ★★☆ |\n| L6 | 물리치료사 찾기 | ★☆☆ |\n| L7 | 일정을 바꿔야 할 때 | ★★☆ |\n\n⚠️ **L3은 특히 조심한다.** \"이 약을 가져가세요\"가 아니라 **\"약사와 상의해 준비하세요\"**로 쓴다. 성분명도 우리가 지정하지 않는다.\n\n---\n\n## 4. 콘텐츠와 제품의 연결\n\n**콘텐츠가 제품으로, 제품이 콘텐츠로 이어져야 한다.**\n\n| 콘텐츠 | 연결되는 제품 |\n|---|---|\n| P2 하루 몇 km | → 일정 계산기 |\n| P3 초반 3일 | → 일정 계산기 (초반 적응 로직 설명) |\n| K1·K2 내리막 | → 구간별 하강 데이터 |\n| B1 배낭 무게 | → 배낭 무게 계산기 |\n| B5 짐 배송 | → 짐배송 비용·리스크 비교 |\n| L1 약국 | → **보여주기 카드 A1~A3** |\n| L2 병원 | → **보여주기 카드 A4** |\n| L4 보험 | → 보험 비교 (R1) |\n| S1~S9 신발 | → 장비 안내 (R2) |\n\n⚠️ **콘텐츠 안에 구매 링크를 직접 넣지 않는다.** (02 문서 4부 7.2)\n**\"일정을 계산해보세요\" → 결과 화면에서 준비물 안내** 순서로 간다.\n\n---\n\n## 5. 작성 계획\n\n### 5.1 일정\n\n| 시기 | 작업 |\n|---|---|\n| **2026.10 초~11 초** | **실측 도보 40일 — 나폴레옹 폐쇄(11/1) 전 출발** |\n| 2026.11 | **의료 자문 계약** |\n| 2026.12 | 초안 45개 (주 12개 속도) |\n| 2027.01 | **검수 및 수정** |\n| **2027.01 말** | **게시 완료 — 검색 피크 전** |\n\n⚠️ **혼자서는 어렵다.** 45개 × (작성 3시간 + 수정 1시간) = 약 180시간. **외주 또는 자문 의료진과의 공동 작성을 미리 계획한다.**\n\n### 5.2 우선순위\n\n**전부 못 쓰면 이 순서로 쓴다.**\n\n| 순위 | 묶음 | 개수 |\n|---|---|---|\n| 1 | 신발 S1~S4, S8 | 5 |\n| 2 | 물집 F1~F3, F8 | 4 |\n| 3 | 무릎 K1, K2, K8 | 3 |\n| 4 | 체력·일정 P2~P4, P7 | 4 |\n| 5 | 배낭 B1, B3, B5 | 3 |\n| 6 | 현지 L1, L2, L4 | 3 |\n| **소계 (필수)** | | **22** |\n| 7~ | 나머지 | 23 |\n\n**22개만 있어도 A축은 성립한다.**\n\n### 5.3 실측 도보에서 확인할 것\n\n```\n□ 실제로 어떤 부상이 나에게 발생했나 (일자, 부위, 강도)\n□ 다른 순례자에게 무엇이 발생했나 (관찰 + 짧은 대화)\n□ 약국에서 무엇을 권하나 (5곳 이상)\n□ 물리치료사가 길 위에 실제로 있나\n□ 병원 접근성 (어느 마을에 있나)\n□ 내 신발·양말·깔창이 실제로 어땠나\n□ 배낭 무게가 몸에 어떻게 왔나\n□ 내리막 구간에서 무릎이 실제로 어땠나 (하강 데이터 검증)\n```\n\n⚠️ **자기 몸으로 실험하지 않는다.** 아프면 쉰다. 데이터보다 몸이 먼저다.\n\n---\n\n## 6. 콘텐츠 형식\n\n### 6.1 페이지 구조\n\n```\n제목 (검색어 그대로)\n\n한 줄 요약 — 결론부터\n\n■ 왜 이런 일이 생기나\n   (원인. 검수 대상)\n\n■ 준비 단계에서 할 수 있는 것\n   (예방. 가장 중요)\n\n■ 이미 생겼다면\n   (⚠️ 자가 처치를 유도하지 않는다.\n     \"전문가에게 가는 방법\"을 알려준다)\n\n■ 언제 진료를 받아야 하나\n   ★ 모든 부상 페이지에 필수\n\n■ 관련 도구\n   (계산기, 카드 등)\n\n─────────────────\n검수: 2027년 1월 · ○○○ 전문의\n면책 고지\n```\n\n**\"언제 진료를 받아야 하나\"를 모든 페이지에 넣는다.** 이게 우리가 판단자가 아니라 통로임을 보여준다.\n\n### 6.2 이미지\n\n| 원칙 |\n|---|\n| **실측 도보 사진을 쓴다.** 스톡 이미지 금지 |\n| 상처·물집 사진은 쓰지 않는다 (혐오감, 자가 처치 유도) |\n| 도식은 직접 그린다 |\n| 신발·장비는 실제 사용한 것만 |\n\n---\n\n## 7. 지표\n\n| 지표 | 목표 | 의미 |\n|---|---|---|\n| 부상 페이지 검색 유입 | 전체의 35% | A축 진입 |\n| 평균 체류 | 90초+ | 실제로 읽는가 |\n| 계산기 연결률 | 20% | 제품으로 이어지는가 |\n| 보험 비교 도달률 | 8% | R1 |\n| 장비 안내 도달률 | 12% | R2 |\n| **\"도움이 됐나요\" 긍정률** | **80%** | **품질** |\n\n---\n\n## 8. 열린 질문\n\n| # | 질문 | 확인 |\n|---|---|---|\n| 1 | 의료 자문을 어디서 구하나 | 스포츠의학회, 지인 소개, 유료 플랫폼 |\n| 2 | 검수 비용이 예산을 넘으면 | 22개 필수분만 검수하고 나머지 보류 |\n| 3 | 검수자가 \"이 서비스 자체가 위험하다\"고 하면 | **그 의견을 존중하고 범위를 줄인다** |\n| 4 | 물집 대응(F3)을 아예 안 쓰는 게 나은가 | 검수자 판단에 따른다 |\n| 5 | 60대 대상 표현이 적절한가 | 인터뷰 대상 3명에게 초안 검토 요청 |\n\n> **3번을 진지하게 받아들인다.** 전문가가 위험하다고 하면 우리 사업 계획보다 그 판단이 우선이다.\n\n---\n\n# 4부 · 제휴 실무\n\n## 0. 왜 이게 급한가\n\n**R1(보험)이 매출의 33%다. 그런데 제휴 가능성도 규제 가능성도 확인이 안 됐다.**\n\n여기가 막히면 사업모델을 다시 짜야 한다. **인터뷰보다 먼저, 혹은 병행해서 확인한다.**\n\n| 대상 | 검증 | 우선 | 시점 |\n|---|---|---|---|\n| **보험사·GA** | H16 | 🔴 | 2026.09 |\n| 여행사 | R5·R6 | 🟠 | 2026.09 |\n| 장비 브랜드·유통 | R2 | 🟠 | 2026.10 |\n| 짐 배송 | R4 | 🟡 | 2026.11 |\n| 인쇄 (포토북) | R7 | 🟢 | 2027.03 |\n\n---\n\n## 1. 접촉 전 공통 준비\n\n### 1.1 우리를 어떻게 소개할 것인가\n\n⚠️ **\"창업 준비 중입니다\"라고 하면 대화가 끝난다.** 실체를 먼저 만든다.\n\n| 준비물 | 상태 |\n|---|---|\n| 웹사이트 (계산기 + SEO 페이지) | 접촉 전 공개 |\n| 실측 도보 계획서 1장 | 작성 |\n| 시장 자료 1장 (순례자 통계) | 01 문서에서 발췌 |\n| 명함·이메일 도메인 | 확보 |\n\n### 1.2 소개 문구 (공통)\n\n```\n산티아고 순례길을 준비하는 한국인을 위한 서비스를 만들고 있습니다.\n\n한국인 순례자는 연간 7,481명(2025년 공식 통계)이고,\n2027년은 25년 주기의 성년(Año Santo)이라 크게 늘 것으로 봅니다.\n\n이들은 평균 35일을 걷고 1인당 400만 원 안팎을 씁니다.\n그런데 준비 과정이 전부 개인의 검색에 맡겨져 있습니다.\n\n저희는 부상 예방과 숙소 확보, 두 가지를 한국어로 해결합니다.\n2026년 10월에는 800km 전 구간을 직접 걸으며 데이터를 실측할 예정입니다.\n```\n\n**핵심은 \"우리가 뭘 팔지\"가 아니라 \"이 시장이 있다\"를 먼저 보여주는 것이다.**\n\n---\n\n## 2. 🔴 보험 — 최우선\n\n### 2.1 왜 보험인가\n\n| 이유 | 설명 |\n|---|---|\n| 단가가 가장 크다 | 40일 장기 보험료 15~25만. 수수료 15~20% |\n| 니즈가 명확하다 | 40일 해외 체류 + 도보. 안 드는 사람이 드물다 |\n| 시점이 맞는다 | D-60에 결정. 우리가 그 시점을 잡고 있다 |\n| **경쟁이 없다** | 순례 특화 안내를 하는 곳이 없다 |\n\n### 2.2 접촉 대상\n\n| 유형 | 예 | 장단 |\n|---|---|---|\n| 보험사 직접 | 대형 손보사 | 브랜드, 절차 느림 |\n| **GA (법인보험대리점)** | 여행자보험 전문 | **실무 빠름. 우선 접촉** |\n| 여행자보험 비교 플랫폼 | | 제휴 구조가 이미 있음 |\n\n**3곳 이상 접촉한다.** 한 곳만 보면 조건을 비교할 수 없다.\n\n### 2.3 이메일 초안\n\n```\n제목: 산티아고 순례길 준비자 대상 여행자보험 제휴 문의\n\n안녕하세요.\n산티아고 순례길을 준비하는 한국인을 위한 서비스를 준비 중인 ○○○입니다.\n\n■ 배경\n- 한국인 순례자 연 7,481명 (2025년, 산티아고 순례자 사무소 공식 통계)\n- 2027년은 25년 주기 성년으로 큰 폭 증가 예상\n- 평균 체류 35일. 40일 이상 장기 여행자보험 수요\n\n■ 저희 서비스\n출국 90일 전부터 일정 설계와 준비를 돕는 웹 서비스입니다.\n현재 [URL]에서 무료 도구를 운영 중입니다.\n\n■ 문의드리고 싶은 것\n1. 장기 도보 여행 특성을 반영한 상품이 있는지\n2. 온라인 채널 제휴 구조와 조건\n3. 제휴 시 저희 역할의 법적 범위\n\n특히 3번을 중요하게 보고 있습니다.\n보험 모집 규제상 저희가 할 수 있는 범위를 정확히 알고 싶습니다.\n\n편하신 때에 짧게 통화할 수 있을까요.\n```\n\n⚠️ **3번을 먼저 묻는 것이 중요하다.** 나중에 알면 늦는다. 그리고 규제를 아는 파트너로 보인다.\n\n### 2.4 통화 시 물어볼 것\n\n```\n[상품]\n1. 40일 이상 장기 여행자보험 상품이 있나요?\n2. 도보·트레킹이 담보에 포함되나요? 제외되나요?\n   ★ 이게 핵심이다. 위험 스포츠로 분류되면 보장이 안 될 수 있다\n3. 기왕증(무릎 관절 등)이 있으면 어떻게 되나요?\n   ★ 60대 사용자가 많다\n4. 현지 병원 이용 시 절차는? 캐시리스 되나요?\n5. 보험금 청구에 필요한 서류는? (→ 카드 A8 설계에 반영)\n\n[제휴]\n6. 온라인 채널 제휴를 받으시나요?\n7. 수수료 체계가 어떻게 되나요?\n8. 저희가 할 수 있는 것과 못 하는 것의 경계는?\n   - 상품 비교표 게시는?\n   - 링크 연결은?\n   - 가입 절차 진행은?\n9. 광고 심의가 필요한 범위는?\n\n[규모]\n10. 유사 제휴 사례가 있나요? 전환율은 어느 정도인가요?\n```\n\n### 2.5 판단 기준\n\n| 결과 | 판단 |\n|---|---|\n| 3곳 중 2곳 이상이 제휴 가능 + 수수료 10% 이상 | **R1 유효.** 재무 추정 유지 |\n| 1곳만 가능 | 단가 하향 후 재계산 |\n| 제휴는 되나 **도보가 담보 제외** | **상품 자체가 부적합.** 다른 상품 탐색 |\n| 규제상 링크 연결도 불가 | **R1 삭제.** 정보 제공만 (수익 0) |\n\n⚠️ **\"도보가 담보에서 제외된다\"가 나오면 이건 제휴 문제가 아니라 사용자 안전 문제다.** 그 사실 자체를 콘텐츠로 알려야 한다.\n\n---\n\n## 3. 여행사\n\n### 3.1 두 가지 관계\n\n| 관계 | 내용 | 문서 |\n|---|---|---|\n| **R6 송객** | 자유여행이 부담스러운 사용자를 보낸다 | 02 |\n| **R5 화이트라벨** | 우리가 기획, 여행사가 판매 | 02 4.3 |\n\n**첫 접촉에서는 R6만 이야기한다.** R5는 신뢰가 쌓인 뒤에.\n\n### 3.2 이메일 초안\n\n```\n제목: 산티아고 순례길 상품 관련 협업 문의\n\n안녕하세요.\n산티아고 순례길 준비자를 위한 웹 서비스를 운영 중인 ○○○입니다.\n\n저희 서비스는 자유여행으로 준비하는 분들이 주로 이용하시는데,\n준비 과정에서 \"혼자는 어렵겠다\"고 판단하시는 분들이 있습니다.\n\n그런 분들께 적합한 상품을 안내드리고 싶어 연락드립니다.\n\n■ 문의\n1. 온라인 채널을 통한 송객을 받으시나요?\n2. 수수료 체계가 어떻게 되나요?\n3. 어떤 형태의 안내가 도움이 될까요?\n\n짧게 통화할 수 있을까요.\n```\n\n### 3.3 통화 시 물어볼 것\n\n```\n[송객]\n1. 온라인 송객을 받으시나요? 수수료 체계는?\n2. 정률인가요 정액인가요? 성과 기준이 있나요?\n3. 예약 확정 기준인가요, 출발 기준인가요?\n\n[시장 정보] ← 여기가 진짜 목적이다\n4. 연간 카미노 상품 판매 규모가 어느 정도인가요?\n5. 고객이 주로 어디서 오시나요?\n6. ★ 자유여행 준비하다 패키지로 돌아서는 분이 있나요? 왜요?\n7. 고객 연령대는요?\n8. 어떤 문의가 가장 많나요?\n9. 취소·중도 이탈은 얼마나 되나요?\n\n[화이트라벨 — 2차 접촉에서]\n10. 숙소 예약만 대행하는 상품도 가능한가요?\n11. 저희가 일정을 설계하고 실행만 맡기는 구조는 어떠세요?\n```\n\n> **6번과 8번이 우리 상품 설계의 원료다.** 수수료율보다 이게 더 값지다.\n\n### 3.4 협상 포인트\n\n| 우리가 줄 수 있는 것 | 받아야 할 것 |\n|---|---|\n| 검증된 리드 (이미 준비 중인 사람) | 수수료 5% 이상 |\n| 일정 설계 데이터 | 전환 데이터 공유 |\n| 콘텐츠 노출 | 독점 요구 거절 |\n\n⚠️ **독점 계약을 하지 않는다.** 한 곳에 묶이면 협상력이 사라진다.\n\n---\n\n## 4. 장비 — 신발 중심\n\n### 4.1 왜 신발인가\n\n**물집은 가장 흔한 부상이고, 신발이 최대 변수다.** 그리고 25만 원짜리 물건이다.\n\n| 품목 | 단가 | 수수료 | 인당 |\n|---|---|---|---|\n| **등산화·트레킹화** | 20~30만 | 5~8% | 1~2.4만 |\n| 깔창 | 5~10만 | 6~10% | 0.3~1만 |\n| 등산스틱 | 8~15만 | 6~10% | 0.5~1.5만 |\n| 양말 (3~4켤레) | 6~12만 | 8~15% | 0.5~1.8만 |\n| 배낭 | 20~40만 | 5~8% | 1~3.2만 |\n\n### 4.2 접촉 대상\n\n| 유형 | 장단 |\n|---|---|\n| 브랜드 본사 | 단가 좋음, 절차 느림, 품목 제한 |\n| **아웃도어 유통** | **품목 다양, 빠름. 우선** |\n| 제휴 마케팅 플랫폼 | 즉시 시작 가능, 수수료 낮음 |\n\n### 4.3 우리만의 제안\n\n**단순 링크가 아니라 \"순례 특화 큐레이션\"을 제안한다.**\n\n```\n■ 저희가 드릴 수 있는 것\n- 출국 D-60 시점의 구매 수요 (신발 길들이기 기간)\n- 개인별 일정 데이터 기반 추천\n  (35일 800km / 20일 300km에 따라 필요한 장비가 다릅니다)\n- 순례 특화 콘텐츠에서의 자연스러운 노출\n\n■ 요청\n- 제휴 수수료\n- 순례자 대상 기획전 또는 할인 코드\n- 사이즈 교환 편의 (발 크기 관련 문의가 많습니다)\n```\n\n⚠️ **\"할인 코드\"가 수수료보다 사용자에게 가치가 클 수 있다.** 우리 신뢰도 올라간다.\n\n### 4.4 하지 않을 것\n\n| 금지 | 이유 |\n|---|---|\n| 브랜드 지정 추천 | 신뢰 훼손. **기준을 알려주고 선택은 사용자가** |\n| 부상 콘텐츠 안에 구매 링크 | **정보와 상품의 분리** (02 문서 4부 7.2) |\n| \"이거 안 사면 다칩니다\" | 공포 마케팅 |\n\n---\n\n## 5. 짐 배송\n\n### 5.1 대상\n\n| 사업자 | 특징 |\n|---|---|\n| Correos (스페인 우체국) | **PAQ PEREGRINO** 공식 서비스. 한국어 안내 있음 |\n| 사설 배송업체 | 구간별 다수 존재 |\n\n### 5.2 확인할 것\n\n```\n1. 온라인 사전 접수가 가능한가?\n2. 한국에서 미리 결제할 수 있나?\n3. 제휴·수수료 구조가 있나?\n4. 구간별 부분 이용이 가능한가? (전 구간이 아니라)\n   ★ \"오르막 3구간만\" 제안의 전제\n5. 공립 알베르게 수령 불가 문제를 어떻게 안내하나?\n6. 분실·파손 시 절차는?\n```\n\n⚠️ **4번이 핵심이다.** 부분 이용이 안 되면 F-05 계산기의 \"오르막만\" 옵션이 성립하지 않는다.\n\n---\n\n## 6. 인쇄 (완주 보상)\n\n**Phase 4 항목이지만 미리 견적을 받아둔다.**\n\n| 품목 | 확인 |\n|---|---|\n| 포토북 (20~40p) | 소량 인쇄 단가, API 연동 가능 여부 |\n| 완주 지도 포스터 (A2~A1) | 단가, 배송 |\n| 명함형 의료 카드 | 소량 |\n\n**국내 POD 업체 3곳 견적.** API로 자동 주문이 가능한 곳을 우선한다.\n\n---\n\n## 7. 접촉 관리\n\n### 7.1 기록 양식\n\n```\n회사:\n담당자:\n접촉일:\n채널: 이메일 / 전화 / 미팅\n─────────────────────\n핵심 답변:\n  수수료:\n  규제 관련:\n  전환율 사례:\n─────────────────────\n우리에게 유리한 점:\n걸림돌:\n다음 액션:\n재연락 예정일:\n```\n\n### 7.2 원칙\n\n| 원칙 | 이유 |\n|---|---|\n| **3곳 이상 접촉** | 비교 없이 협상 못 한다 |\n| **조건을 먼저 말하지 않는다** | 상대의 기준을 먼저 듣는다 |\n| **독점 계약 거절** | 협상력 상실 |\n| **구두 합의는 이메일로 남긴다** | |\n| **거절도 기록한다** | 이유가 시장 정보다 |\n| 계약은 법률 검토 후 | 02 문서 4부 |\n\n### 7.3 첫 미팅에서 하지 말 것\n\n| 금지 | 이유 |\n|---|---|\n| 매출 목표를 부풀려 말하기 | 나중에 신뢰를 잃는다 |\n| \"곧 크게 될 겁니다\" | 근거가 없다 |\n| 우리 수수료 요구를 먼저 꺼내기 | 상대 기준을 먼저 듣는다 |\n| 다른 회사 이름 흘리기 | 업계는 좁다 |\n\n> **정직하게 말한다. \"지금은 검증 단계이고, 2027년 성년 시즌을 목표로 합니다.\"**\n> 이게 오히려 진지하게 받아들여진다.\n\n---\n\n## 8. 90일 접촉 일정\n\n| 주차 | 대상 | 목표 |\n|---|---|---|\n| 1 | 웹사이트 공개, 소개 자료 준비 | 실체 확보 |\n| 2~3 | **보험 GA 3곳 이메일** | 회신 확보 |\n| 3~4 | **보험 통화 3건** | H16 판단 |\n| 4~5 | 여행사 3곳 이메일 | |\n| 5~6 | 여행사 통화 3건 | 시장 정보 |\n| 7~8 | 장비 유통 2곳 | 조건 확인 |\n| 9~10 | Correos 문의 | 부분 이용 가능 여부 |\n| 11~12 | 정리 → **게이트 2 판단** | 수익 모델 확정 |\n\n---\n\n## 9. 게이트 2 판단표 (2026년 10월)\n\n| 항목 | 통과 | 결과 |\n|---|---|---|\n| 보험 제휴 가능 + 수수료 10%+ | 3곳 중 2곳 | R1 유지 |\n| 도보 담보 포함 상품 존재 | 1곳 이상 | R1 유지 |\n| 여행사 송객 수수료 5%+ | 3곳 중 2곳 | R6 유지 |\n| 장비 제휴 가능 | 2곳 중 1곳 | R2 유지 |\n| 짐배송 부분 이용 가능 | 확인 | F-05 유지 |\n\n**R1이 불통과하면 02 문서 3부 시나리오 B로 이동한다.**\n\n---\n\n# 5부 · 런칭과 운영\n\n## 5. 2027 성년 시즌 대응\n\n### 5.1 왜 이 시즌이 전부인가\n\n**2027년은 성년(Año Santo Xacobeo)이다.** 직전 성년 2010년은 전년 대비 85% 급증했다. **다음 성년은 2032년.**\n\n> **이 창은 5년에 한 번 열린다.**\n\n### 5.2 순례 시즌 달력\n\n| 시기 | 순례자 | 우리 활동 |\n|---|---|---|\n| 12~2월 | 최저 (많은 알베르게 폐쇄) | **다음 시즌 준비. 데이터 갱신** |\n| **3~4월** | 증가. 부활절 급증 | 출발자 지원 시작 |\n| **5~6월** | **최성수기** | **최대 부하** |\n| 7~8월 | 많으나 더위로 감소 | 유지 |\n| **9~10월** | **2차 성수기** | **최대 부하** |\n| 11월 | 급감 | 시즌 회고 |\n\n**준비 검색은 여정 3개월 전에 몰린다. 즉 1~3월과 6~7월이 검색 피크다.**\n\n### 5.3 런칭 일정 (역산)\n\n| 시점 | 할 일 |\n|---|---|\n| 2026.08 | 인터뷰 20명 |\n| 2026.09 | 웹 공개 → **4주 트래픽 실험** / **보험사 접촉** |\n| **2026.10 초~11 초** | **실측 도보 40일** — 10월 초 출발 필수 |\n| 2026.12 | 데이터 반영 — **갈림길 11곳 · 랜드마크 19곳 · 숙소 120곳** |\n| 2026.12 | **부상 가이드 45개 (의료 검수 포함)** |\n| **2027.01** | **검색 피크 진입. 콘텐츠 완비 상태여야 한다** |\n| 2027.02 | 제휴 연결 (보험·장비) |\n| 2027.03 | 앱 베타 (봄 출발자 100명) |\n| **2027.04** | **앱 정식 출시** |\n| 2027.05~06 | **최성수기 대응** |\n| 2027.06 | **게이트 4 — 전업 판단** |\n\n⚠️ **2027년 1월에 콘텐츠가 완비돼 있어야 한다.** 4월에 앱을 내도 콘텐츠가 없으면 아무도 안 온다.\n\n---\n\n## 6. 운영 계획\n\n### 6.1 데이터 갱신 주기\n\n**데이터가 낡으면 사람이 한데서 잔다.**\n\n| 데이터 | 주기 | 방법 |\n|---|---|---|\n| 알베르게 요금 | 연 1회 (1~2월) | 시즌 전 일괄 확인 |\n| **개방 기간** | **연 2회 (2월, 10월)** | **폐쇄 직전·개방 직전** |\n| 예약 가능 여부 | 연 1회 + 정책 변경 시 | 뉴스 모니터링 |\n| 건조기·시설 | 실측 시 | 2년 주기 |\n| 마을 서비스 | 제보 + 실측 | 상시 |\n| 경로·고도 | 2년 | GPX 재생성 |\n| **갈림길 계절 폐쇄** | **연 1회 (2월)** | **나폴레옹 개방일 등. 생장 순례자 사무소** |\n| **접근 교통 시각·요금** | **연 2회 (3월·9월)** | **철도·버스 시각표는 계절마다 바뀐다** |\n| 콤포스텔라 요건 | 연 1회 | **2025년에 바뀌었다.** 순례자 사무소 |\n| 이중 순례자 요건 | 연 1회 | 공식 사이트 |\n| **보여주기 카드 문안** | 연 1회 | 현지 검수 |\n\n**모든 항목에 `verifiedAt`을 표시한다.**\n\n### 6.2 CS 설계\n\n| 유형 | 예상 비중 | 대응 |\n|---|---|---|\n| 사용법 | 40% | FAQ + 도구 내 안내 |\n| 데이터 오류 제보 | 25% | **제보 폼. 채택 시 사후 상품 무료** |\n| 일정 상담 | 20% | FAQ. **개별 상담은 하지 않는다** |\n| **갈림길 문의** | **5%** | **가이드 11페이지로 대응. 안전 판단은 현지 사무소 안내** |\n| 제휴 문의 | 10% | 이메일 |\n| **의료 관련** | 5% | **⚠️ 절대 답하지 않는다** |\n\n#### ⚠️ CS 매뉴얼 1번 — 의료 문의\n\n**\"무릎이 아픈데 걸어도 되나요?\" 에 답하지 않는다.**\n\n- 진단·판단을 하지 않는다\n- 현지 의료기관 정보와 보험 청구 절차만 안내\n- 응급이면 112(스페인) 안내\n\n### 6.3 성수기 운영\n\n| 항목 | 대응 |\n|---|---|\n| 서버 | 트래픽 3~5배. 사전 스케일 |\n| CS 응답 | 24시간 내 (시차 감안) |\n| 데이터 제보 | 성수기에 가장 많다. 처리 큐 |\n| 모니터링 | **만실 제보 급증 = 혼잡 모델 보정 신호** |\n\n### 6.4 시즌 회고 (매년 11월)\n\n| 확인 | 산출 |\n|---|---|\n| 순례자 사무소 통계 vs 우리 사용자 | **도달률 실측** |\n| 제휴 전환율 | 수익 모델 보정 |\n| 데이터 오류 제보 집계 | 실측 우선순위 |\n| CS 문의 유형 | 다음 시즌 FAQ |\n| 검색어 변화 | 콘텐츠 계획 |\n| **카드 응답률** | 보여주기 카드 개선 |\n\n---\n\n## 7. 조직과 시간\n\n**Phase 0~1은 1~2인이다. 시간이 가장 부족한 자원이다.**\n\n| 시기 | 주당 투입 | 주 활동 |\n|---|---|---|\n| 2026.08 | 10시간 | 인터뷰 |\n| 2026.09 | 20시간 | 웹 개발 + 제휴 조사 |\n| 2026.10 초~11 초 | **전일** | 실측 도보 |\n| 2026.12~2027.02 | 20시간 | 콘텐츠 작성 |\n| 2027.03~06 | 30시간 | 앱 + 성수기 대응 |\n\n⚠️ **2026년 12월~2027년 2월에 부상 가이드 45개를 쓰는 게 가장 큰 부하다.** 의료 검수까지 포함하면 혼자서는 어렵다. **외주 또는 자문 의료진과의 공동 작성을 미리 계획한다.**\n\n---\n\n## 8. 다음 90일\n\n| 주차 | 할 일 |\n|---|---|\n| 1~2 | 카페 운영진·협회 접촉, **인터뷰 파일럿 1명** |\n| 3~5 | 인터뷰 20명 |\n| **4~6** | **보험사·GA 3곳 접촉 (H16)** |\n| 4~6 | 여행사 3곳 접촉 |\n| 6~8 | 웹 계산기 + SEO 170페이지 |\n| 8~12 | **4주 트래픽 실험** |\n| 10~12 | 실측 도보 준비 (항공, 장비, **카드 초안 23장 인쇄**) |\n\n**보험사 접촉을 인터뷰와 병행한다.** H16이 무너지면 사업모델을 다시 짜야 하므로 빨리 알아야 한다."}, {"file": "05_검증계획.md", "title": "검증 계획", "sub": "가설 27개 · 인터뷰 · 게이트", "md": "# 05 · 검증 계획\n\n> 우리가 맞는지 어떻게 확인할 것인가\n> v1.1 · 2026년 7월\n\n---\n\n## 0. 왜 이 문서가 필요한가\n\n01~05 문서는 **무엇을 만들 것인가**로 채워져 있다. 그런데 그 근거의 상당수가 우리가 만든 숫자다.\n\n01 문서 2부 2.6절의 등급 D·E 항목을 다시 보면:\n\n- 페르소나 비율 30/40/20/10 — **창작**\n- 도달률 목표 30/60/85% — **목표이지 예측이 아님**\n- ARPU 3만 원, 수수료율 5~10% — **근거 없음**\n- 임계값 전부 (상승 600m, 하강 500m, 28km, 침대 30개) — **임의 설정**\n- `injuryRiskScore` 공식 — **의학적 근거 전무**\n- 애로사항 ①~⑪ 전체 — **2차 자료 기반 가설**\n\n**이 문서는 위 항목들을 사실로 바꾸는 계획이다.**\n\n그리고 순서가 중요하다. **인터뷰를 먼저 하고, 그 결과로 실측 도보에서 무엇을 볼지 정한다.** 반대로 하면 40일을 걷고 와서 \"그걸 안 봤네\"가 된다.\n\n---\n\n## 1. 검증할 가설 전수\n\n각 가설이 틀렸을 때 무엇이 무너지는지를 함께 적는다. **무너지는 게 클수록 먼저 검증한다.**\n\n| # | 가설 | 틀리면 무너지는 것 | 방법 | 우선 |\n|---|---|---|---|---|\n| H1 | **어느 날을 예약할지 판단이 어렵다** (v3.1 수정) | **B축 전체.** 예약이 쉬우면 우리 역할이 없다 | 인터뷰 | 🔴 |\n| H2 | 순례자는 걷는 중 휴대폰을 자주 본다 | **앱 자체.** 안 보면 현장 기능이 다 헛것 | 인터뷰 | 🔴 |\n| H3 | 부상·중도 포기가 실제로 흔하다 | 부상 회피 엔진의 존재 이유 | 인터뷰 | 🔴 |\n| H4 | 출국 전 정보 탐색에 공백이 있다 | **준비 단계 장악 전략** | 인터뷰 | 🔴 |\n| H5 | 검색으로 우리를 찾는다 | **도달률 전략 전체** (SEO 60%) | 트래픽 실험 | 🔴 |\n| H6 | 여행사가 송객 수수료를 준다 | **수익 모델의 절반** | 제휴 조사 | 🔴 |\n| H7 | 기존 앱 침투율이 낮다 | 진입 공간의 존재 | 인터뷰 | 🟠 |\n| H8 | 언어 장벽이 예약을 막는다 | F-04 예약 스크립트 | 인터뷰 | 🟠 |\n| H9 | 완주 보상에 지불 의사가 있다 | 포토북 등 R5 매출 | 인터뷰 | 🟠 |\n| H10 | 이중 순례자를 모른다 | 확장 전략의 진입점 | 인터뷰 | 🟠 |\n| H11 | 60대가 실제로 앱을 쓴다 | 페르소나 A 전체 | 인터뷰 | 🟠 |\n| H12 | 알베르게 정보가 실제로 부정확하다 | 데이터 구축의 가치 | **실측 도보** | 🟡 |\n| H13 | 건조기 정보가 실제로 필요하다 | `hasDryer` 필드 | 인터뷰 + 실측 | 🟡 |\n| H14 | 짐 배송이 부상을 줄인다 | F-05 계산기 | 실측 + 문헌 | 🟡 |\n| H15 | 임계값이 적절하다 (600m/500m/28km) | 일정 엔진의 정확도 | 실측 도보 | 🟡 |\n| **H16** | **여행자 보험 제휴가 가능하다** | **최대 수익원. 매출의 3분의 1** | 보험사 접촉 | 🔴 |\n| H17 | 출발 전 신발을 새로 산다 | R2 장비 커머스 | 인터뷰 | 🟠 |\n| H18 | 화이트라벨 구조가 규제상 가능하다 | R5 반패키지 | 법률 자문 | 🟠 |\n| H19 | 필요한 날만 예약하는 방식을 원한다 | **B축 재정의의 전제** | 인터뷰 | 🔴 |\n| **H21** | **전 구간 예약은 자유를 잃어 불만이 생긴다** | **B축 \"판단\" 가치의 근거** | 인터뷰 | 🔴 |\n| **H22** | **예약 안 한 날 실제로 곤란했던 경험이 있다** | B축 존재 자체 | 인터뷰 | 🔴 |\n| **H23** | **패키지 구매자의 다수가 \"불안\"이 이유다** | **R5 전체. 최대 단일 기회** | 인터뷰 | 🔴 |\n| **H24** | **가족 안심 기능에 지불 의사가 있다** | 가족 안심 세트 | 인터뷰 | 🔴 |\n| H25 | 패키지 이용자가 알베르게 경험을 아쉬워한다 | 전환 메시지 | 인터뷰 | 🟠 |\n| H26 | 여행사가 화이트라벨 실행을 받아들인다 | 대행형 상품 | 여행사 접촉 | 🔴 |\n| H27 | 20~50만 원 가격대가 수용된다 | 상품 가격 | 인터뷰 | 🟠 |\n| **H28** | **일회용 필름 카메라에 수요가 있다** | R7 완주 실물 세트 | 인터뷰 | 🟡 |\n| **H29** | **안개 지도가 60대에게 부담이 아니다** | **소유욕 설계 전체** | 인터뷰 + 실측 | 🟠 |\n| H30 | 「내 돌」 기록이 부담스럽지 않다 | 애착 장치 | 인터뷰 | 🟡 |\n| **H31** | **기존 도구로 충분하다고 느끼는가** | **차별점 존재 여부** | 인터뷰 | 🔴 |\n| **H32** | **순례자가 갈림길에서 실제로 고민한다** | **F-19 갈림길 추천** | 인터뷰 | 🟠 |\n| H33 | 계획이 어긋났을 때 대안을 찾기 어려웠다 | F-21 Plan B | 인터뷰 | 🟠 |\n| H34 | 예산 관리 도구에 수요가 있다 | F-23 예산 | 인터뷰 | 🟡 |\n| H35 | 일자별 상세 일정이 실제로 쓰인다 | F-20 | 인터뷰 + 베타 | 🟠 |\n| H36 | 매일 체크리스트가 부담이 아니다 | F-22 | 베타 | 🟡 |\n| **H37** | **시작점까지 가는 것이 준비의 큰 부담이다** | **F-24 접근 교통** | 인터뷰 | 🟠 |\n| H38 | 여정 중 버스·택시를 실제로 쓴다 | F-21 이동수단 | 인터뷰 | 🟠 |\n| **H20** | **상대가 내 폰을 만져도 꺼리지 않는다** | **보여주기 카드 전체** | **실측 도보** | 🔴 |\n\n---\n\n## 2. 검증 활동 세 가지\n\n| 활동 | 시기 | 비용 | 검증 대상 |\n|---|---|---|---|\n| **A. 인터뷰 20명** | 2026.08 | 약 60만 | H1~H4, H7~H11, H13 |\n| **B. 웹 트래픽 실험 4주** | 2026.09~10 | 약 30만 | H5 |\n| **C. 실측 도보 40일** | **2026.10 초~11 초** | 약 800만 | H12~H15 + 데이터 구축 |\n| — 제휴 조사 | 2026.09 | 0 | H6 |\n\n**순서를 바꾸지 않는다.** A의 결과가 C에서 무엇을 볼지 결정한다.\n\n---\n\n## 3. A · 인터뷰 설계\n\n### 3.1 대상 20명\n\n| 구분 | 인원 | 왜 |\n|---|---|---|\n| 완주자 (2년 내) | 8 | 전체 여정 경험 |\n| **중도 포기자** | **5** | **가장 중요. 완주자만 보면 생존자 편향** |\n| 출발 예정자 (D-90 이내) | 4 | 준비 단계의 실제 공백 |\n| 60대 이상 완주자 | 3 | 페르소나 A 검증 |\n| **패키지 이용 완주자** | **3** | **H23·H25. 최대 단일 기회** |\n| **패키지 검토했으나 자유여행 선택** | **2** | **H23. 왜 안 샀나** |\n\n**총 25명** (60대 3명은 다른 구분과 겹쳐도 됨)\n\n**60대 3명은 위 구분과 겹쳐도 된다.** 다만 반드시 포함한다.\n\n### 3.2 모집\n\n| 경로 | 방법 | 주의 |\n|---|---|---|\n| 네이버 카페 | 운영진에 사전 문의 후 공지 | **무단 모집 글은 강퇴 사유.** 반드시 허락받는다 |\n| 순례자 협회 | 협력 요청 | 데이터 제휴 논의와 함께 |\n| 브런치·블로그 후기 작성자 | 개별 연락 | 정중하게. 거절 시 재요청 안 함 |\n| 지인 소개 | 눈덩이 표집 | 편향 주의. 3명 이하로 |\n\n**사례**: 3만 원 상당 (커피 기프티콘 또는 도서). 미리 명시한다.\n\n### 3.3 ⚠️ 중도 포기자 인터뷰 주의\n\n**이 사람들에게 순례 중단은 실패의 기억일 수 있다.**\n\n- 모집 공고에 \"실패\", \"포기\" 같은 단어를 쓰지 않는다 → **\"계획과 다르게 마무리하신 분\"**\n- 왜 못 걸었는지 캐묻지 않는다. 본인이 말하는 만큼만 듣는다\n- 부상·건강 이야기가 나와도 진단하거나 조언하지 않는다\n- 힘들어하면 **바로 중단한다.** 데이터보다 사람이 먼저다\n\n### 3.4 진행 방식\n\n- 1인 **45분** (패키지 관련 질문 해당자는 55분), 화상 또는 전화\n- **녹음은 반드시 사전 동의.** 거절해도 진행한다\n- 반구조화. 아래 질문지는 순서를 지킬 필요 없다\n- **한 명이 진행하고 한 명이 기록**하면 좋지만, 혼자면 녹음에 의존\n\n### 3.5 인터뷰 기법 — 이걸 지켜야 데이터가 쓸모 있다\n\n| 원칙 | 나쁜 질문 | 좋은 질문 |\n|---|---|---|\n| **과거 행동을 묻는다** | \"이런 앱 있으면 쓰시겠어요?\" | \"그때 어떻게 하셨어요?\" |\n| **유도하지 않는다** | \"침대 못 구할까 봐 불안하셨죠?\" | \"하루 중 언제가 제일 신경 쓰였어요?\" |\n| **구체를 캔다** | \"불편한 게 있었나요?\" | \"가장 최근에 그랬던 게 언제예요?\" |\n| **침묵을 견딘다** | 바로 다음 질문 | 3초 기다린다. 진짜 답은 그 다음에 나온다 |\n| **제품을 설명하지 않는다** | \"저희가 이런 걸 만드는데…\" | 아무 말도 하지 않는다 |\n\n> **\"쓰시겠어요?\"에 대한 대답은 전부 거짓말이다.** 사람들은 예의상 그렇다고 한다.\n> 오직 **과거에 실제로 한 행동**만 데이터다.\n\n### 3.6 질문지\n\n#### 도입 (5분)\n\n```\n1. 언제, 어느 구간을 걸으셨어요?\n2. 왜 카미노였어요?\n   (→ 캐지 말 것. 대답이 짧으면 넘어간다)\n3. 혼자 가셨어요, 같이 가셨어요?\n```\n\n#### 하루의 흐름 — H1, H2 검증 (12분)\n\n```\n4. 걷던 중 하루를 아침부터 저녁까지 그대로 얘기해주실 수 있을까요?\n   몇 시에 일어나서 뭘 하셨는지.\n   ★ 이 질문이 인터뷰의 핵심이다. 충분히 시간을 준다.\n\n5. (기상 시각이 이르면) 왜 그 시간에 일어나셨어요?\n   ★ H1: \"침대\" 이야기가 나오는지 본다. 우리가 먼저 꺼내지 않는다.\n\n6. 하루 중 제일 신경 쓰였던 게 뭐예요?\n\n7. 오늘 어디서 잘지는 언제 정하셨어요?\n   - 전날 밤? 아침? 걷다가?\n   - 정해놓고 걸으신 적과 안 정하고 걸으신 적, 어느 쪽이 많았어요?\n\n8. 침대를 못 구하신 적 있어요?\n   - (있으면) 몇 번이나? 그때 어떻게 하셨어요?\n   - (없으면) 못 구할까 봐 걱정은 하셨어요?\n   ★ H1의 핵심. \"걱정은 했지만 실제로는 없었다\"가 많이 나오면\n     베드 레이스는 실재가 아니라 공포다 → 우리 가설이 맞다.\n\n9. 걷는 동안 휴대폰을 몇 번쯤 꺼내셨어요? 주로 언제, 뭘 보려고?\n   ★ H2. 여기서 \"거의 안 봤다\"가 다수면 앱 전략을 재검토해야 한다.\n```\n\n#### 몸 — H3 검증 (7분)\n\n```\n10. 몸이 힘들었던 날이 있었어요? 언제, 어디가?\n11. 그때 어떻게 하셨어요?\n12. 일정을 바꾸신 적 있어요? 쉬거나, 버스를 타거나.\n13. (중도 포기자에게) 어디까지 걸으셨어요?\n    ★ 이유를 먼저 묻지 않는다. 본인이 말하면 듣는다.\n```\n\n#### 준비 — H4 검증 (7분)\n\n```\n14. 가기 전에 정보를 어디서 얻으셨어요?\n15. 준비하면서 제일 답답했던 게 뭐예요?\n16. 일정은 어떻게 짜셨어요? 뭘 보고?\n17. 지금 다시 간다면 준비를 뭘 다르게 하시겠어요?\n```\n\n#### 도구 — H7, H8 검증 (5분)\n\n```\n18. 앱이나 웹사이트 쓰신 거 있어요?\n    - (있으면) 어떤 거요? 뭘 할 때 쓰셨어요?\n    - (없으면) 특별한 이유가 있으세요?\n    ★ H7. Buen Camino 같은 이름이 안 나오면 침투율이 낮은 것.\n\n19. 스페인어 때문에 곤란했던 적 있어요? 언제요?\n20. 숙소에 전화를 걸어보신 적 있어요?\n    - (없으면) 왜 안 하셨어요?\n    ★ H8. \"말이 안 통해서\"가 나오면 F-04의 근거가 된다.\n21. 짐 배송(동키) 쓰셨어요? 왜 쓰셨어요 / 왜 안 쓰셨어요?\n\n22. 가기 전에 신발 새로 사셨어요? 언제쯤요?\n    ★ H17. R2 장비 커머스의 전제.\n\n23. 여행자 보험 드셨어요? 어디서 알아보셨어요?\n    - 보험금 청구해보신 적 있어요?\n    ★ H16 보조. 실제 니즈를 본다.\n\n24. 숙소를 미리 잡고 가신 날이 있어요? 며칠쯤요?\n    - 전부 잡을까 생각해보신 적은요?\n    - 왜 그렇게 하셨어요?\n    ★ H19. \"필요한 날만\" 이라는 우리 설계의 전제.\n\n25. (예약을 하셨다면) 예약 때문에 불편한 적은 없었어요?\n    - 더 걷고 싶은데 못 걸었거나, 쉬고 싶은데 가야 했거나\n    ★ ★ 이게 v3.1 B축 재정의의 핵심 근거다.\n      \"예약을 다 하면 자유가 없다\"가 실재하는 문제인지 확인.\n\n26. 예약을 안 한 날, 실제로 어땠어요?\n    - 몇 시에 도착하셨어요? 자리가 있었나요?\n    ★ 예약 유무에 따른 실제 경험 차이.\n```\n\n#### 패키지 관련 — H23~H27 (해당자에게만, 8분)\n\n```\n[패키지 이용자에게]\n27. 왜 패키지를 고르셨어요?\n    ★ H23. \"불안\"이 나오는지 본다. 우리가 먼저 꺼내지 않는다.\n28. 얼마 내셨어요? 아깝다고 느낀 게 있어요?\n29. 알베르게에서 못 주무신 게 아쉽진 않으셨어요?\n    ★ H25. 전환 메시지의 핵심.\n30. 다시 간다면 어떻게 하시겠어요?\n31. 준비만 대신 해주고 걷는 건 자유로운 상품이 있다면요?\n    ★ H27. 가격을 먼저 말하지 말고 반응을 본다.\n\n[패키지를 검토했다 안 산 사람에게]\n32. 왜 안 사셨어요?\n33. 대신 어떻게 준비하셨어요?\n34. 가장 불안했던 건 뭐예요?\n\n[보상·도구 — H28~H31]\n37. 다 걷고 나서 남기고 싶었던 게 있어요? 물건이든 기록이든.\n38. 사진은 뭘로 찍으셨어요? 필름 카메라 생각해보신 적은요?\n    ★ H28.\n39. 걸으면서 \"여기는 꼭 기억하고 싶다\" 싶은 장소가 있었어요?\n    ★ 안개 지도 스팟 선정의 근거.\n40. 지도 앱에서 걸은 만큼 지도가 열리는 기능이 있다면 어떠셨을까요?\n    - 재밌을 것 같으세요, 아니면 번거로울 것 같으세요?\n    ★ H29. 특히 60대 응답을 본다.\n41. 생장까지 어떻게 가셨어요? 그건 어떻게 알아보셨어요?\n    - 헤매거나 고생하신 부분이 있어요?\n    ★ H37. 준비의 첫 관문.\n42. 걷는 중에 버스나 택시를 타신 적 있어요? 왜요?\n    ★ H38. 이걸 예외로 보지 않기 위한 근거.\n43. 걷다가 길이 두 갈래로 갈라지는 곳이 있었죠. 어떻게 정하셨어요?\n    - 미리 정하고 가셨어요, 그 자리에서 정하셨어요?\n    - 나중에 후회하신 적은요?\n    ★ H32.\n42. 계획대로 안 된 날이 있었어요? 그때 어떻게 하셨어요?\n    ★ H33. Plan B의 근거.\n43. 돈 관리는 어떻게 하셨어요? 예산을 정해두셨나요?\n    ★ H34.\n44. 쓰셨던 앱이나 웹에서 아쉬웠던 게 있어요?\n    - 없었다면, 그걸로 충분하셨어요?\n    ★ H31. ★★ \"충분했다\"가 많으면 우리 차별점을 다시 봐야 한다.\n\n[가족 관점 — 60대 완주자에게]\n35. 가족이 걱정하셨어요? 어떻게 안심시키셨어요?\n36. 매일 도착 사실이 가족에게 자동으로 전달된다면 어떠셨을까요?\n    ★ H24. 가족 안심 세트의 전제.\n    ★ 자녀에게도 물어볼 수 있으면 더 좋다.\n```\n\n#### 끝나고 — H9, H10 검증 (4분)\n\n```\n22. 다 걷고 나서 뭐가 남았어요? 물건이든 기록이든.\n23. 사진이나 기록은 어떻게 하셨어요? 지금도 보세요?\n24. 돌아와서 아쉬웠던 게 있어요?\n25. '이중 순례자'라고 들어보셨어요?\n    ★ H10. 모른다는 답이 대부분이면 확장 전략의 근거가 강해진다.\n    ★ 설명해주고 반응을 본다. 관심을 보이면 \"가실 것 같아요?\"까지.\n```\n\n#### 돈 — 마지막에 (3분)\n\n```\n26. 전체 얼마 정도 쓰셨어요?\n27. 그중에 \"이건 돈 아깝지 않았다\" 싶은 게 있어요?\n28. 준비하면서 돈 주고라도 해결하고 싶었던 게 있었어요?\n    ★ H9. 우리 제품을 제안하지 않는다. 열린 질문으로 둔다.\n```\n\n#### 마무리\n\n```\n29. 제가 안 물어봤는데 하고 싶은 얘기 있으세요?\n30. 혹시 소개해주실 만한 분 계세요?\n```\n\n### 3.7 분석 틀\n\n인터뷰 후 24시간 안에 정리한다. 기억이 흐려지기 전에.\n\n**개별 기록 (1인당 1장)**\n\n```\n구분: 완주 / 중도 / 예정 / 60대\n구간, 시기, 일수\n─────────────────────\n기상 시각:\n숙소 결정 시점:\n침대 못 구한 횟수:\n휴대폰 사용 빈도:\n몸 문제:\n일정 변경:\n사용 도구:\n전화 예약 시도:\n짐 배송:\n이중 순례자 인지:\n─────────────────────\n인상적인 문장 (원문 그대로):\n  \"...\"\n예상과 달랐던 것:\n```\n\n**종합 (20명 끝난 뒤)**\n\n| 가설 | 지지 | 반박 | 판단 |\n|---|---|---|---|\n| H1 예약 판단이 어렵다 | ?/20 | ?/20 | |\n| H2 걷는 중 휴대폰 사용 | ?/20 | ?/20 | |\n| ... | | | |\n\n**판단 기준**: 20명 중 **13명 이상(65%)이 지지**하면 가설 채택. **7명 이하면 기각하고 문서를 고친다.**\n\n⚠️ **중간에 결론 내지 않는다.** 5명쯤에서 패턴이 보여도 20명을 다 채운다. 초반 편향이 크다.\n\n---\n\n## 4. B · 웹 트래픽 실험\n\n### 4.1 목적\n\n**H5 검증**: 한국인이 카미노를 준비하며 실제로 검색하는가, 그리고 우리 페이지가 그 검색에 걸리는가.\n\n도달률 전략의 60%가 검색인데, **이게 안 되면 전략 전체를 다시 짜야 한다.**\n\n### 4.2 설계\n\n| 항목 | 내용 |\n|---|---|\n| 기간 | **4주** (색인에 2주쯤 걸린다. 6주까지 볼 수도) |\n| 시기 | 2026년 9~10월. **가을 시즌 준비자가 검색하는 때** |\n| 범위 | 일정 계산기 + 마을 82 + 구간 81 + 루트 3 = 약 170페이지 |\n| 홍보 | **하지 않는다.** 순수 검색 유입만 본다 |\n| 비용 | 도메인·서버 약 30만 |\n\n**⚠️ 카페에 홍보하고 싶은 유혹을 참는다.** 홍보하면 검색 수요를 측정할 수 없다.\n\n### 4.3 측정\n\n| 지표 | 도구 |\n|---|---|\n| 검색 노출 수 / 클릭 수 / 평균 순위 | Google Search Console, 네이버 서치어드바이저 |\n| 유입 검색어 | 동일 |\n| 페이지별 유입 | Vercel Analytics |\n| 계산기 완료율 | 커스텀 이벤트 |\n| 계획 링크 공유 수 | 커스텀 이벤트 |\n| 체류 시간 | Analytics |\n\n### 4.4 판단 기준 (사전에 정한다)\n\n**이걸 미리 정해두지 않으면 결과를 보고 유리하게 해석하게 된다.**\n\n| 결과 | 4주 후 검색 유입 | 판단 |\n|---|---|---|\n| 🟢 | **월 1,500 세션 이상** | 전략 유효. 계속 |\n| 🟡 | 월 500~1,500 | 콘텐츠 부족. 6주 더 보고 재판단 |\n| 🔴 | **월 500 미만** | **검색 전략 재검토.** 카페·유튜브 중심으로 전환 검토 |\n\n**보조 지표**\n\n- 계산기 완료율 40% 미만 → UX 문제\n- 평균 체류 30초 미만 → 콘텐츠가 검색 의도와 안 맞음\n- 네이버 유입이 구글의 1/3 미만 → **네이버 대응 별도 필요** (한국 시장에서 치명적)\n\n### 4.5 ⚠️ 네이버를 과소평가하지 않는다\n\n한국인 순례자는 **네이버에서 검색한다.** 그런데 네이버는 외부 사이트 색인이 구글만큼 관대하지 않다.\n\n- 네이버 서치어드바이저 등록은 필수\n- 네이버는 블로그·카페 콘텐츠를 우선 노출한다\n- **자체 사이트만으로 네이버를 뚫기 어려울 수 있다** → 블로그 병행 운영 검토\n\n**이건 실험으로만 알 수 있다. 4주 결과에서 네이버 비중을 반드시 본다.**\n\n---\n\n## 5. 제휴 조사 (H6)\n\n### 5.1 대상\n\n- 산티아고 전문 여행사 3곳\n- 아웃도어 장비 브랜드 2곳\n- 여행자 보험사 1곳\n\n### 5.2 물어볼 것\n\n여행사에는 이렇게 접근한다. **\"저희가 이런 서비스를 준비 중인데, 협업 가능성을 여쭙고 싶다.\"**\n\n```\n1. 온라인 채널을 통한 송객을 받으시나요?\n2. 수수료 체계가 어떻게 되나요? (정률 / 정액 / 성과 기준)\n3. 연간 카미노 상품 판매 규모가 어느 정도인가요?\n4. 고객이 주로 어디서 오시나요?\n5. 자유여행 준비하다 패키지로 돌아서는 분이 있나요? 왜요?\n   ★ 이게 우리 송객 시나리오의 핵심이다\n6. 저희가 어떤 형태로 협업하면 도움이 될까요?\n```\n\n### 5.3 판단 기준\n\n| 결과 | 판단 |\n|---|---|\n| 3곳 중 2곳 이상이 수수료 5% 이상 제시 | R1 모델 유효 |\n| 1곳만 긍정 | 단가 하향 조정 후 재계산 |\n| 전부 부정적 | **R1 삭제.** 수익 모델 재설계 |\n\n⚠️ **재무 추정에서 R1이 매출의 35%다. 여기가 무너지면 손익분기가 4년차로 밀린다.**\n\n---\n\n## 6. C · 실측 도보 40일\n\n### 6.1 이건 여행이 아니라 조사다\n\n**800만 원과 40일을 쓴다. 계획 없이 가면 절반은 낭비된다.**\n\n동시에 **이건 마케팅 콘텐츠의 원천**이기도 하다. 두 목적을 함께 챙긴다.\n\n### 6.2 시기와 코스\n\n| 항목 | 결정 |\n|---|---|\n| 시기 | **2026년 10월 초 출발 ~ 11월 초 도착** |\n| 코스 | 프랑스 길 전 구간 (생장 → 산티아고) 773.1km |\n| 일수 | 35일 도보 + 예비 5일 |\n| 왜 이 시기인가 | ① 성수기를 피해 관찰이 쉽다 ② **겨울 폐쇄 직전이라 개방 기간을 확인할 수 있다** ③ 2027년 봄 출시 역산 |\n| ⚠️ 위험 | 비가 많고 일부 알베르게가 이미 닫혀 있다. **닫힌 것도 데이터다** |\n\n#### ⚠️ 출발일 제약 — 반드시 확인\n\n**나폴레옹 루트(생장 → 론세스바예스)는 11월 1일부터 3월 31일까지 폐쇄된다.**\n\n| 출발일 | 결과 |\n|---|---|\n| **10월 20일 이전** | 나폴레옹 통과 가능. **1일차 데이터를 실측할 수 있다** |\n| 11월 1일 이후 | 발카를로스만 가능. **나폴레옹 데이터를 못 얻는다** |\n\n**1일차는 카미노에서 부상이 가장 많은 날이고, 우리 고도 결함의 대표 사례다.**\n이 구간을 직접 걷지 못하면 검증의 핵심이 빠진다.\n\n**→ 출발을 10월 초로 앞당긴다.** 35일 도보면 11월 초에 마친다.\n\n⚠️ 개방 시기라도 당일 기상에 따라 통제될 수 있다. **생장 순례자 사무소의 안내를 따른다.**\n\n### 6.3 매일 기록할 것\n\n**앱 없이 시작하므로 스프레드시트 + 사진으로 한다.**\n\n#### 구간 기록 (매일 1건)\n\n| 항목 | 방법 |\n|---|---|\n| GPS 트랙 | 워치 또는 폰. **GPX 저장 필수** — 우리 계산 결과와 대조 |\n| 실제 소요 시간 (휴식 제외) | 수동 기록 |\n| 체감 난이도 1~5 | 주관이지만 일관되게 |\n| **몸 상태** | 통증 부위와 강도. **H15 임계값 검증의 핵심** |\n| 날씨 | |\n| 그늘 없는 구간 | 대략 km |\n| 통신 끊긴 구간 | **오프라인 설계 근거** |\n\n#### 마을 기록 (지나는 마을마다)\n\n| 항목 | 확인 방법 |\n|---|---|\n| 서비스 실재 여부 | 물, 바, 상점, 약국, ATM, 배송 접수 |\n| **첫 바 개점 시각** | 새벽 출발 시 아침 확보 가능 여부 |\n| 상점 시에스타 시간 | |\n| 실제 도착 시각 | |\n\n#### 숙소 기록 (매일 1~3곳) ★ 가장 중요\n\n```\n□ 원어명 (간판 사진)\n□ 유형 (공립/Xunta/본당/수도원/사립/기부제)\n□ 실제 침대 수\n□ 요금\n□ 예약 방법 (전화/WhatsApp/불가) ← 직접 물어본다\n□ 개방 기간 ← 직접 물어본다. \"언제 닫아요?\"\n□ ★ 건조기 유무 ← 눈으로 확인\n□ 세탁기, 취사, 난방, WiFi\n□ ★ 짐 배송 수령 가능 여부 ← 직접 물어본다\n□ 콘센트 개수\n□ 소등 시각, 문 닫는 시각\n□ 몇 시에 만실이 됐나 ← ★ H1 검증의 결정적 데이터\n□ 사진 3장 (외관/도미/공용)\n```\n\n**하루에 묵는 곳 외에 지나치는 알베르게도 들러서 묻는다.** 하루 3곳이 목표.\n40일 × 3곳 = **약 120곳.** 프랑스 길 주요 숙소의 상당수를 커버한다.\n\n#### ⭐ 보여주기 카드 검증 (매일 최소 1장)\n\n```\n□ 오늘 사용한 카드:\n□ 상대: 알베르게 주인 / 약사 / 식당 / 기타\n□ 반응\n   □ 바로 이해했다\n   □ 되물었다 → 어떤 부분에서:\n   □ 무시했다 / 거부했다\n□ ★ 내 폰을 만지는 것을 꺼렸는가?  ← H20. 가장 중요\n□ 응답 선택지가 실제 상황을 커버했나?\n   □ 없는 답을 하려 했다 → 무엇:\n□ 고칠 문장:\n```\n\n**목표: 약국 5곳, 알베르게 20곳에서 검증.**\n**H20이 부정적이면 설계를 바꾼다** — 상대는 가리키기만 하고 내가 누르는 방식으로.\n\n#### 관찰 기록 (매일)\n\n```\n· 알베르게 앞에 줄이 있었나? 몇 시부터?\n· 만실이라 돌아가는 사람을 봤나?\n· 한국인을 몇 명 만났나? 어떤 앱을 쓰던가?\n· 오늘 스페인어가 필요했던 순간\n· 내가 몰라서 곤란했던 것 ← 제품 아이디어의 원천\n```\n\n### 6.4 인터뷰를 길 위에서도 한다\n\n**40일 동안 한국인 순례자를 계속 만난다.** 정식 인터뷰 20건과 별개로, 길에서 짧게 묻는다.\n\n```\n· 오늘 몇 시에 나오셨어요? 왜요?\n· 숙소는 언제 정하세요?\n· 뭐 보고 다니세요? (앱)\n· 준비하면서 뭐가 제일 답답했어요?\n```\n\n**목표 30명.** 3장의 인터뷰보다 짧지만 표본이 커진다.\n\n### 6.5 콘텐츠 산출\n\n| 산출물 | 빈도 | 용도 |\n|---|---|---|\n| 일일 사진 + 짧은 글 | 매일 | 브런치·인스타 연재 |\n| 영상 클립 | 격일 | 유튜브 |\n| 구간별 정리 글 | 주 1회 | **SEO 가이드 페이지의 원료** |\n| 숙소 사진 | 매일 | 제품 데이터 |\n\n⚠️ **콘텐츠 제작이 조사를 방해하지 않게 한다.** 기록이 먼저다.\n\n### 6.6 장비\n\n| 항목 | 이유 |\n|---|---|\n| GPS 워치 또는 GPX 기록 앱 | 트랙 확보 |\n| **보조 배터리 20,000mAh 이상** | 기록량이 많다 |\n| 방수 폰 케이스 | 갈리시아는 비가 온다 |\n| 노트 + 펜 | **배터리가 없을 때 유일한 수단** |\n| 명함 또는 안내지 | 알베르게 주인에게 목적 설명용 (스페인어) |\n\n### 6.7 ⚠️ 안전\n\n**이건 조사이기 전에 800km를 걷는 일이다.**\n\n- 목표 데이터를 채우려고 무리해서 걷지 않는다\n- 몸이 아프면 **일정보다 몸이 우선**이다. 쉬거나 버스를 탄다\n- 여행자 보험은 필수\n- 가족에게 일정 공유\n- 혼자라면 매일 생존 신고\n\n> **역설적이지만, 우리가 만드는 제품의 핵심 메시지가 \"무리하지 마라\"다.**\n> 창업자가 데이터 욕심에 무리하면 제품 철학과 모순된다.\n\n---\n\n## 7. 판단 게이트\n\n**언제 무엇을 보고 무엇을 결정하는가.** 미리 정해둔다.\n\n### 게이트 1 — 2026년 9월 (인터뷰 후)\n\n| 확인 | 통과 조건 | 불통과 시 |\n|---|---|---|\n| H1 예약 판단 어려움 | 13/20 지지 | **B축 재설계 또는 A축 단독 전환** |\n| H2 현장 휴대폰 사용 | 13/20 지지 | **앱 계획 보류, 웹만** |\n| H3 부상·이탈 | 10/20 이상 경험 | 부상 회피 엔진 우선순위 하향 |\n| H4 준비 단계 공백 | 15/20 지지 | **준비 단계 장악 전략 재검토** |\n\n**H1·H2·H4 중 둘 이상 불통과 → 제품 방향 전면 재검토.**\n\n### 게이트 2 — 2026년 10월 (트래픽 4주 후)\n\n| 확인 | 통과 조건 | 불통과 시 |\n|---|---|---|\n| H5 검색 유입 | 월 1,500 세션 | 채널 전략 전환 |\n| 네이버 비중 | 구글의 1/3 이상 | 블로그 병행 |\n| H6 여행사 수수료 | 3곳 중 2곳 긍정 | **수익 모델 재설계** |\n\n### 게이트 3 — 2026년 12월 (실측 도보 후)\n\n| 확인 | 내용 |\n|---|---|\n| 데이터 | 숙소 120곳, GPX 전 구간, 마을 82곳 검증 |\n| H12 | 기존 정보가 실제로 부정확했나 |\n| H15 | 우리 임계값이 체감과 맞았나 |\n| 콘텐츠 | 연재 반응, 구독자 |\n\n### 게이트 4 — 2027년 6월 (성년 시즌 후) — **전업 판단**\n\n| 지표 | 전업 전환 기준 |\n|---|---|\n| 도달률 | **20% 이상** (약 2,600명) |\n| 제휴 매출 전망 | **연 5,000만 이상** |\n| 앱 현장 사용률 | 40% 이상 |\n\n**셋 중 둘 이상 충족 → 전업 전환.** 그 미만이면 사이드로 유지하거나 정리한다.\n\n> ⚠️ **02 문서 1부 8.2절의 판단 기준과 이 표를 항상 일치시킨다.** 문서마다 다르면 자기합리화의 여지가 생긴다.\n\n---\n\n## 8. 예산\n\n| 항목 | 금액 | 시기 |\n|---|---|---|\n| 인터뷰 사례 (20명 × 3만) | 60만 | 2026.08 |\n| 도메인·서버 (6개월) | 30만 | 2026.09~ |\n| 항공 (왕복) | 150만 | 2026.10 |\n| 현지 체류 (40일 × 12만) | 480만 | 2026.10 초~11 초 |\n| 장비 (배낭·신발·기록장비) | 100만 | 2026.09 |\n| 보험 | 20만 | |\n| 예비 | 60만 | |\n| **합계** | **약 900만** | |\n\n**02 문서에서 830만으로 잡았던 Phase 0 예산을 900만으로 수정한다.** 인터뷰 사례와 장비가 누락돼 있었다.\n\n---\n\n## 9. 이 계획의 한계\n\n정직하게 적는다.\n\n| 한계 | 영향 |\n|---|---|\n| **20명은 통계적으로 유의하지 않다** | 정성 조사다. 경향만 본다. 수치화하지 않는다 |\n| **모집 편향** | 카페·블로그에서 모으면 정보 탐색 적극층에 치우친다. **가장 도움이 필요한 무관심층이 빠진다** |\n| **1인 실측의 주관성** | 체감 난이도, 통증은 개인차가 크다. H15 검증의 근거로는 약하다 |\n| **가을 1회 관측** | 성수기(5~6월) 혼잡을 못 본다. **H1의 결정적 검증은 못 한다** |\n| **트래픽 4주는 짧다** | SEO는 원래 수개월이 걸린다. 초기 신호로만 본다 |\n\n**→ 특히 마지막 두 개가 아프다.** 성수기 혼잡과 장기 SEO는 2027년 봄에야 확인된다. 그때까지는 잠정 판단으로 간다.\n\n---\n\n## 10. 다음 2주 안에 할 일\n\n| # | 항목 | 기한 |\n|---|---|---|\n| 1 | 네이버 카페 운영진에 인터뷰 모집 문의 | 1주 |\n| 2 | 순례자 협회 접촉 (데이터 + 인터뷰 협조) | 1주 |\n| 3 | 인터뷰 질문지 인쇄, 녹음 환경 점검 | 1주 |\n| 4 | **파일럿 인터뷰 1명** — 질문지 다듬기 | 2주 |\n| 5 | 여행사 3곳 연락처 확보 | 2주 |\n| 6 | 실측 도보 항공권 가격 조사 | 2주 |\n\n**4번을 반드시 한다.** 첫 인터뷰는 질문지가 어색해서 망친다. 그걸 파일럿으로 쓴다.\n"}, {"file": "06_개발가이드.md", "title": "개발 가이드", "sub": "Claude Code · 프롬프트", "md": "# 06 · 개발 가이드\n\n> 1부: Claude Code 사용법 · 2부: 단계별 프롬프트\n> v2.0 · 2026년 7월\n\n---\n\n# 1부 · Claude Code 실전 사용법\n\n---\n\n## 0. 핵심 원칙 세 가지\n\n1. **컨텍스트를 파일로 관리한다.** 매번 프롬프트에 붙여넣지 않는다\n2. **큰 작업은 계획을 먼저 받는다.** 바로 코드를 쓰게 하지 않는다\n3. **되돌릴 수 있게 해둔다.** 커밋과 체크포인트가 안전망이다\n\n> Claude Code는 기능이 자주 바뀐다. 이 문서와 실제 동작이 다르면 `/help`와 공식 문서(https://code.claude.com/docs)를 따른다.\n\n### 이 프로젝트가 무엇인지 (한 문단)\n\n한국인 순례자가 **다치지 않고(A축), 숙소 걱정 없이(B축)** 걷게 하는 서비스다.\nPhase 1은 **웹 일정 계산기 + SEO 약 170페이지**이고, DB도 로그인도 앱도 만들지 않는다.\n핵심 제약 셋: **무료 · 가입 없음 · 오프라인 동작.** 상세는 02·03 문서.\n\n---\n\n## 1. 최초 설정 (한 번만)\n\n### 1.1 저장소 준비\n\n```bash\nmkdir camino && cd camino\ngit init\nmkdir docs\n# 01_조사와근거.md, 03_제품과기능.md, 03_제품과기능.md 를 docs/ 에 복사\n# CLAUDE.md 를 루트에 복사\n# camino-companion.jsx 를 루트에 복사 (P0에서 데이터 이관용)\ngit add -A && git commit -m \"문서와 프로토타입 추가\"\n```\n\n**`CLAUDE.md`는 루트에 둔다.** 매 세션 자동으로 읽힌다.\n\n### 1.2 Claude Code 실행\n\n```bash\nclaude\n```\n\n### 1.3 첫 세션에서 할 일\n\n```\n/init          # 저장소를 스캔해 CLAUDE.md 초안 생성 (이미 있으면 병합 검토)\n/memory        # CLAUDE.md 내용 확인·수정\n/permissions   # 승인 규칙 설정\n```\n\n우리는 이미 CLAUDE.md를 작성했으므로 `/init`은 선택이다. 다만 `/init`이 프로젝트 구조를 스캔해 빌드·테스트 명령을 찾아주므로, **실행한 뒤 우리 내용과 병합**하는 게 낫다.\n\n### 1.4 CLAUDE.md에 대한 주의\n\n- **틀린 내용을 쓰면 없는 것보다 나쁘다.** Claude가 자신 있게 반복한다\n- 매 세션 컨텍스트를 차지하므로 **길수록 손해다.** 오래된 문단은 지운다\n- 규칙은 **동작으로** 쓴다. \"코드를 깔끔하게\" ❌ / \"계산 로직은 lib/planner에 순수 함수로\" ✅\n- 개인 설정은 `CLAUDE.local.md`에 (gitignore 대상)\n\n---\n\n## 2. 프롬프트를 먹이는 방법\n\n### 2.1 기본 흐름 — 한 번에 하나\n\n```\n1. /clear           ← 이전 작업 컨텍스트 비우기 (CLAUDE.md는 유지됨)\n2. P0 프롬프트 붙여넣기\n3. 결과 확인 → 완료 조건 직접 검증\n4. git commit\n5. 1번으로 돌아가 P1\n```\n\n**P0~P7을 한 번에 주지 않는다.** 여러 작업을 섞으면 각각의 품질이 떨어지고, 어디서 잘못됐는지 추적이 안 된다.\n\n### 2.2 큰 작업은 계획부터\n\nP1(일정 엔진)이나 P5(SEO 페이지)처럼 파일을 여러 개 건드리는 작업은 **먼저 계획을 받는다.**\n\n```\n/plan docs/06_개발가이드.md 의 P1 을 구현할 계획을 세워줘.\n     파일을 아직 수정하지 말고 계획만.\n```\n\n`/plan`은 **읽기 전용 모드**다. 코드를 분석하고 계획서를 쓰지만 파일을 수정하거나 명령을 실행하지 않는다. 계획을 읽고 마음에 들면 승인한다.\n\n**계획을 읽을 때 확인할 것**\n- 우리가 지정한 타입 이름을 그대로 쓰는가\n- 테스트를 먼저 만드는가, 나중에 만드는가 (먼저가 낫다)\n- 불필요한 의존성을 추가하려 하는가\n- CLAUDE.md의 금지 사항을 어기는 부분이 있는가\n\n### 2.3 프롬프트를 파일로 참조하기\n\n긴 프롬프트를 매번 붙여넣는 대신 이렇게 해도 된다.\n\n```\ndocs/06_개발가이드.md 의 P1 섹션을 읽고 그대로 구현해줘.\n완료 조건까지 전부 만족시켜야 해.\n```\n\n**장점**: 프롬프트 원문이 저장소에 남아 재현 가능하다.\n**단점**: 파일을 읽는 데 컨텍스트를 쓴다.\n\nP0~P2처럼 타입 정의가 중요한 단계는 **직접 붙여넣는 쪽**을 권한다. 정확도가 중요하다.\n\n### 2.4 반복 작업은 스킬로 만든다\n\n같은 지시를 자주 한다면 커스텀 커맨드(스킬)로 만든다. `.claude/skills/` 아래에 `SKILL.md`로 저장하면 `/이름`으로 호출된다.\n\n예: `.claude/skills/verify/SKILL.md`\n\n```markdown\n---\nname: verify\ndescription: 변경 후 검증 루틴\n---\n\n아래를 순서대로 실행하고 결과를 보고해줘.\n\n1. npm test\n2. npm run build\n3. lib/planner/ 안에 fetch, window, localStorage 참조가 있는지 grep\n4. data/towns.ts 의 마을 수와 km 정렬 상태 확인\n\n하나라도 실패하면 원인을 설명하고, 고치기 전에 먼저 물어봐.\n```\n\n이러면 매번 `/verify` 한 줄로 끝난다.\n\n---\n\n## 3. 세션 관리\n\n### 3.1 언제 `/clear` 하나\n\n**작업 단위가 바뀔 때마다.** P0이 끝나고 P1로 갈 때가 그 시점이다.\n\n`/clear`는 대화를 비우지만 **CLAUDE.md 같은 프로젝트 메모리는 유지**한다. 이전 작업의 시행착오가 다음 작업의 판단을 흐리는 걸 막는다.\n\n### 3.2 언제 `/compact` 하나\n\n**한 작업 안에서 대화가 길어졌을 때.** 요약해서 컨텍스트를 비우되 대화는 이어간다.\n\n```\n/context     # 지금 뭐가 컨텍스트를 차지하는지 확인\n/compact     # 요약해서 공간 확보\n```\n\n큰 작업을 시작하기 전에 `/compact`를 한 번 돌리면 안정적이다.\n\n### 3.3 위험한 변경 전에는 `/branch`\n\n되돌릴 자신이 없는 실험은 대화를 분기해두고 한다. 원래 대화는 `/resume`으로 돌아갈 수 있다.\n\n---\n\n## 4. 검증 — 이게 제일 중요하다\n\n### 4.1 완료 조건을 직접 확인한다\n\n프롬프트마다 완료 조건을 숫자로 써둔 이유가 이것이다. **Claude가 \"완료했습니다\"라고 해도 직접 본다.**\n\n```bash\nnpm test              # P1 이후 필수\nnpm run build         # P5 이후 필수, 정적 생성 페이지 수 확인\nnpm run dev           # 눈으로 확인\n```\n\nP5(SEO)는 특히 이렇게 확인한다.\n\n```bash\nnpm run build 2>&1 | grep -c \"○\\|●\"   # 생성된 페이지 수\ncurl -s localhost:3000/town/sarria | grep -c \"<h1\"  # 서버 렌더 확인\n```\n\n### 4.2 변경 내용을 본다\n\n```\n/diff              # 대화형 diff 뷰어\n/code-review       # 현재 diff의 버그·정리 대상 검토\n```\n\n`/code-review --fix`로 발견 사항을 바로 적용할 수도 있다. 다만 **자동 수정 후에도 `/diff`로 다시 본다.**\n\n### 4.3 이 프로젝트에서 특히 봐야 할 것\n\n| 확인 | 이유 |\n|---|---|\n| `data/towns.ts`의 km·elevation이 안 바뀌었나 | 검증된 데이터다. 임의 수정 금지 |\n| 알베르게 데이터를 지어내지 않았나 | 사람이 한데서 잔다 |\n| 원어명(`nameEs`)이 UI에서 안 사라졌나 | 현지에서 보여줘야 한다 |\n| `lib/planner/`에 fetch가 들어갔나 | 오프라인 동작이 깨진다 |\n| 페이지가 서버 렌더되나 (JS 끄고 확인) | SEO가 전략 그 자체다 |\n| 글꼴이 17px 아래로 내려갔나 | 60대 사용자 |\n\n**`git diff data/`를 습관적으로 확인한다.** 데이터 파일 변경은 거의 항상 실수다.\n\n---\n\n## 5. 잘못됐을 때\n\n### 5.1 되돌리기\n\n```\n/rewind      # 코드와 대화를 체크포인트로 되돌린다\n```\n\ngit 커밋이 있으면 더 확실하다.\n\n```bash\ngit checkout -- .        # 커밋 안 한 변경 버리기\ngit reset --hard HEAD    # 마지막 커밋으로\n```\n\n**각 프롬프트 완료 후 반드시 커밋한다.** 이게 최선의 안전망이다.\n\n### 5.2 자주 나는 문제와 대응\n\n| 증상 | 원인 | 대응 |\n|---|---|---|\n| 없는 알베르게를 만들어냄 | 빈 필드를 채우려는 습성 | CLAUDE.md 규칙 1 재확인 시키고 `/rewind` |\n| 타입 이름을 자기 식으로 바꿈 | 프롬프트에 타입을 안 줬거나 무시 | 타입 정의를 다시 주고 재작업 |\n| 테스트를 자기 코드에 맞춰 씀 | 테스트를 나중에 시켰음 | 프롬프트의 테스트 케이스를 명시적으로 지정 |\n| `useEffect`에서 계산 | 습관적 클라이언트 렌더 | \"서버 컴포넌트에서 계산\" 재지시 |\n| 의존성을 마음대로 추가 | | CLAUDE.md에 \"추가 전 이유 설명\" 규칙 있음. 롤백 |\n| 컨텍스트가 꽉 참 | 대화가 길어짐 | `/context` → `/compact` 또는 `/clear` |\n\n### 5.3 같은 실수가 반복되면\n\n**CLAUDE.md에 규칙을 추가한다.** 매번 지적하는 건 낭비다.\n\n```\n/memory\n```\n\n로 열어서 \"하지 말 것\"에 한 줄 추가한다.\n\n---\n\n## 6. 이 프로젝트의 권장 순서\n\n```\n[준비]\n  저장소 생성, 문서 배치, CLAUDE.md 루트에\n  claude 실행 → /init → /permissions\n\n[P0] 프로젝트 초기화 + 데이터 이관\n  ⚠️ 착수 전: 01 문서 2부 결함 1·2 해결 여부 확인\n     (GPX에서 ascent/descent 추출 계획)\n  → 붙여넣기 → 확인 → git commit\n  /clear\n\n[P1] 일정 분할 엔진      ← 가장 중요. /plan 먼저\n  → /plan 으로 계획 받기 → 승인 → 구현\n  → npm test 전부 통과 확인\n  → git commit\n  /clear\n\n[P2] 시그니처 컴포넌트\n  → 붙여넣기 → npm run dev 로 눈 확인 → commit\n  /clear\n\n[P3] 계산기 화면\n  → JS 끄고 서버 렌더 확인 필수\n  → Lighthouse 실행\n  → commit\n  /clear\n\n[P4] 인쇄용 일정표\n  → 실제로 인쇄 미리보기 확인\n  → commit\n  /clear\n\n[P5] SEO 페이지          ← /plan 먼저\n  → npm run build 로 페이지 수 확인\n  → commit\n  /clear\n\n[P6] 무료 도구 3종\n  → 각각 독립 확인\n  → commit\n  /clear\n\n[P7] 계측 (공개 직전)\n  → commit → 배포\n```\n\n**P1과 P5는 `/plan`을 먼저 쓴다.** 파일을 여러 개 건드리고 되돌리기 번거로운 작업이다.\n\n---\n\n## 7. 프롬프트 작성 요령 (직접 추가할 때)\n\n05번 문서의 프롬프트를 수정하거나 새로 쓸 때 참고.\n\n### 7.1 좋은 프롬프트의 구조\n\n```\n[무엇을] 한 문장으로\n[어디에] 파일 경로를 명시\n[타입]   인터페이스를 직접 제공\n[규칙]   알고리즘을 단계로\n[검증]   테스트 케이스를 미리 나열\n[완료]   숫자로 측정 가능하게\n[금지]   하지 말 것을 명시\n```\n\n### 7.2 반드시 지킬 것\n\n| 원칙 | 이유 |\n|---|---|\n| **타입 정의를 직접 준다** | 이름이 흔들리면 뒤 단계가 전부 어긋난다 |\n| **테스트 케이스를 미리 쓴다** | 나중에 시키면 자기 코드에 맞춘 테스트를 쓴다 |\n| **완료 조건을 숫자로** | \"잘 동작한다\"는 검증 불가 |\n| **하지 말 것을 명시** | 안 시킨 일을 하는 쪽으로 기운다 |\n| **한 프롬프트 = 한 관심사** | 섞으면 품질이 떨어진다 |\n| **도메인 함정을 미리 알린다** | \"공립 알베르게는 예약을 안 받는다\" |\n| **★로 우선순위 표시** | 전부 중요하면 아무것도 안 중요하다 |\n\n### 7.3 나쁜 예 / 좋은 예\n\n**나쁜 예**\n```\n일정 계산 기능이랑 SEO 페이지 만들어줘. 예쁘게 해줘.\n```\n- 두 관심사가 섞임\n- \"예쁘게\"는 검증 불가\n- 타입, 완료 조건, 금지 사항 없음\n\n**좋은 예**\n```\nlib/planner/split.ts 에 구간 분할 함수를 만들어줘.\n순수 함수로. fetch·window·localStorage 사용 금지.\n\n[타입 정의 제공]\n\n알고리즘:\n1. 체력 보정 (low ×0.85 / normal ×1.0 / high ×1.15)\n2. ...\n\n테스트 (반드시 작성):\n- 사리아 출발 → 총 114.2km\n- 목표 14km에서 무한루프 없음\n- ...\n\n완료 조건: npm test 전부 통과, split.ts에 fetch 참조 없음\n\n하지 마: 마을 데이터의 km 값을 수정하지 마\n```\n\n---\n\n## 8. 비용 관리\n\n```\n/usage       # 토큰 사용량 확인 (별칭 /cost)\n/context     # 무엇이 컨텍스트를 차지하는지\n/effort      # 추론 수준 조정\n```\n\n**절약 요령**\n\n- 단순 작업(P2 컴포넌트, P4 인쇄)은 효율을 낮춰도 된다\n- 복잡한 작업(P1 엔진, P5 SEO)은 높인다\n- CLAUDE.md를 짧게 유지한다. 매 세션 컨텍스트를 먹는다\n- 작업 단위마다 `/clear`. 대화가 길어질수록 매 턴 비용이 오른다\n- 큰 파일을 통째로 읽히지 말고 경로와 범위를 지정한다\n\n---\n\n## 9. 주의사항\n\n### 9.1 자동 승인을 함부로 켜지 않는다\n\n`/permissions`에서 승인 규칙을 설정할 수 있지만, **파일 삭제나 `git reset` 같은 명령까지 자동 승인하면 위험하다.** 읽기 전용 명령 정도만 미리 허용한다.\n\n`/fewer-permission-prompts`가 자주 쓰는 읽기 전용 명령을 찾아 허용 목록을 만들어준다.\n\n### 9.2 이 프로젝트 특유의 위험\n\n**Claude Code는 빈 필드를 채우려는 습성이 있다.** 알베르게 데이터에서 이게 발동하면 없는 숙소가 생긴다.\n\n`CLAUDE.md`의 규칙 1을 최우선으로 둔 이유가 이것이고, **알베르게 데이터는 실측 도보 전까지 아예 만들지 않는 것**이 가장 안전하다.\n\n### 9.3 문서와 코드가 어긋나면\n\n01 문서 2부의 결함 1·2처럼 **사양 자체가 틀린 경우가 있다.** Claude Code는 사양대로 정확히 구현하므로, 틀린 사양은 틀린 코드가 된다.\n\n**의심스러우면 구현 전에 물어본다.**\n\n```\n03_제품과기능.md 의 F-01 알고리즘을 읽고,\n논리적 결함이나 구현이 불가능한 부분이 있는지 먼저 검토해줘.\n코드는 아직 쓰지 마.\n```\n\n---\n\n## 10. 참고\n\n- Claude Code 문서 — https://code.claude.com/docs\n- 명령어 전체 목록 — 세션에서 `/help`\n- 설정 진단 — `/doctor`\n\n*Claude Code는 업데이트가 잦다. 이 문서의 명령어가 동작하지 않으면 `/help`로 현재 버전의 목록을 확인한다.*\n\n\n---\n\n# 2부 · 단계별 개발 프롬프트\n\n\n## 프롬프트 사용 원칙\n\n1. 저장소 루트에 `CLAUDE.md`를 넣는다\n2. `03_제품과기능.md`, `03_제품과기능.md`를 `/docs`에 넣는다\n3. 아래 프롬프트를 **하나씩** 붙여넣는다. 여러 개를 한 번에 주면 품질이 떨어진다\n4. 각 단계의 완료 조건을 직접 확인한 뒤 다음으로 넘어간다\n\n**Phase 1 범위**: P0 ~ P6. 웹 계산기 + SEO 페이지 + 무료 도구.\n**DB도, 로그인도, 앱도 만들지 않는다.** 검색 수요를 검증하는 단계다.\n\n---\n\n## P0 — 프로젝트 초기화 및 데이터 이관\n\n> 🔴 **착수 전 확인**: 01 문서 2부의 결함 1·2를 읽었는가?\n> 마을 고도만으로는 오르막을 계산할 수 없다. 이 프롬프트에 GPX 처리가 포함된 이유다.\n\n```\nNext.js 15 (App Router) + TypeScript(strict) + Tailwind CSS로 프로젝트를 초기화해줘.\n프로젝트명은 camino.\n\n1. 프로젝트 생성\n   - App Router, TypeScript, Tailwind, ESLint\n   - src 디렉터리 사용 안 함 (app/, components/, lib/, data/ 를 루트에)\n   - Vitest 설치 및 설정\n\n2. Tailwind 토큰 등록\n   CLAUDE.md의 디자인 토큰을 tailwind.config.ts의 theme.extend.colors에 등록.\n   이름: ink, ink2, granite, stone, flecha, vino, moss\n   폰트: display(Gowun Batang), body(IBM Plex Sans KR), mono(IBM Plex Mono)\n   app/layout.tsx에서 next/font/google로 로드.\n\n3. 브랜드명 분리\n   config/brand.ts를 만들고 서비스명·태그라인·도메인을 여기 모아줘.\n   컴포넌트에서 브랜드명을 하드코딩하지 말고 여기서 import하도록.\n   나중에 이름이 바뀔 예정이야.\n\n4. 데이터 이관\n   첨부한 camino-companion.jsx의 TOWNS 배열을 data/towns.ts로 옮겨줘.\n   아래 타입으로 정의하고, 기존 km/elevation 값은 절대 수정하지 마.\n\n   export type Service =\n     'WATER'|'BAR'|'SHOP'|'PHARMACY'|'ATM'|'BAG_TRANSFER'\n\n   export interface Town {\n     id: string          // nameEs를 케밥케이스로 슬러그화\n     nameEs: string      // 원어명 (필수)\n     nameKo: string\n     km: number\n     elevation: number   // 마을 해발. ★ 오르막 계산에 쓰지 마\n     beds: number\n     services: Service[]\n   }\n\n   기존 sv 문자열('wbspax')을 Service[]로 변환.\n\n5. ★ 고도 프로파일 뼈대 (중요)\n   ※ 실제 값은 scripts/build-profiles.ts 로 OSM 경로 + 스페인 IGN MDT05 에서\n     생성한다 (03 문서 부록 참조). 이 단계에서는 타입과 임시 데이터만 만든다.\n\n   data/profiles.ts 를 만들고 아래 타입을 정의해줘.\n\n   export interface SegmentProfile {\n     fromTownId: string\n     toTownId: string\n     distanceKm: number\n     ascent: number        // 누적 상승 m\n     descent: number       // 누적 하강 m\n     maxElevation: number  // 구간 최고점\n     source: 'OSM+MDT' | 'ESTIMATED'\n   }\n\n   ★ 지금은 GPX가 없으므로, 인접 마을 쌍 81개에 대해\n     source: 'ESTIMATED' 로 임시 레코드를 생성해줘.\n     ascent = max(0, 도착지고도 - 출발지고도)\n     descent = max(0, 출발지고도 - 도착지고도)\n     maxElevation = max(두 마을 고도)\n\n   ★ 그리고 파일 상단에 이 주석을 반드시 넣어줘:\n\n   // ⚠️ 이 값들은 마을 고도 차이로 계산한 추정치이며 실제와 크게 다르다.\n   //    예: 생장→론세스바예스는 여기서 +780m지만 실제로는 레포에데르 고개\n   //    (약 1,450m)를 넘으므로 누적 상승 약 1,280m다. (오차 39%)\n   //    scripts/build-profiles.ts 실행 후 source:'OSM+MDT' 로 교체할 것.\n   //    (03 문서 부록 참조)\n   //    그 전까지 injuryRiskScore를 사용자에게 노출하지 말 것.\n\n   ★ lib/planner 는 반드시 profiles.ts 를 통해서만 고도를 읽어야 한다.\n     towns.elevation 을 직접 빼서 오르막을 구하는 코드를 만들지 마.\n     나중에 GPX로 교체할 때 이 경계가 있어야 한다.\n\n6. data/routes.ts\n   프랑스 길 전 구간 / 레온 출발 / 사리아 출발 3개 루트.\n\n7. ★ data/forks.ts — 갈림길 뼈대 (중요)\n   프랑스 길은 하나의 선이 아니다. 11곳에서 갈라졌다 다시 만난다.\n\n   export type VariantTrait =\n     'SCENERY'|'MONASTERY'|'QUIET'|'SHORTER'|'EASIER'|'WINTER_SAFE'|'HISTORIC'|'ROAD_HEAVY'\n\n   export interface RouteVariant {\n     id: string\n     nameKo: string\n     nameEs: string\n     isMain: boolean\n     townIds: string[]\n     distanceKm: number\n     ascent: number\n     descent: number\n     closedFrom: string | null   // MM-DD\n     closedTo: string | null\n     roadShareRatio: number\n     hasShelter: boolean\n     traits: VariantTrait[]\n     highlightsKo: string[]\n     cautionKo: string | null\n   }\n\n   export interface RouteFork {\n     id: string\n     splitTownId: string\n     mergeTownId: string\n     variants: RouteVariant[]\n   }\n\n   ★ 지금은 1번 갈림길(생장 → 론세스바예스)만 실제 값으로 넣어줘.\n     나머지 10곳은 id와 분기점·재합류점만 두고 variants는 빈 배열로.\n     실측 도보 후에 채운다.\n\n   1번 갈림길 값:\n     napoleon  — 나폴레옹 루트 / Ruta de Napoleón\n                 isMain: true, hasShelter: false\n                 closedFrom: '11-01', closedTo: '03-31'\n                 traits: ['SCENERY','HISTORIC']\n                 cautionKo: '오리송 위로는 대피할 곳이 없고 날씨가 몇 분 만에 바뀝니다.'\n     valcarlos — 발카를로스 루트 / Ruta de Valcarlos\n                 isMain: false, hasShelter: true, roadShareRatio: 0.6\n                 traits: ['EASIER','WINTER_SAFE','ROAD_HEAVY']\n\n   ★ distanceKm/ascent/descent는 아직 모른다. null 로 두고\n     \"실측 전\"임을 파일 상단 주석에 명시해.\n\n8. data/landmarks.ts — 안개 지도 스팟 19곳\n   id, townId, nameKo, nameEs, order 만 채우고\n   lat/lng/storyKo/photoUri 는 null. 실측 도보에서 채운다.\n\n   1 생장 성문 · 2 레포에데르 고개 · 3 론세스바예스 · 4 팜플로나\n   5 용서의 언덕 · 6 푸엔테 라 레이나 · 7 이라체 와인 샘\n   8 산토 도밍고 대성당 · 9 부르고스 대성당 · 10 메세타 시작\n   11 레온 대성당 · 12 아스토르가 · 13 철의 십자가 · 14 폰페라다 성\n   15 비야프랑카 · 16 오 세브레이로 · 17 사리아 · 18 포르토마린\n   19 몬테 도 고소\n\n완료 조건:\n- npm run dev 에러 없음\n- data/towns.ts에 82개 마을, km 오름차순 정렬\n- 마지막 마을이 santiago-de-compostela, km 773.1\n- data/profiles.ts에 81개 SegmentProfile, 전부 source:'ESTIMATED'\n- profiles.ts 상단에 위 경고 주석이 있다\n- ★ data/forks.ts에 11개 RouteFork, 1번만 variants 채워짐\n- ★ 나폴레옹 variant의 closedFrom='11-01', closedTo='03-31'\n- ★ data/landmarks.ts에 19개, order 1~19\n- config/brand.ts 외에는 브랜드명이 하드코딩된 곳이 없다\n\n하지 마:\n- 마을 데이터의 거리/고도를 임의로 반올림하거나 수정하지 마\n- 없는 마을을 추가하지 마\n- ★ 고도 데이터를 지어내지 마. 없으면 ESTIMATED 로 두고 넘어가\n```\n\n---\n\n## P0.5 — 경로·고도 프로파일 생성 🔴\n\n> **03 문서 부록을 먼저 읽는다.** 라이선스와 평활화 함정이 정리돼 있다.\n> 이 단계 없이 P1을 하면 부상 회피 엔진이 최대 39% 틀린 값으로 동작한다.\n\n```\nscripts/build-profiles.ts 를 만들어줘.\n일회성 배치 스크립트다. 서비스 런타임 코드가 아니다.\n\n목적: 마을 82곳 사이 81개 구간의 실제 누적 상승/하강을 계산한다.\n\n입력\n1) 경로 좌표 — OpenStreetMap 카미노 프랑스 길 릴레이션\n   Overpass API로 조회. 결과를 data/geometry/frances.geojson 에 저장.\n   ★ 이 파일은 .gitignore 에 넣어줘 (ODbL 파생 DB 배포 회피)\n\n2) 고도 — 스페인 IGN MDT05 (COG GeoTIFF, 5m 격자)\n   centrodedescargas.cnig.es 에서 받은 파일을 data/dem/ 에 둔다고 가정.\n   파일이 없으면 스크립트는 안내 메시지를 출력하고 종료.\n   ★ DEM 파일을 자동 다운로드하지 마. 도엽 선택은 사람이 한다\n\n처리\n1) 경로를 마을 좌표 기준으로 81개 구간으로 분할\n2) 각 구간을 15m 간격으로 리샘플링\n3) 각 점의 고도를 DEM에서 이중선형 보간으로 샘플링\n4) ★ 평활화: 이동평균(윈도우 5) 적용 후,\n   연속 고도차가 4m 미만이면 누적에서 제외\n5) ascent = Σ max(0, Δh), descent = Σ max(0, -Δh)\n6) maxElevation = 구간 최고점\n\n출력\ndata/profiles.ts — SegmentProfile[] , source: 'OSM+MDT'\n★ 좌표는 넣지 마. 숫자만 남긴다\n\n검증 (스크립트가 자체 실행)\n계산 후 아래를 콘솔에 출력하고, 벗어나면 경고를 띄워줘.\n- 생장 → 론세스바예스: 누적 상승 1,200~1,400m 기대\n- 비야프랑카 → 오 세브레이로: 700~900m 기대\n- 엘 아세보 → 몰리나세카: 하강 500m 이상, 상승은 거의 0 기대\n- 부르고스 → 오르니요스 (메세타): ★ 상승 100m 이하여야 정상\n  이 값이 300m를 넘으면 평활화가 안 된 것이다. 크게 경고해줘\n\n완료 조건:\n- npm run build:profiles 로 실행된다\n- data/profiles.ts 에 81개 레코드, 전부 source:'OSM+MDT'\n- 위 검증 4개가 전부 기대 범위 안에 들어온다\n- data/geometry/ 가 .gitignore 에 있다\n- README 에 출처 표시 문구가 추가돼 있다:\n  \"경로 데이터 © OpenStreetMap contributors (ODbL)\"\n  \"고도 데이터 © Instituto Geográfico Nacional (CC BY 4.0)\"\n\n하지 마:\n- ★ 계산이 안 되면 그럴듯한 값을 지어내지 마. 실패로 종료해\n- DEM 파일을 자동으로 받지 마\n- 좌표를 profiles.ts 에 넣지 마\n- 이 스크립트를 서비스 코드에서 import 하지 마\n```\n\n---\n\n## P1 — 부상 회피형 일정 분할 엔진\n\n```\nlib/planner/ 에 구간 분할 엔진을 구현해줘.\n순수 함수로만 작성하고 React/Next.js에 의존하지 마.\n나중에 React Native로 그대로 옮길 코드야. fetch, window, localStorage 사용 금지.\n\n파일: lib/planner/{types.ts, split.ts, risk.ts, split.test.ts}\n\n★ 이 엔진의 목표는 \"최단 일수\"가 아니라 \"부상 없는 완주 확률\"이다.\n  경쟁 앱은 사용자가 직접 구간을 고르게 두고 무리한 일정을 방치한다.\n  우리는 무리한 일정을 능동적으로 교정한다.\n\n타입:\n\nexport interface PlanInput {\n  startTownId: string\n  targetKmPerDay?: number      // 14~32\n  totalDays?: number\n  fitness: 'low' | 'normal' | 'high'\n  restDays: number\n  startDate?: string           // ★ 갈림길 계절 폐쇄 판정에 쓴다\n  variantChoices?: Record<string, string>  // forkId → variantId\n  travelMode?: 'FOOT' | 'BIKE' | 'HORSE'   // ★ 기본 FOOT\n}\n\nexport type StageWarning =\n  | 'STEEP_CLIMB'       // 누적 상승 600m 초과\n  | 'STEEP_DESCENT'     // 누적 하강 500m 초과 ★ 무릎 부상 주원인\n  | 'LONG_DISTANCE'     // 28km 초과\n  | 'FEW_BEDS'          // 도착지 침대 30개 미만\n  | 'NO_SERVICES'       // 물·식당 없는 구간 10km 초과\n  | 'EARLY_OVERLOAD'    // 1~3일차 22km 초과\n  | 'CONSECUTIVE_HARD'  // 연속 3일 26km 초과\n\nexport interface Stage {\n  dayNo: number\n  fromTownId: string\n  toTownId: string\n  distanceKm: number      // 소수점 1자리\n  ascent: number          // profiles.ts에서 읽는다\n  descent: number         // profiles.ts에서 읽는다\n  estimatedMinutes: number\n  warnings: StageWarning[]\n  isRestDay: boolean\n}\n\nexport interface Plan {\n  stages: Stage[]\n  totalKm: number            // 전체 이동 거리\n  walkedKm: number           // ★ 실제로 걸은 거리 (이동수단 구간 제외)\n  totalDays: number\n  compostelaEligible: boolean\n  doubleStampPerDay: boolean\n  injuryRiskScore: number   // 0~100, 낮을수록 안전\n  riskDataQuality: 'OSM+MDT' | 'ESTIMATED'  // ★ ESTIMATED면 UI에 점수를 숨긴다\n  advice: string            // 한 줄 판단\n}\n\n★ 고도는 반드시 data/profiles.ts 의 SegmentProfile 에서 읽어라.\n  towns.elevation 을 직접 빼서 오르막을 구하지 마.\n  현재 profiles 는 전부 source:'ESTIMATED' 이고 실제와 최대 39% 차이가 난다.\n  GPX 확보 후 교체할 것이므로 경계를 유지해야 한다.\n\n★ 내리막이 무릎 부상의 주원인이다. 위험 산정에서 descent 가중치를\n  ascent보다 높게 잡아라 (예: ascent×1.0, descent×1.4).\n  단, 이 계수는 의학적 근거가 없는 임시값이므로 risk.ts 상단에 주석으로 명시해라.\n\n알고리즘 (03_제품과기능.md F-01 참조):\n\n1. 목표 거리 산정\n   - totalDays 입력 시: daily = 총거리 / (totalDays - restDays)\n   - 체력 보정: low ×0.85 / normal ×1.0 / high ×1.15\n\n2. 탐욕 분할\n   현재 위치 + 목표거리 지점에 가장 가까운 beds > 0 마을을 도착지로.\n   산티아고까지 반복.\n\n3. 부상 회피 후처리  ← 핵심\n   a. 초반 적응: 1~3일차 목표거리 ×0.8\n   b. 오르막 보정: 다음 구간 누적 상승 600m 초과 시 해당 구간 ×0.85\n   c. 회복 배치: 상승 600m 또는 하강 500m 초과 구간의 다음 날 ×0.85\n   d. 휴식일: restDays > 0 이면 beds >= 150 인 큰 도시에 배치\n   e. 마지막 구간 < 6km → 직전 구간에 병합\n\n4. 경고 산출 (위 StageWarning 기준)\n\n5. injuryRiskScore (risk.ts)\n   평균거리, 최대거리, 누적 상승, 누적 하강(가중), 초반부하, 연속고강도를 합산.\n   riskDataQuality 는 구간 profiles 의 source 가 하나라도 ESTIMATED 면 'ESTIMATED'.\n\n6. estimatedMinutes = (거리 / 4.2) * 60 + ascent / 8 + descent / 20\n\n7. ★ 갈림길 처리\n   a. startDate가 있으면 각 fork의 variant 중\n      closedFrom~closedTo 안에 드는 것을 후보에서 제외한다\n   b. variantChoices에 지정이 있으면 그것을 쓴다\n   c. 지정이 없으면 isMain=true 인 것을 쓰되,\n      폐쇄로 제외됐으면 남은 것 중 첫 번째\n   d. Stage에 variantId를 기록한다\n   ★ 지금은 forks.ts에 1번만 실제 값이 있으므로\n     나머지는 그냥 통과시켜라. 에러를 내지 마.\n\n8. ★ 콤포스텔라 판정 (2025년 개정 기준)\n   최소 거리: 도보·말 100km / 자전거 200km / 전기자전거 대상 아님\n   도장 규칙: ★ 위치가 아니라 총 도보 거리 기준\n     - 최소 거리만 걷는 경우      → 하루 2개 (doubleStampPerDay = true)\n     - 그보다 길게 걷는 경우      → 하루 1개 (false)\n   ❌ if (지점 > 사리아) 2개  ← 이렇게 짜지 마. 틀린 로직이다\n\n테스트 (반드시 작성):\n- 생장 출발 24km/normal → 33~36 구간\n- 사리아 출발 → 총 114.2km, compostelaEligible true, doubleStampPerDay true\n- ★ 생장 출발(773km) → doubleStampPerDay **false** (하루 1개면 충분)\n- 모든 구간의 fromTownId가 이전 구간의 toTownId와 일치\n- 모든 도착지의 beds > 0 (산티아고 제외)\n- 마지막 toTownId는 항상 santiago-de-compostela\n- 거리 합계가 총 거리와 오차 0.1km 이내\n- 목표 14km(최소)에서 무한루프 없음\n- 목표 32km(최대)에서도 모든 도착지에 숙소 있음\n- ★ 초반 적응 검증: 1~3일차 평균 거리 < 4~6일차 평균 거리\n- ★ 오르막 회복 검증: 피레네 구간(생장→론세스바예스) 다음 날이 그 다음 날보다 짧다\n- ★ 하강 경고 검증: 엘 아세보 → 몰리나세카가 포함된 구간에 STEEP_DESCENT 경고가 있다\n  (1145m → 595m, 급경사 돌길로 무릎 부상이 많은 구간)\n- ★ restDays=2 지정 시 isRestDay가 정확히 2개이고 전부 beds>=150 마을\n- ★ 32km/high 전구간 → injuryRiskScore >= 60\n- ★ 현재 profiles가 전부 ESTIMATED이므로 riskDataQuality === 'ESTIMATED'\n- ★ split.ts / risk.ts 어디에도 towns.elevation을 직접 빼는 코드가 없다\n- ★ startDate를 2026-11-15로 주면 나폴레옹 variant가 선택되지 않는다\n- ★ startDate를 2026-06-15로 주면 나폴레옹이 기본 선택된다\n- ★ startDate가 없으면 계절 판정을 건너뛰고 isMain을 쓴다\n- ★ 콤포스텔라: 도보 100km / 자전거 200km 기준으로 판정한다\n- ★ 생장 출발(773km) → doubleStampPerDay **false**\n- ★ 사리아 출발(114.2km) → doubleStampPerDay **true**\n  (판정 기준은 위치가 아니라 총 도보 거리다)\n\n완료 조건:\n- npm test 전부 통과\n- split.ts, risk.ts에 fetch/window/localStorage 참조 없음\n- 고도를 profiles.ts 경유로만 읽는다\n- risk.ts 상단에 \"이 가중치는 의학적 근거가 없는 임시값\" 주석이 있다\n```\n\n---\n\n## P2 — 시그니처 컴포넌트\n\n```\ncomponents/ 에 재사용 컴포넌트를 만들어줘.\n첨부한 camino-companion.jsx에 프로토타입이 있으니 참고하되 TS+Tailwind로 다시 작성.\n\n1. components/Shell.tsx\n   산티아고 조가비 표식. 아래에서 위로 부채꼴로 퍼지는 방사선 SVG.\n   props: size, color, rays (기본 9)\n\n2. components/Mojon.tsx  ← 시그니처. 신경 써서\n   길가 이정표(모호온)를 옮긴 헤더.\n   props: { remainingKm, walkedKm, totalKm, totalDays }\n\n   - 배경 ink, 테두리는 flecha 반투명\n   - 남은 거리는 스페인식 소수점 표기: 114.235 → \"114,235\"\n     구현: remainingKm.toFixed(3).replace('.', ',')\n   - 수치는 mono, tabular-nums, 32px 이상\n   - 하단 진행률 바 (flecha)\n   - 라벨 \"SANTIAGO\"는 letter-spacing 넓게\n\n3. components/Elevation.tsx\n   고도 단면 SVG.\n   props: { fromTownId, toTownId, marks?: number[], height? }\n   - 구간 내 마을 elevation을 폴리라인으로, 아래는 반투명 채움\n   - marks(km 배열)에 flecha 세로선\n   - viewBox + preserveAspectRatio=\"none\"\n   - vectorEffect=\"non-scaling-stroke\"\n   - role=\"img\", aria-label 필수\n\n4. components/StageCard.tsx\n   일자별 구간 카드.\n   - 도착지 한글명(크게) + 원어명(작게) ← 원어 생략 금지\n   - 거리, 오르막, 예상 소요, 침대 수\n   - 경고 배지 (StageWarning별 색상·문구)\n   - 휴식일이면 다르게 표시\n\n5. components/RiskGauge.tsx\n   injuryRiskScore 0~100 시각화 + advice 문구.\n\n완료 조건:\n- app/dev/page.tsx 에서 전부 렌더 확인 가능\n- 모바일 375px에서 안 깨짐\n- Mojon 숫자가 소수점 3자리 + 쉼표\n- 본문 최소 17px, 터치 타깃 44px 이상\n```\n\n---\n\n## P3 — 계산기 화면과 공유 URL\n\n```\napp/plan 에 일정 계산기를 만들어줘.\n로그인도 DB도 없이 모든 상태를 URL 쿼리스트링에 담는다.\n★ 이게 핵심이다 — 사용자가 계획을 링크로 공유하면 그게 그대로 유입 경로가 된다.\n\n1. lib/url.ts\n   encodePlan(input: PlanInput): string   → \"r=frances&d=24&f=normal&rest=1\"\n   decodePlan(params: URLSearchParams): PlanInput  (잘못된 값은 기본값 폴백)\n\n2. app/plan/page.tsx\n   - searchParams로 PlanInput을 읽어 ★서버 컴포넌트에서 계산★\n   - 상단 Mojon\n   - 루트 선택 칩 3개\n   - 입력 모드 전환: \"며칠에 걸을까\" ↔ \"하루 몇 km\"\n   - 슬라이더 (14~32) — 변경 시 router.replace로 URL 갱신\n   - 체력 선택, 휴식일 선택\n   - ★ riskDataQuality === 'ESTIMATED' 이면 injuryRiskScore를 숫자로 표시하지 마.\n     대신 advice 문구만 서술형으로 보여주고, 하단에 작게\n     \"고도 데이터가 추정치라 난이도 판단이 부정확할 수 있습니다\"를 표시해.\n     (의학적 근거 없는 점수를 숫자로 제시하면 사용자가 과신한다)\n   - 결과: 총 일수 / 총 거리 / 하루 평균\n   - 전체 고도 단면 + 구간별 도착지 표시선\n   - 콤포스텔라 요건 안내 (100km 미만 시 경고)\n   - StageCard 목록 (경고 배지 포함)\n\n3. 공유\n   \"이 계획 링크 복사\" 버튼 (navigator.clipboard)\n   generateMetadata로 OG 동적 생성:\n   \"산티아고 순례길 34일 일정 — 생장에서 산티아고까지 773km\"\n\n완료 조건:\n- 슬라이더를 움직이면 URL이 바뀌고, 그 URL을 새 탭에 붙여넣으면 같은 결과\n- ★ JS를 꺼도 서버 렌더 결과가 보인다 (SEO 필수)\n- Lighthouse 성능 90+, 접근성 95+, SEO 100\n- 모바일에서 슬라이더 터치 타깃 44px 이상\n\n하지 마:\n- useEffect 안에서 계산하지 마. 서버 컴포넌트에서 계산해서 내려줘\n- 계획 상태를 localStorage에 저장하지 마 (URL이 진실의 원천)\n- 회원가입이나 이메일 입력을 강제하지 마\n```\n\n---\n\n## P4 — 인쇄용 일정표\n\n```\n계산 결과를 A4 1장으로 인쇄할 수 있게 만들어줘.\n\n★ 이건 부가 기능이 아니다. 60대 이상 순례자에게 닿는 유일한 경로이고,\n  실제로는 \"자녀가 뽑아서 부모에게 주는\" 용도로 쓰인다.\n\n1. app/plan/print/page.tsx\n   - 같은 searchParams를 받아 인쇄 전용 레이아웃 렌더\n   - 표 형태: 일자 | 날짜 | 출발→도착(한글+원어) | 거리 | 오르막 | 침대\n   - 하단: 응급 연락처(112), 기본 스페인어 문장 5개\n   - 상단: 총 일수, 총 거리, 출발일~도착일\n\n2. print.css\n   @media print 에서:\n   - 네비게이션, 버튼, 배경색 제거\n   - 페이지 나눔 제어 (break-inside: avoid)\n   - 글꼴 크기 인쇄에 맞게 조정\n   - 링크 URL 표시 안 함\n\n3. /plan 에 \"인쇄용 보기\" 버튼\n\n완료 조건:\n- 34일 전 구간 일정이 A4 1~2장에 깨끗하게 들어간다\n- 인쇄 미리보기에 배경색과 네비게이션이 안 나온다\n- 글씨가 인쇄물에서 읽을 수 있는 크기다 (9pt 이상)\n```\n\n---\n\n## P5 — SEO 페이지 대량 생성\n\n```\n★ 검색이 이 서비스의 유일한 100% 관문이다. SEO는 마케팅이 아니라 전략 그 자체다.\n  목표는 \"한국인이 카미노 준비 중 검색하는 모든 질문에 우리 페이지가 있는 것\"이다.\n\n1. app/town/[slug]/page.tsx — 82개 정적 생성\n   - generateStaticParams로 사전 생성\n   - 한글명 + 원어명(크게), 산티아고까지 남은 거리, 해발\n   - 이전/다음 마을과의 거리\n   - 서비스 (물, 식당, 상점, 약국, ATM, 배낭배송)\n   - 침대 수 + \"이 마을에서 묵는 일정 보기\" → /plan 링크\n   - ★ 알베르게 정보가 없으면 \"정보 확인 중\"으로 표시. 절대 지어내지 마\n\n2. app/stage/[slug]/page.tsx — 81개 정적 생성\n   slug 형식: \"saint-jean-pied-de-port-to-roncesvalles\"\n   - 거리, 고도 단면, 예상 소요 시간, 난이도\n   - 통과하는 마을 목록과 각 서비스\n   - 이 구간이 포함된 일정 링크\n\n3. app/route/[slug]/page.tsx — 3개\n   - 총 거리, 표준 일수, 난이도, 주요 통과 도시\n   - 기간별 추천 일정 3개 (각각 /plan 링크)\n   - 전체 고도 단면\n   - schema.org TouristTrip JSON-LD\n\n4. app/sitemap.ts, app/robots.ts\n\n5. 공통 요건\n   - generateMetadata로 title/description 동적 생성. title은 50~60자\n   - ★ 모든 페이지 하단에 일정 계산기 CTA\n   - 내부 링크: 마을 ↔ 구간 ↔ 루트가 서로 연결\n\n완료 조건:\n- npm run build 시 170개 이상 페이지가 정적 생성된다\n- 각 페이지의 title이 전부 다르다\n- sitemap.xml에 모든 페이지가 들어간다\n- ★ 데이터가 없는 항목에서 가짜 정보가 나오지 않는다\n- 아무 페이지나 골라 JS를 꺼도 본문이 보인다\n```\n\n---\n\n## P6 — 무료 도구 3종\n\n```\n각각 독립 URL로 배포한다. 이 도구들이 각자 검색 유입을 만든다.\n전부 가입 없이, 즉시 사용 가능해야 한다.\n\n1. app/tools/cost/page.tsx — 비용 계산기\n   입력: 루트, 일수, 숙소 유형 비율(공립/사립), 외식 비율, 장비 신규 구입 여부\n   출력: ★ 단일 숫자가 아니라 범위로. \"약 380만~450만 원\"\n   항목: 항공(120~180만), 숙박(일수×유형별), 식비(일수×25~40유로),\n        장비(0~120만), 보험·기타(15만)\n   결과도 URL에 담아 공유 가능하게.\n\n2. app/tools/pack/page.tsx — 배낭 무게 계산기\n   입력: 체중, 계절, 짐 배송 사용 여부\n   출력: 권장 상한 = 체중 × 10% (보통 6~7kg)\n        품목별 권장 무게 목록과 총합\n        초과 시 감량 우선순위 제안\n   ★ 체중 입력은 선택 사항으로 두고, 미입력 시 기본 7kg 기준으로 동작하게.\n     민감한 정보이므로 강제하지 않는다.\n\n3. app/tools/timeline/page.tsx — 준비 타임라인\n   입력: 출발일\n   출력: D-90 역산 체크리스트 (03_제품과기능.md F-08 표 그대로)\n        각 항목에 관련 페이지 링크\n        인쇄 가능\n\n완료 조건:\n- 세 도구 모두 가입·설치 없이 동작\n- 각각 독립 URL이고 결과가 공유 가능\n- 세 도구가 서로, 그리고 /plan 과 상호 링크\n- 모바일에서 입력이 불편하지 않다\n\n하지 마:\n- 이메일이나 개인정보를 입력받고 나서 결과를 보여주는 구조로 만들지 마\n- 체중, 나이 같은 민감 정보를 필수 입력으로 만들지 마\n```\n\n---\n\n## P7 — 계측 (선택, 공개 직전)\n\n```\nPhase 1의 목표는 매출이 아니라 수요 검증이다. 측정 장치를 붙여줘.\n\n1. Vercel Analytics + 커스텀 이벤트\n   - plan_calculated (route, targetKm, fitness, riskScore)\n   - plan_link_copied\n   - plan_printed\n   - tool_used (cost | pack | timeline)\n   - town_page_viewed (slug)\n   - stage_page_viewed (slug)\n\n2. 이메일 수집 (선택 사항으로만)\n   - 계산 결과 하단에 \"출국 D-90 체크리스트 받기\"\n   - ★ 이메일만. 이름·전화번호 받지 마\n   - Resend 또는 ConvertKit API. DB 안 만듦\n   - 개인정보 수집·이용 동의 문구와 /privacy 링크 필수\n\n3. app/api/health/route.ts\n\n완료 조건:\n- Vercel 대시보드에서 커스텀 이벤트가 보인다\n- /privacy 페이지가 존재한다\n- 이메일 입력 없이도 모든 기능이 완전히 동작한다\n\n하지 마:\n- 제3자 광고 추적 스크립트를 넣지 마\n- 결과를 보려면 이메일을 내라는 식으로 만들지 마\n```\n\n---\n\n## 이후 단계 — 조건부\n\n**아래는 4주 트래픽 데이터를 본 뒤에 진행한다. 미리 만들지 않는다.**\n\n| Phase | 내용 | 진행 조건 |\n|---|---|---|\n| 2 | 알베르게 데이터, 혼잡 추정, 예약 스크립트, 짐배송 비교 | **실측 도보 완료 후** |\n| 2 | 가이드 페이지 100+ | 월 방문 5,000 이상 |\n| 2 | **일자별 상세 일정** (F-20) | 웹에서도 필요. 인쇄와 직결 |\n| 2 | **예산 관리** (F-23) | 독립 도구로 먼저 |\n| 2 | **갈림길 추천** (F-19) | **실측 도보로 11곳 데이터 확보 후** |\n| 2 | 이중 순례자 안내 페이지 | 언제든. 검색어 공백이 크다 |\n| 3 | React Native 앱, 오프라인 지도, 일지 | 웹 도달률 20% 이상 |\n| 3 | **보여주기 카드 23장** | 문안 현지 검수 후 |\n| 3 | **Plan B** (F-21) | 앱과 동시 |\n| 3 | **안개 지도 + 「내 돌」** (F-15·F-18) | 랜드마크 19곳 데이터 확보 후 |\n| 3 | 완주 화면 + 보상 | 앱과 동시. 전부 원가 0 |\n| 4 | 커머스 연동, 포토북·포스터 | 제휴 수수료율·인쇄 견적 확정 후 |\n| 5 | 구마노고도 계산기, 제주올레 | 이중 순례자 클릭률 50% 확인 후 |\n\n**특히 알베르게 데이터는 실측 전에 만들지 않는다.** 부정확한 숙소 정보는 사람을 한데서 자게 한다.\n\n---\n\n## 프롬프트 작성 원칙\n\n이 문서를 직접 수정할 때 참고.\n\n1. **한 프롬프트 = 한 관심사.** 데이터, 로직, UI, SEO를 섞지 않는다\n2. **완료 조건을 숫자로.** \"잘 동작한다\"가 아니라 \"82개 마을, km 오름차순\"\n3. **하지 말 것을 명시.** 에이전트는 안 시킨 일을 하는 쪽으로 기운다\n4. **테스트 케이스를 프롬프트에 넣는다.** 나중에 시키면 자기 코드에 맞춘 테스트를 쓴다\n5. **도메인 함정을 미리 알려준다.** \"공립 알베르게는 예약을 안 받는다\" 같은 것\n6. **타입 정의를 직접 준다.** 이름이 흔들리면 뒤 단계가 전부 어긋난다\n7. **★ 표시로 우선순위를 준다.** 전부 중요하다고 하면 아무것도 안 중요해진다\n"}, {"file": "CLAUDE.md", "title": "CLAUDE.md", "sub": "저장소 상시 컨텍스트", "md": "# CLAUDE.md — 프로젝트 컨텍스트\n\n> 저장소 루트에 두고 매 세션 자동 로드된다.\n> 작업 시작 전 반드시 읽고, 여기 적힌 규칙을 어기지 않는다.\n\n---\n\n## 프로젝트\n\n한국인 순례자를 위한 **카미노 데 산티아고 여정 관리 서비스**.\n출국 90일 전 코스 선정부터 현지 도보, 귀국 후 기록까지를 한국어로 관리한다.\n\n**두 축**: **A. 부상 예방·대응** / **B. 숙소 예약 판단**\n**목표**: 한국인 순례자의 **도달률 85%**\n**차별점**: 데이터를 보여주지 않는다. **판단을 대신 내려준다.**\n\n**현재 단계: Phase 1 — 웹 계산기 + SEO.** 앱도, DB도, 로그인도 아직 만들지 않는다.\n\n> 서비스명은 미확정이다. 브랜드명은 `config/brand.ts`에서만 관리하고 다른 곳에 하드코딩하지 않는다.\n\n---\n\n## 절대 규칙\n\n### 1. 데이터를 지어내지 않는다 (최우선)\n\n이 서비스는 순례자의 안전과 직결된다. **없는 알베르게를 만들어내거나, 확인되지 않은 거리·요금·전화번호·예약 가능 여부를 채워 넣으면 사람이 한데서 잔다.**\n\n- 숙소 정보를 **추정으로 채우지 않는다.** 없으면 `null` 또는 `UNKNOWN`\n- UI에서는 \"정보 확인 중\"으로 표시한다\n- 샘플 데이터는 `source: 'PLACEHOLDER'`로 표시하고 **화면에도 샘플임을 노출**한다\n- `data/towns.ts`의 거리·고도는 검증된 값이다. **임의로 수정하거나 보간하지 않는다**\n\n### 2. 도메인 사실을 하드코딩하지 않는다\n\n정책은 바뀐다. 2025년 초 포르투갈 길 친구회가 성수기 공립 알베르게 예약 허용을 제안했고, 2027년 성년을 앞두고 바뀔 수 있다.\n\n- ❌ `if (albergue.type === 'MUNICIPAL') return '예약 불가'`\n- ✅ `albergue.reservation` 필드를 읽는다\n\n### 3. 고도는 반드시 profiles.ts를 경유한다 🔴\n\n**마을 고도 차이로 오르막을 계산하면 최대 39% 틀린다.**\n\n생장 → 론세스바예스는 마을 기준 +780m지만, 실제로는 레포에데르 고개(약 1,450m)를 넘으므로 누적 상승이 약 1,280m다. 카미노에서 부상이 가장 많은 날인데 \"평범한 산길\"로 판단된다.\n\n**하강도 마찬가지로 중요하다.** 무릎 부상의 주원인은 오르막이 아니라 내리막이다. 엘 아세보 → 몰리나세카(−550m 급경사 돌길)는 `elevationGain` 기준으로 0이라 \"쉬운 날\"이 된다.\n\n- ❌ `toTown.elevation - fromTown.elevation`\n- ✅ `getProfile(fromId, toId).ascent` / `.descent`\n\n`data/profiles.ts`는 `scripts/build-profiles.ts`가 생성한다.\n경로는 OpenStreetMap(ODbL), 고도는 스페인 IGN MDT05(CC BY 4.0)에서 가져와 직접 계산한다.\n\n- `source: 'ESTIMATED'` 인 동안은 **`injuryRiskScore`를 사용자에게 숫자로 노출하지 않는다**\n- **좌표를 `profiles.ts`에 넣지 않는다.** 숫자만 남긴다 (ODbL 파생 DB 배포 회피)\n- `data/geometry/` 는 gitignore 대상이다\n- 출처 표시 의무: \"경로 데이터 © OpenStreetMap contributors (ODbL)\" / \"고도 데이터 © Instituto Geográfico Nacional (CC BY 4.0)\"\n\n### 4. 프랑스 길은 하나의 선이 아니다 🔴\n\n**11곳에서 갈라졌다 다시 만난다.** 현재 `towns.ts`는 단일 선형 배열이라 변형 경로가 없다.\n\n- 경로는 `RouteFork` / `RouteVariant`로 관리한다\n- **계절 폐쇄를 반드시 확인한다** — `closedFrom` / `closedTo`\n- ❌ 모든 순례자가 같은 마을을 지난다고 가정하는 코드\n- ✅ `variantId`를 `Stage`에 담아 어느 쪽을 걷는지 기록한다\n\n| 대표 갈림길 | 선택지 |\n|---|---|\n| **생장피드포르** | **나폴레옹(고지)** vs **발카를로스(계곡)** |\n| 레온 이후 | 비야당고스(차도) vs 비야르 데 마사리페 |\n| 트리아카스텔라 | 산 실(짧음) vs 사모스(대수도원) |\n\n⚠️ **나폴레옹 루트는 11월 1일~3월 31일 폐쇄된다.** 오리송 위로 대피소가 없다.\n출발일이 폐쇄 기간이면 **후보에서 아예 뺀다.**\n\n⚠️ **당일 안전 판단은 생장 순례자 사무소가 한다.** 우리는 사전 정보만 제공하고, 현지 안내를 따르라고 말한다.\n\n### 5. 원어명을 지우면 버그다\n\n마을과 숙소 이름은 **스페인어 원어를 반드시 함께 표시**한다. 순례자가 현지에서 화면을 보여줘야 하기 때문이다. 한글만 남기는 UI는 거절한다.\n\n### 6. 계산 로직은 순수 함수 + 테스트\n\n일정 분할, 거리, 고도, 위험 점수는 전부 `lib/planner/` 아래 순수 함수로 두고 단위 테스트를 붙인다.\n\n- 컴포넌트 안에서 계산하지 않는다\n- `fetch`, `window`, `localStorage` 참조 금지 (Phase 3에서 React Native로 이식)\n\n### 7. SEO는 전략 그 자체다\n\n검색이 이 서비스의 유일한 100% 관문이다.\n\n- 모든 페이지 **서버 렌더**. JS를 꺼도 본문이 보인다\n- `useEffect` 안에서 계산해서 렌더하지 않는다\n- 페이지마다 `generateMetadata`로 고유 title (50~60자)\n- 새 페이지를 만들면 sitemap에 반드시 포함\n\n### 8. 무료이고 가입이 없다\n\n- 핵심 기능에 결제벽·가입벽을 세우지 않는다\n- 계획 상태는 **URL 쿼리스트링**에 담는다. localStorage 금지 (URL이 진실의 원천)\n- 이메일은 선택 사항. 결과를 보려면 이메일을 내라는 구조 금지\n- 체중·나이 같은 민감 정보를 필수 입력으로 만들지 않는다\n\n### 9. 접근성 하한선\n\n주 사용자층에 60대 이상이 상당수다.\n\n- 본문 최소 17px, 주요 수치 18px 이상\n- 명도 대비 4.5:1 이상\n- 터치 타깃 최소 44×44px\n- 키보드 포커스 링 제거 금지\n- **인쇄 지원 필수** (`@media print`) — 비디지털층에 닿는 유일한 경로\n\n### 10. 오프라인을 전제로 설계\n\nPhase 3에서 React Native로 옮긴다. 메세타와 갈리시아 산간은 통신이 끊긴다.\n**서버 API 호출로 일정을 계산하는 설계는 금지.**\n\n### 11. 의료 정보는 넣지 않는다\n\n통증 대처법, 약품명, 물집 처치 방법은 **정형외과·스포츠의학 자문 검수 전까지 앱에 넣지 않는다.**\n\n### 12. 인증서를 흉내내지 않는다\n\n완주 증명은 이미 공식 제도가 있다.\n\n- **콤포스텔라** — 산티아고 대성당 발급\n- **이중 순례자(Dual Pilgrim)** — 타나베시 관광청·산티아고 공동 운영\n\n우리는 **안내와 기록만** 한다. 우리 이름으로 증서를 발급하거나 인증을 대행하지 않는다.\nNFT·블록체인 기반 증서도 만들지 않는다 (→ 03 문서 6.2절).\n\n완주 보상의 기본형은 **무료**다. 유료는 포토북처럼 실제 원가가 발생하는 것에 한정한다.\n**\"완주했는데 돈을 내야 결과를 준다\"는 구조는 만들지 않는다.**\n\n---\n\n## 기술 스택 (Phase 1)\n\n| 영역 | 선택 | 비고 |\n|---|---|---|\n| 프레임워크 | Next.js 15 (App Router) | SEO가 핵심 |\n| 언어 | TypeScript strict | `any` 금지 |\n| 스타일 | Tailwind CSS | 토큰은 `tailwind.config` |\n| 상태 | **URL 쿼리스트링** | DB 없음 |\n| 테스트 | Vitest | 계산 로직 필수 |\n| 배포 | Vercel | |\n| 데이터 | 정적 TS 파일 | Phase 3에서 Postgres 이관 |\n\n---\n\n## 디자인 토큰\n\n카미노 공식 표지(사아코베오)의 코발트 + 노란 화살표에서 가져왔다.\n\n```\n--ink:     #12253F   짙은 코발트. 헤더, 이정표 판\n--ink-2:   #1D3B5E\n--granite: #E7E8E2   갈리시아 화강암. 페이지 배경\n--stone:   #C6C8BE   테두리, 구분선\n--flecha:  #F0B429   노란 화살표\n--vino:    #7A2E39   도장 잉크\n--moss:    #3F5D4A\n--text:    #1B2430\n--muted:   #6B7280\n```\n\n**노란색(`--flecha`) 사용 규칙: 길 안내·현재 위치·활성 상태에만.**\n실제 카미노에서 노란색은 방향 지시 전용이다. 장식이나 강조에 남용하면 규칙이 무너진다.\n\n**서체**\n- 표제: `Gowun Batang` (한글 세리프) — 아껴서\n- 본문: `IBM Plex Sans KR`\n- 수치: `IBM Plex Mono` — 거리·고도·남은 km는 전부 모노 + `tabular-nums`\n\n**시그니처: 이정표(모호온) 판.** 상단에 산티아고까지 남은 거리를 스페인식 소수점 표기로 (`114,235`). 이 컴포넌트는 임의로 바꾸지 않는다.\n\n---\n\n## 디렉터리 구조\n\n```\n/app\n  page.tsx                  랜딩 + 계산기 진입\n  /plan\n    page.tsx                일정 계산 결과\n    /print/page.tsx         인쇄용 (A4 1장)\n  /tools\n    /cost/page.tsx          비용 계산기\n    /pack/page.tsx          배낭 무게 계산기\n    /timeline/page.tsx      준비 타임라인\n  /route/[slug]/page.tsx    루트 3개 (SEO)\n  /town/[slug]/page.tsx     마을 82개 (SEO)\n  /stage/[slug]/page.tsx    구간 81개 (SEO)\n  sitemap.ts, robots.ts\n/components\n  Mojon.tsx                 이정표 헤더 (시그니처)\n  Elevation.tsx             고도 단면 SVG\n  StageCard.tsx\n  RiskGauge.tsx\n  Shell.tsx                 조가비 표식\n/lib\n  /planner\n    types.ts\n    split.ts                구간 분할 (순수 함수)\n    risk.ts                 부상 위험 점수\n    split.test.ts\n  url.ts                    계획 ↔ 쿼리스트링\n/config\n  brand.ts                  ★ 브랜드명은 여기서만\n/data\n  towns.ts                  마을 마스터 (검증 완료, 수정 금지)\n  profiles.ts               ★ 구간별 누적 상승/하강. 고도는 여기서만 읽는다\n  forks.ts                  ★ 갈림길 11곳. 변형 경로와 계절 폐쇄\n  landmarks.ts              안개 지도 스팟 19곳\n  albergues.ts              숙소 (실측 전까지 대부분 PLACEHOLDER)\n  routes.ts\n```\n\n---\n\n## 도메인 지식 (틀리기 쉬운 것)\n\n### 순례 기본\n\n- **콤포스텔라**: 도보 100km(자전거 200km) 이상이어야 발급. 사리아가 최다 출발지인 이유\n- **크레덴시알(순례자 여권)**: 도장을 모으는 종이 수첩. **사리아 이후는 하루 2개** 필요\n- 프랑스 길 총 **773.1km** (생장피드포르 → 산티아고). 사리아부터는 **114.2km**\n- 큰 오르막 3곳: **피레네(+780m), 폰세바돈(+560m), 오 세브레이로(+790m)**\n\n### 숙소 (자주 틀림)\n\n| 유형 | 예약 | 요금 |\n|---|---|---|\n| Xunta 공립 (갈리시아) | 불가 (선착순, 13시 개방) | 8~10유로 |\n| 지자체 공립 | 불가 | 8~12유로 |\n| 본당·수도원 | 대부분 불가 | 기부제~10유로 |\n| 기부제 | 불가 | 자율, 현금만 |\n| **사립** | **가능** (전화·WhatsApp·Booking) | 12~25유로 |\n\n- **겨울 폐쇄가 많다.** 공립은 보통 부활절~10월 말. `openFrom`/`openTo` 없이 숙소를 추천하면 안 된다\n- **공립 알베르게는 짐 배송을 받지 않는다.** 예약을 안 받아 침대를 보장할 수 없기 때문. 마을에 `BAG_TRANSFER`가 있어도 숙소 단위로 따로 확인해야 한다\n\n### 갈림길과 위험\n\n- 프랑스 길은 **11곳에서 갈라진다.** 같은 순례길이라도 사람마다 걷는 길이 다르다\n- **나폴레옹 루트 11/1~3/31 폐쇄.** 겨울에는 발카를로스가 유일한 선택지\n- 위험 유형 8종: 급경사 하강(무릎) · 대피소 없음 · 그늘 없음 · 식수 없음 · 차도 병행 · 진흙 · 통신 두절 · 겨울 결빙\n- **위험 표시는 겁주기가 아니라 준비하기 위한 것이다.** 대응 행동을 반드시 함께 적는다\n\n### 콤포스텔라 요건 (2025년 개정) — 자주 틀린다\n\n| 방식 | 최소 거리 |\n|---|---|\n| 도보·말 | **100km** |\n| 자전거 | **200km** |\n| **전기자전거** | **대상 아님** |\n\n**조건**\n- 연속이어야 한다. **이동수단으로 건너뛰면 그 지점에서 끊긴다**\n- 스페인 영토 안에서 채워야 한다\n- **마지막 구간이 최소 20km이고 대성당으로 직접 이어져야 한다**\n- 국외 출발이면 스페인 내 최소 70km\n\n**⚠️ 도장 규칙 — 위치가 아니라 총 도보 거리 기준**\n\n| 조건 | 하루 도장 |\n|---|---|\n| 최소 거리만 걷는 경우 (도보 100km대) | **2개** |\n| 그보다 길게 걷는 경우 | **1개** |\n\n**생장에서 773km를 걸으면 사리아를 지나도 하루 1개면 된다.**\n❌ `if (지점 > 사리아) 도장 2개` — 틀린 로직이다\n\n걷지 않은 구간은 **안개 지도 개방과 도보 거리 집계에서 제외**한다.\n\n### 이동 방식과 접근 교통\n\n- `TravelMode`는 `FOOT | BIKE | HORSE`. **Phase 1~3은 도보만 지원하되 모델은 처음부터 갖는다**\n- 순례는 걷기 전부터 시작한다. **인천 → 생장은 최소 2~3회 환승**이고 준비에서 가장 헷갈리는 부분이다\n- 생장에는 공항이 없다. 파리(CDG TGV) · 비아리츠 · 팜플로나 경유가 주요 경로\n- 바욘 → 생장 기차는 하루 6편, 약 12유로, 1시간\n- **여정 중에도 버스·택시를 쓴다.** 부상·만실·시간 부족 때문이다. 이걸 예외로 보지 않는다\n\n### 완주 이후 (Phase 3~5)\n\n- **콤포스텔라** — 도보 100km 이상 완주 시 대성당이 발급하는 공식 증서\n- **「내 돌」** — 집에서 가져온 돌을 철의 십자가(1,505m)에 놓는 의식. **마스코트를 만들지 않고 이미 있는 것을 기록한다**\n- **안개 지도** — 걸으면 열린다. 랜드마크 19곳. ⚠️ **경로·화살표·알베르게는 절대 가리지 않는다**\n- **이중 순례자(Dual Pilgrim)** — 카미노와 일본 구마노고도를 모두 걸은 사람에게 주는 공식 자격. 세계에서 단 둘뿐인 유네스코 세계유산 순례길이다. 2015년 시작, 2025년 5월 1만 번째 수여\n  - 받는 것: 조가비 + 세 발 까마귀(야타가라스) 핀 배지, 화지 수제 인증서\n  - **카미노를 먼저 걸으면** 구마노 혼구 대사에서 다이코 의식에 참여할 수 있다. 반대 순서면 없다\n  - 등록: 구마노 혼구 헤리티지 센터 또는 타나베시 관광안내소\n  - **우리 확장 전략(구마노고도)의 실제 진입점이다**\n\n### 실제 애로사항 (제품 설계의 근거)\n\n1. **침대 확보 불안이 1번 문제다.** 길은 노란 화살표 덕에 거의 안 잃는다. 순례자는 오늘 그 마을에 침대가 남을지 몰라서 새벽 5시에 뛴다. 대부분은 남는다. **정보 부재의 문제다**\n2. **부상이 완주 실패의 주된 원인.** 그래서 일정 목표는 최단 일수가 아니라 **부상 없는 완주 확률**이다\n3. **언어 장벽이 1번을 악화시킨다.** 전화 한 통이면 사립 예약이 되는데 스페인어를 못 해서 못 건다\n4. **빈대(chinches).** 발생 시 여정이 망가진다. 해법은 **고온 건조기**이므로 `hasDryer`가 중요하다\n\n---\n\n## 주요 기능 (전체 사양은 03 문서 2부)\n\n| # | 기능 | 핵심 |\n|
