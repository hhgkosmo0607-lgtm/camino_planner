---|---|---|\n| F-01 | 구간 자동 계획 | **목표는 최단 일수가 아니라 부상 없는 완주** |\n| F-02 | \"오늘 서두를 필요 있나요?\" | 혼잡 추정 |\n| F-04 | 전화 예약 스크립트 | 언어 장벽이 예약을 막는다 |\n| F-05 | 짐 배송 판단 | 공립은 배송 수령 불가 |\n| F-12 | **보여주기 카드 23장** | 상대가 짚으면 한국어로 답이 뜬다 |\n| F-15 | **안개 지도** | 걸으면 열린다. ⚠️ 경로는 절대 가리지 않는다 |\n| F-19 | **갈림길 추천** | 11곳. 계절 폐쇄 반영 |\n| F-20 | **일자별 상세** | Day 1~N. 하루 안의 모든 거점 + 위험 |\n| F-21 | **Plan B** | **별도 화면이 아니라 각 날짜 카드 안에 접혀 있다** |\n| F-22 | 체크리스트 | **오늘 일정에서 자동으로 채워진다** |\n| F-23 | 예산 관리 | **오프라인 필수** |\n| F-24 | **접근·귀환 교통** | 인천 → 생장. Day 0으로 표시 |\n| F-25 | 이동 방식 | 도보·자전거·말. 콤포스텔라 요건이 다르다 |\n\n## 메뉴 명칭\n\n**순례자가 현지에서 첫날부터 듣는 말만 쓴다.** 기독교 교리 용어는 쓰지 않는다.\n\n| 메뉴 | 명칭 |\n|---|---|\n| 홈 | 오늘 |\n| 일정 | 에타파 Etapa |\n| 지도 | 플레차 Flecha |\n| 숙소 | 알베르게 Albergue |\n| 기록 | 크레덴시알 Credencial |\n| 카드 | 카드 |\n| 완주 | 콤포스텔라 Compostela |\n| 준비 | 준비 |\n\n한글을 크게, 원어를 작게 병기한다. **\"카드\"와 \"준비\"는 번역하지 않는다.**\n\n---\n\n## 작업 방식\n\n1. 작업 전 관련 파일을 먼저 읽는다. 추측으로 수정하지 않는다\n2. 한 번에 하나의 관심사만 변경한다\n3. 계산 로직을 건드리면 `npm test`를 돌리고 결과를 보고한다\n4. 새 의존성을 추가하기 전에 이유를 먼저 설명한다\n5. 커밋 메시지는 한국어, 명령형 (`일정 분할 엔진에 오르막 회복 보정 추가`)\n6. **확실하지 않으면 지어내지 말고 질문한다**\n"}]</script>
<script>
const DOCS = JSON.parse(document.getElementById('payload').textContent);
let cur = 0;

marked.setOptions({gfm:true, breaks:false, headerIds:true, mangle:false});

function slug(s){
  return s.trim().toLowerCase()
    .replace(/[^\w가-힣ㄱ-ㅎㅏ-ㅣ\s·-]/g,'')
    .replace(/\s+/g,'-').slice(0,60);
}

/* 사이드바 */
function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = DOCS.map((d,i)=>{
    const parts = [...d.md.matchAll(/^# (.+)$/gm)].map(m=>m[1])
      .filter(x=>/^(\d+부|부록)/.test(x));
    const no = d.file.match(/^(\d+)/) ? d.file.match(/^(\d+)/)[1] : '—';
    return `<div class="doc" data-i="${i}">
      <button onclick="open_(${i})">
        <span class="doc-no mono">${no}</span>
        <span><span class="doc-t">${d.title}</span><span class="doc-s">${d.sub}</span></span>
      </button>
      <div class="parts">${parts.map(p=>
        `<a href="#${slug(p)}" onclick="event.stopPropagation()">${p}</a>`).join('')}</div>
    </div>`;
  }).join('');
}

function open_(i, anchor){
  cur = i;
  const d = DOCS[i];
  let html = marked.parse(d.md);
  // 표를 스크롤 컨테이너로 감싼다
  html = html.replace(/<table>/g,'<div class="tw"><table>').replace(/<\/table>/g,'</table></div>');
  const el = document.getElementById('doc');
  el.innerHTML = html;
  // 헤딩에 id 부여
  el.querySelectorAll('h1,h2,h3').forEach(h=>{ if(!h.id) h.id = slug(h.textContent); });
  document.getElementById('crumb').innerHTML = `<b>${d.title}</b> · ${d.file}`;
  document.querySelectorAll('.doc').forEach(n=>n.classList.toggle('on', +n.dataset.i===i));
  document.title = d.title + ' · 카미노 프로젝트';
  closeSide();
  if(anchor){ const t=document.getElementById(anchor); if(t){t.scrollIntoView(); return;} }
  scrollTo({top:0});
  progress();
}

/* 읽은 분량 */
function progress(){
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  const p = max<=0 ? 100 : Math.min(100, Math.round(h.scrollTop/max*100));
  document.getElementById('pct').innerHTML = p + '<small>%</small>';
  document.getElementById('bar').style.width = p + '%';
  // 현재 부 표시
  const hs = [...document.querySelectorAll('#doc h1')];
  let here = null;
  for(const el of hs){ if(el.getBoundingClientRect().top < 120) here = el.id; }
  document.querySelectorAll('.parts a').forEach(a=>
    a.classList.toggle('here', here && a.getAttribute('href')==='#'+here));
}
addEventListener('scroll', progress, {passive:true});

/* 검색 */
const q = document.getElementById('q');
q.addEventListener('input', ()=>{
  const s = q.value.trim();
  if(s.length < 2){ if(document.getElementById('doc').dataset.mode==='search') open_(cur); return; }
  const hits = [];
  DOCS.forEach((d,i)=>{
    d.md.split('\n').forEach((line,ln)=>{
      const at = line.toLowerCase().indexOf(s.toLowerCase());
      if(at>-1 && hits.length<80){
        const clean = line.replace(/[#*`>|]/g,'').trim();
        if(clean.length<3) return;
        hits.push({i, ln, doc:d.title, text:clean});
      }
    });
  });
  const el = document.getElementById('doc');
  el.dataset.mode='search';
  el.innerHTML = `<h1>검색: ${s}</h1><p style="color:var(--muted)">${hits.length}건</p>` +
    hits.map(h=>{
      const re = new RegExp('('+s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
      return `<div class="hit" onclick="open_(${h.i})">
        <div class="hit-doc">${h.doc}</div>
        <div class="hit-line">${h.text.replace(re,'<mark>$1</mark>')}</div></div>`;
    }).join('') || '<p>결과가 없습니다.</p>';
  document.getElementById('crumb').innerHTML = '<b>검색 결과</b>';
});

/* 모바일 */
function toggleSide(){ document.getElementById('side').classList.toggle('open');
  document.getElementById('scrim').classList.toggle('on'); }
function closeSide(){ document.getElementById('side').classList.remove('open');
  document.getElementById('scrim').classList.remove('on'); }
document.getElementById('scrim').onclick = closeSide;

/* 키보드 */
addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement!==q){ e.preventDefault(); q.focus(); }
  if(e.key==='Escape'){ q.blur(); closeSide(); }
  if(e.altKey && e.key==='ArrowDown'){ open_(Math.min(DOCS.length-1, cur+1)); }
  if(e.altKey && e.key==='ArrowUp'){ open_(Math.max(0, cur-1)); }
});

/* 내부 링크 가로채기 */
document.addEventListener('click', e=>{
  const a = e.target.closest('#doc a');
  if(!a) return;
  const href = a.getAttribute('href') || '';
  const m = href.match(/([\w가-힣]+\.md)(?:#(.+))?$/);
  if(m){
    const idx = DOCS.findIndex(d=>d.file===m[1] || d.file.endsWith(m[1]));
    if(idx>-1){ e.preventDefault(); open_(idx, m[2]); }
  }
});

buildNav();
open_(0);
</script>
</body>
</html>
