760만 |\n| 마케팅 | 1,000만 |\n| **합계** | **6,760만** |\n\n**필요 도달 사용자 약 2,700명 → 도달률 약 22%**\n\n#### 4.3 2인 전업\n\n| 항목 | 연간 |\n|---|---|\n| 인건비 2인 | 9,600만 |\n| 운영비 | 1,200만 |\n| 마케팅 | 2,000만 |\n| **합계** | **1억 2,800만** |\n\n**필요 도달 사용자 약 5,100명 → 도달률 약 42%**\n\n#### 4.4 결론\n\n| 체제 | 필요 도달률 | 시점 |\n|---|---|---|\n| **사이드** | **4%** | 2027년 즉시 가능 |\n| **1인 전업** | **22%** | 2027년 하반기 가능 |\n| **2인 전업** | **42%** | **2028년 이후** |\n\n> ⚠️ **2인 전업은 2028년까지 하지 않는다.** 02 문서에서 2027년 6월 전업 전환을 말했는데, **1인 기준으로 수정한다.**\n\n---\n\n### 5. 실패 시나리오와 출구\n\n**진지한 계획서는 실패를 미리 다룬다.**\n\n#### 5.1 언제 접는가\n\n| 조건 | 판단 |\n|---|---|\n| 게이트 1에서 H1·H2·H4 중 둘 이상 불통과 | **제품 방향 전면 재검토** |\n| 2027년 성년 시즌 도달률 10% 미만 | **정리 검토** |\n| 누적 적자 3,000만 초과 (사이드 기준) | **중단** |\n| 의료 자문이 \"이 서비스는 위험하다\"고 판단 | **A축 포기 또는 전체 중단** |\n| 법률상 R1·R5 전부 불가 | **수익 모델 재설계 또는 중단** |\n\n#### 5.2 접는 방법 — 잘 접는 것도 계획이다\n\n| 단계 | 행동 |\n|---|---|\n| 1 | **사용자에게 미리 알린다.** 여정 중인 사람이 있다 |\n| 2 | 시즌이 끝난 뒤(11월) 종료한다. **성수기 중 종료 금지** |\n| 3 | 데이터를 정리해 공개하거나 협회에 기증 |\n| 4 | 도메인은 최소 1년 유지 (링크가 살아 있다) |\n| 5 | 제휴처에 사전 통보 |\n\n#### 5.3 남는 것\n\n**최악의 경우에도 이것들은 남는다.**\n\n| 자산 | 가치 |\n|---|---|\n| **카미노 완주 경험** | 개인적으로 사라지지 않는다 |\n| 실측 데이터 (숙소 120곳, GPX) | 협회 기증 또는 공개 |\n| 콘텐츠 340페이지 | 블로그로 유지 가능 |\n| 40일 연재 (유튜브·브런치) | 포트폴리오 |\n| 제휴 네트워크 | 다음 사업에 쓰인다 |\n| 개발 경험 | |\n\n> **Phase 0의 실패 비용은 약 900만 원과 40일이다.**\n> 그 40일은 어차피 걷고 싶었던 길이다.\n\n#### 5.4 부분 전환\n\n**전체를 접지 않고 축소하는 선택지.**\n\n| 형태 | 내용 |\n|---|---|\n| **정보 사이트로 유지** | 콘텐츠만. 제휴 수익만. 유지비 월 5만 |\n| **협회에 이관** | 대한민국 산티아고 순례자 협회 등 |\n| **오픈소스 공개** | 계산기와 데이터를 공개. 커뮤니티가 유지 |\n| **카테고리 전환** | 카미노를 접고 제주올레·해파랑길로 |\n\n⚠️ **\"오픈소스 공개\"는 실패가 아니라 명예로운 종료다.** 순례자 커뮤니티에 자산을 남긴다.\n\n---\n\n### 6. 해자 — 누군가 따라온다면\n\n**우리가 시장을 증명하면 경쟁자가 온다.** 미리 대비한다.\n\n#### 6.1 따라올 수 있는 사람\n\n| 후보 | 가능성 | 위협 |\n|---|---|---|\n| 여행사 | 중 | 자본과 공급망. 하지만 자유여행층을 이해 못 함 |\n| 기존 카미노 블로거 | 높음 | 신뢰와 콘텐츠. 하지만 도구를 못 만듦 |\n| 순례자 협회 | 낮음 | 명분. 하지만 개발 역량 부족 |\n| 글로벌 앱의 한국어 지원 | 낮음 | 한국인이 1.4%라 투자 유인 없음 |\n| **다른 개발자 창업자** | **높음** | **가장 현실적인 위협** |\n\n#### 6.2 우리 해자\n\n| 해자 | 강도 | 복제 난이도 |\n|---|---|---|\n| **실측 데이터** (숙소 120곳, 건조기, 개방기간) | ★★★ | **40일과 800만 원이 든다** |\n| **검색 점유** (340페이지, 선점 효과) | ★★★ | 시간이 든다 |\n| **의료 검수 콘텐츠** | ★★☆ | 비용과 관계가 필요 |\n| **보여주기 카드** (현지 검수 문안) | ★★☆ | 현지 검증이 필요 |\n| 일정 엔진 로직 | ★☆☆ | **쉽게 복제됨** |\n| GPX·고도 데이터 | ★☆☆ | 공개 데이터 |\n| 제휴 관계 | ★★☆ | 시간 |\n\n> **가장 강한 해자는 \"직접 걸었다\"는 사실과 그로부터 나온 데이터다.**\n> 코드는 복제되지만 40일은 복제 안 된다.\n\n#### 6.3 방어 행동\n\n| # | 행동 |\n|---|---|\n| 1 | **실측 데이터를 계속 갱신한다.** 낡으면 해자가 아니다 |\n| 2 | 검색 선점을 서두른다 (2027년 1월 전 340페이지) |\n| 3 | 커뮤니티 신뢰를 쌓는다 (상업성 자제) |\n| 4 | 제휴를 독점으로 묶지 않되 관계를 깊게 |\n| 5 | **경쟁자가 오면 협력을 먼저 검토한다.** 시장이 작아 둘 다 죽는다 |\n\n⚠️ **5번이 중요하다.** 연 1만 명 시장에서 두 개가 싸우면 둘 다 안 된다. 인수·합병·역할 분담을 먼저 생각한다.\n\n---\n\n### 7. KPI 통합 대시보드\n\n**지표가 문서마다 흩어져 있었다. 한 곳에 모은다.**\n\n#### 7.1 북극성\n\n| 지표 | 정의 | 측정 |\n|---|---|---|\n| **도달률** | 그 해 한국인 순례자 중 우리를 한 번이라도 쓴 비율 | **연 1회 (이듬해 1월)** |\n\n⚠️ 분모가 연 1회만 나오므로 **연중에는 대리 지표로 운영한다.**\n\n#### 7.2 연중 대리 지표\n\n| 구분 | 지표 | 2027 목표 | 주기 |\n|---|---|---|---|\n| 획득 | 월 순방문자 (성수기) | 15,000 | 월 |\n| 획득 | 검색 유입 비중 | 60% | 월 |\n| 획득 | **네이버 : 구글 비중** | 1:2 이내 | 월 |\n| 활성 | 계산기 완료율 | 60% | 주 |\n| 활성 | 계획 링크 공유율 | 15% | 주 |\n| 활성 | 무료 도구 사용률 | 40% | 월 |\n| 전환 | 앱 설치 전환율 | 25% | 월 |\n| **핵심** | **앱 현장 사용률** | **55%** | 시즌 |\n| 보상 | 완주 화면 도달률 | 70% | 시즌 |\n| 보상 | 숫자 카드 공유율 | 40% | 시즌 |\n| 확장 | **이중 순례자 클릭률** | **50%** | 시즌 |\n| 카드 | **상대 응답률** | **70%** | 시즌 |\n| 콘텐츠 | 부상 페이지 유입 비중 | 35% | 월 |\n| 수익 | 보험 전환율 | 15% | 월 |\n| 수익 | 장비 전환율 | 12% | 월 |\n| 수익 | 숙소 예약 전환율 | 10% | 월 |\n| 품질 | \"도움이 됐나요\" 긍정률 | 80% | 월 |\n| 운영 | CS 24시간 응답률 | 95% | 주 |\n| 운영 | 데이터 오류 제보 처리율 | 90% | 월 |\n\n#### 7.3 경보 지표\n\n**이 값이 나오면 즉시 원인을 본다.**\n\n| 지표 | 경보선 | 의미 |\n|---|---|---|\n| 계산기 완료율 | 40% 미만 | UX 문제 |\n| 평균 체류 | 30초 미만 | 검색 의도 불일치 |\n| 네이버 비중 | 구글의 1/3 미만 | **블로그 병행 착수** |\n| 앱 현장 사용률 | 30% 미만 | **앱의 존재 이유 재검토** |\n| 카드 상대 응답률 | 40% 미만 | **그냥 번역기가 됐다** |\n| 데이터 오류 제보 | 월 20건 초과 | 데이터 신뢰도 위기 |\n| 보험 전환율 | 5% 미만 | R1 재설계 |\n\n---\n\n### 8. 의사결정 원칙\n\n#### 8.1 미리 정해둔다\n\n**결과를 보고 기준을 바꾸지 않는다.** 게이트 기준은 05 문서와 02 문서에 이미 있고, 그것을 따른다.\n\n#### 8.2 판단을 미루지 않는다\n\n| 상황 | 나쁜 대응 | 좋은 대응 |\n|---|---|---|\n| 트래픽이 안 나온다 | \"조금만 더 기다려보자\" | **원인을 특정하고 채널을 바꾼다** |\n| 제휴가 안 된다 | \"다른 데도 알아보자\" (무한 반복) | **3곳 시도 후 판단. 안 되면 시나리오 B** |\n| 인터뷰 결과가 예상과 다르다 | 유리하게 해석 | **문서를 고친다** |\n\n#### 8.3 매몰비용을 무시한다\n\n**900만 원과 40일을 이미 썼다는 사실은 다음 판단에 영향을 주면 안 된다.**\n\n> 걸었던 800km는 사라지지 않는다. 그건 이미 얻은 것이다.\n> 사업을 계속할지는 **앞으로의 기대값**으로만 판단한다.\n\n---\n\n### 9. 요약\n\n| 질문 | 답 |\n|---|---|\n| 가장 중요한 변수는? | **도달률.** 매출의 50%를 흔든다 |\n| 그다음은? | 보험·장비 전환율 (합쳐 24%) |\n| 사이드로 먹고살려면? | **도달률 4%** |\n| 1인 전업하려면? | **도달률 22%** |\n| 2인 전업하려면? | **도달률 42% — 2028년 이후** |\n| 최악의 실패 비용은? | **900만 원과 40일** |\n| 그때 남는 것은? | 완주 경험, 데이터, 콘텐츠 340개, 제휴망 |\n| 가장 강한 해자는? | **직접 걸었다는 사실과 실측 데이터** |\n| 경쟁자가 오면? | **먼저 협력을 검토한다.** 시장이 작다 |\n\n---\n\n# 4부 · 법무와 리스크\n\n### 0. 왜 필요한가\n\n법적 검토 항목이 여러 문서에 흩어져 있었다. **흩어져 있으면 빠뜨린다.**\n\n그리고 사업 축을 **부상**과 **숙소**로 잡은 순간, 법적 위험의 성격이 달라졌다.\n\n| 이전 | 지금 |\n|---|---|\n| 정보 제공 서비스 | **건강에 관한 판단을 제공하는 서비스** |\n| 무료 도구 | **커머스·제휴가 결합된 서비스** |\n| 데이터 표시 | **여행 상품 기획에 근접** |\n\n**세 가지 다 법적 노출이 커지는 방향이다.**\n\n---\n\n### 1. 위험 등급\n\n| 등급 | 의미 | 대응 |\n|---|---|---|\n| 🔴 | 사업 중단·소송 가능 | **착수 전 반드시 해결** |\n| 🟠 | 서비스 제한·행정 조치 가능 | 출시 전 해결 |\n| 🟡 | 분쟁 소지 | 문서화·고지로 관리 |\n| 🟢 | 관행적 준수 사항 | 체크리스트 |\n\n---\n\n### 2. 🔴 의료 정보 — A축의 근본 위험\n\n#### 2.1 위험의 실체\n\n우리는 **부상 예방과 대응**을 사업의 한 축으로 삼는다. 그런데:\n\n| 행위 | 위험 |\n|---|---|\n| \"이 통증은 쉬면 낫습니다\" | **진단·의료 판단** |\n| \"이 약을 드세요\" | **처방 행위** |\n| \"무릎보호대를 착용하세요\" | 의료기기 관련 표현 |\n| `injuryRiskScore` 78점 | **의학적 근거 없는 수치 제시** |\n| 부상 가이드 45개 페이지 | 의료 정보 제공 |\n\n**의료 자문 없이 이걸 하면 안 된다.**\n\n#### 2.2 우리가 지킬 선\n\n```\n증상을 전달한다              ← 우리\n        ↓\n전문가가 판단한다             ← 약사·의사\n        ↓\n판단을 정확히 받아온다         ← 우리\n        ↓\n일정에 반영한다               ← 우리\n```\n\n**우리는 통로다. 판단자가 아니다.**\n\n#### 2.3 필수 조치\n\n| # | 조치 | 시점 |\n|---|---|---|\n| 1 | **정형외과 또는 스포츠의학 자문 계약** | 부상 콘텐츠 착수 전 |\n| 2 | 부상 가이드 45개 전량 검수 | 게시 전 |\n| 3 | 보여주기 카드 의료 8장 검수 | 배포 전 |\n| 4 | **`injuryRiskScore`를 숫자로 노출 금지** | 즉시 |\n| 5 | 약 이름·용량·복용법 미기재 | 즉시 |\n| 6 | 전 페이지 면책 고지 | 게시 전 |\n| 7 | 응급 시 112 안내 상시 노출 | 즉시 |\n\n#### 2.4 면책 고지 문안 (초안 — 변호사 검토 필요)\n\n```\n이 서비스가 제공하는 신체·건강 관련 정보는 일반적인 참고 정보이며\n의학적 진단이나 치료 조언이 아닙니다.\n증상이 있을 경우 반드시 의료 전문가와 상담하십시오.\n응급 상황에서는 즉시 112(스페인)에 연락하십시오.\n```\n\n#### 2.5 CS 원칙\n\n**\"무릎이 아픈데 걸어도 되나요?\" 에 답하지 않는다.**\n\n- 진단·판단을 하지 않는다\n- 현지 의료기관 정보와 보험 청구 절차만 안내\n- **CS 매뉴얼 1번 항목으로 둔다**\n\n---\n\n### 3. 🔴 여행업 규제 — R5 반패키지\n\n#### 3.1 문제\n\n**숙소 예약 + 짐 배송 + 보험을 묶어 팔면 여행 상품이다.**\n\n국내에서 여행 상품을 기획·판매하려면 **관광사업자 등록**과 **영업보증보험**이 필요하다.\n\n#### 3.2 세 경로\n\n| 경로 | 규제 | 판단 |\n|---|---|---|\n| A. 순수 제휴 (링크만) | 없음 | 안전하나 수익 얇음 |\n| B. 직접 판매 | **등록 필요** | 부담 큼 |\n| **C. 화이트라벨** | **경계가 모호** | **택하되 반드시 확인** |\n\n#### 3.3 확인해야 할 것\n\n```\n□ \"기획만 하고 판매는 등록 여행사가 한다\"가 법적으로 성립하는가\n□ 우리가 받는 것이 \"기획료\"인가 \"알선 수수료\"인가 — 성격에 따라 규제가 다를 수 있다\n□ 사고 발생 시 책임 소재 (여행사 / 우리 / 공급자)\n□ 계약 주체가 누구로 표시되는가\n□ 우리 화면에서 결제가 일어나면 판매로 보는가\n```\n\n⚠️ **H18로 05 문서에 등록했다. 법률 자문 없이 R5를 진행하지 않는다.**\n\n---\n\n### 4. 🔴 보험 제휴 — 모집 행위 규제\n\n#### 4.1 문제\n\n여행자 보험을 소개하고 수수료를 받으면 **보험 모집 행위**에 해당할 수 있다.\n\n국내에서 보험을 모집하려면 **보험설계사·대리점 등록**이 필요하다.\n\n#### 4.2 가능한 구조\n\n| 구조 | 설명 | 규제 |\n|---|---|---|\n| 단순 정보 제공 | 상품 비교표만 제공, 링크 없음 | 낮음 |\n| 제휴 링크 | 보험사·GA 사이트로 연결 | **확인 필요** |\n| 직접 모집 | 우리가 가입 절차 진행 | **등록 필요** |\n\n#### 4.3 확인해야 할 것\n\n```\n□ 제휴 링크 방식이 모집 행위에 해당하는가\n□ GA(법인보험대리점)와의 제휴 시 우리 역할의 한계\n□ 보험 비교 콘텐츠의 광고 규제 (보험업법상 광고 심의)\n□ 수수료 수취의 적법성\n```\n\n⚠️ **R1이 매출의 3분의 1이다. 여기가 막히면 사업모델을 다시 짜야 한다.**\n**H16(제휴 가능성)과 함께 법적 가능성도 동시에 확인한다.**\n\n---\n\n### 5. 🟠 데이터 라이선스\n\n#### 5.1 OSM (경로 데이터) — ODbL\n\n| 의무 | 내용 |\n|---|---|\n| 저작자 표시 | \"© OpenStreetMap contributors\" |\n| **동일조건변경허락** | **파생 데이터베이스 배포 시 ODbL 적용** |\n\n**우리 설계**\n\n```\ndata/geometry/*.geojson   ← 좌표. gitignore. 배포 안 함\ndata/profiles.ts          ← 계산 결과 숫자만. 좌표 없음\n```\n\n**확인할 것**\n\n```\n□ 숫자만 남긴 profiles.ts가 \"파생 DB\"인가 \"Produced Work\"인가\n□ 상업 서비스에서의 적용 범위\n□ 앱 내 표시 위치와 방식\n```\n\n#### 5.2 IGN España (고도 데이터) — CC BY 4.0\n\n출처 표시만 하면 상업 이용 가능하다. **동일조건변경허락 의무 없음.**\n\n```\n고도 데이터 © Instituto Geográfico Nacional (CC BY 4.0)\n```\n\n#### 5.3 지도 타일\n\n**오프라인 대량 캐싱은 서비스 약관 위반이 될 수 있다.**\n\n```\n□ OSM 타일 서버 직접 사용 금지 (자체 호스팅 또는 상용)\n□ MapTiler 등 상용 서비스의 오프라인 캐싱 약관\n□ 사용자당 캐싱 용량 제한\n```\n\n#### 5.4 기타 데이터\n\n| 출처 | 판단 |\n|---|---|\n| 순례자 사무소 통계 | 공개 통계. 출처 표시 후 인용 가능 |\n| Gronze, Wise Pilgrim 등 | **크롤링·복제 금지** |\n| Village to Village Press GPX | **명시적 저작권. 사용 금지** |\n| 사용자 제보 | 이용약관에 이용 권한 명시 |\n\n---\n\n### 6. 🟠 개인정보\n\n#### 6.1 수집 최소화 원칙\n\n| 데이터 | 수집 | 저장 위치 |\n|---|---|---|\n| 이메일 | 선택 | 서버 |\n| 일정·계획 | 기본 | **URL (서버 저장 안 함)** |\n| 위치 | 앱만 | **단말 내. 서버 전송 금지** |\n| **의료 정보 (A7 카드)** | 선택 | **단말 내. 서버 전송 절대 금지** |\n| 사진·일지 | 선택 | 단말 + 선택적 동기화 |\n| **1년 후 편지** | 선택 | **서버 1년 보관 → 별도 동의** |\n\n#### 6.2 민감정보\n\n**의료 정보 카드(A7)는 개인정보보호법상 민감정보다.**\n\n```\n□ 별도의 명시적 동의\n□ 단말 내 암호화 저장\n□ 서버 전송 금지를 코드로 강제\n□ 삭제 요청 시 즉시 삭제\n□ 잠금화면 노출은 사용자가 켜야만\n```\n\n#### 6.3 필수 문서\n\n| 문서 | 상태 |\n|---|---|\n| 개인정보 처리방침 | 미작성 |\n| 이용약관 | 미작성 |\n| 위치정보 이용약관 | 앱 출시 전 |\n| **위치정보사업 신고** | **확인 필요** |\n\n⚠️ **위치정보를 다루면 방송통신위원회 신고 대상일 수 있다.** 단말 내 처리만 하면 해당하지 않을 수 있으나 확인한다.\n\n---\n\n### 7. 🟠 커머스와 광고\n\n#### 7.1 제휴 표시 의무\n\n**대가를 받고 상품을 추천하면 표시해야 한다.**\n\n```\n□ \"제휴 링크를 통해 수수료를 받습니다\" 명시\n□ 추천이 대가와 무관함을 밝히거나, 대가 관계를 밝히거나\n□ 심사지침(추천·보증 등에 관한 표시·광고 심사지침) 확인\n```\n\n#### 7.2 ⚠️ 공포 마케팅 금지 — 자체 원칙\n\n법적 문제이기 이전에 **윤리와 신뢰의 문제다.**\n\n| 금지 | 이유 |\n|---|---|\n| \"다칠 수 있으니 사세요\" | 공포 마케팅 |\n| 부상 통계로 상품 유도 | 위와 동일 |\n| 의료 정보 페이지에 상품 링크 | **정보와 상품의 분리** |\n\n**원칙: 부상 정보는 무료로, 상품 연결 없이 제공한다.**\n장비 추천은 **일정 설계의 결과로** 나온다.\n\n#### 7.3 의료기기·건강기능식품\n\n무릎보호대, 깔창, 테이핑 등은 **의료기기로 분류될 수 있다.**\n\n```\n□ 취급 품목의 의료기기 해당 여부\n□ 의료기기 광고 사전심의 대상 여부\n□ 효능·효과 표현 금지 범위\n```\n\n---\n\n### 8. 🟡 서비스 책임\n\n#### 8.1 \"판단을 제공한다\"의 무게\n\n우리 차별점은 \"데이터가 아니라 판단\"이다. **판단에는 책임이 따른다.**\n\n| 상황 | 위험 |\n|---|---|\n| \"오늘은 서두르지 않아도 됩니다\" → 만실 → 노숙 | 손해배상 주장 |\n| \"이 일정은 무리 없습니다\" → 부상 | 손해배상 주장 |\n| 숙소 정보 오류 → 헛걸음 | 불만·환불 요구 |\n| 개방 기간 오류 → 문 닫힌 알베르게 | 위와 동일 |\n\n#### 8.2 대응\n\n| # | 조치 |\n|---|---|\n| 1 | **모든 판단에 근거를 함께 표시** (\"침대 240개, 6월 평일 기준\") |\n| 2 | **\"추정\"임을 항상 명시** |\n| 3 | `verifiedAt` 노출로 데이터 나이를 밝힌다 |\n| 4 | 미확인 정보는 `UNKNOWN`으로 표시하고 추정하지 않는다 |\n| 5 | 이용약관에 면책 조항 |\n| 6 | 무료 서비스임을 명확히 (유료 부분과 구분) |\n\n> **정직함이 최선의 방어다.** \"우리도 모른다\"고 쓰는 것이 잘못된 정보보다 안전하다.\n\n---\n\n### 9. 🟡 명예훼손 — 숙소 실명\n\n#### 9.1 위험\n\n빈대 발생, 불친절, 시설 불량 등을 **특정 숙소 실명과 함께 게시**하면 명예훼손이 될 수 있다.\n\n스페인 사업자를 대상으로 한 게시물이라 **준거법과 관할** 문제도 생긴다.\n\n#### 9.2 대응\n\n| 원칙 |\n|---|\n| 빈대 제보는 **지역·시점만** 표시. 실명 금지 |\n| 사용자 리뷰 기능을 만들지 않는다 (Phase 1~3) |\n| 우리가 확인한 사실만 게시 |\n| 게시 전 법률 검토 |\n\n⚠️ **리뷰 기능은 매력적이지만 관리 부담과 법적 위험이 크다. 당분간 만들지 않는다.**\n\n---\n\n### 10. 🟢 기타\n\n| 항목 | 조치 |\n|---|---|\n| 상표 | 브랜드명 확정 후 출원 검토 |\n| 도메인 | 확보 |\n| 사업자 등록 | 매출 발생 전 |\n| 부가세 | 해외 제휴 수수료의 과세 여부 확인 |\n| **스페인·EU** | 서비스 대상이 한국인이므로 국내법 위주. **GDPR 적용 여부 확인** |\n| 저작권 | 실측 사진은 우리 것. 타인 사진 사용 금지 |\n| 오픈소스 라이선스 | 사용 패키지 라이선스 점검 |\n\n---\n\n### 11. 처리 순서\n\n**전부 한 번에 할 수 없다. 순서를 정한다.**\n\n| 순위 | 항목 | 시점 | 비용 |\n|---|---|---|---|\n| 1 | **의료 자문 계약** | 부상 콘텐츠 착수 전 (2026.11) | 월 정액 또는 건당 |\n| 2 | **보험 모집 규제 확인** | 제휴 조사와 동시 (2026.09) | 자문 1회 |\n| 3 | **여행업 화이트라벨 구조** | R5 착수 전 (2027.01) | 자문 1회 |\n| 4 | 개인정보 처리방침·이용약관 | 웹 공개 전 (2026.09) | 템플릿 + 검토 |\n| 5 | ODbL 파생물 해석 | 개발 착수 전 (2026.09) | 자문 1회 |\n| 6 | 제휴 표시·광고 규제 | 커머스 착수 전 (2027.02) | 자문 1회 |\n| 7 | 위치정보사업 신고 여부 | 앱 출시 전 (2027.03) | 확인 |\n| 8 | 상표 출원 | 브랜드 확정 후 | |\n\n**1~2번은 사업모델의 전제다.** 여기가 막히면 다른 걸 해도 소용없다.\n\n#### 예상 비용\n\n| 항목 | 금액 |\n|---|---|\n| 법률 자문 (초기 4건) | 200~400만 |\n| 의료 자문 (콘텐츠 검수) | 300~500만 |\n| **합계** | **500~900만** |\n\n⚠️ **Phase 0 예산 900만에 이 비용이 빠져 있다.** 전업 전환 시 반영한다.\nPhase 0에서는 **2번(보험)만 먼저 확인**하고 나머지는 미룬다.\n\n---\n\n### 12. 하지 않기로 한 것 (법적 이유)\n\n| 항목 | 이유 |\n|---|---|\n| 자체 숙소 예약 시스템 | 계약 주체가 되면 책임이 커진다 |\n| 사용자 리뷰 | 명예훼손 관리 부담 |\n| 약 이름·용량 안내 | 처방 행위 |\n| 진단·의학적 판단 | 무면허 의료 |\n| NFT·블록체인 증서 | 가상자산 규제 |\n| 자체 완주 인증서 | 공식 제도 사칭 우려 |\n| 실시간 위치 공유 | 위치정보 규제 + 프라이버시 |\n| 타사 앱·사이트 데이터 크롤링 | 저작권·DB권 |\n\n---\n\n### 13. 리스크 종합 대장\n\n**전 문서의 리스크를 한 표로 모은다.**\n\n| # | 리스크 | 등급 | 영향 | 대응 | 문서 |\n|---|---|---|---|---|---|\n| L1 | 보험 제휴 불발 | 🔴 | 매출 -33% | H16 최우선 검증 | 02 |\n| L2 | 의료 정보 책임 | 🔴 | 소송·서비스 중단 | 자문 검수 | 08 |\n| L3 | 고도 데이터 오류 | 🔴 | 부상 유발 | GPX 파이프라인 | 01, A |\n| L4 | 여행업 규제 | 🟠 | R5 불가 | 화이트라벨 검토 | 08 |\n| L5 | 보험 모집 규제 | 🟠 | R1 불가 | 자문 | 08 |\n| L6 | 숙소 정보 오류 → 노숙 | 🟠 | 신뢰 붕괴 | `verifiedAt`, `UNKNOWN` | 04 |\n| L7 | ODbL 파생물 해석 | 🟠 | 라이선스 위반 | 좌표 미배포 | A |\n| L8 | 시장 규모 자체 | 🟠 | 성장 한계 | 카테고리 확장 | 02 |\n| L9 | 성년 이후 반동 | 🟠 | 2028 감소 | 도달률 평가 | 02 |\n| L10 | 상업성 반감 | 🟠 | 도달률 실패 | 공포 마케팅 금지 | 02 |\n| L11 | 명예훼손 (숙소 실명) | 🟡 | 분쟁 | 실명 금지 | 08 |\n| L12 | 개인정보 유출 | 🟡 | 신고·과징금 | 최소 수집, 단말 저장 | 08 |\n| L13 | 데이터 노후화 | 🟡 | 신뢰 하락 | 갱신 주기 | 07 |\n| L14 | 정책 변경 (예약 제도) | 🟡 | 정보 오류 | 하드코딩 금지 | 04 |\n| L15 | 60대 사용성 실패 | 🟡 | 세그먼트 상실 | 17px, 대비 4.5:1 | 04 |\n| L16 | CS 부담 폭증 | 🟡 | 운영 마비 | FAQ, 상담 미제공 | 07 |\n| L17 | **상대가 폰을 안 만짐** | 🟠 | **보여주기 카드 무력화** | H20 실측 검증 | 09 |\n| L18 | 무료 강자 존재 | 🟢 | 경쟁 | 축이 다르다 | 02 |\n| L19 | 지도 타일 약관 | 🟢 | 비용 증가 | 자체 호스팅 | 08 |\n| L20 | 이중 순례자 제도 변경 | 🟢 | 안내 오류 | 연 1회 확인 | 03 |\n\n**🔴 3건이 전부 착수 전 해결 대상이다.**"}, {"file": "03_제품과기능.md", "title": "제품과 기능", "sub": "기획 · 사양 · 카드 · 경로고도", "md": "# 03 · 제품과 기능\n\n> 1부 제품 기획 · 2부 기능 사양 · 3부 보여주기 카드 · 부록 경로·고도 데이터\n> v4.1 · 2026년 7월\n\n---\n\n## 목차\n\n| 부 | 내용 | 대상 |\n|---|---|---|\n| **1부** | 제품 기획 | 문제 정의, 제품 원칙, 완주 보상, 기능 범위 |\n| **2부** | 기능 사양 | 데이터 모델, 기능별 상세, SEO 사양 |\n| **3부** | 보여주기 카드 | 화면을 보여주기만 하면 끝나는 카드 23장 |\n| **부록** | 경로·고도 데이터 | **개발 착수 전 필수.** 결함 1·2 해결 |\n\n---\n\n# 1부 · 제품 기획\n\n### 1. 한 줄 정의\n\n**한국인 순례자가 \"오늘 어떻게 걸어야 하는가\"를 대신 판단해주고, 다 걷고 나면 그 여정을 남겨주는 서비스.**\n\n경쟁 앱은 데이터를 **보여준다.** 우리는 **판단하고, 기록하고, 다음으로 연결한다.**\n\n---\n\n### 2. 문제 정의\n\n#### 2.1 핵심 문제\n\n> **한국인 순례자는 \"길을 못 찾아서\" 힘든 게 아니라, \"혼자 판단할 근거가 없어서\" 힘들다.**\n\n노란 화살표는 잘 되어 있다. 길은 거의 안 잃는다. 진짜 문제는 이것들이다.\n\n| 판단해야 하는 것 | 근거가 없는 이유 |\n|---|---|\n| 오늘 몇 km를 걸어야 무리가 안 되나 | 내 체력과 구간 난이도를 연결해주는 도구가 없다 |\n| 지금 쉬어도 되나, 서둘러야 하나 | 그 마을에 침대가 남을지 알 방법이 없다 |\n| 저 마을에서 자도 되나 | 침대 수, 겨울 폐쇄, 예약 가능 여부가 흩어져 있다 |\n| 이 통증은 쉬면 낫나, 병원에 가야 하나 | 판단 기준이 없고 언어도 안 통한다 |\n| 짐을 부치는 게 나은가 | 비용과 부상 위험의 트레이드오프를 아무도 계산해주지 않는다 |\n| **다 걷고 나면 뭐가 남나** | **콤포스텔라 한 장과 흐려지는 사진첩** |\n\n**기존 앱은 데이터를 주지만 판단을 대신해주지 않고, 여정이 끝나면 아무것도 남기지 않는다.**\n\n#### 2.2 시점별 문제\n\n| 시점 | 문제 | 현재 해결 방식 | 공백 |\n|---|---|---|---|\n| D-90 | 어느 길을, 며칠에 걸을지 못 정함 | 블로그·유튜브·카페 | 파편적, 개인 체력 미반영 |\n| D-60 | 항공권·순례자 여권·보험·장비 | 카페 눈팅 | 순서와 마감이 정리된 곳이 없음 |\n| D-30 | 배낭 꾸리기, 체력 준비 | 블로그 짐 목록 복사 | 계절·구간·체력별 조정 불가 |\n| D-Day | 숙소 확보 | Buen Camino, Gronze | 외국어, 오프라인 불가 구간 |\n| **여정 중** | **오늘 서둘러야 하나** | **없음** | **아무도 답하지 않음** |\n| 여정 중 | 물집·통증 | 참거나 현지 약국 | 스페인어 못 함, 약 이름 모름 |\n| 여정 중 | 빈대 | 커뮤니티에 물어봄 | 건조기 위치가 흩어져 있음 |\n| **종료 후** | **기록이 사라짐** | **사진첩에 방치** | **35일·800km·400만원의 결과가 없음** |\n| **종료 후** | **다음이 없음** | **\"카미노 앓이\"** | **연결이 끊긴다** |\n\n#### 2.3 ⭐ 1·2위가 사업 모델이다\n\n**침대 확보 불안**과 **부상**은 단순한 애로사항이 아니라 **이 사업의 수익 구조 그 자체**다.\n\n여행사 패키지가 585~720만 원을 받으며 파는 것의 본질이 짐 배송(=부상 대책)과 숙소 확보다.\n자유여행과의 차액 약 200만 원이 그 값이다.\n\n**우리는 그 두 가지를 50만 원 이하로 해결한다.** 상세는 02 문서 5장.\n\n#### 2.4 문제의 우선순위\n\n1. **침대 확보 불안** — 하루가 풍경이 아니라 시계를 중심으로 돌아간다\n2. **부상** — 완주 실패의 주된 원인\n3. **언어 장벽** — 1번과 2번을 모두 악화시킨다\n4. **여정 이후의 공백** — 제품 가치이자 도달률 전략의 핵심 (→ 6장)\n5. 빈대 — 빈도는 낮지만 발생 시 여정 전체가 망가진다\n6. 비용 — 400만 원대 지출\n\n---\n\n### 3. 타깃\n\n#### 3.1 타깃은 \"전원\"이다\n\n도달률 85%가 목표이므로 세그먼트를 좁히지 않는다. 다행히 공통 문제가 압도적으로 크다.\n\n#### 3.2 페르소나 (⚠️ 비율은 근거 없는 임시 가설)\n\n> **아래 비율은 우리가 만든 숫자다.** 순례자 사무소의 연령 분포를 확인하지 않았다.\n> 인터뷰 전까지 이 비율로 리소스를 배분하면 안 된다. (→ 01 문서 2부 2.6절)\n\n**A. 은퇴 직후 60대 — \"인생 정리형\"**\n- 전 구간 800km, 35~40일\n- 지불 의사 높음, 디지털 숙련도 낮음\n- 핵심 니즈: 큰 글씨, 무리 없는 일정, 아플 때 대처법, **인쇄 가능한 일정표**\n- **보상 민감도 최고.** 실물로 남는 것을 강하게 원한다\n- ⚠️ **자녀가 대신 계획을 세워주는 경로가 존재한다.** 사용자와 수혜자가 다르다\n\n**B. 30대 직장인 휴직·퇴사자 — \"전환기형\"**\n- 사리아 100km 또는 레온 300km, 10~20일\n- 예산 민감, 정보 탐색 능력 높음, SNS 활발\n- 핵심 니즈: 짧은 기간 최대 밀도, 비용 최적화, **기록 콘텐츠화**\n- **입소문의 주역.** 이들의 공유가 A와 C를 끌어온다\n\n**C. 20대 대학생·취준생 — \"방학형\"**\n- 최저 예산, 공립 알베르게 위주, 동행 선호\n- 핵심 니즈: 비용, 동행, 안전\n\n**D. 천주교 신자 순례단**\n- 본당·수도회 단위, 인솔자 존재\n- 핵심 니즈: 미사 시간, 수도원 숙소, 단체 관리 → B2B 접점\n\n---\n\n### 4. 포지셔닝\n\n|  | Buen Camino | Wise Pilgrim | Gronze | 네이버 카페 | **우리** |\n|---|---|---|---|---|---|\n| 언어 | 9개 (한국어 X) | 영어/스페인어 | 스페인어 | 한국어 | 한국어 |\n| 가격 | 무료 | 루트당 $4.99 | 무료 | 무료 | **무료** |\n| 강점 | 45개 루트 | 오프라인 지도 | 숙소 DB | 실경험 | **판단 + 기록** |\n| 커버 시점 | 길 위 | 길 위 | 계획~길 위 | 전 구간 | **D-90 ~ 귀국 1년 후** |\n| **여정 후** | **없음** | **없음** | **없음** | 후기 글 | **보상 체계** |\n\n**차별 축 세 가지**\n\n1. **시점** — 출국 전 90일을 장악한다. 커머스 수익 구간이기도 하다\n2. **판단** — 데이터가 아니라 결론을 준다\n3. **여정 이후** — 아무도 하지 않는 영역. 6장 참조\n\n> 한국어 번역만으로는 무료 앱 Buen Camino를 못 이긴다. 길 위에는 이미 한글 메뉴판이 있다.\n\n---\n\n### 5. 제품 원칙\n\n#### 원칙 1 — 묻지 말고 제안한다\n❌ \"며칠 걸으실래요?\" → ✅ \"체력 보통, 20일이면 레온 출발이 맞습니다. 하루 평균 21km, 휴식 1일 포함.\"\n\n#### 원칙 2 — 숫자에 근거를 붙인다\n❌ \"오늘 24km\" → ✅ \"오늘 24km · 상승 400m · 하강 550m · 그늘 없는 구간 8km · 도착지 침대 240개\"\n\n#### 원칙 3 — 오프라인이 기본이다\n메세타와 갈리시아 산간은 통신이 끊긴다. **온라인을 전제한 기능은 넣지 않는다.**\n\n#### 원칙 4 — 무료이고 가입이 없다\n핵심 기능에 결제벽·가입벽을 세우지 않는다. 계획 상태는 URL에 담아 링크 하나로 공유된다.\n\n#### 원칙 5 — 데이터의 나이를 숨기지 않는다\n숙소마다 \"2026년 4월 확인\"을 표시한다. 오래된 데이터에 대한 클레임을 구조적으로 방어한다.\n\n#### 원칙 6 — 완주가 아니라 무사 귀환이 목표다\n일정 설계의 목표 함수는 최단 일수가 아니라 **부상 없는 완주 확률**이다.\n\n#### 원칙 7 — 기록은 앱 밖으로 나갈 수 있어야 한다\n앱을 지워도 남는 형태(실물 포토북, 인쇄용 일정표, PDF)로 뽑아준다.\n\n#### 원칙 8 — 보상은 팔지 않고 준다 🆕\n완주 보상의 기본형은 **무료**다. 유료는 실물 제작처럼 원가가 발생하는 것에 한정한다.\n**\"완주했는데 돈을 내야 증서를 준다\"는 구조는 만들지 않는다.**\n\n---\n\n\n### 5-b. 메뉴 명칭 체계\n\n#### 5-b.1 원칙 — 현지에서 실제로 쓰는 말만 쓴다\n\n카미노 어휘를 쓰면 몰입감이 생긴다. 그러나 **모르는 단어는 장벽**이고, 우리 사용자의 상당수는 60대다.\n\n| 기준 | 판단 |\n|---|---|\n| **순례자가 현지에서 실제로 쓰는 말인가** | 쓴다 |\n| 배워야만 아는 말인가 | 안 쓴다 |\n| **기독교 교리 용어인가** | **안 쓴다** |\n\n⚠️ **기독교 용어(미사, 고해, 성무일도 등)를 메뉴에 쓰지 않는다.** 지금 순례자의 다수가 비종교적이고, 종교 서비스로 오인되면 도달률이 깎인다.\n\n#### 5-b.2 채택\n\n**아래 다섯 단어는 순례자가 첫날부터 듣는 말이다. 학습 부담이 없다.**\n\n| 메뉴 | 명칭 | 뜻 | 왜 이 말인가 |\n|---|---|---|---|\n| 홈 | **오늘** | — | 순례 중에는 오늘 하루만 중요하다 |\n| 일정 | **에타파** (Etapa) | 구간 | 하루 구간을 부르는 말. 가이드북·앱이 다 쓴다 |\n| 숙소 | **알베르게** (Albergue) | 순례자 숙소 | 한국 커뮤니티에서도 그대로 쓴다 |\n| 기록 | **크레덴시알** (Credencial) | 순례자 여권 | 실물을 매일 들고 다닌다 |\n| 지도 | **플레차** (Flecha) | 노란 화살표 | 길 안내의 상징 |\n| 카드 | **카드** | — | 다급한 순간에 쓰는 기능. **뜻이 즉시 통해야 한다** |\n| 완주 | **콤포스텔라** (Compostela) | 완주 증서 | 목표 그 자체 |\n| 준비 | **준비** | — | 출국 전 사용자는 아직 카미노 어휘를 모른다 |\n\n#### 5-b.3 표기 규칙\n\n- **한글을 크게, 원어를 작게 병기한다.** `에타파 Etapa`\n- 첫 사용 시 한 줄 설명을 붙인다\n- **\"카드\"와 \"준비\"는 번역하지 않는다.** 급하거나 낯선 사용자가 쓰는 곳이다\n- 도장은 **세요(Sello)** 로 부른다. 크레덴시알 화면 안에서만\n\n> **몰입은 부차적이고, 통하는 것이 우선이다.**\n> 판단을 대신해준다면서 메뉴를 못 읽게 만들면 앞뒤가 안 맞는다.\n\n---\n\n### 6. 보상 설계 — 소유욕을 만든다\n\n#### 6.1 원칙 — 보상은 \"받는 것\"이 아니라 \"갖는 것\"이어야 한다\n\n**800km를 걷고 400만 원을 쓴 사람에게 PDF 한 장은 약하다.**\n\n문제는 분량이 아니라 성격이다. **보상이 소유욕을 만들지 못하면 그냥 파일이다.**\n\n#### 6.2 소유욕은 무엇으로 만들어지나\n\n| 동인 | 설명 | 카미노에서의 형태 |\n|---|---|---|\n| **노력의 증거** | 고생해서 얻은 것만 갖고 싶다 | **걸어야만 열린다** |\n| **수집 완성** | 빈칸을 채우고 싶다 | **도장(세요) — 이미 존재하는 문화** |\n| **희소성** | 그때 그곳에서만 얻는다 | 구간·계절·성년 한정 |\n| **개인화** | 세상에 하나뿐 | 내 경로, 내 날짜, 내 사진 |\n| **물성** | 손에 잡힌다 | 인쇄물, 배지, 필름 |\n| **자랑 가능성** | 남에게 보여줄 수 있다 | 공유 카드, 액자 |\n| **애착 대상** | 정이 드는 무언가 | **크레덴시알, 철의 십자가에 놓는 돌** |\n\n> **카미노에는 이미 세계 최고의 수집 시스템이 있다. 크레덴시알에 도장 찍기다.**\n> 우리가 새 수집 문화를 만들 필요가 없다. **이미 있는 것을 디지털로 확장하면 된다.**\n\n#### 6.3 애착 — 만들지 않고 이미 있는 것을 쓴다\n\n**마스코트를 만들지 않는다.**\n\n순례자 커뮤니티는 유희적·상업적 장치에 민감하고, 60대 이상이 상당수인 사용자층에서 캐릭터는 부담이 될 수 있다. 무엇보다 **카미노에는 이미 애착 대상이 있다.**\n\n| 실존 사물 | 애착의 근거 | 우리가 할 일 |\n|---|---|---|\n| **크레덴시알 (순례자 여권)** | 매일 손에 들고 도장을 받는다. 다 차면 두 번째 권을 산다 | **디지털 아카이브로 보존** — 종이는 바래고 잃어버린다 |\n| **철의 십자가에 놓는 돌** | 집에서 가져와 지고 가서 내려놓는다 | **출발 전 등록 → 도착 시 기록** |\n| 조가비 | 배낭에 달고 다니는 순례자의 표식 | 완주 각인 상품 |\n\n##### 「내 돌」\n\n순례자는 집에서 돌 하나를 가져와 **철의 십자가(Cruz de Ferro, 1,505m)** 에 놓는다. 각자 그 돌에 무엇을 실을지 스스로 정한다. 프랑스 길 최고점이자 가장 상징적인 순간이다.\n\n```\n출발 전    돌 사진을 찍고, 무엇을 내려놓고 싶은지 한 줄 적는다\n   ↓\n걷는 동안  아무것도 하지 않는다\n   ↓\n13번 스팟  철의 십자가 도착 → 그 한 줄이 다시 보인다\n   ↓\n완주 후    순례기와 지도 포스터에 남는다\n```\n\n**우리가 만든 것이 아니라 이미 있는 의식을 기록해줄 뿐이다.** 그래서 부담이 없고, 그래서 진짜다.\n\n⚠️ 종교적 해석이나 위로의 문구를 덧붙이지 않는다. **무엇을 내려놓을지는 사용자가 정한다.**\n\n#### 6.4 ⭐ 안개 지도 — 걸어야 열린다\n\n**소유욕의 핵심 장치.**\n\n##### 개념\n\n```\n처음                          걸으면\n┌──────────────────┐         ┌──────────────────┐\n│ ☁ ☁ ☁ ☁ ☁ ☁ ☁ │         │ ☁ ☁ ☁ ██████ │\n│ ☁ ☁ ☁ ☁ ☁ ☁ ☁ │   →    │ ☁ ☁ ████████ │\n│ ☁ ☁ ☁ ☁ ☁ ☁ ☁ │         │ ██████████ ☁ │\n└──────────────────┘         └──────────────────┘\n   전부 구름                    걸은 만큼 밝아진다\n```\n\n**상징적 장소에 도착하면 그 주변이 열리고, 그곳의 이야기가 함께 열린다.**\n\n##### 열리는 장소 (프랑스 길 19곳)\n\n| # | 장소 | 무엇 |\n|---|---|---|\n| 1 | 생장피드포르 성문 | 출발 |\n| 2 | **레포에데르 고개** | 피레네 정상. 1일차 최대 고비 |\n| 3 | 론세스바예스 수도원 | 롤랑의 노래 |\n| 4 | 팜플로나 | 산 페르민 |\n| 5 | **용서의 언덕 (Alto del Perdón, 770m)** | 1996년 설치된 순례자 조각. **\"바람의 길과 별의 길이 만나는 곳\"** |\n| 6 | 푸엔테 라 레이나 | 중세 다리 |\n| 7 | **이라체 와인 샘** | 수도꼭지 둘. 하나는 물, 하나는 포도주 |\n| 8 | 산토 도밍고 대성당 | 성당 안에 살아있는 닭이 있다. 1350년부터의 전통 |\n| 9 | 부르고스 대성당 | 유네스코 |\n| 10 | 메세타 시작 | 끝없는 평야 |\n| 11 | 레온 대성당 | 스테인드글라스 |\n| 12 | 아스토르가 | 가우디 주교궁 |\n| 13 | **철의 십자가 (Cruz de Ferro, 1,505m)** | **프랑스 길 최고점. 집에서 가져온 돌을 놓는다** |\n| 14 | 폰페라다 성 | 템플기사단 |\n| 15 | 비야프랑카 델 비에르소 | 용서의 문 |\n| 16 | **오 세브레이로** | 성배 전설. 갈리시아 진입 |\n| 17 | **사리아** | 100km 지점 |\n| 18 | 포르토마린 | 수몰된 마을을 옮겨 지었다 |\n| 19 | **몬테 도 고소** | **대성당 첨탑이 처음 보이는 언덕** |\n\n각 장소가 열리면 **짧은 이야기 한 편**이 함께 열린다. 우리가 쓰는 게 아니라 **실측 도보에서 직접 보고 쓴다.**\n\n##### ⚠️ 설계 규칙 — 안전이 먼저다\n\n| 규칙 | 이유 |\n|---|---|\n| **기본은 전체 지도다. 안개는 선택 기능** | **길을 못 찾으면 위험하다** |\n| 안개는 \"이야기 레이어\"만 가린다 | **경로·화살표·알베르게는 항상 보인다** |\n| 언제든 끌 수 있다 | 60대에게 게임 요소는 부담일 수 있다 |\n| 오프라인에서 동작 | 통신 끊긴 구간에서도 열려야 한다 |\n| **위치는 단말 안에서만 판정** | 서버 전송 금지 |\n| 배터리 | 스팟 근처에서만 정밀 측위 |\n\n##### 왜 이게 소유욕을 만드나\n\n- **걸어야만 열린다** → 노력의 증거\n- **19개를 다 열고 싶다** → 수집 완성\n- **내가 밝힌 지도가 남는다** → 개인화\n- **완주 후 포스터로 뽑는다** → 물성 + 자랑 가능성\n\n> **\"내가 밝힌 지도\"가 완주 지도 포스터가 된다.** 디지털 성취가 벽에 걸리는 물건으로 이어진다.\n> 이게 소유욕 설계의 완성이다.\n\n#### 6.5 보상 목록\n\n##### A. 물성 — 손에 잡히는 것\n\n| # | 항목 | 소유욕 동인 | 원가 | 수익 |\n|---|---|---|---|---|\n| A1 | **내가 밝힌 지도 포스터** | 노력·개인화·자랑 | 8천~1.5만 | ○ |\n| A2 | **순례기 포토북** | 개인화·물성 | 2~4만 | ○ |\n| A3 | **일회용 필름 카메라** | 아래 6.6 | 1~2만 | ○ |\n| A4 | 자수 패치 / 핀 배지 | 수집·자랑 | 3천 | ○ |\n| A5 | 크레덴시알 보존 케이스 | 물성 | 5천 | ○ |\n| A6 | 각인 조가비 | 개인화 | 1만 | △ |\n\n##### B. 디지털 — 무료, 공유 유발\n\n| # | 항목 | 소유욕 동인 | 도달률 기여 |\n|---|---|---|---|\n| B1 | **안개 지도 (내가 밝힌 지도)** | 노력·수집·개인화 | ★★★ |\n| B2 | **도장 아카이브** | 수집 완성 | ★★ |\n| B3 | **내 카미노 숫자 카드** | 자랑 | ★★★ |\n| B4 | **「내 돌」 기록** | 애착 | ★★ |\n| B5 | 순례기 PDF | 개인화 | ★ |\n\n##### C. 다음 여정\n\n| # | 항목 |\n|---|---|\n| C1 | **이중 순례자(Dual Pilgrim) 안내** → 6.7 |\n| C2 | 피니스테레·무시아 연장 |\n| C3 | 국내 도보길 연결 |\n\n##### D. 시간\n\n| # | 항목 | 원가 |\n|---|---|---|\n| D1 | **1년 후 편지** | 0 |\n| D2 | 다음 순례자에게 조언 남기기 | 0 |\n\n#### 6.6 일회용 필름 카메라 — 검토\n\n**순례의 정서와 맞는 몇 안 되는 물건이다.**\n\n| 맞는 이유 | 설명 |\n|---|---|\n| **느림** | 27컷 제한 → 신중하게 찍는다 → 오히려 기억에 남는다 |\n| **배터리를 안 쓴다** | 순례에서 배터리는 늘 부족하다 |\n| **현상이 의식이 된다** | 귀국 후 며칠 뒤에 도착. **여정이 한 번 더 끝난다** |\n| **디지털이 못 주는 물성** | 인화지 |\n| **가볍다** | 100g 안팎. 배낭 10% 원칙과 충돌하지 않는다 |\n\n| 걸리는 점 | 대응 |\n|---|---|\n| 60대에게 매력적일까 | **오히려 익숙하다.** 필름 세대다 |\n| 분실·파손 | 저가라 부담이 적다 |\n| 현상 비용 | 국내 현상소 제휴로 묶는다 |\n| 항공 X선 | 800 이하 감도는 대체로 무해. **안내 필요** |\n\n**제안**: 출국 전 준비 세트에 넣고, **귀국 후 현상·스캔까지 묶는다.**\n`카메라 + 현상 + 스캔 + 포토북` = 하나의 상품.\n\n⚠️ 검증 필요 (H28).\n\n#### 6.7 이중 순례자 — 확장의 다리\n\n카미노와 일본 구마노고도는 **세계에서 단 둘뿐인 유네스코 세계유산 순례길**이고, 양쪽을 걸으면 공식 자격을 준다. 2015년 시작, 2025년 5월에 1만 번째 수여자가 나왔다.\n\n받는 것은 **조가비와 세 발 까마귀(야타가라스)를 결합한 한정판 핀 배지**와 화지(和紙) 수제 인증서다.\n\n**한국인에게 유리하다**\n\n- **카미노를 먼저 걸으면** 구마노 혼구 대사에서 다이코(북) 의식에 참여할 수 있다. 반대 순서면 없다\n- 일본이라 항공 20~30만 원, 3~5일\n- 최소 코스는 약 7km + 3대 신사 참배\n- **한국 커뮤니티에 정리된 자료가 거의 없다**\n\n⚠️ **우리는 안내만 한다.** 인증 대행이나 자체 증서 발급을 하지 않는다.\n\n#### 6.8 채택 순서\n\n| Phase | 항목 | 근거 |\n|---|---|---|\n| **1 (웹)** | — | 완주 기능 없음 |\n| **2 (웹)** | 이중 순례자 안내 페이지 | 검색 공백 |\n| **3 (앱)** | **안개 지도 · 세요 아카이브 · 숫자 카드 · 「내 돌」 · 1년 후 편지** | **전부 원가 0** |\n| **4 (수익)** | 지도 포스터 · 포토북 · 필름 카메라 세트 | 원가 발생 |\n| **5 (확장)** | 구마노고도 | 이중 순례자가 만든 수요 |\n\n#### 6.9 지표\n\n| 지표 | 목표 | 의미 |\n|---|---|---|\n| **안개 지도 스팟 개방률** | 완주자의 평균 15/19 | 실제로 쓰이는가 |\n| 완주 화면 도달률 | 앱 사용자의 70% | |\n| **숫자 카드 공유율** | **40%** | **도달률 기여** |\n| 이중 순례자 클릭률 | 50% | 확장 선행 지표 |\n| 1년 후 편지 작성률 | 50% | 재방문 |\n| 물성 상품 전환율 | 15% | 수익 |\n\n---\n\n### 7. 기능 범위\n\n#### 7.1 우선순위\n\n**Must — Phase 1 (웹, 2026 하반기)**\n\n| # | 기능 | 근거 |\n|---|---|---|\n| M1 | 구간 자동 계획 (부상 회피형) | 문제 1·2 |\n| M2 | 마을 데이터베이스 82곳 + 구간 고도 프로파일 | 기반 |\n| M3 | 마을·구간 SEO 페이지 163개 (자동 생성) | 도달률 전략 |\n| M4 | 비용 계산기 | 문제 6 |\n| M5 | 배낭 무게 계산기 | 문제 2 |\n| M6 | 준비 타임라인 (D-90) | 시점 공백 |\n| M7 | 인쇄용 일정표 PDF | 비디지털층 |\n\n**Must — Phase 2 (웹 확장, 2027 Q1)**\n\n| # | 기능 | 근거 |\n|---|---|---|\n| M8 | 알베르게 데이터 (`verifiedAt`, `hasDryer` 포함) | 문제 1·5 |\n| M9 | **\"오늘 서두를 필요 있나요?\" 혼잡 추정** | **문제 1 — 핵심 차별점** |\n| M10 | 전화 예약 스크립트 생성기 | 문제 3 |\n| M11 | 짐배송 비용·리스크 비교 | 트레이드오프 |\n| M12 | 상황별 스페인어 문장집 | 문제 3 |\n| M13 | **이중 순례자 안내 페이지** | 보상 + SEO |\n| **M14** | **보여주기 카드 인쇄본 (핵심 8장)** | **03 문서 3부. 앱 없이도 쓸 수 있다** |\n\n**Should — Phase 3 (앱, 2027 Q2)**\n\n| # | 기능 |\n|---|---|\n| S1 | 오프라인 지도 + GPX 내비게이션 |\n| S2 | 순례 일지 + 도장 기록 |\n| S3 | 건조기 보유 숙소 검색 (빈대 대응) |\n| S4 | 실시간 혼잡 제보 |\n| **S5** | **완주 화면 + 보상 5종 (6.5절 Phase 3)** |\n| **S6** | **보여주기 카드 23장 + 양방향 응답** ⭐ (3부 참조) |\n| **S7** | **안개 지도 (플레차)** ⭐ 소유욕 설계의 핵심 |\n| **S8** | **Plan B — 일정 카드 안에 접힘** (F-21) ⭐ 계획은 반드시 어긋난다 |\n\n**Could — Phase 4~5**\n\n| # | 기능 |\n|---|---|\n| C1 | 포토북·포스터 제작 연동 |\n| C2 | 커머스 연동 (장비·보험·짐배송) |\n| C3 | 다음 순례자에게 조언 (릴레이) |\n| C4 | 포르투갈 길, 북쪽 길 확장 |\n| C5 | **구마노고도 일정 계산기** |\n| C6 | 제주올레·해파랑길 |\n| C7 | **자전거 순례 지원** (F-25) — 보관 시설·자전거 가능 경로 데이터 필요 |\n\n**Won't — 명시적 제외**\n\n| # | 제외 | 이유 |\n|---|---|---|\n| W1 | 자체 숙소 예약 시스템 | 공립은 예약 인프라가 없다. 잘못된 표시는 노숙 위험 |\n| W2 | SNS 피드형 커뮤니티 | 네이버 카페가 이미 장악 |\n| W3 | 실시간 위치 공유 | 배터리·프라이버시 대비 효용 낮음 |\n| W4 | 구독 결제 | 도달률 상한을 만든다 |\n| W5 | 의료 진단·처방 정보 | 전문가 검수 없이는 절대 넣지 않는다 |\n| **W6** | **NFT·블록체인 증서** | **6.2절 참조** |\n| **W7** | **자체 완주 인증서 발급** | **콤포스텔라와 이중 순례자가 공식이다. 우리가 흉내내면 가짜가 된다** |\n\n#### 7.2 화면 구조\n\n```\n웹\n├── / 랜딩 — 즉시 계산기 진입\n├── /plan 일정 계산기            ← Phase 1 핵심\n│   └── /print 인쇄용\n├── /tools\n│   ├── /cost      비용 계산기\n│   ├── /pack      배낭 무게 계산기\n│   ├── /timeline  준비 타임라인\n│   ├── /phrase    스페인어 문장 생성기   (Phase 2)\n│   └── /transfer  짐배송 비교           (Phase 2)\n├── /route/[slug]  루트별 (3)             ← SEO\n├── /town/[slug]   마을별 (82)            ← SEO\n├── /stage/[slug]  구간별 (81)            ← SEO\n├── /guide/[slug]  준비·상황별 (100+)     ← SEO, Phase 2\n└── /dual-pilgrim  이중 순례자 안내       ← SEO + 보상, Phase 2\n\n앱 (Phase 3)\n├── 오늘                          ← 첫 화면\n│   ├── 오늘 구간 · 남은 거리\n│   ├── \"서두를 필요 있나요?\"\n│   └── 다음 식수·바·도착지\n├── 에타파 Etapa                  ← 전체 일정\n├── 플레차 Flecha                 ← 오프라인 지도 + ⭐ 안개 레이어(선택)\n├── 알베르게 Albergue\n├── 크레덴시알 Credencial          ← 일지 · 세요(도장)\n├── ⭐ 카드                        ← 보여주기 카드 23장. 3초 안에\n└── 콤포스텔라 Compostela          ← 마지막 도장을 찍으면 열린다\n    ├── 내가 밝힌 지도\n    ├── 내 카미노 숫자\n    ├── 「내 돌」\n    ├── 이중 순례자\n    └── 1년 후 편지\n    ├── 내 카미노 숫자\n    ├── 도장 아카이브\n    ├── 순례기 PDF\n    ├── ⭐ 이중 순례자\n    └── 1년 후 편지 쓰기\n```\n\n> **앱의 첫 화면은 \"오늘\"이다.** 순례 중에는 전체 일정이 아니라 오늘 하루만 중요하다.\n> **\"완주\" 탭은 마지막 도장을 찍기 전까지 잠겨 있다.** 미리 보이면 보상의 의미가 준다.\n\n---\n\n### 8. 성공 지표\n\n| 구분 | 지표 | 2027 목표 | 비고 |\n|---|---|---|---|\n| **북극성** | **도달률** | **30%** | 콤포스텔라 국적별 통계로 분모 산출. **연 1회 사후 검증** |\n| 대리 지표 | 월 순방문자 (성수기) | 15,000 | 연중 운영 지표 |\n| 획득 | 검색 유입 비중 | 60% | |\n| 활성 | 일정 계산 완료율 | 60% | |\n| 활성 | 계획 링크 공유율 | 15% | |\n| 전환 | 앱 설치 전환율 | 25% | |\n| **핵심** | **현장 사용률** | **55%** | 앱 설치자 중 여정 중 실사용 |\n| **보상** | **완주 화면 도달률** | **70%** | 앱 사용자 대비 |\n| **보상** | **숫자 카드 공유율** | **40%** | 도달률 기여 |\n| **확장** | **이중 순례자 클릭률** | **50%** | 다음 시장의 선행 지표 |\n| 수익 | 제휴 클릭률 | 8% | |\n\n**도달률이 북극성이다.** 단, 분모가 이듬해 1월에 발표되므로 연중에는 대리 지표로 운영한다.\n\n---\n\n### 9. 로드맵\n\n| 기간 | 단계 | 산출물 | 투입 |\n|---|---|---|---|\n| 2026 Q3 | 웹 MVP | 계산기 + SEO 163페이지 | 사이드, 500만 이내 |\n| 2026 Q4 | **현지 실측 도보 40일** | 전 구간 데이터 검증 + 콘텐츠 + **GPX** | 800만 |\n| 2027 Q1 | 웹 확장 | 알베르게 데이터, 도구 6종, 가이드 100페이지, 이중 순례자 안내 | |\n| 2027 Q2 | **앱 출시 + 보상 체계** | 오프라인 지도, 일지, **완주 화면** — 성년 시즌 진입 | 전업 판단 |\n| 2027 Q3~ | 수익화 | 커머스, 포토북·포스터 | |\n| 2028~ | 확장 | 포르투갈 길, **구마노고도**, 제주올레 | |\n\n#### 왜 2027 Q2인가\n\n**2027년은 성년(Año Santo Xacobeo)이다.** 직전 성년 2010년은 전년 대비 85% 급증했다. 2025년 53만 명 기준이면 2027년은 70만 명 이상이 예상된다.\n\n**다음 성년은 2032년이다. 이 창은 5년에 한 번 열린다.**\n\n---\n\n### 10. 리스크 (제품 관점)\n\n| 리스크 | 대응 |\n|---|---|\n| 잘못된 숙소 정보로 노숙 발생 | `verifiedAt` 노출, 미확인은 `UNKNOWN`, 예약 가능 여부 추정 금지 |\n| **고도 데이터 오류로 무리한 일정 제안** | **GPX 확보 전까지 위험 점수를 숫자로 노출하지 않는다** (→ 01 문서 2부 결함 1·2) |\n| 의료 정보 오류 | 전문가 검수 전까지 미제공. 면책 고지 |\n| **\"판단\"의 법적 책임** | 모든 판단에 근거 표시 + \"추정\" 명시 + 이용약관 면책. **법률 검토 필요** |\n| 정책 변경 (예약 제도 등) | 하드코딩 금지, 데이터로 관리 |\n| 60대 사용성 실패 | 최소 글꼴 17px, 대비 4.5:1, 60대 대상 테스트 필수 |\n| 오프라인 미동작 | 계산 로직에 네트워크 의존성 금지 |\n| 빈대 발생 숙소 실명 노출 | 지역·시점만. 법률 검토 전까지 실명 금지 |\n| **보상이 상업적으로 보임** | **원칙 8 준수. 무료 보상이 기본, 유료는 원가 발생 항목만** |\n| **이중 순례자 제도 변경** | **우리가 운영하는 제도가 아니다.** 안내만 하고, 연 1회 공식 사이트 확인 |\n\n---\n\n# 2부 · 기능 사양\n\n### 1. 시스템 개요\n\n#### 1.1 아키텍처\n\n**Phase 1 (2026 하반기) — 백엔드 없음**\n\n```\n┌──────────────────────────────────┐\n│  Next.js 15 (App Router)          │\n│  · 정적 생성 330+ 페이지           │\n│  · 계산은 전부 서버 컴포넌트에서    │\n│  · 상태는 URL 쿼리스트링           │\n│  · 데이터는 정적 TS 파일           │\n└──────────────┬───────────────────┘\n               │\n          Vercel 배포\n```\n\nDB도, 로그인도, API 서버도 만들지 않는다. **계산기 하나로 검색 수요를 검증하는 단계다.**\n\n**Phase 3 (2027 Q2) — 앱 추가**\n\n```\n┌──────────────────┐   ┌──────────────────┐\n│  React Native     │   │  Next.js (웹)     │\n│  · 오프라인 우선   │   │  · SEO·준비 단계  │\n│  · SQLite 로컬    │   │                  │\n└────────┬─────────┘   └────────┬─────────┘\n         └───────────┬───────────┘\n              ┌──────▼──────┐\n              │  API 서버    │\n              │  Node + PG   │\n              └──────┬──────┘\n        ┌────────────┼────────────┐\n   지도 타일      데이터 소스      제휴\n   (OSM 자체)   (실측·협회·제보)  (커머스)\n```\n\n#### 1.2 기술 선택 근거\n\n| 항목 | 선택 | 근거 |\n|---|---|---|\n| 프레임워크 | Next.js 15 App Router | **SEO가 전략 그 자체.** 정적 생성 필수 |\n| 언어 | TypeScript strict | `any` 금지 |\n| 스타일 | Tailwind CSS | 토큰 관리 용이 |\n| 상태 (Phase 1) | **URL 쿼리스트링** | 공유가 곧 바이럴. 가입 불필요 |\n| 테스트 | Vitest | 계산 로직 필수 |\n| 앱 (Phase 3) | React Native | 웹 계산 로직 재사용 |\n| 로컬 DB | SQLite (WatermelonDB) | 오프라인 우선. 전체 마을 DB 20MB 이내 |\n| 지도 | OSM + 자체 타일 호스팅 | Google Maps는 오프라인 캐싱 불가 |\n| 경로 | GPX + 단말 내 매칭 | 서버 통신 없이 이탈 감지 |\n| 백엔드 | Node.js + PostgreSQL(PostGIS) | 지리 쿼리, 인력 확보 용이 |\n\n#### 1.3 비기능 요구사항\n\n| 항목 | 요구 수준 |\n|---|---|\n| **SEO** | 모든 페이지 서버 렌더. JS 꺼도 내용이 보인다. Lighthouse SEO 100 |\n| **오프라인** (앱) | 항공기 모드에서 지도·경로·숙소·일정 전 기능 동작 |\n| **배터리** (앱) | GPS 상시 추적 시 8시간에 25% 이내 (10초 간격 샘플링) |\n| **저장 공간** (앱) | 프랑스 길 전 구간 지도 포함 400MB 이내 |\n| **접근성** | **최소 글꼴 17pt, 대비 4.5:1, 터치 타깃 44×44px 이상.** 60대 대상 테스트 필수 |\n| **응답 속도** | 일정 재계산 300ms 이내 (로컬 연산) |\n| **인쇄** | 일정표가 A4 1장에 깨끗하게 출력. `@media print` 필수 |\n| **언어** | 한국어 단일. 단, **마을·숙소명은 원어 병기 필수** (현지에서 보여줘야 함) |\n| **네트워크 의존성** | **계산 로직에 fetch 금지.** 순수 함수로만 |\n\n---\n\n### 2. 데이터 모델\n\n#### 2.1 Town (마을)\n\n```ts\ntype Service =\n  | 'WATER'         // 식수\n  | 'BAR'           // 바·식당\n  | 'SHOP'          // 상점\n  | 'PHARMACY'      // 약국\n  | 'ATM'\n  | 'BAG_TRANSFER'  // 짐 배송 접수\n  | 'MEDICAL'       // 의료시설\n  | 'MASS'          // 순례자 미사\n\ninterface Town {\n  id: string           // 슬러그. 'sarria', 'puente-la-reina'\n  nameEs: string       // 원어명 (필수, 절대 생략 불가)\n  nameKo: string\n  routeId: string\n  km: number           // 출발지 기준 누적거리\n  elevation: number    // 해발 m\n  lat: number\n  lng: number\n  services: Service[]\n  beds: number         // 마을 총 침대 수. 0이면 숙소 없음\n  population: number | null\n  notesKo: string | null   // 한국인 관점 메모\n}\n```\n\n#### 2.1-b SegmentProfile (마을 간 고도 프로파일) — 🔴 필수\n\n```ts\ninterface SegmentProfile {\n  fromTownId: string\n  toTownId: string\n  distanceKm: number\n  ascent: number       // 누적 상승 m  ← 마을 고도 차이가 아니다\n  descent: number      // 누적 하강 m  ← 무릎 부상의 주원인\n  maxElevation: number // 구간 최고점 (고개)\n  maxGradient: number  // 최대 경사도 %\n  source: 'OSM+MDT' | 'ESTIMATED'\n}\n```\n\n##### ⚠️ 왜 별도 테이블이 필요한가\n\n**마을 고도만으로 오르막을 계산하면 최대 39% 틀린다.**\n\n| 생장 → 론세스바예스 | 값 |\n|---|---|\n| `toTown.elevation − fromTown.elevation` | 950 − 170 = **+780m** |\n| 실제 (레포에데르 고개 약 1,450m 경유) | 상승 **약 1,280m**, 하강 약 500m |\n| 오차 | **약 500m** |\n\n카미노에서 부상이 가장 많은 날인데 \"평범한 산길\"로 판단된다.\n\n**하강 누락도 같은 급의 문제다.** 엘 아세보 → 몰리나세카는 1,145m → 595m로 **−550m 급경사 돌길**이며 무릎 부상으로 악명 높다. 그런데 `elevationGain` 기준으로는 0이라 \"쉬운 날\"이 된다.\n\n**→ `ascent`/`descent`는 반드시 실제 경로 좌표 + 수치표고모델에서 계산한다. 마을 고도로는 계산할 수 없다.**\n\n확보 방법은 **03 문서 부록** 참조.\n요약하면 경로는 OpenStreetMap(ODbL), 고도는 스페인 IGN MDT05(CC BY 4.0, LiDAR 5m 격자)를 쓰고 직접 계산한다. 데이터 비용은 0원이다.\n\n확보 전까지는 `source: 'ESTIMATED'`로 표시하고 **`injuryRiskScore`를 사용자에게 노출하지 않는다.**\n\n#### 2.1-c RouteFork (갈림길) 🆕\n\n**프랑스 길은 하나의 선이 아니다.** 여러 곳에서 갈라졌다가 다시 만난다.\n\n```ts\ntype VariantTrait =\n  | 'SCENERY'      // 경치\n  | 'MONASTERY'    // 수도원·성당\n  | 'QUIET'        // 한적함\n  | 'SHORTER'      // 거리 짧음\n  | 'EASIER'       // 난이도 낮음\n  | 'WINTER_SAFE'  // 겨울에도 안전\n  | 'HISTORIC'     // 역사적 가치\n  | 'ROAD_HEAVY'   // 차도 병행 많음 (부정적)\n\ninterface RouteFork {\n  id: string\n  splitTownId: string       // 갈라지는 지점\n  mergeTownId: string       // 다시 만나는 지점\n  variants: RouteVariant[]\n}\n\ninterface RouteVariant {\n  id: string\n  nameKo: string\n  nameEs: string\n  isMain: boolean           // 공식·주 경로 여부\n  townIds: string[]         // 경유 마을 순서\n  distanceKm: number\n  ascent: number\n  descent: number\n  closedFrom: string | null // MM-DD. 계절 폐쇄\n  closedTo: string | null\n  roadShareRatio: number    // 차도 병행 비율 0~1\n  hasShelter: boolean       // 중간에 대피할 마을이 있는가\n  traits: VariantTrait[]\n  highlightsKo: string[]\n  cautionKo: string | null\n}\n```\n\n##### 주요 갈림길\n\n| # | 분기점 | 선택지 | 판단 요소 |\n|---|---|---|---|\n| **1** | **생장피드포르** | **나폴레옹(고지)** vs **발카를로스(계곡)** | **11/1~3/31 나폴레옹 폐쇄.** 날씨·체력 |\n| 2 | 오바노스 직전 | 직행 vs **에우나테** (12세기 성당) | 거리 vs 역사 |\n| 3 | 에스테야 근처 | 직행 vs 몬테후라 | 경치 |\n| 4 | 부르고스 진입 | N-120 vs **강변길** vs N-1 | 차도 회피 |\n| 5 | 카리온 이후 | 직행 vs **비요비에코**(강길) | 경치 |\n| 6 | 사아군 이후 | 엘 부르고 라네로 vs **칼사다 로마나**(로마 가도) | 한적함 vs 서비스 부족 |\n| **7** | **레온 이후** | 비야당고스(차도) vs **비야르 데 마사리페** | **차도 회피. 인기 있음** |\n| 8 | 오스피탈 데 오르비고 | 직행 vs 산 후스토 우회 | 경치 |\n| 9 | 카카벨로스 이후 | 직행 vs 카라세도 수도원 | 역사 |\n| 10 | 비야프랑카 이후 | 직행 vs **프라델라**(능선) | 경치 vs 급경사 |\n| **11** | **트리아카스텔라** | **산 실(짧음)** vs **사모스(대수도원)** | 거리 vs 볼거리 |\n\n##### ⚠️ 1번 갈림길 — 반드시 정확해야 한다\n\n**나폴레옹 루트는 11월 1일부터 3월 31일까지 폐쇄된다.**\n\n| | 나폴레옹 | 발카를로스 |\n|---|---|---|\n| 성격 | 능선 종주 | 계곡 도로 |\n| 경유 | 온토 · 오리송 · 벤타르테아 고개 · **레포에데르 고개** | 아르네기(국경) · 발카를로스 · 이바녜타 고개 |\n| 경치 | 맑은 날 프랑스와 스페인이 모두 보인다 | 평범 |\n| **위험** | **오리송 위로 대피소가 없고 날씨가 몇 분 만에 바뀐다** | 도로 구간이 길다 |\n| 겨울 | **폐쇄** | **유일한 선택지** |\n\n**생장 순례자 사무소가 당일 안전한 쪽을 안내한다.**\n우리는 그 판단을 대체하지 않는다. **사전에 알려주고, 현지 안내를 따르라고 말한다.**\n\n---\n\n#### 2.2 Albergue (숙소)\n\n```ts\ntype AlbergueType =\n  | 'MUNICIPAL'   // 공립 (지자체)\n  | 'XUNTA'       // 갈리시아 주 공립\n  | 'PARISH'      // 본당\n  | 'MONASTERY'   // 수도원\n  | 'PRIVATE'     // 사립\n  | 'DONATIVO'    // 기부제\n\ntype ReservationMethod =\n  | 'NONE'      // 선착순 — 예약 불가\n  | 'PHONE'\n  | 'WHATSAPP'\n  | 'ONLINE'\n  | 'UNKNOWN'   // 미확인. 절대 추정으로 채우지 않는다\n\ninterface Albergue {\n  id: string\n  townId: string\n  name: string              // 원어명\n  type: AlbergueType\n  beds: number | null\n  priceEur: number | null   // 0 = 기부제, null = 미확인\n  reservation: ReservationMethod\n  contact: string | null\n  openFrom: string | null   // MM-DD. 겨울 폐쇄 다수 — 필수 관리\n  openTo: string | null\n  hasKitchen: boolean | null\n  hasLaundry: boolean | null\n  hasDryer: boolean | null  // ★ 빈대 대응의 핵심\n  hasWifi: boolean | null\n  hasHeating: boolean | null\n  acceptsBagTransfer: boolean | null  // ★ 공립은 대부분 false\n  verifiedAt: string | null // YYYY-MM. UI에 노출\n  source: 'FIELD' | 'PARTNER' | 'USER_REPORT' | 'PLACEHOLDER'\n}\n```\n\n##### ⚠️ 이 모델에서 절대 어기면 안 되는 것\n\n**① `reservation`을 추정으로 채우지 않는다**\n\n공립은 예약 불가가 일반적이지만, **하드코딩하지 않는다.** 2025년 초 포르투갈 길 친구회가 성수기 예약 허용을 제안했고, 2027년 성년을 앞두고 정책이 바뀔 수 있다. 미확인은 `UNKNOWN`으로 두고 UI에서 \"확인 필요\"로 표시한다.\n\n**② `verifiedAt`을 UI에 노출한다**\n\n\"2026년 4월 확인\" 표기는 경쟁 앱이 하지 않는 정직함이며, 오래된 데이터에 대한 클레임을 구조적으로 방어한다. `PLACEHOLDER`는 화면에도 샘플임을 명시한다.\n\n**③ `openFrom`/`openTo` 없이 숙소를 추천하지 않는다**\n\n공립 알베르게는 보통 부활절~10월 말 운영이다. 11월 순례자에게 4월에만 여는 곳을 추천하면 그 사람은 한데서 잔다.\n\n**④ `acceptsBagTransfer`는 별도 필드다**\n\n마을에 `BAG_TRANSFER` 서비스가 있어도, **공립 알베르게는 짐 배송을 받지 않는다.** 예약을 안 받아 침대를 보장할 수 없기 때문이다. 마을 단위와 숙소 단위를 분리해야 한다.\n\n#### 2.3 Plan / Stage\n\n```ts\ninterface PlanInput {\n  startTownId: string\n  targetKmPerDay?: number       // 14~32\n  totalDays?: number            // targetKm 대신 일수로 지정 가능\n  fitness: 'low' | 'normal' | 'high'\n  restDays: number              // 기본 1 (전 구간) / 0 (100km)\n  startDate?: string\n  useBagTransfer: boolean       // 비용·숙소 필터에 영향\n}\n\ntype StageWarning =\n  | 'STEEP_CLIMB'      // 누적 상승 600m 초과\n  | 'STEEP_DESCENT'    // 누적 하강 500m 초과 ← 무릎 부상 경고\n  | 'LONG_DISTANCE'    // 28km 초과\n  | 'FEW_BEDS'         // 도착지 침대 30개 미만\n  | 'NO_SERVICES'      // 구간 내 물·식당 없는 거리 10km 초과\n  | 'EARLY_OVERLOAD'   // 초반 3일에 과부하\n  | 'CONSECUTIVE_HARD' // 연속 3일 고강도\n\ntype HazardType =\n  | 'STEEP_DESCENT'   // 급경사 하강 — 무릎\n  | 'NO_SHELTER'      // 대피 지점 없음\n  | 'EXPOSED'         // 그늘 없음 — 열사병\n  | 'NO_WATER'        // 식수 없는 구간\n  | 'ROAD_WALKING'    // 차도 병행 — 교통\n  | 'SLIPPERY'        // 진흙·자갈\n  | 'NO_SIGNAL'       // 통신 두절\n  | 'WINTER_RISK'     // 적설·결빙\n\ninterface Hazard {\n  type: HazardType\n  fromKm: number      // 구간 내 상대 위치\n  toKm: number\n  noteKo: string\n}\n\ntype WaypointKind =\n  | 'START' | 'ARRIVE'\n  | 'BREAKFAST' | 'LUNCH' | 'REST'\n  | 'WATER' | 'PHARMACY' | 'ATM'\n  | 'BAG_DROP'        // 짐 배송 접수\n  | 'STAMP'           // 세요 받기 좋은 곳\n  | 'LANDMARK'        // 안개 지도 스팟\n  | 'TRANSPORT'       // 버스·택시 이용 지점\n\ninterface Waypoint {\n  kind: WaypointKind\n  townId: string | null\n  km: number              // 구간 시작 기준\n  etaMinutes: number      // 출발 후 경과\n  labelKo: string\n  noteKo: string | null\n  opensAt: string | null  // 첫 바 개점 시각 등\n}\n\ninterface Stage {\n  dayNo: number\n  date: string | null\n  fromTownId: string\n  toTownId: string\n  variantId: string | null   // 선택한 갈림길\n  distanceKm: number\n  ascent: number\n  descent: number\n  maxElevation: number\n  estimatedMinutes: number\n  suggestedStartTime: string // \"06:30\"\n  waypoints: Waypoint[]      // 하루 안의 모든 거점\n  hazards: Hazard[]\n  lodgingId: string | null   // 선택한 숙소\n  transportLegs: TransportLeg[]\n  warnings: StageWarning[]\n  isRestDay: boolean\n}\n\ninterface TransportLeg {\n  mode: 'BUS' | 'TAXI' | 'TRAIN'\n  fromTownId: string\n  toTownId: string\n  skippedKm: number       // 걷지 않은 거리\n  costEur: number | null\n  noteKo: string\n}\n\ninterface Plan {\n  stages: Stage[]\n  totalKm: number            // 전체 이동 거리\n  walkedKm: number           // ★ 실제로 걸은 거리 (이동수단 구간 제외)\n  totalDays: number\n  compostelaEligible: boolean\n  doubleStampPerDay: boolean     // ★ 총 도보거리 기준. 아래 주석 참조\n  injuryRiskScore: number        // 0~100. 낮을수록 안전\n}\n```\n\n---\n\n### 3. 기능별 상세 사양\n\n#### F-01 구간 자동 계획 (부상 회피형)\n\n**기존 앱과의 결정적 차이: 목표 함수가 최단 일수가 아니라 완주 확률이다.**\n\n##### 입력\n\n| 항목 | 형식 | 기본값 |\n|---|---|---|\n| 루트 | 프랑스 길 / 레온 / 사리아 | 프랑스 길 |\n| 기간 **또는** 하루 목표 거리 | 정수 / 14~32km | 24km |\n| 체력 수준 | 낮음 / 보통 / 높음 | 보통 |\n| 휴식일 | 0~5 | 전 구간 1, 100km 0 |\n| 출발일 | 날짜 | (선택) |\n| 짐 배송 사용 | 안 함 / 전 구간 / **오르막 구간만** | 안 함 |\n\n##### 알고리즘\n\n```\n1. 목표 거리 산정\n   - 일수 입력:  daily = 총거리 / (일수 - 휴식일)\n   - 거리 입력:  daily = 입력값\n   - 체력 보정:  낮음 ×0.85 / 보통 ×1.0 / 높음 ×1.15\n\n2. 탐욕 분할\n   현재 위치 + 목표거리 지점을 계산하고,\n   beds > 0 인 마을 중 가장 가까운 곳을 도착지로 선택. 산티아고까지 반복.\n   ※ 짐 배송 사용 시: acceptsBagTransfer 숙소가 있는 마을만 후보\n\n3. 부상 회피 후처리  ← 핵심\n   a. 초반 적응: 1~3일차 목표거리 ×0.8\n                 (몸이 적응하기 전 과부하가 부상의 주원인)\n   b. 오르막 보정: 다음 구간 오르막 400m 초과 시 해당 구간 ×0.85\n   c. 회복 배치: 오르막 400m 초과 구간 다음 날 ×0.85\n   d. 휴식일 삽입: restDays > 0 이면 큰 도시(beds ≥ 150)에 배치\n                  버고스, 레온 등 볼거리와 시설이 있는 곳\n   e. 마지막 구간 < 6km → 직전 구간에 병합\n\n4. 경고 산출\n   - 오르막 400m 초과       → STEEP_CLIMB\n   - 28km 초과              → LONG_DISTANCE\n   - 도착지 beds < 30       → FEW_BEDS\n   - 물·식당 없는 10km 초과 → NO_SERVICES\n   - 1~3일차 22km 초과      → EARLY_OVERLOAD\n   - 연속 3일 26km 초과     → CONSECUTIVE_HARD\n\n5. 부상 위험 점수\n   injuryRiskScore = f(평균거리, 최대거리, 총오르막, 초반부하, 연속고강도)\n   0~100. 60 이상이면 일정 재조정 권고 표시\n\n6. 콤포스텔라 요건 검증 (2025년 개정 기준)\n\n   최소 거리\n     도보·말 100km / 자전거 200km / 전기자전거 대상 아님\n\n   조건\n     a. 연속이어야 한다 → 이동수단으로 건너뛰면 그 지점에서 끊긴다\n     b. 스페인 영토 안에서 채워야 한다\n     c. 마지막 구간이 최소 20km이고 대성당으로 직접 이어져야 한다\n     d. 국외 출발이면 스페인 내 최소 70km\n        → 생장 출발은 여기 해당하나 스페인 구간이 700km 넘어 문제없다\n\n   도장 규칙  ★ 위치가 아니라 총 도보 거리 기준\n     최소 거리만 걷는 경우(도보 100km대 / 자전거 200km대) → 하루 2개\n     그보다 길게 걷는 경우                                → 하루 1개\n     → 생장에서 773km를 걸으면 사리아를 지나도 하루 1개면 된다\n```\n\n##### 출력\n\n일자별 카드. 도착지(한글+원어), 거리, 오르막, 예상 소요, 침대 수, 경고 배지, 도착 예정일.\n\n상단에 **부상 위험 점수**와 한 줄 판단:\n> \"무리 없는 일정입니다\" / \"초반 3일이 다소 빡빡합니다. 하루 늘리는 것을 권합니다\"\n\n##### 엣지 케이스\n\n| 상황 | 처리 |\n|---|---|\n| 하루 목표 14km 미만 | 숙소 없는 구간 발생. 하한 고정 |\n| 전 구간 + 32km (25일) | 물리적으로 가능하나 injuryRiskScore 90+ 경고 |\n| 출발지가 산티아고 100km 이내 | 콤포스텔라 요건 미달 사전 안내 |\n| 짐 배송 + 공립 선호 | **양립 불가 안내.** 비용 차이 표시 |\n\n---\n\n#### F-02 \"오늘 서두를 필요 있나요?\" — 혼잡 추정\n\n**우리만의 기능. 기존 앱은 아무도 이 질문에 답하지 않는다.**\n\n##### 왜 필요한가\n\n순례자는 오늘 그 마을에 침대가 몇 개고 몇 명이 향하는지 알 방법이 없다. 그래서 최악을 가정하고 새벽에 뛴다. 대부분의 경우 침대는 남는다. **문제는 침대 부족이 아니라 정보 부재다.**\n\n##### 추정 모델 (Phase 2)\n\n```\n예상 수요 = 기준 순례자 수\n          × 계절 계수 (월별)\n          × 요일 계수\n          × 구간 계수 (사리아 이후 급증)\n          × 특수일 계수\n\n혼잡도 = 예상 수요 / 마을 총 침대 수\n```\n\n**특수일 계수 — 반드시 반영**\n\n| 날짜/기간 | 영향 |\n|---|---|\n| 부활절 (Semana Santa) | 매우 높음 |\n| 7월 25일 (성 야고보 축일) | 산티아고 매우 높음 |\n| 10월 12일 (스페인 국경일) | 높음 |\n| 7월 6~14일 (팜플로나 산 페르민) | 팜플로나 극심 |\n| **2027년 전체 (성년)** | **전 구간 상향** |\n\n##### 출력\n\n```\n팔라스 데 레이 · 침대 240개\n⚠ 6월 토요일 · 사리아 출발자 집중 구간\n→ 13시 전 도착 권장\n\n────────────────────────\n\n카사노바 · 침대 40개\n✓ 대안: 4.2km 더 가면 침대 240개\n```\n\n세 단계로만 표현한다: **여유 / 서두르세요 / 만실 가능성 높음**\n\n⚠️ **정확도를 과장하지 않는다.** \"추정\"임을 명시하고, 근거(침대 수, 계절, 요일)를 함께 보여준다.\n\n---\n\n#### F-03 숙소 정보\n\n##### 목록\n\n정렬: 도착 마을 순 → 마을 내 공립 → 기부제 → 사립\n\n##### 카드 표시\n\n- **원어명 (크게)** — 현지에서 보여줄 수 있게\n- 유형 배지 / 침대 수 / 요금\n- **예약 가능 여부** — `UNKNOWN`이면 \"확인 필요\"로 표시하고 절대 추정하지 않는다\n- **\"2026년 4월 확인\"** 검증일\n- 시설 아이콘: 취사, 세탁, **건조기**, 난방, WiFi\n- **짐 배송 수령 가능 여부**\n- 한국인 메모\n\n##### 예약을 대행하지 않는다\n\n자체 예약 시스템은 만들지 않는다(→ 03 문서 1부 W1). 대신:\n\n- 전화·WhatsApp **원터치 연결**\n- **스페인어 예약 문장 자동 생성** (→ F-04)\n\n---\n\n#### F-04 전화 예약 스크립트 생성기\n\n**구현 비용 대비 효용이 가장 높은 기능.**\n\n언어 장벽 때문에 예약 가능한 사립 숙소를 두고도 선착순 공립에 줄 서는 문제를 직접 해결한다.\n\n##### 생성 예시\n\n```\n[알베르게 예약]\n\nHola, buenos días.\nQuería reservar una cama para esta noche.\nSomos 2 personas.\nLlegaremos sobre las 3 de la tarde.\nMi nombre es Kim.\nMuchas gracias.\n\n[한글 발음]\n올라, 부에노스 디아스.\n케리아 레세르바르 우나 카마 파라 에스타 노체.\n소모스 도스 페르소나스.\n...\n\n[뜻] 안녕하세요. 오늘 밤 침대 하나 예약하고 싶습니다. 2명입니다.\n     오후 3시쯤 도착합니다. 제 이름은 김입니다.\n```\n\n##### 상황 목록\n\n| 상황 | 우선순위 |\n|---|---|\n| 알베르게 전화 예약 | ★★★ |\n| WhatsApp 메시지 | ★★★ |\n| 약국 — 물집·근육통·소염제 | ★★★ |\n| **빈대 신고 (chinches)** | ★★☆ |\n| 응급 상황 | ★★☆ |\n| 식당 주문 | ★☆☆ |\n\n**WhatsApp은 복사 버튼 제공.** 스페인 알베르게는 WhatsApp을 많이 쓴다.\n\n---\n\n#### F-05 짐배송 비용·리스크 비교\n\n##### 왜 필요한가\n\n**공립 알베르게는 짐 배송을 받지 않는다.** 예약을 안 받아 침대를 보장할 수 없기 때문이다.\n\n```\n배낭 배송 사용 → 숙소가 미리 확정돼야 함\n              → 예약 가능한 사립만\n              → 8~10유로 → 12~25유로\n              → 35일이면 숙박비만 150~500유로 추가\n```\n\n**\"부상 위험을 줄이려면 돈을 더 내야 하는\" 구조**이고, 아무 앱도 계산해주지 않는다.\n\n##### 출력\n\n| | 배송 안 함 | **오르막 구간만** | 전 구간 |\n|---|---|---|---|\n| 배송비 | 0 | 약 25유로 (5구간) | 약 200유로 |\n| 숙박비 차액 | 0 | +25유로 | +250유로 |\n| **총 추가 비용** | **0** | **약 50유로** | **약 450유로** |\n| 부상 위험 점수 | 62 | **41** | 28 |\n| 공립 숙박 가능 | 전부 | 대부분 | 불가 |\n\n> **\"오르막 구간만\" 옵션을 기본 추천한다.** 비용은 최소, 효과는 대부분 확보된다.\n> 큰 오르막 3곳: 피레네(+780m), 폰세바돈(+560m), 오 세브레이로(+790m)\n\n---\n\n#### F-06 비용 계산기\n\n| 항목 | 산출 근거 |\n|---|---|\n| 항공 | 왕복 120~180만 (시즌별) |\n| 숙박 | 일수 × 숙소 유형별 단가 |\n| 식비 | 일수 × 25~40유로 (자취/외식 비율) |\n| 장비 | 신규 구입 여부에 따라 0~120만 |\n| 짐 배송 | F-05 연동 |\n| 보험·여권·기타 | 15만 |\n\n**출력은 범위로.** \"약 380만~450만 원\" 형태. 단일 숫자는 신뢰를 잃는다.\n\n---\n\n#### F-07 배낭 무게 계산기\n\n- 체중 입력 → **권장 상한 = 체중 × 10%** (보통 6~7kg)\n- 계절·구간·배송 사용 여부에 따라 품목 목록 조정\n- 품목별 권장 무게와 총합\n- 초과 시 **감량 우선순위 제안**\n\n---\n\n#### F-08 준비 타임라인 (D-90)\n\n출발일 입력 → 역산 체크리스트. 각 항목에 관련 페이지 연결.\n\n| 시점 | 항목 |\n|---|---|\n| D-90 | 코스 결정 / 항공권 / 여권 유효기간 (잔여 6개월 이상) |\n| D-60 | 순례자 여권(크레덴시알) / 여행자 보험 / **등산화 구입 후 길들이기 시작** |\n| D-30 | 배낭·침낭 / 체력 훈련 / 상비약 (물집·소염제·근육이완제) |\n| D-14 | 배낭 무게 최종 점검 / 유심·eSIM / 유로 환전 |\n| D-7 | 첫날 숙소 예약 / 공항 이동 / 가족 비상 연락 체계 |\n| D-1 | 짐 최종 점검 |\n\n> 크레덴시알은 국내 협회에서도 받을 수 있지만 **생장 현지 발급이 일반적**이다. 양쪽 다 안내한다.\n\n---\n\n#### F-09 인쇄용 일정표\n\n**비디지털층 접근의 유일한 경로.** 자녀가 뽑아서 부모에게 준다.\n\n- A4 1장에 전 일정\n- 일자, 날짜, 출발지→도착지 (한글+원어), 거리, 오르막, 침대 수\n- 하단에 응급 연락처, 기본 스페인어 문장 5개\n- `@media print` CSS 필수. 배경·네비게이션 제거\n\n---\n\n#### F-10 순례 일지·도장 (Phase 3, 앱)\n\n- 도착 표시 → 거리·소요시간 자동 기록, 도장 생성\n- 도장은 마을명 기반 SVG 자동 생성 + 실물 도장 사진 첨부 가능\n- 도장 2개 규칙 해당 시 \"오늘 도장 2개\" 리마인더\n- 오프라인 작성 → 온라인 복귀 시 동기화\n- 여정 종료 시 PDF 순례기 내보내기\n\n⚠️ **산티아고 대성당이 QR 기반 공식 디지털 크레덴시알을 운영 중이다.** 우리 도장은 **공식 증빙이 아닌 개인 기록**임을 명시하고, 콤포스텔라 발급에는 실물 크레덴시알이 필요함을 반복 안내한다.\n\n---\n\n#### F-10b 완주 화면 및 보상 (Phase 3, 앱) 🆕\n\n**마지막 도장을 찍으면 열린다. 그 전까지는 잠겨 있다.**\n미리 보이면 보상의 의미가 준다.\n\n##### 구성\n\n```\n완주\n├── 헤더: \"축하합니다. 773.1km를 걸으셨습니다\"\n├── ① 내 카미노 숫자        (원가 0, 공유 유발)\n├── ② 도장 아카이브         (원가 0)\n├── ③ 순례기 PDF            (원가 0)\n├── ④ ⭐ 이중 순례자 안내    (원가 0, 확장 전략)\n├── ⑤ 1년 후 편지 쓰기      (원가 0, 재방문)\n└── ⑥ 포토북·포스터 주문    (Phase 4, 유료)\n```\n\n##### ① 내 카미노 숫자 — 공유 카드\n\n일지 데이터에서 자동 산출한다.\n\n| 항목 | 산출 |\n|---|---|\n| 걸은 날 | 완료 표시한 구간 수 |\n| 총 거리 | 구간 거리 합 |\n| **총 걸음 수** | 거리 ÷ 평균 보폭(0.7m). **추정임을 명시** |\n| **누적 상승** | profiles 합. \"에베레스트 ○배\" 로 환산 |\n| 누적 하강 | profiles 합 |\n| 지나온 마을 | 구간 내 마을 수 |\n| 모은 도장 | 도장 수 |\n| 가장 긴 날 / 가장 높은 곳 | 최대값 |\n\n출력은 **1080×1350 이미지**로 내보낸다. SNS 세로 비율.\n디자인은 모호온(이정표) 형식을 재사용한다.\n\n⚠️ 걸음 수는 추정치다. \"약\"을 붙이고 산출 근거를 작게 표시한다.\n\n##### ④ 이중 순례자 안내 — 확장 전략의 진입점\n\n```\n\"그런데, 아직 절반입니다\"\n\n카미노 데 산티아고와 일본 구마노고도는\n세계에서 단 둘뿐인 유네스코 세계유산 순례길입니다.\n\n양쪽을 모두 걸으면 '이중 순례자'가 됩니다.\n2015년 시작해 2025년 5월에 1만 번째 순례자가 나왔습니다.\n\n받는 것\n· 조가비와 세 발 까마귀가 결합된 한정판 핀 배지\n· 일본 화지(和紙) 수제 인증서\n\n당신은 순서가 유리합니다\n카미노를 먼저 걸은 사람은 구마노 혼구 대사에서\n다이코(북) 의식에 참여할 수 있습니다.\n구마노를 먼저 걸으면 이 의식이 없습니다.\n\n필요한 것\n· 항공 20~30만 원 (일본)\n· 3~5일\n· 최소 코스: 홋신몬오지 → 혼구 대사 약 7km + 3대 신사 참배\n\n등록 장소\n구마노 혼구 헤리티지 센터 또는 타나베시 관광안내소\n(준비물: 카미노 크레덴시알 사진 + 구마노고도 도장첩)\n\n               [준비 체크리스트 보기]\n               [구마노고도 일정 짜기]  ← Phase 5\n```\n\n⚠️ **우리는 안내만 한다.** 인증을 대행하거나 우리 이름으로 증서를 발급하지 않는다.\n⚠️ 이 제도는 타나베시 관광청과 산티아고 측이 운영한다. **연 1회 공식 사이트로 요건을 재확인**한다.\n\n##### ⑤ 1년 후 편지\n\n- 완주 시점에 \"1년 뒤의 나에게\" 글을 쓰게 한다\n- 정확히 1년 뒤 이메일로 발송. 완주 당시의 숫자 카드를 함께 첨부\n- 원가 0, 재방문 유발\n- ⚠️ 이메일 1년 보관에 대한 동의를 별도로 받는다\n\n##### 데이터 모델\n\n```ts\ninterface Completion {\n  planId: string\n  completedAt: string\n  stats: {\n    days: number\n    distanceKm: number\n    estimatedSteps: number   // 추정치\n    totalAscent: number\n    totalDescent: number\n    townsPassed: number\n    stampsCollected: number\n    longestDayKm: number\n    highestPointM: number\n  }\n  letterToFuture: string | null\n  letterSendAt: string | null\n  dualPilgrimInterest: boolean   // 확장 전략 선행 지표\n}\n```\n\n##### 지표\n\n| 지표 | 목표 |\n|---|---|\n| 완주 화면 도달률 | 앱 사용자의 70% |\n| 숫자 카드 공유율 | 40% |\n| **이중 순례자 클릭률** | **50%** |\n| 1년 후 편지 작성률 | 50% |\n| 편지 개봉률 | 60% |\n\n---\n\n#### F-11 오프라인 지도·경로 (Phase 3, 앱)\n\n##### 사전 다운로드\n\n- 계획 확정 시 해당 구간 지도 타일(줌 12~16) + GPX 자동 다운로드\n- Wi-Fi 전용 기본값, 진행률 표시, 중단 후 재개\n- 프랑스 길 전 구간 약 320MB\n\n##### 주행 중 (전량 오프라인)\n\n| 기능 | 동작 |\n|---|---|\n| 현재 위치 | GPS + GPX 매칭, 남은 거리 |\n| 경로 이탈 | 트랙에서 **150m 이상** 벗어나면 진동 + 알림 |\n| 다음 서비스 | \"식수 2.1km / 바 4.8km / 도착지 11.3km\" 상시 표시 |\n| 갈림길 | 대안 경로 분기 사전 알림 (예: 사모스 vs 산실) |\n| 배터리 절약 | 화면 꺼짐 시 60초 간격 전환 |\n\n> **이탈 임계값 150m 근거**: 마을 통과 시 GPX와 실제 도보 경로가 50~100m 차이 나는 구간이 흔하다. 임계값이 낮으면 알림 피로가 발생한다.\n\n---\n\n#### F-13 준비물·장비 안내 (A축) 🆕\n\n**부상 예방의 실행 도구이자 R2 커머스의 접점.**\n\n##### 입력 없이 일정에서 자동 산출\n\n| 일정 조건 | 안내 내용 |\n|---|---|\n| 총 거리 500km 이상 | 신발 길들이기 D-60 시작 |\n| 하루 평균 25km 이상 | 깔창·양말 등급 상향 |\n| 누적 하강 큰 구간 다수 | 등산스틱 권장 |\n| 10~11월 또는 3~4월 출발 | 방수 등급 |\n| 짐 배송 미사용 | 배낭 무게 상한 강조 |\n| 60세 이상 (선택 입력) | 무리하지 않는 항목 강조 |\n\n##### 출력\n\n```\n35일 · 773km · 누적 하강 11,200m\n\nD-60까지 준비할 것\n  ▸ 등산화        ← 발이 붓습니다. 평소보다 크게\n                    길들이는 데 4~6주 걸립니다\n  ▸ 양말 3~4켤레\n\nD-30까지\n  ▸ 등산스틱      ← 이 일정은 하강이 많습니다\n  ▸ 배낭 (체중 10% = 6.5kg 이내)\n\n지금 쓰는 것이 멀쩡하다면 새로 사지 않아도 됩니다.\n  [무엇을 봐야 하는지 알아보기]\n```\n\n⚠️ **\"안 사도 된다\"를 반드시 노출한다.** (→ 02 문서 1부 9.1)\n⚠️ **브랜드를 지정하지 않는다.** 기준을 알려주고 선택은 사용자가 한다.\n⚠️ **부상 콘텐츠 페이지 안에는 구매 링크를 넣지 않는다.** (→ 02 문서 4부 7.2)\n\n---\n\n#### F-14 보험 안내 (A축) 🆕\n\n⚠️ **보험 모집 규제 확인 전까지 구현하지 않는다.** (→ 02 문서 4부 4장)\n\n##### 제공 범위 (규제 확인 후 조정)\n\n| 단계 | 내용 | 규제 위험 |\n|---|---|---|\n| 1 | **무엇을 봐야 하는지** 안내 | 낮음 |\n| 2 | 상품 비교표 | **확인 필요** |\n| 3 | 제휴 링크 | **확인 필요** |\n| 4 | 가입 절차 진행 | **불가 (등록 필요)** |\n\n##### 순례 특화 체크리스트\n\n```\n□ 40일 이상 장기 가입이 되는가\n□ ★ 도보·트레킹이 담보에 포함되는가\n   (위험 스포츠로 분류되면 보장이 안 될 수 있습니다)\n□ 기왕증(무릎 관절 등) 처리\n□ 현지 병원 캐시리스 여부\n□ 보험금 청구 서류 (→ 보여주기 카드 A8과 연동)\n```\n\n> **2번이 가장 중요하다.** 이건 제휴 이전에 **사용자 안전 정보**다.\n> 제휴가 안 되더라도 이 정보는 무료로 제공한다.\n\n---\n\n#### F-15 짐 배송 판단 (A+B축) 🆕\n\nF-05 계산기를 확장한다.\n\n| 옵션 | 배송비 | 숙박 차액 | 총 추가 | 하강 부하 |\n|---|---|---|---|---|\n| 안 함 | 0 | 0 | **0** | 100% |\n| **오르막 3구간만** | 약 25유로 | +25유로 | **약 50유로** | **75%** |\n| 전 구간 | 약 200유로 | +250유로 | 약 450유로 | 55% |\n\n⚠️ **공립 알베르게는 짐 배송을 받지 않는다.** 배송 사용 시 숙소 후보가 사립으로 제한된다.\n⚠️ 배송 사업자가 **구간별 부분 이용을 허용하는지** 확인이 필요하다. (→ 04 문서 4부 5장)\n\n---\n\n#### F-16 보여주기 카드 연동 🆕\n\n03 문서 3부 참조. 사양서 관점의 요건만 적는다.\n\n| 요건 | 내용 |\n|---|---|\n| 저장 | 카드 문안·이미지 전량 로컬. 오프라인 동작 |\n| 데이터 삽입 | 이름, 인원, 도착 예정 시각, 일정, 크레덴시알 번호 |\n| **B3 대안 마을** | `towns.ts`에서 실시간 산출 |\n| **A1 결과 연동** | 약사 응답 → 일정 재계산 호출 |\n| 밝기 | 카드 표시 중 화면 밝기 최대 |\n| 인쇄 | 핵심 8장 A4 양면 |\n| **의료 정보(A7)** | **단말 내 암호화. 서버 전송 금지** |\n\n---\n\n#### F-17 안개 지도 (플레차) — Phase 3 🆕\n\n**소유욕 설계의 핵심 장치.** 개념과 근거는 1부 6.4절.\n\n```ts\ninterface Landmark {\n  id: string\n  townId: string | null\n  nameKo: string\n  nameEs: string\n  lat: number\n  lng: number\n  radiusM: number          // 개방 판정 반경. 기본 300\n  storyKo: string          // 실측 도보에서 직접 쓴다\n  photoUri: string | null  // 실측 사진만. 스톡 금지\n  order: number            // 1~19\n}\n\ninterface FogState {\n  revealed: string[]\n  revealedAt: Record<string, string>\n  trackCells: string[]     // 걸어서 밝힌 지도 셀\n}\n```\n\n##### 개방 판정\n\n```\n1. 스팟 반경 300m 진입 + 3분 이상 체류 → 개방\n   (지나가기만 한 것과 도착한 것을 구분)\n2. 개방 시 진동 + 카드 표시 (이야기 + 사진)\n3. 개방 상태는 영구 보존\n4. 경로 주변 1km 폭은 걸은 만큼 자동으로 밝아진다\n```\n\n##### ⚠️ 안전 규칙\n\n| 규칙 | 이유 |\n|---|---|\n| **기본값은 안개 꺼짐** | 사용자가 켜야 켜진다 |\n| **안개는 이야기 레이어만 가린다** | **경로·화살표·알베르게·식수는 항상 보인다** |\n| 설정에서 언제든 끈다 | 게임 요소가 부담일 수 있다 |\n| **오프라인 동작** | 통신 끊긴 구간에서도 열려야 한다 |\n| 위치는 단말 내 판정 | **서버 전송 금지** |\n| 스팟 근처에서만 정밀 측위 | 배터리 |\n| 개방 실패 시 수동 개방 허용 | GPS 오차로 못 열면 상실감이 크다 |\n\n> **안개 때문에 길을 못 찾는 일이 단 한 번도 있어서는 안 된다.**\n> 이 기능은 재미를 위한 것이고, 안전은 재미보다 위다.\n\n##### 완주 후\n\n개방한 스팟 수와 밝힌 면적을 완주 화면에 표시하고, **\"내가 밝힌 지도\"를 포스터로 주문**할 수 있다. 못 연 스팟은 흐리게 남긴다 — 다시 오고 싶게.\n\n---\n\n#### F-18 「내 돌」 — Phase 3 🆕\n\n**마스코트 대신, 이미 존재하는 의식을 기록한다.** 근거는 1부 6.3절.\n\n```ts\ninterface MyStone {\n  photoUri: string | null    // 출발 전 촬영\n  noteKo: string             // 무엇을 내려놓고 싶은지. 한 줄\n  registeredAt: string\n  placedAt: string | null    // 철의 십자가 도착 시각\n}\n```\n\n| 요건 | 내용 |\n|---|---|\n| 등록 | 준비 타임라인 D-7 항목. **선택 사항** |\n| 노출 | 평소에는 보이지 않는다. **알림을 보내지 않는다** |\n| 13번 스팟 | 철의 십자가 개방 시 등록한 한 줄이 다시 표시된다 |\n| 이후 | 순례기와 지도 포스터에 포함 |\n| 저장 | **단말 내.** 서버 전송하지 않는다 |\n\n⚠️ **종교적 해석이나 위로의 문구를 덧붙이지 않는다.** 사용자가 쓴 문장을 그대로 보여줄 뿐이다.\n⚠️ 미등록 사용자에게 등록을 권하지 않는다. 원하는 사람만 쓴다.\n\n---\n\n#### F-19 갈림길 추천 🆕\n\n**같은 순례길이라도 사람마다 걷는 길이 다르다.** 11곳에서 갈라진다.\n\n##### 입력\n\n일정 계산 시 이미 받은 값에 두 가지를 더한다.\n\n| 항목 | 값 |\n|---|---|\n| 출발일 | (기존) — **계절 폐쇄 판정** |\n| 체력 | (기존) |\n| **관심** | 경치 / 역사·건축 / 한적함 / 최단 (복수 선택) |\n| **차도 회피** | 예 / 아니오 |\n\n##### 판정 규칙\n\n```\n1. 폐쇄 제외\n   출발 예정일이 closedFrom~closedTo 안이면 해당 변형을 후보에서 뺀다\n   → 11~3월 나폴레옹은 아예 선택지에 없다\n\n2. 안전 우선\n   체력 '낮음' + hasShelter=false → 감점\n   roadShareRatio > 0.5 + 차도 회피=예 → 감점\n\n3. 관심 가중\n   traits와 사용자 관심의 교집합 크기로 가점\n\n4. 부하 반영\n   ascent/descent가 그날 일정 부하를 넘기면 감점\n```\n\n##### 출력\n\n각 분기점마다 **추천 + 이유 + 대안**을 함께 보여준다.\n\n```\n갈림길 11 · 트리아카스텔라\n\n▸ 추천: 사모스 Samos            +6.4km\n  스페인에서 가장 오래된 수도원 중 하나가 있습니다.\n  \"역사·건축\"을 고르셨고, 이 날 일정에 6km 여유가 있습니다.\n\n  대안: 산 실 San Xil           최단\n  거리를 줄이고 싶다면 이쪽입니다.\n\n  [사모스로]  [산 실로]  [나중에 정할게요]\n```\n\n⚠️ **\"나중에 정할게요\"를 항상 둔다.** 길 위에서 마음이 바뀌는 것이 순례다.\n\n##### 1번 갈림길의 특례\n\n```\n갈림길 1 · 생장피드포르 → 론세스바예스\n\n⚠️ 출발일이 11월 12일입니다.\n   나폴레옹 루트는 11월 1일~3월 31일 폐쇄됩니다.\n   → 발카를로스 루트로 계획했습니다.\n\n   나폴레옹 구간은 오리송 위로 대피할 곳이 없고\n   날씨가 몇 분 만에 바뀝니다.\n\n   ※ 개방 시기라도 당일 상황은 생장 순례자 사무소가 안내합니다.\n     현지 안내를 우선하세요.\n```\n\n**우리가 안전 판단을 대체하지 않는다.** 사전 정보를 주고 현지 판단을 따르게 한다.\n\n---\n\n#### F-20 일자별 상세 일정 🆕\n\n**\"Day 1 → Day 35\"로 펼쳐 보이고, 하루 안의 모든 거점을 표시한다.**\n\n##### 화면\n\n```\nDay 12  ·  10월 22일 (수)\n부르고스 → 오르니요스 델 카미노        21.0 km\n────────────────────────────────────────────\n06:30  출발 · 부르고스               해 뜨기 40분 전\n       ⚠ 시가지 구간. 화살표 확인\n\n07:40  타르다호스           3.9km   ☕ 첫 바 07:00 개점\n       🅿 아침 권장\n\n09:10  라베 데 라스 칼사다스 6.0km   💧\n       ⚠ 이후 10.4km 서비스 없음  ← 물 채우기\n\n       ░░░ 메세타 진입 ░░░\n       ⚠ 그늘 없음 · 통신 약함\n\n12:20  오르니요스 도착      21.0km\n       🛏 공립 알베르게 70침대 · 예약 불가\n          13:00 개방 · 여유\n       🍽 마을에 식당 1곳\n       📮 짐 배송 접수 불가 (공립)\n────────────────────────────────────────────\n상승 +180m   하강 -215m   예상 5시간 50분\n위험: 그늘 없음(10km) · 통신 두절\n```\n\n##### 표시 항목\n\n| 종류 | 기호 | 내용 |\n|---|---|---|\n| 출발·도착 | — | 권장 출발 시각, 도착 예상 |\n| 아침·점심 | ☕ 🍽 | **첫 바 개점 시각 포함** |\n| 휴식 권장 | 🅿 | 90분마다 |\n| 식수 | 💧 | 다음 식수까지 거리 |\n| 약국·ATM | ✚ 🏧 | |\n| 짐 배송 | 📮 | 접수·수령 가능 여부 |\n| 세요 | ● | 도장 받기 좋은 곳 |\n| 랜드마크 | ★ | 안개 지도 스팟 |\n| 숙박 | 🛏 | 선택한 숙소, 침대 수, 예약 여부, 개방 시각 |\n| 이동수단 | 🚌 | 버스·택시 이용 구간 |\n| **위험** | ⚠ | **아래 참조** |\n\n##### 위험 표시\n\n| 유형 | 표시 |\n|---|---|\n| 급경사 하강 | \"무릎 주의 · 500m 하강\" |\n| 대피소 없음 | \"이후 12km 대피 지점 없음\" |\n| 그늘 없음 | \"그늘 없는 구간 10km\" |\n| 식수 없음 | \"다음 식수까지 10.4km\" |\n| 차도 병행 | \"차도 옆 3km · 반사 조끼 권장\" |\n| 통신 두절 | \"이 구간 통신 약함\" |\n| 겨울 위험 | \"적설·결빙 가능\" |\n\n⚠️ **위험은 겁주기 위한 게 아니라 준비하기 위한 것이다.** 대응 행동을 반드시 함께 적는다.\n\n##### 인쇄\n\n일자별 상세는 **하루 한 장**으로도 인쇄된다. 전체 요약표와 별개다.\n\n---\n\n#### F-21 Plan B — 일정 안에 넣는다 🆕\n\n**별도 화면을 만들지 않는다.** 계획이 어긋나는 것은 예외가 아니라 일상이므로, **각 날짜 카드 안에 접혀 있다가 필요할 때 펼쳐진다.**\n\n##### 일정 카드 구조\n\n```\n┌────────────────────────────────────────┐\n│ Day 12 · 10월 22일 (수)                 │\n│ 부르고스 → 오르니요스        21.0 km    │\n│ ─────────────────────────────────────  │\n│ 06:30 출발 · 12:20 도착 예정            │\n│ 상승 +180m  하강 -215m                  │\n│ 🛏 공립 70침대 · 예약 불가 · 여유        │\n│ ⚠ 그늘 없음 10km · 통신 약함            │\n│                                        │\n│ ▸ 이 날이 어긋나면            ← 접힘    │\n└────────────────────────────────────────┘\n```\n\n**「이 날이 어긋나면」을 누르면 그 자리에서 펼쳐진다.**\n\n```\n│ ▾ 이 날이 어긋나면                      │\n│                                        │\n│   상황을 고르세요                        │\n│   [자리 없음] [몸이 안 좋음]             │\n│   [늦게 출발] [날씨]                     │\n│                                        │\n│   또는  [직접 고치기]                    │\n└────────────────────────────────────────┘\n```\n\n##### 상황을 고르면 그 카드 안에서 대안이 나온다\n\n```\n│   자리 없음 · 대안                       │\n│                                        │\n│   ○ 더 간다   온타나스   +10.4km        │\n│                침대 80 · 15:40 도착      │\n│                ⚠ 오늘 총 31.4km. 무리    │\n│                                        │\n│   ○ 되돌아간다 라베      -4.0km         │\n│                침대 30 · 13:10 도착      │\n│                                        │\n│   ○ 이동수단  카스트로헤리스 20.1km      │\n│                택시 약 25유로 · 20분     │\n│                ⚠ 걷지 않은 구간으로 기록  │\n│                                        │\n│   ○ 사립 예약 오르니요스 내 2곳          │\n│                [전화 카드 열기]          │\n│                                        │\n│   [적용하고 이후 일정 다시 계산]          │\n```\n\n##### 왜 별도 화면이 아닌가\n\n| 이유 | 설명 |\n|---|---|\n| **맥락이 붙어 있다** | 그날 정보를 보면서 판단한다. 화면을 옮기면 맥락이 끊긴다 |\n| **평소엔 안 보인다** | 접혀 있어 일정 화면이 복잡해지지 않는다 |\n| **어느 날이든 열린다** | 오늘만이 아니라 미리 걱정되는 날도 미리 열어볼 수 있다 |\n| 조작이 짧다 | 만실 앞에서 화면을 헤매지 않는다 |\n\n##### 자동 감지\n\n사용자가 누르지 않아도 아래 상황에서는 **카드에 조용히 표시**를 띄운다. 알림은 보내지 않는다.\n\n| 상황 | 표시 |\n|---|---|\n| 숙소 개방 기간 위반 | \"이 숙소는 이 시기에 닫습니다\" |\n| 갈림길 계절 폐쇄 | \"이 경로는 이 시기에 닫습니다\" |\n| 실제 출발이 2시간 이상 늦음 | \"도착이 늦어집니다\" |\n| 전날 통증 기록 | \"어제 무릎 통증을 기록하셨습니다\" |\n\n##### 재계산\n\n선택하면 **남은 일정 전체를 다시 나눈다.**\n\n```\n온타나스를 선택하셨습니다.\n오늘 31.4km — 이번 주 가장 긴 날입니다.\n\n내일을 18km로 줄였습니다. (기존 24km)\n전체 도착 예정: 11월 8일 → 변동 없음\n```\n\n##### 직접 고치기\n\n- 마을 검색으로 도착지 지정\n- 목록에 없는 곳은 이름 직접 입력\n- 이동수단 구간 기록 (수단·구간·요금)\n- 하루 건너뛰기 (쉬는 날)\n\n##### ⚠️ 콤포스텔라 요건 경고\n\n**이동수단을 쓰면 걷지 않은 구간이 생긴다.**\n\n```\n⚠️ 카스트로헤리스까지 택시로 이동하면\n   걸은 거리에서 20.1km가 빠집니다.\n\n   현재 계획 도보 거리: 773.1km → 753.0km\n   콤포스텔라 요건(100km)에는 영향이 없습니다.\n```\n\n**최소 거리 언저리에서는 강하게 경고한다.**\n\n```\n🔴 사리아에서 출발하셨고 현재 도보 108.2km입니다.\n   여기서 20.1km를 이동수단으로 건너뛰면 88.1km가 되어\n   콤포스텔라 요건(100km)에 미달합니다.\n\n   대안: 다른 선택지를 보시거나, 이후 구간을 늘리세요.\n```\n\n⚠️ **걷지 않은 구간은 안개 지도 개방에서도 제외된다.**\n\n---\n\n#### F-22 체크리스트 🆕\n\n**시점마다 다른 목록이 필요하다.**\n\n| 시점 | 이름 | 항목 수 |\n|---|---|---|\n| D-90~D-1 | 준비 타임라인 | 24 (F-08) |\n| D-1 | **배낭 최종 점검** | 18 |\n| 매일 아침 | 출발 전 | 6 |\n| 매일 저녁 | 도착 후 | 7 |\n| 완주 후 | 마무리 | 5 |\n\n##### 매일 아침 (6)\n\n```\n□ 물 채웠나                 다음 식수까지 10.4km\n□ 발에 테이핑·바셀린\n□ 어제 빨래 다 말랐나\n□ 오늘 도장 받을 곳 확인    ← 사리아 이후 2개\n□ 배터리·보조배터리\n□ 오늘 위험 구간 확인       ⚠ 그늘 없는 10km\n```\n\n**오늘 일정에서 자동으로 채워진다.** 고정 목록이 아니다.\n\n##### 매일 저녁 (7)\n\n```\n□ 발 확인 — 물집·붉어짐\n□ 빨래\n□ 도장 받았나\n□ 내일 숙소 확인            ⚠ 내일 도착지 침대 40개\n□ 물집·통증 기록            → 일정 자동 조정에 반영\n□ 오늘 지출 기록            → 예산\n□ 가족에게 도착 알림        (가족 안심 세트)\n```\n\n##### 배낭 최종 점검 (D-1)\n\n배낭 무게 계산기(F-07)와 연동해 **품목별 체크 + 실측 무게 입력**을 받는다.\n체중 10% 초과 시 감량 우선순위를 제시한다.\n\n⚠️ 체크리스트는 **끄고 켤 수 있다.** 매일 알림이 부담인 사용자가 있다.\n\n---\n\n#### F-23 예산 관리 🆕\n\n##### 왜 필요한가\n\n1인당 지출이 370~490만 원이고, 20대 최저예산층에게는 **하루 얼마 남았는지가 매일의 판단**이 된다.\n\n##### 계획 예산\n\n비용 계산기(F-06) 결과를 그대로 가져온다.\n\n```\n계획 예산            450만 원\n  항공  150 · 숙박 62 · 식비 147 · 장비 80 · 기타 11\n```\n\n##### 실제 기록\n\n```\nDay 12 · 10월 22일\n\n  숙박  공립 알베르게        €10\n  식사  아침 €3 · 점심 €8 · 순례자 정식 €12\n  기타  물·간식             €4\n  ─────────────────────────────\n  오늘  €37  (약 54,000원)\n\n  누적  €412 / 예상 €1,180\n  하루 평균 €34.3 · 계획 대비 -8%\n\n  남은 23일 · 하루 €33까지 쓸 수 있습니다\n```\n\n##### 요건\n\n| 항목 | 내용 |\n|---|---|\n| 입력 | **유로로 입력, 원화 병기.** 환율은 출발 시점 고정 + 수동 갱신 |\n| **오프라인** | **필수.** 알베르게에 와이파이가 없다 |\n| 분류 | 숙박 / 식사 / 교통 / 장비 / 기타 |\n| 빠른 입력 | 자주 쓰는 금액 버튼 (€10 알베르게, €12 정식) |\n| 사진 | 영수증 촬영 (선택) |\n| 경고 | 계획 대비 20% 초과 시 |\n| 내보내기 | 완주 후 CSV·PDF |\n\n##### 예산과 일정의 연결\n\n**예산이 부족해지면 일정 선택이 바뀐다.**\n\n```\n현재 속도로는 예산이 4일분 부족합니다.\n\n  · 사립 대신 공립을 쓰면 하루 €8 절약\n  · 순례자 정식 대신 자취를 하면 하루 €7 절약\n  · 남은 구간에 기부제 알베르게 3곳이 있습니다\n```\n\n⚠️ **절약을 강요하지 않는다.** 선택지를 보여주고 판단은 사용자가 한다.\n⚠️ 예산 부족을 이유로 **무리한 일정을 제안하지 않는다.** 안전이 우선이다.\n\n---\n\n#### F-24 접근·귀환 교통 🆕\n\n**우리는 걷는 것만 생각했다. 인천에서 생장까지 가는 것도 계획의 일부다.**\n\n생장피드포르에 공항이 없어 **최소 2~3회 환승**이 필요하고, 이건 순례 준비에서 가장 헷갈리는 부분 중 하나다.\n\n##### 데이터 모델\n\n```ts\ntype TransportKind = 'FLIGHT' | 'TRAIN' | 'BUS' | 'SHUTTLE' | 'TAXI' | 'METRO'\n\ninterface AccessLeg {\n  order: number\n  kind: TransportKind\n  fromName: string\n  toName: string\n  operator: string | null      // SNCF, Alsa, Txiktxak 등\n  durationMin: number | null\n  costEur: number | null\n  frequencyNote: string | null // \"하루 6편\" 등\n  bookingUrl: string | null\n  cautionKo: string | null\n}\n\ninterface AccessRoute {\n  id: string\n  nameKo: string               // \"파리 경유\"\n  toTownId: string             // 도착 지점 (보통 출발 마을)\n  legs: AccessLeg[]\n  totalHours: number\n  estimatedCostKrw: number\n  traits: ('FAST'|'CHEAP'|'SIMPLE'|'POPULAR')[]\n}\n```\n\n##### 주요 경로 (프랑스 길 · 생장 출발)\n\n| 경로 | 구간 | 특징 |\n|---|---|---|\n| **A. 파리 경유** | 인천 → 파리(CDG) → **TGV 바욘** → 생장 기차 | **CDG 공항에 TGV역이 있다.** 시내로 안 나가도 된다 |\n| **B. 비아리츠 경유** | 인천 → 파리 → 비아리츠 → 버스 → 바욘 → 생장 | 가장 가까운 공항 |\n| **C. 팜플로나 경유** | 인천 → 마드리드 → 팜플로나 → 생장 버스 | **가장 많은 순례자가 쓴다** |\n| D. 마드리드 직행버스 | 인천 → 마드리드 → Alsa → 바욘 | 오래 걸린다 |\n\n##### 구간 정보 (실측 전 참고값)\n\n| 구간 | 수단 | 소요 | 요금 |\n|---|---|---|---|\n| 파리(CDG) → 바욘 | TGV | 약 4시간 | |\n| **바욘 → 생장** | SNCF | **1시간** | **약 12유로** · 하루 6편 |\n| 비아리츠 공항 → 바욘 | Txiktxak 3번 | 25분 | 2유로 |\n| 비아리츠 공항 → 생장 | Express Bourricot | | 밴 140유로 (8인 분담 21유로) |\n| 팜플로나 → 생장 | 버스 | 1.5~2시간 | |\n\n##### 화면\n\n일정의 **Day 0**으로 표시한다. 걷기 전날까지가 여정의 일부다.\n\n```\nDay 0 · 10월 5일 (일) — 이동\n────────────────────────────────────\n✈  인천(ICN) 10:30 → 파리(CDG) 15:40    12시간 10분\n🚈  CDGVAL 무료 셔틀 → TGV역             15분\n🚄  CDG → 바욘 (TGV)                    약 4시간\n🚂  바욘 → 생장 (SNCF)   17:14 출발      1시간 · €12\n🛏  생장 알베르게\n\n⚠ 바욘~생장 철로는 자주 운행이 중단되고\n  그때는 대체 버스가 나옵니다. 정상입니다.\n⚠ CDG에서 TGV역까지 CDGVAL 셔틀을 탑니다.\n  표지판이 헷갈리니 'Grandes Lignes'를 따라가세요.\n```\n\n##### 귀환\n\n```\nDay 36 · 산티아고 → 인천\n✈  산티아고(SCQ) → 마드리드   이베리아 하루 여러 편\n   ※ 막판 기차보다 항공이 저렴한 경우가 많습니다\n✈  마드리드 → 인천\n```\n\n피니스테레·무시아 연장을 선택하면 버스 구간이 추가된다.\n\n##### 추천 로직\n\n| 입력 | 반영 |\n|---|---|\n| 예산 | 저가 항공 조합 vs 직항 |\n| 시차 적응 | **팜플로나에서 1~2일 묵고 가는 방식** 제안 |\n| 도착 시각 | 생장행 막차(18:37) 이후 도착이면 바욘 1박 제안 |\n| 짐 | Correos로 짐을 시작점에 미리 보내는 옵션 |\n\n⚠️ **항공권을 우리가 예약하지 않는다.** 경로와 소요 시간을 보여주고 예약은 사용자가 한다.\n⚠️ **시각·요금은 자주 바뀐다.** `verifiedAt`을 표시하고 공식 사이트 링크를 함께 둔다.\n\n---\n\n#### F-25 이동 방식 — 도보 외 🆕\n\n**모두가 걷는 것은 아니다.**\n\n| 방식 | 콤포스텔라 최소 | 하루 이동 | 비고 |\n|---|---|---|---|\n| **도보** | 100km | 20~30km | 기본 |\n| **자전거** | **200km** | 40~100km | 알베르게에서 도보 순례자보다 후순위인 곳이 있다 |\n| 말 | 100km | — | 매우 드묾. 마방 확보가 어렵다 |\n| **전기자전거** | **대상 아님** | — | **콤포스텔라가 나오지 않는다** |\n\n##### 자전거 선택 시 달라지는 것\n\n| 항목 | 변화 |\n|---|---|\n| 하루 목표 거리 | 40~100km |\n| 부상 위험 | 무릎보다 **안장통·손목·낙차** |\n| 숙소 | **자전거 보관 가능 여부**가 필수 조건이 된다 |\n| 갈림길 | 산길 변형은 자전거로 어려운 구간이 있다 |\n| 짐 배송 | 배송을 쓰면 자전거의 이점이 준다 |\n\n⚠️ **Phase 1~3은 도보만 지원한다.** 자전거는 데이터(보관 시설, 자전거 가능 경로)가 별도로 필요하다.\n**다만 데이터 모델은 처음부터 `TravelMode`를 갖는다.** 나중에 넣으려면 전부 뜯어야 한다.\n\n---\n\n### 4. SEO 페이지 사양\n\n**도달률 전략의 핵심이므로 별도 장으로 다룬다.**\n\n#### 4.1 자동 생성 페이지 (163개)\n\n| 유형 | 수 | URL | 내용 |\n|---|---|---|---|\n| 마을 | 82 | `/town/[slug]` | 한글+원어명, 산티아고까지 거리, 해발, 서비스, 침대 수, 이전/다음 마을, 이 마을에서 묵는 일정 링크 |\n| 구간 | 81 | `/stage/[from]-[to]` | 거리, 고도 단면, 소요 시간, 통과 마을, 난이도 |\n\n**82개 마을 데이터에서 전량 자동 생성된다.**\n\n#### 4.2 수기 페이지 (150+)\n\n| 유형 | 수 | 예시 |\n|---|---|---|\n| 루트 | 3 | `/route/frances` |\n| 일정 추천 | 40+ | `/guide/sarria-5days` |\n| 준비 | 60+ | `/guide/backpack-weight` |\n| 상황 대응 | 50+ | `/guide/albergue-full`, `/guide/bedbugs` |\n| **이중 순례자** | 1 | `/dual-pilgrim` ← 검색어 공백. 국내에 정리된 글이 거의 없다 |\n\n> **`/dual-pilgrim` 페이지는 SEO 관점에서도 가치가 크다.**\n> \"이중 순례자\", \"구마노고도 카미노\" 같은 검색어에 한국어 자료가 사실상 없다.\n> 완주 보상이자 확장 전략의 진입점이면서, 검색 유입까지 만든다.\n\n#### 4.3 필수 요건\n\n- 모든 페이지 **서버 렌더**. JS 꺼도 내용이 보인다\n- title은 페이지마다 다르고 50~60자\n- `generateMetadata`로 동적 생성\n- 루트 페이지에 schema.org `TouristTrip` JSON-LD\n- 전체 `sitemap.xml` 자동 생성\n- **모든 페이지 하단에 일정 계산기 CTA**\n\n#### 4.4 콘텐츠 원칙\n\n**콘텐츠 농장이 되면 안 된다.** 각 페이지는 실제 질문에 실제로 답해야 한다.\n\n- 마을 페이지에 알베르게 데이터가 없으면 **\"정보 확인 중\"으로 표시하고 지어내지 않는다**\n- 상황 대응 페이지는 조사에서 확인된 실제 문제만 다룬다\n- 의료 관련은 전문가 검수 전까지 게시하지 않는다\n\n---\n\n### 5. 데이터 확보 계획\n\n**이 서비스의 진입장벽은 코드가 아니라 데이터다.**\n\n| 단계 | 방법 | 비용 | 비고 |\n|---|---|---|---|\n| 1차 | 경로(OSM) + 고도(IGN MDT05) → 직접 계산 | 0 | **03 문서 부록 참조. 라이선스 확인 완료** |\n| 2차 | 대한민국 산티아고 순례자 협회 제휴 | 협의 | 국내 크레덴시알 발급처 중 하나, 숙소 DB 보유 |\n| 3차 | **현지 실측 도보 (2026.10 초 출발, 40일)** | 약 800만 | 창업자 직접 완주 |\n| 4차 | 사용자 제보 (연중) | 0 | 채택 3건 시 사후 상품 무료 |\n\n> **3차 실측은 선택이 아니다.** 카미노를 걸어보지 않은 팀이 만든 앱은 순례자 커뮤니티에서 즉시 판별되며 신뢰를 얻지 못한다. 동시에 이 40일이 마케팅 콘텐츠(연재·유튜브)의 원천이 된다.\n\n#### 실측 시 반드시 수집할 것\n\n| 항목 | 이유 |\n|---|---|\n| **건조기 보유 여부** | 빈대 대응. 어느 앱도 안 함 |\n| **짐 배송 수령 가능 여부** | 공립은 불가. 숙소 단위 확인 필요 |\n| 개방 기간 | 겨울 폐쇄 다수 |\n| 예약 방법 | 전화/WhatsApp/불가 |\n| 실제 침대 수 | 공표치와 다른 경우 있음 |\n| 첫 바(bar) 개점 시각 | 새벽 출발 시 아침 확보 가능 여부 |\n| 콘센트 개수 | 다인실 충전 경쟁 |\n\n---\n\n### 6. 개발 일정\n\n| 스프린트 | 기간 | 산출물 |\n|---|---|---|\n| S1 | 2026.08 | 프로젝트 초기화, 데이터 스키마, 마을 DB 이관 |\n| S2 | 2026.08 | **구간 분할 엔진 (부상 회피형) + 테스트** |\n| S3 | 2026.09 | 계산기 화면, URL 상태, 인쇄 |\n| S4 | 2026.09 | **SEO 페이지 163개 자동 생성**, sitemap |\n| — | 2026.09 | **공개 → 4주 트래픽 실측** |\n| S5 | 2026.10 | 무료 도구 3종 (비용·배낭·타임라인) |\n| **실측** | **2026.10 초~11 초** | **현지 도보 40일** — 11/1 나폴레옹 폐쇄 전 출발 |\n| S6 | 2026.12 | 알베르게 데이터 반영, 가이드 페이지 100개 |\n| S7 | 2027.01 | 혼잡 추정, 예약 스크립트, 짐배송 비교 |\n| S8~ | 2027.02~ | RN 앱, 오프라인 지도 |\n| 출시 | 2027.04 | 스토어 등록, 성년 시즌 진입 |\n\n---\n\n### 7. 미해결 사항\n\n| # | 항목 | 확인 방법 |\n|---|---|---|\n| 1 | 지도 타일 라이선스 (OSM 자체 호스팅 vs MapTiler) | 오프라인 대량 캐싱 시 약관 검토 |\n| 1b | **ODbL 파생 DB 해석** — profiles.ts 에 숫자만 남기면 되는가 | **법률 검토 필요** |\n| 2 | 의료 정보 책임 범위 | 정형외과·스포츠의학 자문 계약 |\n| 3 | 빈대 발생 숙소 실명 노출 가능 여부 | 법률 검토 (명예훼손) |\n| 4 | 협회 제휴 조건 | 직접 접촉 |\n| 5 | iOS 백그라운드 위치 권한 심사 | App Store 가이드라인 |\n| 6 | 커머스 제휴 수수료율 | 여행사·장비사 3곳씩 접촉 |\n| 7 | 혼잡 추정 모델의 정확도 | 실측 도보 시 실제 만실 빈도 기록 |\n| 8 | 포토북·포스터 인쇄 제휴처 | 국내 POD 업체 3곳 견적 |\n| 9 | 이중 순례자 제도 요건 변경 여부 | tb-kumano.jp 연 1회 확인 |\n| 10 | 1년 후 편지의 이메일 장기 보관 동의 | 개인정보 처리방침 반영 |\n| 11 | **보험 모집 규제상 제공 가능 범위** | 02 문서 4부 4장. F-14의 전제 |\n| 12 | **짐 배송 구간별 부분 이용 가능 여부** | 04 문서 4부 5장. F-15의 전제 |\n| 13 | **상대가 폰을 만지는 것을 꺼리는가** | 3부 H20. 카드 전체의 전제 |\n| 14 | **안개 지도가 60대에게 부담인가** | H29. 인터뷰 |\n| 15 | 「내 돌」이 부담스럽게 느껴지는가 | H30. 인터뷰 |\n| 16 | **갈림길 11곳의 정확한 거리·고도** | **실측 도보. 현재 데이터에 변형 경로가 없다** |\n| 17 | 나폴레옹 폐쇄 기간의 연도별 변동 | 생장 순례자 사무소 확인 |\n| 18 | 첫 바 개점 시각 (마을별) | 실측 도보 |\n| 19 | 버스·택시 노선과 요금 | 실측 도보 |\n| 20 | **접근 교통 시각·요금의 갱신 주기** | 자주 바뀐다. 공식 사이트 연동 검토 |\n| 21 | 자전거 보관 가능 알베르게 | 자전거 지원 시 필요 |\n| 16 | 일회용 필름 카메라 수요 | H28 |\n| 17 | 스팟 19곳의 이야기를 누가 쓰는가 | 실측 도보 |\n\n---\n\n# 3부 · 보여주기 카드\n\n### 1. 무엇인가\n\n**특정 상황에서 화면 하나를 상대에게 내밀면, 대화 없이 문제가 해결되는 카드.**\n\n```\n        순례자                        상대\n          │                            │\n          │  ── 카드를 보여준다 ──→     │\n          │                            │  읽는다\n          │                            │  손가락으로 답을 짚는다\n          │  ←── 화면을 돌려준다 ──     │\n          │                            │\n      한국어로 답이 뜬다                 │\n```\n\n**핵심은 양방향이라는 것이다.** 내가 전달하고, **상대가 화면을 짚어서 답한다.**\n\n---\n\n### 2. 번역기와 무엇이 다른가\n\n이게 이 기능의 존재 이유다. **다르지 않으면 만들 필요가 없다.**\n\n| | 번역기 | 보여주기 카드 |\n|---|---|---|\n| **전제** | 내가 뭘 말할지 안다 | **뭘 말해야 하는지 우리가 안다** |\n| **상대의 답** | ❌ 못 알아듣는다 | ✅ **선택지를 짚으면 한국어로 뜬다** |\n| **왕복** | 매번 다시 입력 | 한 화면에서 끝 |\n| **네트워크** | 대부분 필요 | **완전 오프라인** |\n| **맥락** | 없음 | 내 일정·이름·인원·보험이 자동 삽입 |\n| **상대 부담** | 이상한 번역을 해독해야 | **읽고 짚기만** |\n| **정확도** | 문맥 오류 발생 | **현지 검수된 고정 문장** |\n| **속도** | 30초~2분 | **3초** |\n\n#### 2.1 결정적 차이 — \"무엇을 말해야 하는지 모른다\"\n\n**약국에 가서 \"물집이 생겼어요\"를 번역해봤자 소용없다.**\n\n스페인 약국에서 뭘 요구해야 하는지를 모르기 때문이다. 무슨 제품군이 있는지, 며칠째인지 왜 물어보는지, 터졌는지가 왜 중요한지 모른다.\n\n**우리는 안다.** 실측 도보 40일과 인터뷰로 알아낸 것이 이 카드에 들어간다.\n\n#### 2.2 두 번째 차이 — 상대의 답을 알아듣는다\n\n번역기의 최대 실패 지점은 **상대가 대답할 때**다.\n\n```\n번역기:  \"물집이 생겼어요\" (번역 성공)\n약사:    (빠른 스페인어로 뭐라고 길게 설명)\n순례자:  ???  ← 여기서 무너진다\n```\n\n카드는 **상대가 답할 선택지를 화면에 미리 깔아둔다.** 약사는 짚기만 하면 되고, 순례자는 한국어로 읽는다.\n\n#### 2.3 세 번째 차이 — 상대가 편하다\n\n시골 알베르게 주인, 나이 든 약사에게 **낯선 사람의 폰에서 나오는 기계 음성**은 부담이다. 되묻고, 답답해하고, 손을 젓는다.\n\n**종이에 인쇄한 것처럼 깔끔한 카드는 부담이 없다.** 읽고 짚으면 끝난다.\n\n---\n\n### 3. 설계 원칙\n\n| # | 원칙 | 이유 |\n|---|---|---|\n| 1 | **한 화면에 한 상황.** 스크롤 없음 | 내밀었을 때 전부 보여야 한다 |\n| 2 | **상대가 읽을 글씨가 가장 크다** | 화면을 든 사람이 아니라 보는 사람 기준 |\n| 3 | **3초 안에 꺼낼 수 있다** | 최근 카드 + 즐겨찾기를 홈에 |\n| 4 | **완전 오프라인** | 알베르게에 와이파이가 없다 |\n| 5 | **한 손 조작** | 다른 손엔 배낭이나 스틱 |\n| 6 | **밝기 자동 최대** | 한낮 야외, 어두운 도미토리 |\n| 7 | **그림 병행** | 글을 못 읽거나 안 읽는 상대 |\n| 8 | **내 정보 자동 삽입** | 이름·인원·시각·보험을 매번 입력하지 않는다 |\n| 9 | **인쇄 가능** | 배터리가 죽어도 살아남는다 |\n| 10 | **우리가 판단하지 않는다** | **11장 참조** |\n\n---\n\n### 4. 카드 구조\n\n```\n┌──────────────────────────────────┐\n│  🐚  Peregrino coreano            │  ← 순례자임을 밝힘. 신뢰 확보\n├──────────────────────────────────┤\n│                                  │\n│   상대가 읽을 문장                 │  ← 22~26pt. 가장 크다\n│   (스페인어, 현지 검수)            │\n│                                  │\n│   [그림 또는 도식]                 │  ← 글 없이도 통하게\n│                                  │\n├──────────────────────────────────┤\n│  ↓ Por favor, señale su respuesta │  ← \"답을 짚어주세요\"\n│                                  │\n│  ┌────────┐ ┌────────┐ ┌───────┐ │\n│  │  Sí    │ │  No    │ │ ...   │ │  ← 상대가 누르는 버튼\n│  └────────┘ └────────┘ └───────┘ │     충분히 크게\n├──────────────────────────────────┤\n│  (내가 읽는 작은 한국어 안내)        │  ← 12pt. 상대는 안 본다\n└──────────────────────────────────┘\n```\n\n**상대가 버튼을 누르면 화면이 전환되고 한국어 결과가 크게 뜬다.**\n\n---\n\n### 5. 카드 목록\n\n#### 5.1 B축 · 숙소 (9장)\n\n| # | 카드 | 상대의 답변 선택지 |\n|---|---|---|\n| B1 | **침대 있나요** | 있음 / 없음 / 몇 시 이후 / 예약만 |\n| B2 | 예약했습니다 | 확인됨 / 기록 없음 / 이름 다시 |\n| B3 | **만실인데 어디로 가야 하나요** | **마을 목록에서 짚기** + 거리 자동 표시 |\n| B4 | 몇 시에 문 닫나요 / 소등은 | 시각 숫자판 짚기 |\n| B5 | 짐 배송 접수하고 싶습니다 | 가능 / 불가 / 요금 |\n| B6 | 세탁기·건조기 쓸 수 있나요 | 있음 / 없음 / 요금 / 사용법 |\n| B7 | **빈대가 있는 것 같습니다** | 확인함 / 침대 변경 / 세탁 안내 |\n| B8 | 아침 몇 시에 나가야 하나요 | 시각 짚기 |\n| B9 | 도장 부탁드립니다 (세요) | — (설명 불필요) |\n\n#### 5.2 A축 · 부상 (8장)\n\n⚠️ **모든 의료 카드는 의료 자문 검수를 거친 뒤에만 배포한다.** (11장)\n\n| # | 카드 | 상대의 답변 선택지 |\n|---|---|---|\n| A1 | **약국 — 물집** | 제품 제시 / 병원 권유 / 며칠 쉬라 (숫자 짚기) |\n| A2 | 약국 — 근육통·부기 | 제품 / 처방 필요 / 병원 |\n| A3 | 약국 — 발목·무릎 | 제품 / 처방 필요 / 병원 |\n| A4 | **의사를 만나야 합니다** | 진료소 위치 짚기 / 시간 / 예약 필요 |\n| A5 | **응급입니다** | — (즉시 행동 유도) |\n| A6 | 물리치료사를 찾습니다 | 위치 / 시간 / 요금 |\n| A7 | **내 의료 정보** | — (일방향. 6.2절) |\n| A8 | 보험 청구용 서류가 필요합니다 | 발급 가능 / 불가 / 어디서 |\n\n#### 5.3 이동·기타 (6장)\n\n| # | 카드 | 상대의 답변 선택지 |\n|---|---|---|\n| C1 | 다음 마을까지 택시 | 요금 / 대기 시간 / 불가 |\n| C2 | 버스 정류장·시간 | 위치 짚기 / 시각 짚기 |\n| C3 | 배낭을 맡기고 싶습니다 | 가능 / 불가 / 요금 |\n| C4 | 길을 잃었습니다 | 지도에서 현재 위치 짚기 |\n| C5 | 물을 채울 수 있나요 | 가능 / 불가 / 위치 |\n| C6 | 채식·알레르기 (식당) | 가능 / 불가 / 대안 |\n\n**총 23장.** 더 늘리지 않는다. **찾는 데 3초가 넘으면 실패다.**\n\n---\n\n### 6. 핵심 카드 상세\n\n#### 6.1 A1 · 약국 — 물집 ⭐ 대표 카드\n\n**이 카드 하나가 기능 전체를 설명한다.**\n\n```\n┌────────────────────────────────────────┐\n│  🐚  Peregrino coreano · Camino Francés │\n├────────────────────────────────────────┤\n│                                        │\n│  Tengo ampollas en el pie.             │  ← 24pt\n│                                        │\n│         ┌─────────┐                    │\n│         │  🦶     │  ← 발 도식          │\n│         │   ●●    │     내가 미리 짚은   │\n│         │         │     위치가 붉게 표시  │\n│         └─────────┘                    │\n│                                        │\n│  · Desde hace 3 días                   │  ← 자동 삽입\n│  · Ya se han reventado                 │  ← 내가 선택한 상태\n│  · Camino 25 km al día                 │  ← 일정에서 자동\n│                                        │\n├────────────────────────────────────────┤\n│  Por favor, señale su respuesta:       │\n│                                        │\n│  ┌──────────────┐  ┌──────────────┐   │\n│  │  Le doy esto │  │ Vaya al      │   │\n│  │  (producto)  │  │ médico       │   │\n│  └──────────────┘  └──────────────┘   │\n│  ┌──────────────┐  ┌──────────────┐   │\n│  │ Descanse     │  │ Necesita     │   │\n│  │ ___ días     │  │ receta       │   │\n│  └──────────────┘  └──────────────┘   │\n└────────────────────────────────────────┘\n```\n\n**약사가 \"Descanse ___ días\"를 누르면 숫자판이 뜨고, 3을 누르면 내 화면에:**\n\n```\n        약사님 안내\n\n    \"3일 쉬세요\"\n\n  ┌──────────────────────────┐\n  │ 일정을 3일 미루면          │\n  │ 도착이 11월 8일 → 11월 11일│\n  │                          │\n  │ [일정 다시 짜기]          │\n  │ [숙소 연장 문의 카드]      │\n  └──────────────────────────┘\n```\n\n> ⭐ **여기가 이 기능의 정점이다.**\n> 약사의 답이 **곧바로 일정 재계산으로 연결된다.**\n> 번역기는 절대 이걸 못 한다.\n\n**왜 \"3일 전부터\"와 \"이미 터졌다\"가 중요한가**\n약사가 판단에 필요로 하는 정보다. 순례자는 이걸 모르니까 안 말한다. **우리가 대신 물어서 채운다.**\n\n#### 6.2 A7 · 내 의료 정보 — 일방향 카드\n\n**의식이 없거나 말을 못 하는 상황을 위한 카드.**\n\n```\n┌────────────────────────────────────────┐\n│  ⚕  INFORMACIÓN MÉDICA                 │\n├────────────────────────────────────────┤\n│  KIM MINSU · 1962 · 남 / M              │\n│  República de Corea                    │\n│                                        │\n│  Grupo sanguíneo:  A+                  │\n│  Alergias:         Penicilina          │\n│  Medicación:       Warfarina           │\n│  Enfermedades:     Hipertensión        │\n│                                        │\n│  Contacto de emergencia                │\n│  +82 10 xxxx xxxx (hija)               │\n│                                        │\n│  Seguro: ○○보험 / 증권번호 ABC123      │\n│  Tel. asistencia: +34 xxx xxx xxx      │\n│                                        │\n│  Embajada de Corea en España           │\n│  +34 xxx xxx xxx                       │\n└────────────────────────────────────────┘\n```\n\n| 요건 | 이유 |\n|---|---|\n| **잠금화면에서 접근 가능** | 남이 꺼낼 수 있어야 의미가 있다 |\n| **인쇄해서 배낭에 넣기 권장** | 폰이 꺼지면 끝이다 |\n| 정보는 전부 선택 입력 | 강제하지 않는다 |\n| **단말에만 저장. 서버 전송 금지** | 민감정보 |\n\n⚠️ **이 카드는 우리가 아무 판단도 하지 않는다.** 사용자가 입력한 것을 그대로 보여줄 뿐이다. 가장 안전하면서 가장 값진 카드다.\n\n#### 6.3 B3 · 만실인데 어디로 가야 하나요 ⭐\n\n**만실은 순례자가 가장 무너지는 순간이다.**\n\n```\n┌────────────────────────────────────────┐\n│  🐚  Está completo. ¿A dónde puedo ir?  │\n├────────────────────────────────────────┤\n│                                        │\n│  Por favor, señale un pueblo:          │\n│                                        │\n│  ┌──────────────────────────────────┐ │\n│  │ Ventas de Narón      4.5 km  ~1h │ │\n│  ├──────────────────────────────────┤ │\n│  │ Palas de Rei        12.4 km ~3h  │ │\n│  ├──────────────────────────────────┤ │\n│  │ Gonzar (atrás)       3.0 km ~45m │ │\n│  └──────────────────────────────────┘ │\n│                                        │\n│  ┌────────────┐  ┌────────────┐       │\n│  │ Otro lugar │  │ Taxi       │       │\n│  └────────────┘  └────────────┘       │\n└────────────────────────────────────────┘\n```\n\n**마을 목록은 우리 데이터에서 자동 생성된다.** 거리와 예상 소요 시간까지 붙는다.\n\n**주인이 짚으면 → 그 마을 정보 + 전화 예약 카드로 이어진다.**\n\n> 이건 번역기로 불가능하다. **우리 데이터가 있어야 만들어지는 카드다.**\n\n#### 6.4 B7 · 빈대 신고\n\n```\nCreo que hay chinches en mi cama.\n(제 침대에 빈대가 있는 것 같습니다)\n\nLitera número ___  ← 침대 번호 입력\n\n[상대 응답]\n□ Lo reviso ahora        (지금 확인하겠습니다)\n□ Le cambio de cama      (침대를 바꿔드리겠습니다)\n□ Puede lavar aquí       (여기서 세탁하세요)\n□ No hay chinches        (빈대가 아닙니다)\n```\n\n**응답에 따라 다음 행동을 안내한다.**\n\"세탁 가능\" → 건조기 보유 여부 확인 카드로\n\"빈대가 아님\" → 가장 가까운 건조기 보유 숙소 검색으로\n\n---\n\n### 7. 찾는 방법 — 3초 안에\n\n**카드가 아무리 좋아도 못 찾으면 소용없다.**\n\n| 방법 | 설명 |\n|---|---|\n| **상황 추론** | 시각·위치·일정으로 지금 필요한 카드를 위에 올린다 |\n| 최근 사용 | 최근 3장을 홈 상단에 |\n| 즐겨찾기 | 사용자가 고정 |\n| 큰 아이콘 3×3 | 글자를 읽지 않고 그림으로 |\n| 검색 | 마지막 수단 |\n\n**상황 추론 예시**\n\n| 조건 | 상단에 올리는 카드 |\n|---|---|\n| 13~16시, 도착지 근처 | B1 침대 있나요 |\n| 도착 후 알베르게 안 | B4 소등 시각, B6 세탁 |\n| 마을 안, 약국 근처 | A1~A3 약국 카드 |\n| 경로 이탈 상태 | C4 길을 잃었습니다 |\n| 오전, 출발 직후 | (아무것도 안 올린다) |\n\n⚠️ **위치 추론은 단말 안에서만 한다. 서버로 보내지 않는다.**\n\n---\n\n### 8. 인쇄 — 배터리가 죽어도 산다\n\n**폰이 꺼지면 앱은 없는 것과 같다. 순례에서 배터리는 늘 부족하다.**\n\n| 산출물 | 내용 |\n|---|---|\n| **A4 양면 1장** | 핵심 8장 압축 (B1, B3, A1, A4, A5, A7, C1, C4) |\n| **명함 크기** | A7 의료 정보. 지갑·크레덴시알에 끼운다 |\n\n**출국 전 준비 타임라인 D-7 항목에 \"카드 인쇄\"를 넣는다.**\n\n> 자녀가 부모를 위해 뽑아주는 시나리오와 정확히 맞는다.\n\n---\n\n### 9. 두 축과의 연결\n\n**이 기능은 부가 기능이 아니라 두 축의 현장 실행 도구다.**\n\n| 축 | 카드가 하는 일 |\n|---|---|\n| **A. 부상** | 약국·병원에서 **증상을 정확히 전달**하고 **답을 알아듣는다** → 일정 재조정으로 연결 |\n| **B. 숙소** | 만실 대응, 예약, 빈대 → **잘 곳이 해결됐다는 확실성** |\n\n#### 9.1 수익과의 연결\n\n**카드 자체는 무료다.** 하지만 결정적 순간마다 다음 행동으로 이어진다.\n\n| 카드 | 다음 행동 | 수익 |\n|---|---|---|\n| A1 물집 → \"3일 쉬세요\" | 일정 재계산 + 숙소 연장 | R3 |\n| A1 → \"병원 가세요\" | 보험 청구 안내 | R1 |\n| A8 보험 서류 | 보험 청구 지원 | R1 |\n| B3 만실 → 대안 마을 | 사립 예약 연결 | R3 |\n| B5 짐 배송 접수 | 배송 제휴 | R4 |\n| 무릎 통증 반복 | 짐 배송 전환 제안 | R4 |\n\n⚠️ **위급한 순간에 상품을 들이밀지 않는다.** 문제를 해결한 **다음 화면**에서 제안한다.\n\n---\n\n### 10. 제작 방법\n\n#### 10.1 문장은 우리가 쓰지 않는다\n\n**기계 번역이나 우리 스페인어 실력으로 쓰지 않는다.**\n\n| 단계 | 방법 |\n|---|---|\n| 1 | 한국어로 상황과 의도를 정리 |\n| 2 | 스페인어 원어민 번역 (전문 번역가) |\n| 3 | **현지 검수 — 실측 도보 중 실제로 보여주고 반응을 본다** |\n| 4 | 갈리시아어 병기 검토 (갈리시아 구간) |\n| 5 | 의료 카드는 **의료 자문 검수** |\n\n**3번이 핵심이다.** 40일 동안 23장을 실제로 써보고 고친다.\n**\"이 문장 이해되세요?\"를 알베르게 주인과 약사에게 직접 묻는다.**\n\n#### 10.2 실측 도보에서 할 일 (05 문서에 추가)\n\n```\n□ 카드 초안 23장을 인쇄해서 가져간다\n□ 매일 최소 1장을 실제 상황에서 사용한다\n□ 상대의 반응을 기록한다\n   - 바로 이해했나 / 되물었나 / 무시했나\n   - 어떤 단어에서 막혔나\n□ 응답 선택지가 실제 상황을 커버하는지 확인\n   - 없는 선택지를 상대가 말하려 하면 그게 누락이다\n□ 약국 5곳, 알베르게 20곳에서 검증\n```\n\n---\n\n### 11. ⚠️ 안전 원칙 — 우리는 판단하지 않는다\n\n**이 기능의 가장 큰 위험은 의료 영역이다.**\n\n#### 11.1 절대 하지 않는 것\n\n| 금지 | 이유 |\n|---|---|\n| **약 이름을 지정하지 않는다** | \"이 약을 주세요\"는 처방 행위에 가깝다 |\n| **진단하지 않는다** | \"족저근막염입니다\"라고 쓰지 않는다 |\n| **용량·복용법을 우리가 쓰지 않는다** | 약사가 짚은 것만 표시 |\n| **\"괜찮다\"고 말하지 않는다** | 안심시키는 판단을 하지 않는다 |\n\n#### 11.2 우리가 하는 것\n\n```\n증상을 정확히 전달한다      ← 우리 역할\n        ↓\n전문가가 판단한다           ← 약사·의사의 역할\n        ↓\n그 판단을 정확히 전달받는다  ← 우리 역할\n        ↓\n일정에 반영한다             ← 우리 역할\n```\n\n**우리는 통로다. 판단자가 아니다.**\n\n#### 11.3 표시 의무\n\n모든 의료 카드 하단에 작게:\n\n```\n이 카드는 의료 조언이 아닙니다.\n증상 전달을 돕는 도구입니다.\n응급 시 112\n```\n\n#### 11.4 A5 응급 카드의 특례\n\n**응급 카드만은 다르게 만든다.**\n\n- 선택지를 만들지 않는다. 상대가 답할 상황이 아니다\n- 스페인 응급번호 **112**를 크게\n- 내 위치 좌표를 크게 (오프라인에서도 GPS는 동작한다)\n- A7 의료 정보로 한 번에 연결\n- **가장 큰 글씨, 가장 단순한 문장**\n\n---\n\n### 12. 개발 우선순위\n\n| Phase | 카드 | 이유 |\n|---|---|---|\n| **웹 (Phase 2)** | B1, B3, A1, A4, A7 인쇄본 | **앱 없이도 인쇄로 쓸 수 있다** |\n| **앱 (Phase 3)** | 23장 전체 + 양방향 응답 | 핵심 기능 |\n| Phase 3 | 상황 추론 | |\n| Phase 4 | 다음 행동 연결 (수익) | |\n\n> **Phase 2에서 인쇄본만 먼저 낸다.** 앱보다 훨씬 빨리 만들 수 있고,\n> **실측 도보에서 검증할 물건이 곧 이것이다.**\n\n---\n\n### 13. 성공 지표\n\n| 지표 | 목표 | 의미 |\n|---|---|---|\n| 카드 사용률 | 앱 사용자의 60% | 실제로 쓰이는가 |\n| 1인당 사용 횟수 | 여정당 8회 | 반복 사용 |\n| **상대 응답률** | **70%** | **양방향이 실제로 작동하는가** |\n| 응답 후 행동 연결률 | 30% | 일정 재계산 등으로 이어지는가 |\n| 인쇄본 다운로드 | 계획 수립자의 25% | 비디지털 경로 |\n| A7 의료 정보 입력률 | 40% | 안전 기여 |\n\n**\"상대 응답률\"이 핵심 지표다.** 이게 낮으면 카드가 아니라 그냥 번역기다.\n\n---\n\n### 14. 열린 질문\n\n| # | 질문 | 확인 방법 |\n|---|---|---|\n| 1 | 상대가 남의 폰을 만지는 걸 꺼리지 않을까 | **실측 도보에서 직접 확인** |\n| 2 | 위생 문제 (여러 사람이 화면을 만짐) | 대안: 상대가 말로 답하고 내가 누르기 |\n| 3 | 23장이 적절한가, 더 필요한가 | 인터뷰 + 실측 |\n| 4 | 갈리시아어가 필요한가 | 실측 |\n| 5 | 응급 카드의 법적 책임 범위 | 법률 검토 |\n| 6 | 의료 자문 검수 비용과 기간 | 자문 계약 시 |\n\n> **1번이 가장 중요하다.** 이 기능 전체가 \"상대가 내 폰을 만진다\"는 전제 위에 있다.\n> 사람들이 꺼린다면 설계를 바꿔야 한다 — 예를 들어 **상대는 손가락으로 가리키기만 하고 내가 누르는** 방식으로.\n> **실측 도보 첫 주에 반드시 확인한다.**\n\n---\n\n# 부록 · 경로·고도 데이터 확보\n\n### 0. 결론\n\n**고도가 들어있는 GPX 파일을 구하지 않는다.**\n\n대신 **경로 좌표**와 **고도 모델**을 따로 구해서 직접 계산한다.\n\n```\n경로 (좌표)   ← OpenStreetMap  (ODbL)\n    +\n고도 (DEM)    ← 스페인 IGN MDT05  (CC-BY 4.0, LiDAR 기반 5m 격자)\n    ↓\n직접 계산 → ascent / descent / maxElevation\n```\n\n이렇게 하는 이유는 세 가지다.\n\n1. **라이선스가 깨끗하다.** 대부분의 카미노 GPX는 출처와 이용 조건이 불명확하거나 상업적 이용이 금지돼 있다\n2. **정확도가 높다.** 스페인 IGN의 고도 모델은 항공 LiDAR 기반 5m 격자다. 일반 GPS 트랙에 기록된 고도(기압계·위성 고도)보다 훨씬 정확하다\n3. **평활화를 우리가 통제한다.** 이게 생각보다 중요하다 (→ 4장)\n\n---\n\n### 1. 경로 데이터 — OpenStreetMap\n\n#### 1.1 무엇이 있나\n\n카미노 데 산티아고는 OSM에 **하이킹 루트 릴레이션 네트워크**로 매핑돼 있다. 네트워크 전체를 묶는 상위 릴레이션은 **`153968`**이며, 그 아래에 국가별·구간별 하위 릴레이션이 계층으로 들어 있다. 네트워크가 매우 커서 하나의 릴레이션에 모든 way를 넣지 않고 작은 단위로 나눈 구조다.\n\n#### 1.2 가져오는 법\n\nOverpass API로 릴레이션을 조회한다.\n\n```\n[out:json][timeout:180];\n// 프랑스 길 하위 릴레이션을 찾는다\nrel[\"type\"=\"route\"][\"route\"=\"hiking\"][\"name\"~\"Francés|Frances\",i];\nout body;\n>;\nout skel qt;\n```\n\n> 실제 릴레이션 ID는 직접 확인해야 한다. 위 상위 릴레이션에서 내려가며 프랑스 길에 해당하는 것을 고른다.\n> `hiking.waymarkedtrails.org`에서 시각적으로 확인하면 빠르다.\n\n#### 1.3 라이선스 — ⚠️ 주의 깊게 읽을 것\n\nOSM 데이터는 **ODbL**이다. Overpass 응답에도 명시된다.\n\n| 조건 | 의미 |\n|---|---|\n| **저작자 표시** | \"© OpenStreetMap contributors\" 를 앱과 웹에 표시 |\n| **동일조건변경허락** | **파생 데이터베이스를 공개 배포하면 ODbL로 공개해야 한다** |\n\n**우리 경우 어떻게 되나**\n\n- 내부에서 경로를 읽어 `ascent`/`descent` 값을 계산해 쓰는 것 → **Produced Work**로 볼 여지가 크다. 표시만 하면 된다\n- 그러나 **좌표를 그대로 담은 `profiles.ts`를 저장소에 공개**하면 파생 DB 배포로 해석될 수 있다\n\n**→ 안전한 설계**\n\n```\ndata/geometry/*.geojson   ← OSM 원본 좌표. gitignore 또는 별도 ODbL 명시\ndata/profiles.ts          ← 계산 결과(ascent/descent 숫자)만. 좌표 없음\n```\n\n숫자만 남기면 좌표 데이
